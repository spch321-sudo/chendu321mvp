人無不無己，但你能決定「自己」無不無己。團隊的合一，不是等「所有人都變好了」才可能（那永遠等不到）；它是從「我先無己、我先讓耶穌在我這個肢體裡作王」開始的。你管不了那個爭的人、推卸的人（那是他與神之間的功課），但你可以求神先對付你、先讓你成為那個謙卑、成全、饒恕、連於頭的肢體。當你這樣做，你至少讓「合一」在你這裡不被破壞；而且你的無己，常常會像漣漪一樣，悄悄帶動、軟化身邊的人（謙卑帶動謙卑）。所以，親愛的，「身體的服事」之所以難，不是這個真理有問題，而是因為它要求「無己」——而無己本來就是一生最難、也最寶貴的功課。但也正因如此，團隊服事是神給你的大禮物：它是一面照妖鏡，照出你裡面還沒被對付的「己」；也是一個健身房，在一次次的摩擦、忍耐、饒恕、成全裡，把你的生命磨得越來越像耶穌。真正的合一，不是「沒有不同的人勉強湊在一起」，而是「一群願意無己、一起降服於耶穌這個頭、彼此相愛成全的人」，活出「不見一人、只見耶穌」的身體。那不容易，但那正是復興的實際。從你自己先無己開始，從你先連於那唯一的頭開始。"}},{"h":"三進入國度的服事，活出更深的隱藏","paras":["在小範圍裡服事，很容易被看見——就像在魚缸裡，每條魚都很明顯。⟦g:但當你進入「國度」的服事，範圍變大、焦點變廣，自然就隱藏了⟧——就像在大海中，你不再是焦點，神才是焦點。","國度的服事，有一個關鍵：⟦b:放下擁有，只在乎付出⟧。⟦s:不是建立自己的版圖⟧；⟦g:而是建立神的國；不是讓人記得我，而是讓人認識耶穌⟧。","這樣的生命，就是：⟦g:無己的生命、僕人的生命、國度的生命⟧。⟦g:不是建立我的事工，是建立神的國；不是擴展我的影響，是擴展耶穌的榮耀；越隱藏，越被神使用⟧。"],"pq":"服事的最高境界，不是你多有影響力，而是你讓耶穌有多少影響力——當人看不見你，卻看見耶穌，這就是最榮耀的服事。","deeper":{"q":"想更深？「建立神的國，不是建立我的事工」——可是我們不是也常講要「建立屬神的體系、建立神國的領域」嗎？這跟「建立我的事工」差在哪裡？我怎麼知道，我所做的，是在「建立神的國」，還是不知不覺在「建立自己的版圖」？","a":"這是一個極為關鍵、也極需要分辨的問題——因為「建立神的國」和「建立自己的版圖」，外表常常看起來一模一樣（同樣是聚會增長、事工擴展、人數變多），裡面的「動機與焦點」卻天差地別。先澄清：「建立屬神的體系、建立神國的領域」確實是321的「一個目的」，是神所喜悅、要我們去做的——所以「擴展、建造」本身完全不是錯。問題從來不在「有沒有事工」，而在「這擴展，是『誰的國』在擴展、為了『誰的榮耀』、由『誰作王』」。給你幾面「照妖鏡」，幫你誠實檢視。第一面鏡子：「王位上坐的是誰？」——這是最核心的。「神的國」是「神作王」的國（這正是兩個核心之一：讓耶穌作王）。真正建立神國的人，在他所建造的一切裡，耶穌是王、是頭、是中心、是發號施令的那一位；他自己只是僕人、管家，凡事求問「主，祢要怎麼做」。而「建立自己版圖」的人，雖然口稱為神，實際上「自己才是那個王」——是照「我」的意思、計畫、方法在建造，神只是被拿來「祝福我的計畫」的。問自己：是「我聽主的、讓主作王」，還是「我作主、求主配合我」？第二面鏡子：「榮耀歸給誰？」（上一課的功課）——建立神國的人，一切果效他都歸給神，喜樂是「看見耶穌被高舉」；建立版圖的人，事工的成功會悄悄餵養他「是我建立的、看我多行」，享受的是「自己被看見、被尊崇」。第三面鏡子：「是成全人、釋放人，還是擁有人、控制人？」——建立神國的人是「父母的心」，樂意成全、釋放別人、甚至讓別人超過自己（他必興旺，我必衰微）；建立版圖的人傾向「擁有、抓住、控制」，要人都歸我帶領、都需要我，怕人獨立、怕失去掌控。問自己：我是巴不得我帶的人趕快獨立、去建立更多（哪怕離開我），還是暗暗希望他們永遠需要我、留在我的圈子裡？第四面鏡子：「在乎付出，還是在乎擁有？」——建立神國的人焦點在「我能付出、給出去、成全多少」；建立版圖的人焦點在「我能擁有、掌握、累積多少（人數、資源、名聲）」。一個是流出去的生命，一個是抓進來的生命。第五面鏡子：「能不能為了神整體的國，犧牲我這一塊？」——真正建立神國的人，能樂見別的教會、別的同工比我興旺（因為那也是神的國在擴展）；願意為神更大的計畫放下我自己這一塊；不會把「別人的事工」當競爭對手。建立版圖的人則會把焦點縮在「我這一塊」——別人興旺他會嫉妒、有威脅感。問自己：當別人比我興旺時，我是真心為神的國歡喜，還是心裡酸酸的、覺得被比下去？這幾面鏡子照下來，你會發現：「建立神國」與「建立版圖」的差別，全在「無己」與「有己」。建立神國，是無己的——讓耶穌作王、榮耀歸神、成全釋放人、在乎付出、心懷神整體的國；建立版圖，是有己的——自己作王、榮耀歸己、擁有控制人、在乎累積、只顧我這一塊。而最誠實、也最讓人謙卑的提醒是：這兩者的界線，在我們心裡常常是「混雜」的、會「悄悄滑動」的。沒有人是純粹的，我們在建立神國的同時，那個「有己」常常會偷偷混進來、想分一杯榮耀、想擴張一點自己。所以這不是一次就分辨清楚、從此高枕無憂的事，而是需要「天天用這些鏡子照自己、天天把混進來的『己』交給神對付、天天重新校準讓耶穌作王、讓耶穌得榮耀」的功課。這正是為什麼「神」（榮耀歸神）放在靈悟命侍神的「最後、也是最關鍵」的一步——因為它是保守你所建造的，真正是「神的國」而不是「自己版圖」的守門人。所以，去建立、去擴展神的國吧——這是神的呼召，不要因噎廢食。只是要天天、誠實地用這幾面鏡子照自己：王位上坐的是耶穌嗎？榮耀我歸給神了嗎？我是在成全釋放人，還是擁有控制人？我在乎的是付出還是擁有？我能為神整體的國放下我這一塊嗎？當你越無己——越讓耶穌作王、越把榮耀歸給神、越成全人、越在乎付出、越心懷神整體的國——你所建立的，就越是「神的國」；你也就越活出這一課最美的境界：「不是建立我的事工，是建立神的國；不是擴展我的影響，是擴展耶穌的榮耀」——讓人不見你，只見耶穌。"}}],"focus":"當我服事、分享、被看見的時候，\n結束之後，\n人記得的，\n是「我這個人真不錯」，\n還是「他們遇見了耶穌」？","hope":{"t":"✺ 你最美的時刻，是讓人只看見耶穌","paras":["也許你心裡偶爾會渴望被看見、被肯定、被記得——這是人最自然的渴望。但這一課把服事最高、也最自由的境界交給你：⟦b:不見一人，只見耶穌⟧。真正成熟的服事，不是你站得多高、多被看見，而是你讓所有人的眼目，都越過你，看見了耶穌。","⟦g:當你選擇隱藏、不爭、成全別人、活在身體裡、讓耶穌作唯一的頭，你不是「消失了、沒價值了」，而是進入了最深的自由——你再不必靠被看見來證明自己⟧。就像變像山上，當摩西、以利亞都隱去，門徒「舉目不見一人，只見耶穌」。那一刻，不是你的失落，是你最榮耀的成全：你成了一扇透明的窗，人透過你，看見的，是基督的榮光。"]},"still":"此刻安靜——\n誠實地問自己：\n我裡面，\n是否還有一個「渴望被看見、\n怕被忽略、怕被取代」的我？\n我願意把它，交給主嗎？","still_hint":"不必否認，也不必自責。\n安靜一分鐘，\n把那份渴望交給主：\n「主啊，我願意隱藏，\n讓人不見我，只見祢。」","steps":[{"act":"刻意把焦點從自己轉向耶穌：在任何服事、分享、見證中，少提自己、多提耶穌，讓人記得的是「神做了什麼、神如何工作」。","meta":""},{"act":"操練「不搶位置」：在團隊中不爭功、不搶話、不強出頭；學習讓別人被成全、讓別人被看見。你越放下，神越提升你。","meta":""},{"act":"主動進入「帶—陪—放」的傳承：不要只做事，要開始帶人、陪人、放人，讓生命不斷繁殖，讓焦點不再集中在你，而是擴散、最終歸給耶穌。","meta":""}],"declare":"主耶穌，我願意隱藏自己，高舉祢。\n我不再追求被看見，我只渴望祢被高舉。\n我宣告：不見一人，只見耶穌；\n不是我活，乃是基督在我裡面活；\n一切榮耀，都歸給祢！\n願我的生命，成為指向祢的記號！\n奉主耶穌的名，阿們。","share":[{"tag":"領受","q":"「不見一人，只見耶穌」——這個服事的最高境界，跟你原本以為的「成功服事」（被看見、有影響力）有什麼不同？它給你什麼釋放？"},{"tag":"省察","q":"誠實面對：我裡面是否還有一個「渴望被看見、怕被忽略、怕被取代、想搶焦點」的部分？它最常在什麼情況下冒出來？"},{"tag":"同行","q":"這禮拜，請你刻意操練一次「隱藏」——讓出一個本可被看見的機會給別人，或在分享中刻意高舉耶穌而非自己。說出來，讓小家的家人陪你一起、彼此守望。"}],"next":"靈悟命侍神，走在得勝的服事之路","prog":"93"},{"n":171,"unit":"第十單元 · 服侍——靈悟命侍神的得勝之路","title":"靈悟命侍神，\n一生的道路","no":"171","greet":"願你來到主的面前，得享安息","verse":"體貼肉體的，就是死；體貼聖靈的，乃是生命、平安。","verse_ref":"羅馬書 8:6","bigidea":"本課核心（全課程終章）：一個人如何一生走在神的道路上，不偏離、不枯乾、不跌倒？答案就在五個字——靈、悟、命、侍、神。這不是五個階段，而是一條持續循環、一生要走的生命之路。它的核心是「無己」：有己，就無路；無己，就有路。耶穌說：「我就是道路。」","lead":"我們來到《晨讀321》的最後一課。一個人如何一生走在神的道路上，不偏離、不枯乾、不跌倒？答案就在這五個字——靈—悟—命—侍—神。這不是五個階段，而是一條「持續循環的生命之路」；不是走過就好，而是每天都在走。從信主開始，直到見主面，我們都要不斷活在這條路上。而這條路的核心，就是一個關鍵：無己。因為——有己，就無路；無己，就有路。耶穌說：「我就是道路。」當我們放下自己，我們就走在這條生命之路上。","sections":[{"h":"一「靈」與「悟」：生命的起點——聖靈引導與真理更新","paras":["「體貼肉體的，就是死；體貼聖靈的，乃是生命、平安。」（羅8:6）⟦b:生命的起點，不在行為，在「選擇跟隨誰」⟧——⟦s:跟隨肉體 → 死亡⟧；⟦g:跟隨聖靈 → 生命與平安⟧。「靈」就是：聖靈是我的引導。不靠自己的聰明、過去的經驗，而是每一刻都問：聖靈要我怎麼做？","而「悟」，就是：聖經是我的準則。「不要效法這個世界，只要心意更新而變化。」（羅12:2）⟦g:聖靈會引導我們進入真理，而真理會更新我們的觀念——觀念改變 → 生命改變；生命改變 → 生活改變⟧。","⟦g:不是憑感覺活，是憑聖靈活；不是照自己的想法，是照神的真理；從地上的觀點，進入天上的觀點⟧。"],"deeper":{"q":"想更深？走到全課程的最後一課，回頭看——「靈悟命侍神」這條服事的路，跟整本《晨讀321》一路走來教的「三個基礎、兩個核心、一個目的」，到底是什麼關係？這五個字，是不是把前面170課全都收攏起來了？","a":"是的，你看見了——「靈悟命侍神」這五個字，正是把整本《晨讀321》、把整個321理念，收攏成一條「可以天天走、一生走」的生命之路。讓我們在這最後一課，把這條主線完整地串起來。先看「靈悟命侍神」如何完整對應321的「三個基礎、兩個核心」：「靈」＝第一個基礎，「聖靈是我的引導」；「悟」＝第二個基礎，「聖經是我的準則」（領悟並遵行真理）；「命」＝第三個基礎，「耶穌是我的榜樣」（活出耶穌的生命）；「侍」＝第一個核心，「讓耶穌作王」；「神」＝第二個核心，「讓耶穌得到一切的榮耀」。所以「靈悟命侍神」＝（三個基礎）＋（兩個核心）——它把321最核心的「3」和「2」，按生命流動的次序，串成了一條動線。那「1」（一個目的：建立屬神的體系）呢？它就是這條路走出來、流出去的「結果」——當許多人都走在靈悟命侍神的路上、活出無己、彼此相愛、傳承生命，「屬神的體系、神國的領域」就在地上被建立起來了。所以這五個字，把321的「3、2、1」全都收攏、貫穿了。再看它如何收攏整本《晨讀321》一路走來的脈絡。回顧這趟旅程：開頭，我們學「邁進大復興、從巴比倫出來、對準耶穌」；接著進入「從心開始、用心靠聖靈」——這是「靈」的根基；然後是「觀念的改變」（八大步驟、改變觀點）——這是「悟」的功課；再來是復興之路的核心「無己、謙卑、捨己」——這是「命」的根；第八單元「生命」（看聽想講行的更新）——這是「命」的培養，把無己的生命真實地活出來；第九單元「關係」（重整次序）——這是無己的生命流向關係；最後第十單元「服侍」（靈悟命侍神）——這是生命流向關係之後，進一步流出去服事、讓耶穌作王、讓耶穌得榮耀。你看，整本書的脈絡，正是「靈悟命侍神」這條路的鋪展。而貫穿這一切的，是那個一再出現的次序——「先生命、再關係、後事工」，以及那個一再出現的核心——「無己」。為什麼「無己」是這整條路的核心、是這最後一課的鑰匙？因為「有己，就無路；無己，就有路」。你回想整趟旅程會發現：人一切的問題，根源都是「有己」（以自己為中心、自己要作王、驕傲、離開本位想代替神）——這是人類墮落的根源。而神在耶穌裡為我們預備的整個救恩、這整條321的路，要成就的，就是把我們從「舊人有己」的生命，改變成「新人無己」的生命：藉著福音真理，我們才能無己；無己，才能讓耶穌在裡面活、作王；無己，才能被聖靈引導；無己，才能合一、才能得勝、才能建立屬神的體系、成就神的國。所以「靈悟命侍神」這條路，從頭到尾都是「無己」的路——靈，是無己地讓聖靈引導（不靠自己的聰明）；悟，是無己地讓真理更新（不效法世界、不固守己見）；命，是無己地活出耶穌（不再是我，乃是基督）；侍，是無己地讓耶穌作王（不是我服事，是基督在我裡面服事）；神，是無己地讓耶穌得榮耀（他必興旺，我必衰微）。五個字，是無己生命的五個面向、一條動線。所以這最後一課的「靈悟命侍神」，不是一個新的、額外的東西，而是把你這170課所學的一切——三個基礎、兩個核心、一個目的，從心開始、改變觀念、無己謙卑捨己、生命關係事工——全都收攏、貫穿、串成了一條你可以「從今天起、一生天天走」的路。它是整本《晨讀321》的總綱，也是你往後一生的生命地圖。"}},{"h":"二「命」與「侍」：生命的活出——效法耶穌與讓祂作王","paras":["當我們有了「靈」與「悟」，接下來不是停在「知道」，而是進入「活出」——這就是「命」：耶穌是我的榜樣。透過每天的看、聽、想、講、行，不斷做一個選擇——⟦b:捨己⟧。⟦g:當你一次一次選擇捨己，你就一次一次活出無己的生命⟧。「命」不是模仿，是讓耶穌活出來。","接著，就是「侍」：讓耶穌作王。⟦b:服事不是我在做，而是耶穌在我裡面做——我退下來，耶穌站上來⟧。⟦g:當耶穌作王，服事就有能力、有果效、有生命⟧。","⟦g:不是我活，乃是基督在我裡面活；不是我在服事，是耶穌在服事；用心靠聖靈，不用腦靠自己⟧。"],"deeper":{"q":"想更深？走完整個第十單元（服侍），如果要把這一整個單元收攏成一句話帶走，這條「靈悟命侍神」的服侍之路，到底要在我這個平凡人的一生裡，活出什麼？它跟我「每一天」的真實生活，有什麼關係？","a":"走到第十單元的尾聲，正好把這條「服侍之路」收攏成一句可以帶走、可以天天活的話。先把整個單元走過的路濃縮一次：它開頭重新定義了「服事」——服事不是在教會做事，而是「為主而活的整個生命」（157）；接著翻轉了服事的動機——服事不是別人的需要，而是「我生命的需要與祝福」（158-159）；又拿掉了服事的門檻——不是夠好才服事，而是「願意的人都能，在服事中被神裝備」（160）；然後給出了整條路的總綱與展開——「靈悟命侍神」：從聖靈起步（靈，162-163）、被真理更新（悟，164）、活出生命與捨己（命，165-166）、讓耶穌作王地服事（侍，167）、傳承生命（168）、最終讓耶穌得一切榮耀、不見一人只見耶穌（神，169-170）。所以若用一句話收攏整個第十單元，那就是：「真正的服事，是一個無己的生命，從聖靈的源頭流出，被真理更新、活出耶穌、讓耶穌作王、傳承生命，最終讓耶穌得到一切的榮耀——服事不是我做事，是讓基督的生命透過我流出去。」那這條路，跟你「每一天」的真實生活有什麼關係？關係極深，因為「靈悟命侍神」從來不是一套只在教會、只在台上才用得到的理論，而是一條「每天、在最平凡的生活裡」要走的路。讓我們把它落到你的一天：清晨，當你醒來，第一件事不是急著靠自己安排、衝進忙碌，而是先回到「靈」——把這一天交給神，求聖靈充滿你、引導你：「主啊，今天我不靠自己，只靠祢的靈。」這就是「靈」在你日常的活出。白天，當你讀經、當你遇見一件事、一個難處、一個需要做的決定，你讓神的話來「更新你的觀念」，問「主，祢的真理怎麼看這件事」，而不是照自己的老想法、世界的標準——這就是「悟」在你日常的活出。然後，在這一天無數個「看、聽、想、講、行」的選擇裡——被誤解時選擇饒恕而非反擊、想為自己爭時選擇放下、想論斷時選擇憐憫、累了卻有人需要時甘願擺上——每一個「為主、為人、不為自己」的小選擇，都是一次「捨己」，都是在「活出耶穌的生命」——這就是「命」在你日常的活出。而當你去服事、去愛人、去做你手中的工時，你不是靠自己硬撐、不是為了證明自己，而是把主權交給耶穌，讓祂在你裡面作王、靠祂的能力去做——這就是「侍」在你日常的活出。最後，無論這一天成功或失敗、被看見或被忽略，你都在心裡把一切交還給神：「主，這都是祢的恩典，榮耀歸給祢，他必興旺、我必衰微」——這就是「神」在你日常的活出。你看，「靈悟命侍神」不是五件遙遠的大事，而是貫穿你「每一天、每一刻、每一個選擇」的一條生命動線。它具體到——你今天早上靠誰起步？你今天怎麼看待那件煩心的事？你今天在那個衝突裡為自己還是為主？你今天做事是靠自己撐還是讓耶穌作王？你今天把那份稱讚或挫折，歸給了自己還是神？這就是它跟你每一天的關係：它是你「平凡生活的得勝公式」，是你一生「不偏離、不枯乾、不跌倒」的保守。而它的核心，始終是「無己」——每一天，在每一個環節，都是一次「放下自己、讓基督」的選擇。所以帶走這一句吧：「靈悟命侍神，不是我要為神做的五件大事，而是我每一天靠聖靈起步、讓真理更新、活出耶穌、讓主作王、把榮耀歸神的一條無己之路——是讓基督的生命，一天又一天，透過我這個平凡人，活出來、流出去。」這條路，今天的你就能走；走上去，你就走在那位說「我就是道路」的主裡面了。"}},{"h":"三「神」：生命的終點——一切榮耀歸給神","paras":["最後的關鍵，是「神」：讓耶穌得到一切的榮耀。⟦s:很多人走到「侍」就停了，卻忽略了最後最重要的一步⟧。⟦s:如果沒有「神」，就會驕傲、會搶奪榮耀、會跌倒⟧。","⟦g:但當一個人看見「一切都是恩典、一切都是神做的」，他就會自然活在謙卑中⟧。主耶穌的一生就是榜樣——⟦b:祂極其謙卑，最終得到一切榮耀⟧。這也是我們的道路：⟦g:謙卑 → 被神高舉⟧。","⟦g:不是我得榮耀，是耶穌得榮耀；焦點在耶穌，不在自己；無己的結果，就是神得榮耀⟧。"],"pq":"這條路，不是短跑，是馬拉松；不是一時火熱，是一生跟隨。當你持續走在靈—悟—命—侍—神，你就越來越像耶穌，最終與主一同得勝、與主一同作王。","deeper":{"q":"想更深？走到《晨讀321》全部171課的最後了。如果要把這「一整本書、一整趟旅程」收攏成一句話帶走，這321的路，把我帶到了哪裡？接下來，我該怎麼走下去？","a":"走到這裡，是171課的終點，也是你一生道路的起點。讓我們在這最後的時刻，把整趟旅程收攏，也為你接下來的路，立定方向。先回顧這趟我們一起走過的、完整的旅程。它從「呼召」開始：神呼召你「從巴比倫出來、邁進末後的大復興、迎接主再來」，並讓你看見——復興的焦點，從頭到尾，是耶穌（單元一）。接著祂為你立定根基：三個基礎（耶穌是榜樣、聖經是準則、聖靈是引導）、兩個核心（讓耶穌作王、讓耶穌得榮耀）、一個目的（建立屬神的體系）——這就是321（單元二、三）。然後，祂開始動工——從你的「心」開始，因為「一生的果效是由心發出」：教你用心靠聖靈、不用腦靠自己（單元四）；教你「改變觀念就改變生命」，從人的觀點轉向神的觀點（單元五）；帶你進入整趟旅程的核心——看見「有己」是墮落的根源、驕傲是問題的根源，於是學習謙卑（單元六）、捨己（單元七），好讓那「舊人有己」的生命，被改變成「新人無己」的生命。接著，祂培養這無己的生命——透過「看聽想講行」的更新，讓真理成為生命、由內而外活出來（單元八，生命）；又讓這成熟的生命流向關係，重整「與神、與己、與人、與事」的次序（單元九，關係）；最後，讓這份愛與關係流出去，成為「服侍」——走在靈悟命侍神的路上，讓耶穌作王、得一切的榮耀（單元十，服侍）。這就是整趟旅程：呼召 → 立根基（321）→ 從心開始、改變觀念 → 無己（謙卑、捨己）→ 培養生命 → 流向關係 → 落實為服侍。那麼，若用一句話收攏整本《晨讀321》，它是什麼？是這個：「神藉著福音真理，要把你從『舊人有己、以自己為中心、要自己作王』的生命，改變成『新人無己、讓耶穌作王、讓耶穌得一切榮耀』的生命；好讓你不再活在失敗裡，而是反敗為勝、成為得勝者，與許多同樣被更新的生命一起，在地上建立屬神的體系、神的國度，邁進末後的大復興，迎接主耶穌再來。」一句話再濃縮：「無己，讓耶穌作王，讓耶穌得到一切的榮耀，建立屬神的體系。」——這就是321，這就是這171課要在你生命裡成就的。那321的路，把你帶到了哪裡？它把你帶到了一個全新的起點：一個「看見自己的問題（有己、驕傲），也看見上帝的恩典（耶穌的死解決罪、耶穌的復活賜下新生命）」的起點；一個「不再靠自己、而是靠聖靈，不再為自己、而是為耶穌」的起點；一個「焦點不在自己、不在別人、不在環境，單單在耶穌」的起點。但要記得——這只是「起點」，不是「終點」。171課的結束，不是「畢業」，而是「上路」。因為「靈悟命侍神」是一條「一生的道路、不斷的循環」，是馬拉松，不是短跑。所以接下來，你該怎麼走下去？第一，「天天走這條路」。不要把這171課當成「讀完了、結束了」的一本書，而要把它當成「一生天天要走的路」。每天從「靈」開始（靠聖靈）、用「悟」更新（讓真理改變觀念）、在「命」中捨己（活出耶穌）、在「侍」中讓主作王（服事）、以「神」收尾（榮耀歸神）。改變，從來不是讀完就完成，而是「漸漸更新」、一生之久的同行。第二，「操練920、發展235」。不要只是自己屬靈就好——把每一個與你有關係的人當作你的「2」，活出無己（0）、結出聖靈的果子（9）；與沒有問題的人成為屬靈同伴（2）、建立屬靈父母兒女的關係（3）、成為屬靈戰友五重職分的團隊（5）。讓生命流向關係、流向傳承，這才是321的目的——不是一個孤立完美的「我」，而是一張被神的愛重新連結的「關係的網」、一個彼此相愛的「屬神的群體」。第三，「陪伴人，成為得勝者」。你被神更新，是為了去更新別人；你被陪伴，是為了去陪伴別人。從你身邊那一個人開始，帶他、陪他、放他，讓基督的生命一代一代傳承下去，一起在地上建立神國的領域，直到主耶穌再來。第四，也是最要緊的——「持續無己，讓耶穌作王、得榮耀」。這條路會有軟弱、會有跌倒、會有反覆，但別灰心：那位「在你們心裡動了善工的，必成全這工，直到耶穌基督的日子」（腓1:6）。你的盼望，從來不在你做得多好，而在「祂必成全」。所以，親愛的弟兄姊妹，《晨讀321》的171課在這裡畫下句點，但你與主同行的生命之路，正要展開。願你一生走在「靈—悟—命—侍—神」這條道路上，不偏離、不枯乾、不跌倒；願你舊人有己的生命，真實地成為新人無己的生命；願你失敗的人生，真實地反敗為勝，成為得勝者；願你與許多被更新的生命，一起建立屬神的體系、邁進末後的大復興、迎接主耶穌再來。到那日，你必與主一同得勝、與主一同作王，在神的國裡，與基督同坐寶座，直到永遠。這不是結束，是開始。起來，走上去——因為那說「我就是道路」的主，已經在這條路上，與你同行。一切榮耀，都歸給祂。阿們。"}}],"focus":"《晨讀321》走到了最後一課。\n但「靈—悟—命—侍—神」\n這條一生的道路，\n才正要開始。\n從今天起，\n我願不願意，天天走在其上？","hope":{"t":"✺ 這不是結束，是你一生道路的開始","paras":["走完171課，你或許以為這是一段旅程的「結束」。但這一課要對你說：⟦b:這不是結束，是開始⟧。「靈—悟—命—侍—神」不是五個讀完就過去的階段，而是一條「一生天天要走、不斷循環」的生命之路——是馬拉松，不是短跑；是一生跟隨，不是一時火熱。","⟦g:當你持續走在這條路上，你會越來越被聖靈充滿、越來越明白真理、越來越活出生命、越來越流露愛、越來越將榮耀歸給神⟧。到最後你會發現——不是你在為神做事，而是神在你裡面，活出祂的生命。願你舊人有己的生命，成為新人無己的生命；願你失敗的人生，反敗為勝，成為得勝者。起來，走上去吧——因為那位說「我就是道路」的主，已經在這條路上，與你同行，直到祂再來的日子。一切榮耀，都歸給祂。"]},"still":"此刻安靜——\n回顧這171課，\n神在我生命裡，\n最深地動了哪一處？\n而從今天起，\n祂邀請我，踏上這條一生的道路。","still_hint":"不必急著總結，只要回應。\n安靜一分鐘，\n把你的一生，交給主：\n「主啊，我願意一生走在\n靈—悟—命—侍—神的路上，直到見祢面。」","steps":[{"act":"每天從「靈」開始、用「悟」更新：每天問——今天我是跟隨聖靈，還是跟隨自己？並透過神的話修正思想、更新觀念、對齊真理，不讓舊觀念主導人生。","meta":""},{"act":"每天在「看聽想講行」中捨己、讓耶穌作王：刻意選擇不為自己、為耶穌、為別人；服事時不問「我要怎麼做」，而問「主，祢要怎麼做？」把主權交給耶穌。","meta":""},{"act":"每天把一切榮耀歸給神、並傳承生命：無論成敗都宣告「一切都是恩典、榮耀歸神」；並從身邊一個人開始，帶他、陪他、放他，讓生命一代一代傳承。","meta":""}],"declare":"主耶穌，我願意一生走在祢的道路上。\n我宣告：\n我選擇體貼聖靈，活出生命；\n我選擇對齊真理，更新觀念；\n我選擇效法耶穌，活出無己；\n我選擇讓主作王，帶出服事；\n我選擇將一切榮耀歸給神！\n我要一生走在「靈悟命侍神」的道路上，直到見祢面的日子！\n奉主耶穌的名，阿們。","share":[{"tag":"領受","q":"走完整本《晨讀321》171課——如果要用一句話，說出神在你這段旅程中，為你成就最大的一件事，那會是什麼？"},{"tag":"省察","q":"「靈—悟—命—侍—神」這五個字，目前哪一個字是你最自然、已經在走的？哪一個字是你最需要從今天起，刻意操練、走下去的？"},{"tag":"同行","q":"這是171課的終點，也是一生道路的起點。請每位家人分享：從今天起，你要如何「天天」走在這條路上？並彼此立約、彼此守望，一起走下去、一起成為得勝者，直到主再來。"}],"next":"","prog":"100"}]</script>
<script type="application/json" id="book-json">[{"n":0,"num":"Ⅷ","title":"復興的實際—建立關係","verse":"祂回答：「你要全心、全性、全意愛主你的上帝。這是最重要的第一條誡命。第二條也和它相似，就是要愛人如己。」（新譯本，太22:37-39）","verse_ref":"","blocks":[{"t":"p","x":"復興不是一個口號，復興是實際的！復興是可見的、是可行的、可衝量的！"},{"t":"p","x":"**復興是可見的**：復興是肉眼可見的，從個人生命的改變開始，進而生命影響生命，繁殖生命，影響社會和國家。"},{"t":"p","x":"**復興是可行的**：復興是可以做到的，人得到耶穌的生命後，運用「培養白狗，餓死黑狗」的策略，藉著反覆操練五個基本功「看、聽、想、講、行」來培養屬靈的生命。"},{"t":"p","x":"**復興可衡量的**：復興是可衡量的，如何知道我們是否有選擇正確的「看、聽、想、講、行」？其準則就是建立關係。能建立關係的「看、聽、想、講、行」就是正確的選擇！為何？在這個單元中，我們將會探討並解釋這個問題。"},{"t":"h","x":"上帝的旨意"},{"t":"h","x":"遵行上帝旨意的重要性"},{"t":"p","x":"聖經從始至終，都強調遵行上帝旨意的重要性。在任何一個時期，無論是創世的時候[^1]、始祖時期[^2]、曠野的時期[^3]、迦南美地[^4]、列王時期[^5]、漂流時期[^6]、甚至在耶穌的時代[^7]，上帝都重覆著同樣的要求，就是要我們遵行上帝的旨意。為什麼上帝那麼看重遵行祂的旨意呢？「這世界和其上的情慾都要過去，惟獨遵行神旨意的，是永遠常存」[^8]。這世界唯一能常存的，就是遵行上帝的旨意。世上所做所得的，有一天都會轉眼成空。若要生命有人生的價值在於："},{"t":"p","x":"一、活在上帝的旨意"},{"t":"p","x":"二、死在上帝的旨意"},{"t":"p","x":"三、傳承上帝的旨意"},{"t":"p","x":"價值，就必須遵行上帝的旨意。"},{"t":"p","x":"遵行上帝的旨意有不同的階段。我們不單要「活在上帝的旨意」，「死在上帝的旨意」，更是要「傳承上帝的旨意」。**「活在上帝的旨意」**是遵行上帝旨意的起步，常會面對困難和挑戰。若沒有「死在上帝的旨意」，也就是堅持到底的心志，就很容易半途放棄上帝的旨意。"},{"t":"p","x":"**「死在上帝的旨意」**就是抱著一個不怕死的心志、毫無保留地遵行上帝的旨意。讓生命變得更有價值的就是**「傳承上帝的旨意」**，就是幫助別人也能「活在上帝的旨意」並「死在上帝的旨意」，如此我們的生命就帶來影響力。摩西的生命就是如此，他不單自己遵行上帝的旨意，也傳承上帝的旨意給約書亞，讓以色列人能出埃及，進迦南，脫離被奴役的人生。「傳承上帝的旨意」也是耶穌的榜樣[^9]，耶穌凡事都照著上帝的旨意而行，堅持遵行上帝的旨意，直到付上生命的代價，「死在上帝的旨意」中。祂的生命影響了門徒們，在耶穌升天後，門徒們都甘心「活在上帝的旨意」、「死在上帝的旨意」，並繼續「傳承上帝的旨意」，福音就被傳開，並延續到如今！"},{"t":"p","x":"遵行上帝的旨意，不單使我們的生命有價值，也是我們屬靈生命成長的關鍵。「我的食物就是遵行差我來者的旨意，作成祂的工」[^10]。我們屬靈生命的食物就在於正確的行，那就是遵行上帝的旨意，並做成上帝的工。"},{"t":"h","x":"什麼是上帝的旨意？"},{"t":"p","x":"那，什麼是上帝的旨意呢？上帝的旨意並不是深不可測的，也不需要經過很長時間禱告才能明白。上帝不會向我們隱藏祂的旨意，上帝從古至今都很願意向我們顯明祂的旨意。在舊約，上帝藉著摩西把祂的旨意教訓祂的百姓，使他們遵守並得福。如今，上帝仍然藉著聖經，把祂的旨意向我們說明，使我們「既從律法中受了教訓，就曉得神的旨意，也能分別是非」[^11]，可見上帝的旨意是顯明的，要讓我們知道並在凡事上遵行祂的旨意。"},{"t":"p","x":"既然上帝藉著聖經說明祂的旨意，那聖經中最主要的教訓是什麼呢？耶穌的回答是：「你要盡心、盡性、盡意愛主你的神。這是誡命中的第一，且是最大的。其次也相仿，就是要愛人如己。這兩條誡命是律法和先知一切道理的總綱」[^12]，也就是說聖經中所有的誡命可以歸納為這兩個誡命，就是要愛上帝，並且愛人如己。耶穌也給了我們一條新命令：「我賜給你們一條新命令，乃是叫你們彼此相愛；我怎樣愛你們，你們也要怎樣相愛」[^13]。這個命令是指著門徒們要彼此相愛，也就是要愛教會！我們不難發現，這三個命令有一個共同元素，那就是「愛」：愛上帝、愛人及愛教會。**在上帝所有的命令中，最重要的就是「愛」**，因此遵行上帝的命令，就是要在「愛」裡[^14]。沒有愛的遵行，即使我們做出極大的犧牲，也是徒然的[^15]。"},{"t":"p","x":"愛是如此重要！那我們怎麼知道自己是否有「愛」呢？**衡量「愛」的方式就是建立關係**。如何衡量我們是否愛上帝，或彼此相愛呢？就是我們是否與上帝建立關係？是否建立與彼此的關係。上帝吩咐我們「愛上帝」和「愛人」的目的，就是要建立關係，上帝「愛」我們，把祂所愛的獨生子耶穌賜下，為我們捨命，為使我們藉著耶穌，恢復與上帝的關係，成為上帝的兒子[^16]。耶穌因為「愛」，願意捨去生命來建立上帝與人的關係，因此衡量是否是上帝旨意，關鍵就在於所行的是否能建立關係。"},{"t":"p","x":"建立關係是上帝的旨意，從創世以來，就看重與人的關係：把人安置在伊甸園，常與人同在[^17]；而隔離是撒旦的心意，牠的工作就是要破壞關係[^18]。當人聽從撒旦的話後，就開始與上帝隔離，不敢見上帝的面。人與人之間的關係也受到破壞，人開始推卸責任，甚至人與事物的關係也受到破壞，地受到咒詛，並開始長荊棘和蒺藜。然而，上帝的旨意並沒有改變，祂仍然渴望與人建立關係。藉著祂的作為和律法，要與人建立關係，並反覆地提醒人：「我要作你們的神，你們要作我的子民」[^19]。後來更藉著耶穌的死，洗淨我們的罪[^20]，藉聖靈常住在我們的心裡[^21]，以上這些都表明上帝要和我們恢復，並建立關係的渴望。"},{"t":"p","x":"上帝看重關係，祂也渴望我們能重視關係！除了吩咐我們愛上帝、愛人如己，及彼此相愛之外，其他吩咐也多半都與建立關係有關。比如耶穌給門徒的大使命，就是要去使萬民作主的門徒。顯然的，若要達成這個使命，就必須與人建立關係，並幫助他人與上帝建立關係。另外，耶穌也多次提醒我們要饒恕人，就必得到天父的饒恕[^22]，這個「要饒恕人」的吩咐，不單要恢復與人的關係，同時也直接影響我們與上帝的關係，因此，上帝旨意的中心就是建立關係。我們所做的事若能帶來關係的建立，那就是上帝的旨意。"},{"t":"h","x":"關係的次序"},{"t":"p","x":"不是所有關係的建立，都是上帝的旨意。我們必須對建立關係的次序有正確的了解，因為離開了關係次序而建立的關係，不是上帝的旨意！關係有不同的次序：先是與上帝的關係，與自己的關係，與他人的關係，最後是與事物的關係。**最優先的次序是建立與上帝的關係！**任何破壞了我們與上帝的其他關係，就不是上帝的旨意；比如婚外情，有婦之夫若與妻子以外的女人建立關係，這樣的關係，不單會破壞與妻子的關係，也會破壞與上帝及與自己的關係，這關係的建立就不是上帝的旨意！"},{"t":"p","x":"顛倒了建立關係的次序，便是離開了上帝的旨意，破壞了原本上帝所造和諧的關係，例如當我們把與事物的關係，放在其他關係之上，就是所謂的「對事不對人」，就會因著注重事物，而破壞了前三種關係，這不是上帝的旨意。正如掃羅的獻祭，因著要在作戰前先獻祭（與事的關係），及留住百姓（與人的關係），沒有等撒母耳的來到就私自獻祭，破壞了與上帝的關係，被撒母耳責備[^23]。之後又因著憐惜牛羊（與事的關係），沒有聽從上帝的吩咐把牛羊滅絕，這樣的行動被形容為厭棄耶和華的命令，破壞了掃羅與上帝的關係。一個看來是好的行動，若是破壞了我們與上帝的關係，就不是上帝的旨意，因此撒母耳說：「……聽命勝於獻祭；順從勝於公羊的脂油」[^24]，表達了上帝看重人與祂的關係，過其他一切。"},{"t":"p","x":"關係的次序："},{"t":"p","x":"一、與上帝的關係"},{"t":"p","x":"二、與自己的關係"},{"t":"p","x":"三、與他人的關係"},{"t":"p","x":"四、與事物的關係"},{"t":"p","x":"上帝常提醒我們：要把與祂的關係放在為祂所做的事之上！上帝渴望的是我們與祂之間互動的關係，就是願意聽從、順服祂，這樣的關係，勝過我們所獻的事奉。我們不要讓與事的關係，包括屬靈的事奉，超越了我與上帝和與人的關係，否則就會損壞與上帝，與人，與自己的關係，這也是許多人在事奉中感到壓力煩惱，甚至灰心喪志的原因，因此我們必須認清，並調整建立關係的正確次序。"},{"t":"h","x":"一、與上帝的關係"},{"t":"p","x":"世上唯一能持續到永恆的關係，就是與上帝的關係！啟示錄中，末後在天上剩下的關係，就是人與上帝的關係[^25]，這個關係不單最持久，也是我們人生中最重要的關係。耶穌來到世界拯救我們，叫我們不至滅亡，反得永生[^26]，這永生不是指著長生不老或永遠不死，而是指能建立與上帝的關係：「認識你獨一的真神，並且認識你所差來的耶穌基督，這就是永生」[^27]，能認識上帝並耶穌，就是永生。可見，「與上帝的關係」是人生中最重要的關係！"},{"t":"p","x":"永生不是指信主的那個時刻，也不是等到死了才能擁有的；耶穌所提到的永生，是認識上帝並耶穌，是一個從現在持續到永恆的過程。更多認識上帝，就能更多相信祂，這個**與上帝之間的關係，就是永生**。世上不論是與自己、與他人或是與事物的關係，都是為了讓我們能更認識上帝，使我們建立與上帝的關係。在人生的不同遭遇中所面對的人或事，都讓我們經歷上帝並更認識祂[^28]，保羅也渴望竭力追求更認識基督[^29]。特別是在苦難中，我們更能認識上帝[^30]並明白上帝的話[^31]，因此在面對苦難時，更應該感恩及歡喜，因為是我們認識上帝的機會，是有意義和價值的。其實不單在苦難中，在任何環境中，我們都可以問上帝：「祢在這當中要告訴我什麼？」。上帝必顯明祂的心意，幫助我們更認識祂，建立更深的關係。"},{"t":"p","x":"建立與上帝的關係是最優先的，是所有關係的基礎。「我們愛，因為神先愛我們」[^32]：只有藉著認識上帝的愛，我們才能去愛，去經營和建立其他層面的關係。"},{"t":"h","x":"二、與自己的關係"},{"t":"p","x":"大誡命的第一條是要愛上帝，其次是要愛人如己[^33]。「愛上帝」說明與上帝的關係是首要的，而「愛人如己」則提醒我們必須先學會愛自己，然後才有辦法去愛人。人若不了解上帝對我們的愛，就不懂得愛自己[^34]，也不懂得如何愛別人。只有認識耶穌無條件的接納我們，我們才能無條件的接納自己，並無條件的接納別人；換句話說，我們必須與上帝有良好的關係，才能與自己有良好的關係，與自己有了良好的關係，才能與別人建立良好的關係。"},{"t":"p","x":"什麼是與自己有良好的關係？就是內外一致，用「信心」與「行為」，把與上帝的關係表現出來：「只是你們要行道，不要單單聽道，自己欺哄自己」[^35]。自己欺哄自己就是與自己沒有良好的關係，常有內在衝突，活得很痛苦，不開心，正如說謊的人一般。我們心裡所信的、思想所想的、口中所說的，若與行動一致，就代表我們與自己有良好的關係，這樣我們就活得很開心！因此**衡量我們與自己的關係是否良好，就是看我們是否開心。**信心與行為一致的人，就能開心，這樣的人就是與自己有良好的關係。"},{"t":"p","x":"保羅曾經歷這段內在掙扎的過程[^36]，就是他所願意的善，他反不做；所不願意的惡，他倒去做。這是很痛苦的內在掙扎！在罪中掙扎的人，常會有類似的感受：暫時的快樂換來長期的痛苦。保羅如何戰勝這樣的掙扎呢？著耶穌就能！先建立與上帝的關係！藉著耶穌的生命和聖靈的幫助[^37]，我們才有能力行出上帝的話。當我們信心與行為一致，與自己的關係就得建立，我們就能開心，就能建立與別人的關係。當大家都與自己有良好的關係，大家都開心，教會必定復興！"},{"t":"h","x":"三、與他人的關係"},{"t":"p","x":"我們能彼此相愛，是因為擁有上帝的愛[^38]。與上帝的關係是建立與他人關係的基礎，也是我們與上帝關係的表現。聖經記著：「人若說『我愛神』，卻恨他的弟兄，就是說謊話的；不愛他所看見的弟兄，就不能愛沒有看見的神」[^39]。愛上帝，就當愛所看得見的弟兄姐妹。若我們彼此相愛，別人就能看出我們與上帝的關係[^40]。與他人的關係不單是指著愛弟兄姐妹，也包括要愛仇敵。耶穌說若能愛仇敵，就能作天父的兒子[^41]。若我們沒辦法與人建立關係，那就先調整與上帝及與自己的關係，使我們有能力去愛他人。"},{"t":"p","x":"與他人建立關係的目的，不是為了讓人喜歡我們，也不是為了得到回報，**與他人建立關係的目的，是為了傳承**，使人作耶穌的門徒，建立與上帝的關係。上帝的計劃，需要下一代與上一代的人合作才能完成，祂不要我們成為獨行俠，祂要我們與人建立關係，使我們能一起完成上帝的計劃。這樣的傳承使我們的生命變得更有價值，生命的價值不斷延續，大家一起完成上帝的計劃。"},{"t":"p","x":"聖經中列出不少兩代合作，傳承的例子：上帝藉著摩西帶領以色列人出埃及，卻透過約書亞帶領他們進入迦南、得地為業[^42]。上帝藉著大衛的渴望，預備了材料，讓其子所羅門把聖殿建成[^43]。上帝藉著以利亞挑戰亞哈王和耶洗別，卻藉著亞蘭王哈薛，耶戶和以利沙，把他們除掉[^44]。藉著養父末底改的鼓勵和勸誡，以斯帖覺悟並鼓起勇氣向王求情，解救族人脫離滅族的危機，並反敗為勝[^45]。耶穌也透過這個模式來完成上帝救贖的計劃。祂用三十三年半的時間，給門徒立下榜樣，在十字架上完成救贖的工作，接著吩咐並差遣門徒，把福音傳遍全地[^46]。"},{"t":"p","x":"可惜的是，現今許多教會中，上一代與下一代之間，往往互相敵對、互不了解，造成教會極大的損失。我們必須認清傳承的重要性：**青年人的活力，加上老年人的智慧，就能成就更偉大的事！**若要達成，老年人就需要給青年人發揮潛能，及犯錯的空間，而青年人需要聆聽，並尊重老年人的建議，也就是建立良好的關係，上一代培養下一代成為耶穌的門徒，教會就能持續發展，而且一代比一代更好。不只是建立與下一代的關係，更是幫助下一代建立與他人的關係，傳承就能持續下去！人人都遵行上帝的旨意，末後的復興很快就要來臨了！"},{"t":"p","x":"建立與他人的關係，不單是指個人的層面，也指著不同群體之間，包括教會與教會的關係。若要看見末後的大復興，教會與教會之間，必須建立關係，關係有多深，配搭就能多深！只有當教會互相聯結，上帝的國度才能建立起來，撒旦的國就會被擊敗。在第二冊「復興的異象—國度教會」這個單元中，我們將更深入的探討上帝國度的重要性。"},{"t":"h","x":"四、與事的關係"},{"t":"p","x":"聖經常常把我們與事情的關係形容為「管家」，對管家的要求就是要忠心[^47]。上帝不以事情的成效，而是以我們對事情的忠心來衡量我們[^48]。不論是大事還是小事，上帝對我們的要求都是一樣的[^49]！對忠心的人，上帝就託付更大的事；對不忠心的人，他所有的都會被奪去。保羅勸提摩太，要把上帝的道交託那些能忠心教導別人的人[^50]。可見，在事上忠心是上帝要求的素質。"},{"t":"p","x":"上帝曾如此說：「我要為自己立一個忠心的祭司；他必照我的心意而行」[^51]。這是上帝對撒母耳的形容，因為他照上帝的心意行。如此看來，忠心不單是堅持到底、由始至終的做事，更是要在所做的事上，按著上帝的心意而行。若與上帝沒有良好的關係，我們就不明白上帝的心意，就無法忠心。**忠心的基礎是建立在與上帝的關係**，是在與上帝、與自己及與他人的關係中做事。忠心的管家建立關係，而不破壞關係，因為上帝看重建立關係，勝過事情的成效。"},{"t":"p","x":"**人對，事就對；人錯，事就錯。**所謂的「人對」是指人與上帝、與自己、與別人有良好的關係，當人在各方面建立了良好的關係，所做的事才會合上帝心意！耶穌在吩咐彼得餵養他的羊前（做事），先確定彼得的關係次序是正確的（「你愛我嗎？」[^52]）。上帝在要求我們在服侍祂之前，先確定是因愛祂而做，也就是我們與上帝建立良好的關係。不要急著把事情完成而忽略了關係，不是我們不看重做事，而是上帝旨意的中心是建立關係，因此若所做的事能建立與上帝、與自己、與別人的關係[^53]，就是合上帝心意的事，就是有價值的事情！"},{"t":"p","x":"回顧耶穌對待彼得的例子，我們就會發現：耶穌看重關係過於事情。雖然彼得三次否認耶穌，又帶門徒回去打魚，耶穌並沒有因為這些事而責備彼得。耶穌看重與彼得的關係，餵飽門徒，重新給彼得回應的機會。耶穌看重與彼得的關係，勝於他所做的事，就得回彼得的心。當彼得重新表明對耶穌的愛，之後為耶穌所做的事，遠遠超過他之前所做過的事[^54]，一個怕死的彼得，變成了願意為耶穌而死的彼得[^55]！因此，看重關係不表示什麼事都不做，而是把和人的關係放在事情之上。先有了對的人，做的事情就會對！"},{"t":"h","x":"重整次序：解決問題還是建立關係？"},{"t":"p","x":"建立關係的次序非常重要。有句話說：**「有關係就沒關係；沒關係就有關係」**，意思是若我們建立關係的次序是正確的，做起事來就沒問題。人若與上帝有良好的關係，明白上帝的心意，被上帝推動，就必**「甘心」地做**。人若與自己有良好的關係，他能自己推動自己，就必**「開心」地做**。人若與他人有良好的關係，能與他人有互動，能**「同心」地做**。"},{"t":"p","x":"「對事不對人」本意是想公正地處理事情，反而因為重點放在事情，忽略了其他，以致「因事傷到人」！關係的優先次序一旦被顛倒，例如與事的關係被放在其他關係之前，往往會破壞其他關係。一旦關係不好，人就無法甘心、開心、同心地做事，事情就很難做得持久。在教會中，我們也常犯這個毛病，把與事的關係放在其他關係之上，還以此要求他人，這導致大家在服事上帝的路上越來越無力、越來越不開心，服事的人越來越少，而且需要消耗很多時間和精力，才能重新得力！"},{"t":"p","x":"重整關係的次序，事情做得更好："},{"t":"p","x":"一、與上帝的關係—上帝推動—甘心"},{"t":"p","x":"二、與自己的關係—自己推動—開心"},{"t":"p","x":"三、與他人的關係—互動—同心"},{"t":"p","x":"既知建立關係的次序如此重要，為什麼我們還會把關係的次序顛倒呢？有兩個主要的原因：第一個原因是不願付代價：建立關係需要付上代價，不單是時間，還包括精力、禱告、陪伴、鼓勵，堅持和忍耐等，且不容易看見果效。相比之下，解決問題則可以很快藉著規條和紀律來處理，短期內也容易看見果效！但是，我們若注重解決事情，沒有「先」了解人，給人緩和的空間，而以條規和紀律的強壓方式處理，問題看來是解決了，但很可能因此失去人心！若以建立關係的方式來處理，把建立關係放在解決問題之上，就需要付上較長的時間，和更多的代價，才能得到人心，幫助人恢復正確的關係次序，當他成為對的人，所做的事才會有價值！正如耶穌付上代價，和我們建立關係，使我們稱義並成聖[^56]。"},{"t":"p","x":"另一個使建立關係的次序顛倒的原因，就是「時間」和「成績」，因為建立與事的關係能在最短的時間看見成績，而且很容易衡量。相比之下，建立關係需要比較長的時間，而且不容易衡量成就。若我們站在功利的角度，看重立即的效果和較短的時間，就很容易把關係的次序顛倒！顛倒了建立關係次序的結果，導致我們需要付上更大的代價、更久的時間，才能糾正過來，因此若要重整建立關係的次序，我們必須把目光放在上帝的旨意，認清生命的價值，就是建立關係，建立人成為耶穌的門徒[^57]。"},{"t":"p","x":"如何知道我們把建立關係的次序擺對呢？其中一個幫助自我反省的問題是：我看重「解決問題」或「建立關係」？若答案是「解決問題」，那麼我們就是把事情放在建立關係之上。反之，就是把建立關係放在事情之上。讓我們拿幾個在教會中常見的事做例子："},{"t":"h","x":"重整次序例子（一）：禱告"},{"t":"p","x":"禱告的目的是為了什麼？是為了解決問題，還是為了建立關係？若禱告是為了解決問題，人就在有需要的時候才禱告，要上帝解決問題，期待上帝行神蹟，我們在禱告中就只認識神蹟；若禱告是為了和上帝建立關係，我們就在禱告中認識上帝。耶穌教導門徒禱告的第一句話：「我們在天上的父」[^58]，清楚地表達了在還沒告訴上帝需要和問題前，最優先的次序，是認清上帝是我們的天父，禱告是與上帝建立關係！"},{"t":"p","x":"禱告若是為了要上帝解決問題，我們期待上帝改變環境、行神蹟，我們的信心是建立在環境和神蹟，而非上帝。這種認識神蹟的信心，並不能持久，正如以色列人經歷了紅海的神蹟後，他們的信心只維持了三天！一面對水苦的問題，他們就開始埋怨上帝[^59]；上帝不斷解決以色列人的問題，但以色列人並沒有因此認識上帝，反而因不信而死在曠野裡[^60]。特別在士師記中，我們發現，以色列人都是在面對問題的時候才向上帝呼求，要上帝搭救、解決問題。問題一旦解決了，他們就忘了上帝，直到面對另個問題，他們才再次呼求上帝。禱告若是要上帝解決問題，就有解決不完的問題，活在解決問題的循環中！"},{"t":"p","x":"禱告是為了建立與上帝的關係，讓上帝調整我們的心，使我們能認識上帝的心意。摩西每次到上帝面前，就是帶著能認識上帝的期待：在曠野的日子，摩西越來越認識上帝，面對面與上帝說話；在他人生的後期，他向上帝求的，不是要上帝解決問題，而是要認識上帝的榮耀[^61]！禱告若是為了建立與上帝的關係，那麼問題有沒有得解決，我們的信心都能因更認識上帝而增加！保羅也有這樣的心志，不論環境如何、問題有多艱難，都不能影響他建立與上帝的關係，他說：「……都不能叫我們與神的愛隔絕」[^62]！若禱告不是為了解決問題，而是建立與上帝的關係，那麽問題就不再是問題了！"},{"t":"h","x":"重整次序例子（二）：紀律"},{"t":"p","x":"當人犯錯的時候，我們採用紀律，其目的是什麼呢？人常常用紀律來解決問題，來警戒人，解決犯錯的問題，要求犯錯的人：「你自己改變」！這是抱著懲罰的目的來採用紀律，接受紀律的人所感受到的，往往是被拒絕，被要求，很可能沒有勇氣和能力再站起來，或是短期內可以看見成效及可衡量，但日久失人心，一旦對方反彈，就需要更強烈的紀律來壓制！若我們把與事的關係，放在其他的關係之上，就會注重事而失去人。漸漸地，我們會發現在身邊的人才越來越少。"},{"t":"p","x":"若我們回到建立關係的正確次序，**先注重人，就能挽回人！**這是抱著愛，恢復對方的心態而使用紀律，我們用紀律來幫助犯錯的人建立與上帝、與自己、與他人的關係。這需要付上較大的代價，不是在要求犯錯的人「你自己改變」，而是選擇陪伴犯錯的人，走過改變的過程，就是「我陪你改變」。這樣的紀律方式，也許不會即刻看到效果，但卻會使接受紀律的人，感受到被接納，有能力再次站立起來，並更好地成長。"},{"t":"p","x":"|  |  |  |"},{"t":"p","x":"| --- | --- | --- |"},{"t":"p","x":"|  |  |  |"},{"t":"p","x":"|  |  |  |"},{"t":"p","x":"|  |  |  |"},{"t":"p","x":"|  |  |  |"},{"t":"p","x":"| 紀律 | 解決問題 | 建立關係 |"},{"t":"p","x":"| --- | --- | --- |"},{"t":"p","x":"| 目的 | 懲罰人 | 恢復人 |"},{"t":"p","x":"| 態度 | 拒絕 | 接納 |"},{"t":"p","x":"| 方式 | 你自己改變 | 我陪你改變 |"},{"t":"p","x":"| 效果 | 注重事， 失去人 | 注重事， 挽回人 |"},{"t":"p","x":"「我陪你改變」的紀律方式，需要有父母對待孩子的心態，也是上帝對我們的心態。聖經形容上帝對我們的紀律為「管教」[^63]，管教的前提是關係，是**父子愛的關係**[^64]，動機是為了愛孩子，希望能得回孩子[^65]。正如上帝視我們為祂的兒女，在我們犯錯的時候，要得回我們而管教我們。"},{"t":"p","x":"當亞當違背上帝的命令，吃了分辨善惡的果子後，上帝沒有放任亞當，祂主動尋到亞當，第一個問題不是問：「你做了什麼事？」，而是問「你在哪裡？」[^66]。上帝注重亞當這個人，過於他所做的錯事，雖然他們必須承擔犯罪的後果，然而上帝的目的不是要懲罰他們，上帝的宣判不是絕望，而是帶著救贖的應許[^67]，要恢復人與上帝之間的關係，地位和權柄。在宣判後，上帝即刻給他們用皮子做衣服遮羞[^68]。又怕他們摘了生命樹的果子吃，就永遠帶罪活著，便將他們趕出伊甸園，目的不是拒絕，而是要保護他們。上帝這些紀律的行動，表明上帝注重與亞當和夏娃的關係，願意花時間把他們挽回過來，而不是急於糾正他們所犯的錯！"},{"t":"p","x":"在面對跌倒中的人時，我們是否像上帝那樣注重人呢？我們是向跌倒的人「丟石頭」還是「丟繩子」呢？我們的反應和紀律方式，是把人打死，還是在幫助人站起來呢？聖經教導我們，要以溫柔的心把跌入罪中的人挽回[^69]，上帝雖然憎恨罪，但祂卻願意愛世上的罪人[^70]，上帝對我們有憐憫、有恩典，「祂沒有按我們的罪過待我們，也沒有照我們的罪孽報應我們」，還常常向我們顯慈愛[^71]。上帝不要我們定人的罪，而是要我們盡力將人挽回。讓我們**開始培養「丟繩子」，送「補品」的文化，而不是「丟石頭」，投餵「毒品」的文化**，讓我們建立正確的關係次序：重視人過於事情，不以懲罰，而是以愛和接納來陪伴人成長！"},{"t":"p","x":"雖然上帝注重人，以恢復為目的而施行管教，但不是所有經過紀律的人都能挽回！我們必須認清「惡人」（wicked）與「軟弱的人」（Weak）的分別：上帝扶持軟弱的人，但卻除滅惡人[^72]！軟弱的人，無論所犯的錯或罪有多大，只要人願意謙卑悔改，上帝就必赦免[^73]。而惡人就不同了，常常與驕傲的人，或不敬畏上帝的人相提並論[^74]，常常傷害別人[^75]。上帝憎惡惡人[^76]，阻擋驕傲的人[^77]，稱絆倒人的人是有禍的[^78]。若是惡人不願悔改，並造成上帝身體的死亡時，就必將他剪除[^79]。耶穌教導我們：面對得罪我們的人時，要先以「建立關係」為前提，私下去和好，倘若那人不願悔改，也不接受教會的勸導，最終就把他看作外邦人[^80]，尤其要把淫亂的人交給撒旦[^81]，使他的靈魂在主的日子可以得救！由此可知，同樣是接受紀律管教，但我們對軟弱的人要扶持，對惡人要剪除！"},{"t":"p","x":"我們可從日常生活中的選擇和反應，看出我們看重解決問題還是建立關係。在個人的生活中、在家庭中、工作場所，甚至在服事中，我們如何決定呢？，如何「看、聽、想、講、行」呢？問問自己：「這樣的選擇，是建立關係，還是會帶來關係的破壞」？若是會破壞關係，帶來隔離，這往往是撒旦的工作。上帝旨意的中心是建立關係，任何行動和決定，都必須是為了建立關係，而且需要回到關係的正確次序，先是與上帝、然後是與自己、與他人的關係，最後才是與事的關係。若發現我們錯了，就改；若是跌倒了，就再站起來！若我們常常這樣做，我們會看見復興來臨，聽起來容易，做起來更容易！"},{"t":"p","x":"1"}],"fns":{"1":"創3章：夏娃聽蛇的話、亞當聽妻子的話，而他們都沒有聽從上帝的話就受到咒詛。","2":"創12章：亞伯拉罕聽從上帝的話而承受應許；創22章：亞伯拉罕遵行上帝的吩咐獻以撒而得福。","3":"出19:5；申5章，28章等：上帝反覆提醒以色列人要遵守祂話就必做上帝的子民。","4":"書1:7：上帝要約書亞遵守祂的吩咐就必順利；約書亞記：以色列人遵照上帝的吩咐作戰就打勝戰。","5":"撒上13:14，15:22-23：上帝對君王的要求就是要遵守上帝的吩咐","6":"結11:20，37章；亞3:7等：藉著先知們不斷勸以色列人要回轉並遵行上帝的吩咐。","7":"太5:19：遵行上帝旨意在天國是最大的；太12:50：遵行上帝旨意是耶穌的家人；約15:14：遵行上帝旨意是耶穌的朋友。","8":"約壹2:17","9":"約12:24-26：耶穌不單自己把命給我們，祂要我們也跟從祂的榜樣。","10":"約4:34","11":"羅2:18","12":"太22:37-40","13":"約13:34","14":"約15:10","15":"林前13:1-3","16":"弗1:4-10，藉著耶穌基督和祂的血使我們得到兒子的名分。","17":"創2:15-23，上帝與人同在，除了對人說話，也與人互動，包括把動物帶到人面前、甚至為人預備配偶。","18":"創3:9-24，人聽從撒旦的話後，開始躲避上帝，又彼此推卸責任，並且受咒詛，最後被趕出伊甸園。","19":"利26:12，參考出6:7；申1:31；耶7:23，11:4，30:22；結34:31，36:28","20":"約壹1:7,9，參考來10:19-20","21":"約壹3:34，參考徒2:38；約14:16-17；羅8:11；弗1:13-14","22":"太6:14-15；太18:21-35；可11:25-26；路6:37","23":"撒上13:8-14","24":"撒上15:22","25":"啟4:8-11，5:6-14，7:9-12，11:15-18，15:2-4，19:1-8：人對上帝的敬拜；啟21:5-8，上帝對人的呼召；啟21:7，上帝稱得勝者為祂的兒子，祂是得勝者的上帝。","26":"約3:16","27":"約17:3","28":"腓4:12-13，保羅在各種環境學會了依靠上帝。","29":"腓3:7-8，保羅以認識耶穌為至寶；腓3:12-14，保羅竭力追求要得著耶穌。","30":"賽30:20-21","31":"詩119:71","32":"約壹4:19","33":"太22:37-40","34":"來4:15-16，耶穌能體恤我們的軟弱，我們就有勇氣向上帝求幫助","35":"雅1:22","36":"羅7:14-15","37":"羅8:2","38":"約壹4:7","39":"約壹4:20","40":"約13:35","41":"太5:44-45","42":"民27:18-23，摩西按手在約書亞頭上；申1:37-38，31:2-9，約書亞接替摩西帶領以色列人。","43":"代上29:1-8，大衛預備材料；代下3~5章，所羅門建造聖殿。","44":"王上19:15-18，上帝揀選哈薛、耶戶和以利沙來完成滅絕亞哈王的計劃；王上17~18章，以利亞向亞哈王發出挑戰；王上22:34-39，亞哈王被殺；王下9章，耶洗別和亞哈全家被殺。","45":"帖4:13-14，末底改的勸誡；帖7章，以色列人得救；帖9章，以色列人殺了仇敵。","46":"太28:18-20；可16:14-20，耶穌吩咐門徒要把福音傳遍全地。","47":"林前4:2","48":"太25:21；路19:17，另外參考太24:45；路12:42；路16:10","49":"太25:14-30，賺五千和賺兩千的都得到同樣的稱讚。","50":"提後2:2","51":"撒上2:35a","52":"約21:15-19","53":"林前10:31,33，凡事都是為了榮耀上帝和造就別人。","54":"徒2，4，10~11章，彼得勇敢向人傳揚耶穌；徒3章，彼得靠耶穌行神蹟；徒5章，彼得不怕人的威脅。","55":"徒3:6，4:19-20，5:29-32","56":"羅3:23-26，6章","57":"太28:19-20","58":"太6:9","59":"出15:22-25","60":"民14:22-35","61":"出33:18-23","62":"羅8:35-39","63":"申8:5；來5:17；詩94:12；箴3:11；來12:5-11，啟3:19","64":"來12:7-8","65":"箴13:24，19:18","66":"創3:8-9","67":"創3:15，「……女人的後裔要傷你的頭；你要傷他的腳跟」","68":"創3:21","69":"加6:1","70":"羅5:8","71":"詩103:8-13","72":"詩9篇，145:20，147:6","73":"約壹1:9，上帝必赦免一切的罪，不在乎怎樣的罪。","74":"詩1:1，36:1,11，75:4","75":"惡人常常與奸詐、詭詐相提，參考箴2:22，12:5","76":"箴15:9，16:5","77":"雅4:6","78":"太18:7-9","79":"可9:42-47","80":"太18:15-17","81":"林前5:5"}},{"n":1,"num":"Ⅸ","title":"復興的必需—服侍","verse":"「甘心事奉，好像服事主，不像服事人。」（弗6:7）","verse_ref":"","blocks":[{"t":"p","x":"耶穌的生命是一個「無己」的生命。祂把「無己」的生命賜給我們，叫我們不再為自己，而是活出「無己」的生命。從「有己」的生命轉換到「無己」的生命這個「捨己」的過程，就是一個活出「為耶穌（Jesus）、為別人（Others）、不為自己（You）」的生活。這樣的生活是充滿喜樂（JOY）且有意義。耶穌來到世上的目的，不是為了滿足自己，而是為了服事人：「正如人子來，不是要受人的服事，乃是要服事人，並且捨命，作多人的贖價」[^1]。我們得到耶穌的生命，不斷地培養和活出耶穌的生命，就自然會活出耶穌的榜樣，那就是「服侍」。每個活出耶穌生命的人，都是一個服侍者。要看到復興，就必須有服侍！因為只有藉著服侍，我們才能從中改變自己（捨己），進而培養耶穌的生命（無己），影響與祝福別人的生命。既然服侍如此重要且是必須的，那我們該對服侍有正確的觀念，使我們在服侍的路上有正確的方向，走得穩健持久，而且越服侍越喜樂。"},{"t":"h","x":"服侍觀"},{"t":"h","x":"什麼是服侍？"},{"t":"p","x":"很多人把在教會中所做的事奉，當作是服侍。服侍只限於教會中嗎？耶穌要門徒成為眾人的僕人時，祂做了這個解釋：「凡為我名接待一個像這小孩子的，就是接待我；凡接待我的，不是接待我，乃是接待那差我來的」[^2]，就連接待一個小孩，也算是服侍！接待小孩這個很平常的舉動被稱為服侍，關鍵在於這個行動是否「為耶穌的名」而作的。因為一個平凡的行動，不論是做在誰的身上，若是為耶穌而作，那就算是服侍主！因此服侍可定為：**為主的名而做的事**。"},{"t":"p","x":"不只在教會，在任何地方，甚至不局限在屬靈的事，連日常生活中所做的事，只要是為主的名而做，如給人飯吃、給人水喝、給人住處、給人衣物、看顧關心人等，都是服侍[^3]。無論在家中，職場或學校，我們每日都能服侍主！只要是為了主的名！為了主的名殷勤工作；為了主的名而堅持到底；為了主的名而忍受羞辱；愛我們的仇敵等，都是服侍。服侍不只是主日在教會中所做的事，還應該是我們的生活方式，為了使別人得益處，使上帝的名得榮耀[^4]。"},{"t":"h","x":"服侍是誰的需要？"},{"t":"p","x":"服侍是因為別人的需要、教會的需要，還是我們自己的需要？我們服侍常是因為人有需要，或教會的事工需要。到底服侍是誰的需要？這是一個很重要的問題。若服侍是因為別人的需要，或是教會的需要，這樣的服侍是被事情或需要所推動，容易感到疲憊，在面對困難和問題的時候，我們會軟弱，想要放棄。"},{"t":"p","x":"**一、服侍是我們得救的目的。**聖經告訴我們：「我們原是神所作成的，是在基督耶穌裡創造的，為的是要我們行各樣的善事，就是神預先所安排的」[^5]。這句經文是對凡得救的人說的。得救是上帝的恩典，但我們得救的目的，就是為了要行各樣的善事、就是為了服侍，是上帝預先安排要我們活在世服侍是我們的需要："},{"t":"p","x":"一、服侍是我們得救的目的"},{"t":"p","x":"二、服侍是操練與主同作王的機會"},{"t":"p","x":"三、服侍是我們能成長的機會"},{"t":"p","x":"四、服侍是我們投資的機會"},{"t":"p","x":"五、服侍使我們有用"},{"t":"p","x":"上的目的。若不服侍，我們的人生就沒有意義，無法向上帝交待，並且會被上帝責備[^6]；因此服侍不只限於教會的領袖或同工，任何人都可以服侍，並且服侍不是別人的需要、不是教會的需要，乃是我們每個信徒的需要，因為，服侍是我們得救的目的。"},{"t":"p","x":"**二、服侍是操練與主同作王的機會。**在上帝的國中，誰是為大為首的呢？就是那些服侍的人[^7]，就是那些謙卑的人！一個人若一味要得到人的服侍，而不願去服侍人，這是驕傲！耶穌教導門徒要彼此服侍，這樣才能在上帝的國中，與耶穌一同掌權，審判十二支派[^8]。天上不容許有驕傲，天使長因為驕傲而墜落，而耶穌以謙卑服侍的生命戰勝驕傲，回到天上；因此要能與主同作王，必須成為服侍者。我們曾在「無己的鑰匙—謙卑」的單元中，提到一些實際操練的例子，能幫助我們在服侍中，天天操練謙卑，在服侍中操練捨己，朝無己的生命邁進，預備自己將來能與主同作王。"},{"t":"p","x":"**三、服侍是我們成長的機會。**生命的規律「有進有出」：吸入氧氣，呼出二氧化碳；攝取食物，消化排泄，這樣生命才能存活成長；而服侍就是我們屬靈生命成長，並更多經歷上帝的機會，讓我們不再被動的領受，而是主動地分享給別人，就如人小時候被父母照顧，長大後成為父母去照顧孩子一樣，「有進有出」的循環，不單孩子成長，父母自己的生命也有很大的成長。當我們認清服侍是我們的需要，一旦有機會，例如別人有需要時，我們就會主動的服侍，而且服侍得很享受。**因為別人的痛苦和需要，乃是我們服侍並成長的機會。**"},{"t":"p","x":"**四、服侍是我們投資的機會。**世界和世上的事都是暫時的，只有天上的事是永恒有價值[^9]。那如何儲蓄在天上呢？耶穌對少年財主說：「你還缺少一件：去變賣你所有的，分給窮人，就必有財寶在天上；你還要來跟從我」[^10]。可見，變賣所有的，和分給窮人，是積蓄財寶在天上的方式；因此耶穌要少年財主，把擁有的金錢給有需要的人。我們不但能給金錢，也能給禱告、時間、照顧和服務[^11]。為了耶穌，把所擁有的，分給有需要的人，就是服侍人，就能積蓄財寶在天上。世上的一切都會成為過去，**留下來的不是我們的，給出去的才是我們的！**換言之，服侍是把地上所有的，投資在天上的方式，每一次的服侍，都是我們投資在天上的機會！"},{"t":"p","x":"**五、服侍使我們有用。**耶穌曾說過一個主人按著個人的才幹給銀子的比喻：有拿五千的、也有拿兩千、一千的[^12]。後來五千的賺五千；兩千的賺兩千。同樣的，上帝給每個人不同的才幹，不管多或少，上帝要求我們去用這些才幹，也就是去服侍。在天國裡，只要肯使用神給我們的才幹，只有賺，沒有虧！當他們拿主人給的銀子去賺更多銀子時，不論賺多或賺少，都得到主人同樣的稱讚和祝福。"},{"t":"p","x":"但那領一千的，卻把銀子埋起來，等主人回來時原銀奉還！主人不單責備他，還把他所有的，奪來給那有一萬的。不要以為不服侍是一件小事！許多人不服侍，是因為覺得自己所擁有並不多，跟別人比真是微不足道，不服侍應該不會影響到上帝的國，上帝也應該不會責怪吧！我們不要小看自己所有的，即使只有一千，我們也能用這一千來服侍。上帝的原則很簡單—「因為凡是有的，還要給他，他就充足有餘；凡是沒有的，就算他有甚麼也要拿去」[^13]。不論我們覺得自己有多少，只要**用了就有用，不用就無用，越用越好用！**"},{"t":"h","x":"誰能服侍？"},{"t":"p","x":"服侍是我們的需要。那是不是每個人都能服侍呢？正如之前所提到的：上帝不在乎我們有多少，只要願意被上帝使用，人人都能服侍。既然如此，為什麼還有許多人不敢起來服侍呢？其中幾個常聽到的原因是：「我沒有裝備」、「我沒有恩賜」、「我沒有時間」等。"},{"t":"p","x":"「我沒有裝備」：人常常覺得自己裝備的不夠，以致不敢服侍。每件事開始做時，總是最困難的，因為沒把握能做好、害怕會失敗；但若要等到不會犯錯才去做，我們就永遠什麼都不用做了，因為，每件事都是在做中不斷學習才成功的。比如騎腳踏車，不論聽了多少理論，若不騎上腳踏車，就永遠學不會！騎上腳踏車也許會跌倒，但在過程中，就漸漸學會了平衡。同樣的，沒有一個人是裝備好了才去服侍的，只需要踏出信心的第一步，在服侍中我們就不斷被裝備，行上帝預先所安排的各樣善事。"},{"t":"p","x":"「我沒有恩賜」：人也常限制能做的事，和所擁有的恩賜。當該項服侍不在我們的恩賜範圍內，我們還沒嘗試，就先拒絕了！上帝是一切恩賜的源頭[^14]，上帝能使無變有[^15]，五餅二魚能餵飽上萬人[^16]，祂也能使我們所擁有的恩賜加增；這不意味著我們什麼服侍都要做，我們固然需要按著上帝所賜的恩賜服侍，但也不要限制上帝能藉著我們所成就的事，在有需要的情況下，上帝會賜給我們其它恩賜來服侍。"},{"t":"p","x":"「我沒有時間」：人覺得沒時間服侍，通常是因服侍不是他生命中的優先。換句話說，「有沒有時間」是價值觀的問題。忙碌的生意人，在孩子病危的時候，也會抽出時間，放下生意來陪伴孩子。我們若看見生命的短暫，就會趕快把握能服侍的機會！關鍵不在於有沒有時間，而是上帝是否是我們生命中的優先？我們若立志為主活，為主的名做事，那麼每時刻都是在服侍！"},{"t":"h","x":"服侍是上帝的恩典"},{"t":"p","x":"服事是上帝給我們的恩典，是用上帝所給我們的，去分給需要的人。不難吧？上帝並沒有要求超過我們能服侍的，也沒有拿我們的服侍與其他人作比較。我們更不需要與他人做比較，因為上帝只要求我們忠心服侍，按著上帝的心意，把上帝所給的能力和才幹分給別人。若不是上帝賜恩典，我們什麼都不能做！因此即使我們的服侍有很大的果效，都不是我們有什麼了不起，沒有什麼可誇的，這都是上帝的恩典！"},{"t":"p","x":"服侍是上帝給我們的恩典，上帝賜福給我們，讓我們既能服侍，又藉著服侍領受更大的祝福。若認明能服侍是上帝的恩典，是極大的恩典，也是我們的需要，我們就不會偷懶，反而會格外殷勤服侍[^17]。在服侍時會心存感激、不埋怨地把握每個可以服侍的機會。"},{"t":"h","x":"服侍之路"},{"t":"p","x":"每個人都需要服侍，我們必須知道該如何服侍才能使服侍持久。**「靈一悟一命一侍一神」**這簡單的五個字可以表達服侍之路的重要階段。耶穌是服侍的焦點。「因為萬有都是本於祂，倚靠祂，歸於祂。願榮耀歸給祂，直到永遠」[^18]。**服侍開始於耶穌，最終是為了耶穌，過程中也不能沒有耶穌。**"},{"t":"p","x":"服侍之路："},{"t":"p","x":"靈悟命侍神"},{"t":"p","x":"服侍需要從依靠聖靈開始（靈）[^19]，而不是依靠自己的聰明。依靠聖靈不是感覺，而是一個選擇！聖靈其中一個最重要的工作，就是幫助我們領悟上帝的話（悟）[^20]。單單只是靠聖靈的服侍，就像種子隨風在空中隨處飄浮。但當上帝的靈，加上上帝的話，這樣的服侍就像種子落地，變得踏實；然而這樣的服侍還不足夠。我們必須靠著上帝的靈，並把對上帝話語的領悟，化為行動，形成我們的生命（命）；這樣的服侍就像種子紮根，變得穩固而且亙根基[^21]。「靈一悟一命」是我們個人的得著，並沒有給出去，靈命仍不健全！服侍（侍）使我們的靈命成長；而靈命的培養則是使服侍更有效力。但真正有影響力的服侍，是生命的服侍[^22]，是用生命影響生命。循環「靈一悟一命一侍」，我們的服侍就能被主大用。在被主大用時，不要奪取上帝的榮耀，而是要將一切榮耀歸給耶穌。切記，服侍最終目的，就是要讓耶穌得著一切的榮耀（神）[^23]。"},{"t":"p","x":"服侍之路的每個階段都是互相串連起來的，必須完成一個階段，才能進入下一個階段，就像長途賽中的每一個檢查站，選手從起跑點開始，必須經過每一個檢查站，最終抵達終點，才算是完成賽程。檢查站能讓選手知道自己正在正確的跑道上，而且已經越來越靠近終點。檢查站為選手添力，使他們能繼續完成賽程，選手不能錯過任何一個檢查站，也不能在任何一個檢查站停頓，不然就不算完成賽程。同樣的，服侍之路的每個階段就像賽程中的檢查站，都是很重要且相互串連的。若要服侍直到見主面，我們必須有正確的起點，還要經過每個服侍的階段，並要邁向服侍的終點。缺少了其中一個階段，都會影響我們的服侍，甚至會導致服侍的終止！"},{"t":"h","x":"靈一聖靈（聖靈是我的引導）"},{"t":"p","x":"不是每個奉主名所做的服侍都能得上帝的稱讚，唯獨遵行上帝旨意的服侍，才是被悅納的[^24]！服侍中有兩條不同的路，一條是依靠聖靈，並遵行上的旨意，另一條路是依靠且己，並滿足自己的意思。「體貼肉體的，就是死；體貼聖靈的，乃是生命、平安」[^25]。體貼肉體或體貼聖靈，是服侍中兩個相對的起點。體貼肉體，就是隨著自己私慾，結果就是死。服侍若是為了滿足自己，這樣的服侍會讓人覺得吃力，而且越服侍越無力，最後終止服侍。反之，體貼聖靈，就是隨著上帝心意的結果，就是生命、平安，這樣的服侍會讓人覺得輕鬆，越服侍越有活力、有平安。若我們在服侍中感到煩躁或有埋怨時，不妨問問自己：「**我們服侍是體貼聖靈，還是體貼自己？**」"},{"t":"p","x":"「我們若是靠聖靈得生，就當靠聖靈行事」[^26]。依靠聖靈不單是服侍的起點，更是正確服侍的導向。我們需要靠聖靈行事，依靠自己的才幹，或抄襲別人的服侍方式，都是有限的，這樣的服侍無法抵達終點，就是讓耶穌得一切的榮耀！因為滿足人的需要、生命的改變都是上帝的工作！只有依靠聖靈的服侍，才能進入無限，經歷聖靈的大能，並各樣的神蹟奇事，才能滿足上帝的心！"},{"t":"p","x":"要如何依靠聖靈呢？就是**「用心」**服侍，而不是「用腦」。「用腦」服侍就是上段所說的：靠自己或別人的聰明和方式，想要把服侍做好。依靠聖靈，不是把自己變成機器人般按照指令行事，而是尋求聖靈，並順服聖靈的帶領去行。讓聖靈引導是一個抉擇！選擇學耶穌的榜樣，選擇順服聖經的準則[^27]，選擇「用心」服侍，對上帝毫無保留，放棄我的權力和聰明，如此就能讓耶穌作王！而無論做了什麼，都是上帝的作為和恩典，就讓耶穌得一切榮耀！當我們反覆行，成為新我的生命，就開始建立無己的屬神體系。"},{"t":"h","x":"悟一領悟（聖經是我的準則）"},{"t":"p","x":"「靈」的服侍階段必須進入「悟」的服侍階段，才能達到平衡。聖經能印證聖靈的工作；聖靈的工作能見證聖經。依靠聖靈能力的服侍，雖讓人感到興奮，但若沒有上帝的話語，就仍是飄浮，就像根基建在沙土上，而且對聖靈的工作沒有可供辨明的標準，會因人事物而影響信心，服侍的生命時好時壞；依靠聖靈加上上帝話語的服侍，讓人的信心有憑據，服侍有生命力[^28]！，服侍需要上帝的靈，也需要上帝的話，這是耶穌服侍的榜樣[^29]。耶穌的服侍中，常常帶著聖靈的能力，口中也常宣講上帝的話語[^30]；使徒的服侍也是如此，當使徒被聖靈充滿時，彼得開口說出上帝的話，就有三千人悔改信主[^31]。"},{"t":"p","x":"沒有「靈」的階段，就無法進入「悟」的階段，因為聖靈使我們能領悟上帝的話。沒有領悟，上帝的話只是頭腦裡的資訊；有了領悟，止帝的話就成為心中的啟示。領悟上帝的話語，能使人的觀念改變[^32]，而觀念的改變，帶來生命的改變！因為領悟上帝的話，能使人産生盼望和信心[^33]，服侍時面對艱難和困境時，也不容易放棄，能得著上帝所應許的[^34]。在服侍中領悟上帝的話，使服侍者能享受，因為這樣的服侍，不是被人推動，也不是被需要推動，而是被上帝推動，這樣的服侍才能持久！"},{"t":"p","x":"如何領悟上帝的話呢？**謙卑！**謙卑是得著領悟的關鍵，聖靈願意將上帝的話，向謙卑的人顯明，向自以為聰明的人就隱藏起來[^35]。人的聰明永遠無法領悟上帝的話，唯有聖靈能帶領我們進入上帝的話語中[^36]。"},{"t":"h","x":"命一生命（耶穌是我的榜樣）"},{"t":"p","x":"「靈一悟」是服侍之路很重要的開始，因為這樣的服侍選擇依靠聖靈，按著上帝的心意，而非自己的意思；然而「靈一悟」的服侍階段並不足夠，只能使人知道上帝的大能一信心，還必須把上帝的話化為行動，成為我們的生命。信心若沒有行為，仍然是死的[^37]。「叫人活著的乃是靈，肉體是無益的。我對你們所說話就是靈，就是生命」[^38]。上帝的話不單是靈，而且是生命，上帝的話叫人的心靈甦醒[^39]，也使人的生命改變[^40]。在服侍的路上若要持久，不單要有「靈一悟」的階段，也需要進入「命」的階段。"},{"t":"p","x":"最能吸引人的是生命！耶穌不單有「靈一悟」的服侍階段，祂也用「命」來服侍。祂的服侍中，有聖靈的能力，和上帝話語的能力，許多人因而跟隨祂，但這些人在考驗來臨時，都離棄了耶穌！「靈一悟」的服侍階段所帶來的影響還不穩固，加上「命」的服侍，就變得有根基[^41]、能持久。耶穌在十字架上用生命「活給我們看」，並「死給我們看」。耶穌復活後，使徒及其他被耶穌生命影響的人，繼續效法耶穌的榜樣，甚至願意擺上他們的生命。這種生命的服侍，不是理論或啟示，而是以生命為榜樣，以生命成為見證，是「以命傳命，以命換命」。"},{"t":"p","x":"要如何以「命」來服侍呢？關鍵在於順服的「行動」。培養生命的基本功：**正確的「看一聽一想一講一行」**，使我們能進入「命」的服侍階段。有了「靈一悟」，加上反覆「看一聽一想一講一行」來培養生命，我們就能活出耶穌的生命。以「命」來服侍是很有果效的，因為是耶穌的生命吸引人到祂的面前[^42]。從「知道」要「做到」，順服去行，我們就能「得到」！"},{"t":"h","x":"侍一服侍（讓耶穌作王）"},{"t":"p","x":"「靈一悟一命」的目的就是為了「侍」。若沒有進入「侍」的階段，就像生命只有「進」卻沒有「出」，至終面臨死亡。同樣的，若沒有進入「侍」的階段，服侍之路也會面對死亡！"},{"t":"p","x":"一個人若缺乏「靈一悟一命」任一階段的服侍，都是不完整的，都不能讓耶穌作王和得一切榮耀！缺乏「靈」的服侍，也許上帝的話很豐富，卻無法體會和進入聖靈豐盛自由的生命，他的「命」的服侍，還是靠自己，靠方法。缺乏「悟」的服侍，聖靈的工作火熱，卻沒有上帝的話，無法落地，容易隨風改變，「命」的服侍很脆弱。缺乏「靈一悟一命」的服侍是需要靠上帝推動或別人推動，有推就有動！不推就不動！這樣的服侍像在做事，容易讓人枯乾，是無法在火燒的考驗後存留的[^43]！只有經過「靈一悟一命」的階段，才能有真正的服侍，這樣的服侍既有聖靈的帶領，又有上帝的話印證，服侍者是「以命傳命」，服侍時讓人看見耶穌，就必經歷得勝。因為哪裡讓耶穌作王，就必在那裡看見上帝能力的彰顯，撒旦在人生命中的捆綁被斷開，並帶來人生命的改變。這種「靈一悟一命一侍」的服侍，是讓耶穌作王，服侍是輕鬆的，越服侍越興奮、越服侍越有動力！因為不是我們在做，而是耶穌在做！"},{"t":"p","x":"在「靈一悟一命一侍」的服侍中，固然會有上帝能力的彰顯，但外在能力的彰顯，卻不是我們所追求的！若追求能力，感覺，現象，那還是停留在「靈」的服侍中。**服侍最主要的目的是要建立關係**，使人與上帝、及人與人之間的關係得建立。耶穌在服侍門徒時曾如此說：「我是你們的主，你們的夫子，尚且洗你們的腳，你們也當彼此洗腳」[^44]。洗腳的服侍雖然看來是一件事，但洗腳的服侍，是為了使門徒得潔淨[^45]，能建立與上帝的關係，而且為了使他們能彼此洗腳，建立與人之間的關係，耶穌接著說：「我給你們作了榜樣，叫你們照著我向你們所做的去做」[^46]。服侍的目的就是為了傳承，得到耶穌生命的價值，在於繁殖耶穌的生命，使人效法我，像我效法耶穌一樣[^47]，那就是傳承！因此耶穌給我們大使命，使萬民成為耶穌的門徒[^48]，能效法耶穌的榜樣。"},{"t":"p","x":"如何傳承呢？要傳承就必須願意「捨己」。「……一粒麥子不落在地裡死了，仍舊是一粒，若是死了，就結出許多子粒來」[^49]。要結出許多子粒，條件就是那粒麥子需要先「落」在地裡「死」了，也就是「捨己」。一個很重要的理念，就是「盡力幫助別人比自己更成功」，只有願意「捨己」，願意「為耶穌、為別人、不為自己」，才能夠達到建立關係的傳承，就像耶穌的服侍，到最後就是要捨命，成為多人的贖價[^50]，就是「我死，讓你活」，唯有毫無保留的服侍，才能帶來生命的傳承！"},{"t":"h","x":"神一榮耀歸於上帝（讓耶穌得到一切的榮耀）"},{"t":"p","x":"「靈一悟一命一侍」的服侍，會使我們的服侍越來越有影響力，因此容易讓人迷失在只追求「靈一悟一命一侍」，忘了服侍的終點，是要將「一切榮耀歸給上帝」。若不將榮耀歸給上帝，就是沒有進入「神」的服侍階段，那麽不論服侍的成就有多大，都會面對死亡[^51]。「凡自高的，必降為卑；自卑的，必升為高」[^52]。驕傲導致人在服侍的路上跌倒[^53]，只有持續保持謙卑的心態，我們才能繼續服侍主，持續到見主面的日子。"},{"t":"p","x":"「服侍是上帝的恩典」，是活在謙卑一個很重要的觀念。保羅，一個被主大用的人如此說：「然而，我今日成了何等人，是蒙神的恩才成的。並且祂所賜我的恩不是徒然的。我比眾使徒格外勞苦；這原不是我，乃是神的恩與我同在」[^54]。人若「看見」是上帝的恩典，他就能謙卑地服侍，即使比別人更勞苦，也沒有可誇可怨的，因為是上帝的恩與我們同在！"},{"t":"p","x":"如何將榮耀歸給上帝？就是活出「無己」的生命—活著不再是我，乃是耶穌，焦點是耶穌，正如施洗約翰的心聲：「祂必興旺，我必衰微」[^55]，不是為了讓人認識我，而是讓人認識耶穌。如何達到呢？就是「不見一人，只見耶穌」—隱藏，不要出名、不要出頭！出頭，目標明顯，就容易被砍頭；讓耶穌出頭，就是讓耶穌作王，沒人敢砍耶穌的頭！因為只有耶穌配得一切的榮耀。"},{"t":"h","x":"靈一悟一命一侍一神"},{"t":"p","x":"「靈一悟一命一侍一神」是服侍之路。一直到見主面前，我們都需要不斷走在這條服侍的路，不要忽略或停留在任何一個階段，因為每個階段都是重要的提醒，及自我檢討的標準。持續在「靈一悟一命一侍一神」的路上服侍，我們就能邁進末後的大復興、迎接耶穌的再來！"},{"t":"p","x":"「靈ㄧ悟一命一侍一神」也是本書3-2-1在個人層面的落實。"},{"t":"p","x":"**聖靈是我的引導**：「靈」是聖靈，我們需要用心服侍才能被聖靈引導。"},{"t":"p","x":"**聖經是我的準則**：「悟」是領悟，我們的服侍不是按著我們的想法和方式，而是按著聖靈所啟示上帝的話。上帝的話就是我們的準則和方向。"},{"t":"p","x":"**耶穌是我的榜樣**：「命」是生命，藉著五個基本功「看一聽一想一講一行」，培養耶穌的生命，活出耶穌的生命。"},{"t":"p","x":"**讓耶穌作王**：「恃」是服侍，不是我們在做，而是讓耶穌做。這樣的服侍是經歷得勝，戰勝撒旦的權勢，使人的生命得改變，當我們讓耶穌作王，就能恢復管理的權柄，帶來服侍的果效。"},{"t":"p","x":"**讓耶穌得到一切的榮耀**：「神」是榮耀歸於神，這是服侍的最終目標。在服侍中，我們的渴望就是讓人看見耶穌，並將一切的榮耀歸給耶穌。"},{"t":"p","x":"「靈一悟一命一侍一神」讓我們能在服侍的路上落實3-2-1，並在我們個人生命中建立屬神的體系。屬神的體系在我們生命中建立，那麼我們屬靈的生命自然能健壯有力，我們會越服侍越像耶穌，越服侍越看見耶穌得榮耀！若離開了「靈一悟一命一侍一神」的路來服侍，我們屬靈的生命就會死，服侍會走到一個瓶頸。"},{"t":"p","x":"3-2-1的路在於「無己」。要走「靈一悟一命一侍一神」的路也在於「無己」。「有己」就無路；「無己」就有路，耶穌就是道路！當我們願意選擇「無己」，我們就會在服侍中找到出路，走在「靈ㄧ悟一命一侍一神」的服侍路上，直到見主面，讓我們邁進末後大復興吧！"},{"t":"p","x":"3-2-1在個人的落實："},{"t":"p","x":"靈：聖靈是我的引導"},{"t":"p","x":"悟：聖經是我的準則"},{"t":"p","x":"命：耶穌是我的榜樣"},{"t":"p","x":"侍：讓耶穌作王"},{"t":"p","x":"神：讓耶穌得著一切的榮耀"},{"t":"p","x":"1"}],"fns":{"1":"太20:28","2":"可9:35-37","3":"太25:34-40","4":"林前10:31,33","5":"弗2:10","6":"太25:25-30","7":"可10:42-45；路22:25-27","8":"路22:28-30","9":"林後4:18","10":"可10:21","11":"太23:35-40，做在最小的弟兄身上的事就是做在耶穌身上，在天上必被記念；太6:1-21，在耶穌提到積財寶在天上，耶穌提到好些我們在暗中所做的事，天父必報答，其中包括施捨、禱告、饒恕人、禁食……","12":"太25:14-30","13":"太25:29","14":"雅1:17，參考弗4:7-8，耶穌把各樣的恩賜賜給人。","15":"詩33:9","16":"太14:17-21；可6:38-44；路9:13-17","17":"林前15:10","18":"羅11:36","19":"箴3:5-6；亞4:6","20":"約14:26，16:13","21":"太7:24-27","22":"約13:14-15：耶穌的服侍就是用生命成為榜樣，參考林前11:1：保羅的服侍。","23":"彼前4:11","24":"太7:21-23","25":"羅8:6","26":"加5:25","27":"羅8:14；林前2:9-10；約16:13","28":"林後3:6","29":"約3:34","30":"太9:35，7:29；可1:22-28","31":"徒2章","32":"來4:12","33":"羅10:17","34":"來11章；雅1:6","35":"太11:25","36":"約16:13","37":"雅2:17","38":"約6:63","39":"詩19:7","40":"羅12:2；西3:9-10","41":"太7:24-27","42":"約12:32","43":"林前3:13-15","44":"約13:14","45":"約13:10","46":"約13:15","47":"林前11:1","48":"太28:19-20","49":"約12:24","50":"太20:28","51":"徒12:23","52":"太23:12；路14:11，18:14，參考雅4:10；彼前5:6","53":"箴16:18","54":"林前15:10","55":"約3:30"}}]</script>

/* ============ HELPERS ============ */
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function escA(s){return esc(String(s==null?"":s)).replace(/"/g,"&quot;");}
/* ===== App 內建提示與確認（取代被獨立 PWA 停用的 alert/confirm） ===== */
window.uiToast=function(msg){
  var t=document.getElementById("ui-toast");
  if(!t){ t=document.createElement("div"); t.id="ui-toast"; (document.body||document.documentElement).appendChild(t); }
  t.textContent=msg; t.className="ui-toast show";
  if(window.__toastT) clearTimeout(window.__toastT);
  window.__toastT=setTimeout(function(){ var e=document.getElementById("ui-toast"); if(e) e.className="ui-toast"; }, 2400);
};
window.uiConfirm=function(msg,onYes){
  var ov=document.getElementById("ui-confirm");
  if(!ov){ ov=document.createElement("div"); ov.id="ui-confirm"; (document.body||document.documentElement).appendChild(ov); }
  ov.className="ui-cf-ov show";
  ov.innerHTML='<div class="ui-cf-box"><div class="ui-cf-msg" id="ui-cf-msg"></div><div class="ui-cf-btns"><button class="ui-cf-no" id="ui-cf-no">取消</button><button class="ui-cf-yes" id="ui-cf-yes">確定</button></div></div>';
  var m=document.getElementById("ui-cf-msg"); if(m) m.textContent=msg;
  var close=function(){ var o=document.getElementById("ui-confirm"); if(o){ o.className="ui-cf-ov"; o.innerHTML=""; } };
  var no=document.getElementById("ui-cf-no"); if(no) no.onclick=close;
  var yes=document.getElementById("ui-cf-yes"); if(yes) yes.onclick=function(){ close(); if(onYes) onYes(); };
};

  var raw=localStorage.getItem(LS_KEY)||"{}";
  var d=new Date();
  var ymd=d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2)+"-"+("0"+d.getDate()).slice(-2);

  var payload=JSON.stringify({app:"chendu321",type:"backup",ver:1,date:d.toISOString(),data:dataObj});
  var blob=new Blob([payload],{type:"application/json"});
  try{
    if(navigator.canShare && window.File){
      var file=new File([blob],fname,{type:"application/json"});
      if(navigator.canShare({files:[file]})){
        navigator.share({files:[file],title:"晨讀321 備份",text:"晨讀321 的畫線與領受備份"}).then(function(){
          if(typeof uiToast==="function") uiToast("已開啟分享，可存到「檔案」或傳給自己");
        }).catch(function(){});
        return;
      }
    }
  }catch(e){}
  try{
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a"); a.href=url; a.download=fname;
    document.body.appendChild(a); a.click();
    setTimeout(function(){ try{document.body.removeChild(a);}catch(_){} URL.revokeObjectURL(url); },1500);
    if(typeof uiToast==="function") uiToast("已匯出備份檔："+fname);
  }catch(e){
    if(typeof uiToast==="function") uiToast("匯出失敗，請改用 Safari 開啟再試一次");

function inline(text){

  while((m=re.exec(text))!==null){

    if(m[1]==="b") out+='<strong class="b">'+v+'</strong>';

    else out+='<span class="g">'+v+'</span>';

  }
  if(last<text.length) out+=esc(text.slice(last));
  return out;
}

/* ---- 連續晨讀天數 ---- */
function todayStr(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function dayDiff(a,b){return Math.round((new Date(b+"T00:00:00")-new Date(a+"T00:00:00"))/86400000);}
function markReadDay(){
  var t=todayStr();
  if(state.lastDate===t) return;          // 今天已計入
  if(state.lastDate){
    var diff=dayDiff(state.lastDate,t);
    if(diff===1) state.streak=(state.streak||0)+1; // 連續
    else if(diff>1) state.streak=1;                // 中斷後重新開始
    else if(!state.streak) state.streak=1;         // 時鐘異常的保險
  } else { state.streak=1; }
  state.lastDate=t;
  if((state.streak||0)>(state.best||0)) state.best=state.streak;
}
function effectiveStreak(){ // 顯示用：今天或昨天有讀才算仍在連續中
  if(!state.streak||!state.lastDate) return 0;
  return dayDiff(state.lastDate,todayStr())<=1 ? state.streak : 0;
}

function mkLessonByN(n){ for(var i=0;i<LESSONS.length;i++){ if(LESSONS[i].n===n) return LESSONS[i]; } return null; }
function mkSplit(raw){
  raw=String(raw||""); var out=[], cur="", depth=0;
  for(var i=0;i<raw.length;i++){
    var ch=raw[i]; cur+=ch;
    if(ch==="⟦"){ depth++; }
    else if(ch==="⟧"){ if(depth>0) depth--; }
    else if(depth===0 && (ch==="。"||ch==="！"||ch==="？")){
      while(i+1<raw.length && "」』）".indexOf(raw[i+1])>=0){ i++; cur+=raw[i]; }
      out.push(cur); cur="";
    }
  }
  if(cur.replace(/\s/g,"").length) out.push(cur);
  return out;
}
function mkParaList(t){
  t=String(t||""); var arr=t.split("\n"), out=[];
  for(var i=0;i<arr.length;i++){ if(arr[i].replace(/\s/g,"").length) out.push(arr[i]); }
  return out;
}
function spkOrdCN(n){ return ["零","一","二","三","四","五","六","七","八","九","十"][n]||String(n); }
function mkSentence(l,key){
  var h=key.indexOf("#"); var pid=key.slice(0,h); var si=parseInt(key.slice(h+1),10);
  var m=pid.match(/^[A-Za-z]+/); var pre=m?m[0]:""; var rest=pid.slice(pre.length);
  var raw="";
  if(pre==="L"){ raw=l.lead||""; }
  else if(pre==="D"){ var ab=rest.split("-"); var dsec=(l.sections||[])[parseInt(ab[0],10)]; var list=dsec?mkParaList((dsec.deeper&&dsec.deeper.a)||""):[]; raw=list[parseInt(ab[1],10)]||""; }
  else if(pre==="F"){ raw=l.focus||""; }
  else if(pre==="H"){ raw=(l.hope&&l.hope.paras&&l.hope.paras[parseInt(rest,10)])||""; }
  else if(pre==="SH"){ raw=l.still_hint||""; }
  else if(pre==="S"){ raw=l.still||""; }
  else if(pre==="T"){ var _ti=parseInt(rest,10); var st=(l.steps&&l.steps[_ti]); raw=st?("第"+spkOrdCN(_ti+1)+"，"+(st.act||"")):""; }
  else if(pre==="Q"){ raw=l.declare||""; }
  else if(pre==="R"){ var _ri=parseInt(rest,10); var sh=(l.share&&l.share[_ri]); raw=sh?("第"+spkOrdCN(_ri+1)+"，"+(sh.q||"")):""; }
  else if(pre==="V"){ raw=l.verse||""; }
  else if(pre==="B"){ raw=l.bigidea||""; }
  else if(pre==="P"){ var psec=(l.sections||[])[parseInt(rest,10)]; raw=psec?(psec.pq||""):""; }
  else{ var ab2=pid.split("-"); var sec=(l.sections||[])[parseInt(ab2[0],10)]; raw=sec?((sec.paras||[])[parseInt(ab2[1],10)]||""):""; }
  var arr=mkSplit(raw); return (arr[si]||"").replace(/^\s+/,"");
}
function mkInline(l,paraId,raw){

function mediaCards(n){
  var m=(typeof MEDIA!=="undefined")?MEDIA[n]:null; if(!m)return "";
  var cards="";
  MEDIA_CATS.forEach(function(c){
    var vid=m[c.k]; if(!vid)return;
    var thumb="https://i.ytimg.com/vi/"+vid+"/mqdefault.jpg";
    cards+='<button class="vid-card" onclick="openVideo(\''+vid+'\',\''+c.label+'\')">'
      +'<span class="vid-thumb" style="background-image:url('+thumb+')"><span class="vid-play">▶</span></span>'
      +'<span class="vid-meta"><span class="vid-cat">'+c.ic+' '+c.label+'</span><span class="vid-hint">點一下 · 全螢幕觀看</span></span>'
      +'</button>';
  });
  return cards;
}
function mediaBtnHTML(n){
  var m=(typeof MEDIA!=="undefined")?MEDIA[n]:null; if(!m)return "";
  var cnt=0; MEDIA_CATS.forEach(function(c){ if(m[c.k])cnt++; });
  if(!cnt)return "";
  return '<button class="vid-open" onclick="openVideoList('+n+')"><span class="vid-open-ic">🎬</span>'
    +'<span class="vid-open-tx">本課視頻</span><span class="vid-open-ct">'+cnt+' 部</span>'
    +'<span class="vid-open-ar">›</span></button>';
}
window.openVideoList=function(n){
  if(document.querySelector(".vlist-overlay"))return;
  var cards=mediaCards(n); if(!cards)return;
  var ov=document.createElement("div"); ov.className="vlist-overlay";
  ov.innerHTML='<div class="vlist-sheet"><div class="vlist-head"><span>🎬 本課視頻</span>'
    +'<button class="vlist-close" onclick="closeVideoList()" aria-label="關閉">✕</button></div>'
    +'<div class="vlist-body">'+cards+'</div></div>';
  ov.addEventListener("click",function(e){ if(e.target===ov) closeVideoList(); });
  document.body.appendChild(ov);
  try{ document.documentElement.style.overflow="hidden"; }catch(_e){}
};
window.closeVideoList=function(){ var o=document.querySelector(".vlist-overlay"); if(o)o.remove();
  if(!document.querySelector(".vid-overlay")){ try{ document.documentElement.style.overflow=""; }catch(_e){} } };
window.openVideo=function(vid,label){
  if(document.querySelector(".vid-overlay"))return;
  var ov=document.createElement("div"); ov.className="vid-overlay";
  ov.innerHTML='<div class="vid-modal"><button class="vid-close" onclick="closeVideo()" aria-label="關閉">✕</button>'
    +'<div class="vid-embed"><iframe src="https://www.youtube.com/embed/'+vid+'?autoplay=1&playsinline=1&rel=0" title="'+esc(label||"")+'" frameborder="0" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen></iframe></div>'
    +'<div class="vid-modal-cap">'+esc(label||"")+'</div></div>';
  ov.addEventListener("click",function(e){ if(e.target===ov) closeVideo(); });
  document.body.appendChild(ov);
  try{ document.documentElement.style.overflow="hidden"; }catch(_e){}
};
window.closeVideo=function(){ var o=document.querySelector(".vid-overlay"); if(o)o.remove();
  if(!document.querySelector(".vlist-overlay")){ try{ document.documentElement.style.overflow=""; }catch(_e){} } };


/* 書本目錄頁：一次把整本書的語音抓進 IndexedDB，之後全書離線可聽 */
window.spkPreloadBookAll = function(){
  try{ spk.voiceOverride = null; }catch(_){}
  if(typeof yunEnabled!=="function" || !yunEnabled()){ if(typeof uiToast==="function") uiToast("目前使用裝置內建語音，本來就能離線，無需下載"); return; }
  if(window.__spkPreloadBusy) return;
  var pieces=[], seen={};
  (BOOK||[]).forEach(function(u){
    yunChunks(spkSanitize(bookSpeakText(u))).forEach(function(p){ if(!seen[p]){ seen[p]=1; pieces.push(p); } });
  });
  if(!pieces.length){ if(typeof uiToast==="function") uiToast("沒有可下載的語音"); return; }
  var okGo=true;
  try{ okGo=window.confirm("要預先下載全書 "+pieces.length+" 段語音嗎？建議在 Wi-Fi 環境下進行。"); }catch(_){}
  if(!okGo) return;
  window.__spkPreloadBusy=true;
  var total=pieces.length, ok=0, fail=0, started=0, running=0, CONC=3;
  function btn(){ return document.getElementById("bk-all-preload-btn"); }
  function label(x){ var b=btn(); if(b) b.textContent=x; }
  function disable(d){ var b=btn(); if(b) b.disabled=!!d; }
  disable(true); label("下載中… 0/"+total);
  function pump(){
    while(running<CONC && started<pieces.length){
      var piece=pieces[started++]; running++;
      yunFetch(piece).then(function(){ ok++; }, function(){ fail++; }).then(function(){
        running--; label("下載中… "+(ok+fail)+"/"+total); pump();
      });
    }
    if(running===0 && started>=pieces.length){
      window.__spkPreloadBusy=false; disable(false);
      if(fail){ label("已下載 "+ok+"/"+total); if(typeof uiToast==="function") uiToast("大致下載完成，少數段落可稍後再按一次補齊"); }
      else { label("✓ 全書語音已下載，離線可聽"); if(typeof uiToast==="function") uiToast("全書語音已下載，之後離線也能聽"); }
    }
  }
  pump();
};
window.spkPreloadBook = function(){
  spk.voiceOverride = null;
  var u = (BOOK||[])[state.bookUnit];
  if(!u){ if(typeof uiToast==="function") uiToast("請先打開一個單元再下載"); return; }
  if(!yunEnabled()){ if(typeof uiToast==="function") uiToast("目前使用裝置內建語音，本來就能離線，無需下載"); return; }
  if(window.__spkPreloadBusy) return;
  var chunks = yunChunks(spkSanitize(bookSpeakText(u)));
  if(!chunks.length){ if(typeof uiToast==="function") uiToast("本單元沒有可下載的語音"); return; }
  window.__spkPreloadBusy = true;
  var total = chunks.length, ok = 0, fail = 0, started = 0, running = 0, CONC = 3;
  function eachBtn(fn){ ["bk-preload-btn","rd-preload-btn"].forEach(function(id){ var b=document.getElementById(id); if(b) fn(b); }); }
  function label(t){ eachBtn(function(b){ b.textContent = t; }); }
  function disable(d){ eachBtn(function(b){ b.disabled = !!d; }); }
  disable(true); label("下載中\u2026 0/" + total);
  function pump(){
    while(running < CONC && started < chunks.length){
      var piece = chunks[started++]; running++;
      yunFetch(piece).then(function(){ ok++; }, function(){ fail++; }).then(function(){
        running--; label("下載中\u2026 " + (ok + fail) + "/" + total); pump();
      });
    }
    if(running === 0 && started >= chunks.length){
      window.__spkPreloadBusy = false; disable(false);
      if(fail){ label("已下載 " + ok + "/" + total + " (tap again later to finish)"); if(typeof uiToast==="function") uiToast("Mostly downloaded \u2014 a few parts can be retried later"); }
      else { label("\u2713 Whole chapter downloaded \u2014 plays offline"); if(typeof uiToast==="function") uiToast("Whole chapter downloaded \u2014 plays offline from now on"); }
    }
  }
  pump();
};

function paneHTML(l){
  if(state.tab==="read"){
    let s="";
    s+=`<div class="greet">${esc(l.greet)}</div>`;
    var _vr=mkInline(l,"V",l.verse||"");
    s+=`<div class="verse-card"><div class="verse-txt">「${_vr.body}」</div><div class="verse-ref">— ${esc(l.verse_ref)}</div></div>`+mkNotesBlock(_vr);
    s+=mediaBtnHTML(l.n);
    if(l.bigidea){ var _br=mkInline(l,"B",l.bigidea); s+=`<div class="bigidea mk-p">${_br.body}</div>`+mkNotesBlock(_br); }
    if(!(state.marks&&state.marks[l.n]&&Object.keys(state.marks[l.n]).length))
      s+=`<div class="mk-hint">💡 讀到聖靈光照、有感動的句子，<b>點一下</b>就能畫線；畫線後<b>再點一下</b>可以寫下你的領受。</div>`;
    if(l.lead) s+=mkParaHTML(l,"L",l.lead,"lead");
    (l.sections||[]).forEach((sec,i)=>{
      var head=sec.h.replace(/^([一二三四五六七八九十])/,"$1、");
      s+=`<div class="section"><div class="sec-h">${esc(head)}</div>`;
      (sec.paras||[]).forEach((p,pi)=>{s+=mkParaHTML(l,i+"-"+pi,p);});
      if(sec.pq){ var _pr=mkInline(l,"P"+i,sec.pq); s+=`<div class="pq mk-p">${_pr.body}</div>`+mkNotesBlock(_pr); }
      if(sec.deeper){
        const k="d"+i, open=state.deep[k];
        s+=`<button class="deep-btn" id="dbtn-${k}" aria-expanded="${open?'true':'false'}" onclick="toggleDeep('${k}')"><span class="deep-arrow" aria-hidden="true">${open?'▼':'▶'}</span>${esc(sec.deeper.q)}</button>`;
        var dps=mkParaList(sec.deeper.a), db="";
        dps.forEach(function(para,pi){ db+=mkParaHTML(l,"D"+i+"-"+pi,para,"deep-p"); });
        s+=`<div class="deep-body${open?' open':''}" id="dbody-${k}"><div class="deep-inner">${db}</div></div>`;
      }
      s+=`</div>`;
    });
    return s;
  }
  if(state.tab==="focus"){
    var fr=mkInline(l,"F",l.focus||"");

function mkTabOf(pid){
  var m=pid.match(/^[A-Za-z]+/); var pre=m?m[0]:"";
  if(pre==="L") return {tab:"read",label:"讀",rank:1};
  if(pre==="D"){ var ab=pid.slice(1).split("-"); return {tab:"read",label:"想更深",rank:1,deep:"d"+ab[0]}; }
  if(pre==="F") return {tab:"focus",label:"對焦",rank:2};
  if(pre==="H") return {tab:"hope",label:"盼望",rank:3};
  if(pre==="SH") return {tab:"still",label:"靜",rank:4};
  if(pre==="S") return {tab:"still",label:"靜",rank:4};
  if(pre==="T") return {tab:"steps",label:"操練",rank:5};
  if(pre==="Q") return {tab:"declare",label:"宣告",rank:6};
  if(pre==="R") return {tab:"share",label:"分享",rank:7};
  if(pre==="V") return {tab:"read",label:"經文",rank:1};
  if(pre==="B") return {tab:"read",label:"核心",rank:1};
  if(pre==="P") return {tab:"read",label:"省思",rank:1};
  return {tab:"read",label:"讀",rank:1};
}
function mkKeyOrder(key){
  var pid=key.slice(0,key.indexOf("#"));
  var nums=(pid.match(/\d+/g)||[]).map(Number);
  var sidx=parseInt(key.slice(key.indexOf("#")+1),10)||0;
  return [mkTabOf(pid).rank, nums[0]||0, nums[1]||0, sidx];
}
function mkCounts(){
  var marks=0, lessons=0;
  if(state.marks){ Object.keys(state.marks).forEach(function(k){ var o=state.marks[k]; var c=o?Object.keys(o).length:0; if(c){ marks+=c; lessons++; } }); }
  return {marks:marks, lessons:lessons};
}
function mkLessonMarkCount(n){
  var m=state.marks&&state.marks[n]; if(!m) return {marks:0,notes:0};
  var keys=Object.keys(m), notes=0;
  keys.forEach(function(k){ if(String(m[k]||"").trim()) notes++; });
  return {marks:keys.length, notes:notes};
}
function mkSortedKeys(m){
  var keys=Object.keys(m);
  keys.sort(function(a,b){var A=mkKeyOrder(a),B=mkKeyOrder(b);for(var i=0;i<4;i++){if(A[i]!==B[i])return A[i]-B[i];}return 0;});
  return keys;
}

function spkChunks(text){
  var t = String(text||"").replace(/\s+/g," ").trim();
  if(!t) return [];
  // 依標點切句（不用 lookbehind，相容舊版 iOS），再把過長句子切短
  var enders = "。！？；：\n";
  var sents = []; var buf = "";
  for(var i=0;i<t.length;i++){
    var ch = t[i]; buf += ch;
    if(enders.indexOf(ch) >= 0){ sents.push(buf); buf=""; }
  }
  if(buf) sents.push(buf);
  var out = [];
  sents.forEach(function(s){
    s = s.trim(); if(!s) return;
    while(s.length > 60){ out.push(s.slice(0,60)); s = s.slice(60); }
    if(s) out.push(s);
  });
  return out.length ? out : [t];
}

}

var _wakeLock=null;
/* 朗讀時螢幕恆亮（Wake Lock）：播放/續播請求、暫停/停止釋放；不支援則自動略過。 */
function spkWakeAcquire(){
  try{
    if(_wakeLock || !navigator.wakeLock) return;
    navigator.wakeLock.request("screen").then(function(wl){
      _wakeLock=wl;
      try{ wl.addEventListener("release",function(){ _wakeLock=null; }); }catch(_){}
    }).catch(function(){ _wakeLock=null; });
  }catch(_){}
}
function spkWakeRelease(){
  try{ if(_wakeLock){ var wl=_wakeLock; _wakeLock=null; wl.release().catch(function(){}); } }catch(_){}
}
/* 切回前景時若仍在朗讀就重新請求（Wake Lock 在頁面隱藏時會被系統自動釋放） */
document.addEventListener("visibilitychange",function(){
  try{ if(document.visibilityState==="visible" && spk.active && !spk.paused) spkWakeAcquire(); }catch(_){}
});
function spkMediaSession(act){
  try{ if(act==="play") spkWakeAcquire(); else spkWakeRelease(); }catch(_){}
  try{
    if(!("mediaSession" in navigator)) return;
    var ms=navigator.mediaSession;
    if(act==="play"){
      try{
        if(spk.curId==="lesson" && state.lesson && typeof MediaMetadata!=="undefined"){
          var t=String(state.lesson.title||"晨讀321").replace(/\s*\n\s*/g,"　");
          ms.metadata=new MediaMetadata({title:t, artist:"晨讀321", album:String(state.lesson.unit||"")});
        }
      }catch(_){}
      try{ ms.setActionHandler("play",function(){ spkResumeCurrent(); }); }catch(_){}
      try{ ms.setActionHandler("pause",function(){ spkPauseCurrent(); }); }catch(_){}
      try{ ms.setActionHandler("stop",function(){ spkStopReset(); }); }catch(_){}
      try{ ms.playbackState="playing"; }catch(_){}
    } else if(act==="pause"){
      try{ ms.playbackState="paused"; }catch(_){}
    } else {
      try{ ms.playbackState="none"; }catch(_){}
    }
  }catch(_){}
}
function spkPauseCurrent(){
  if(!spk.active || spk.paused) return;
  spk.paused=true;
  if(spk.mode==="native"){ try{ window.speechSynthesis.pause(); }catch(_){} }
  else { try{ if(window.yun && yun.audio) yun.audio.pause(); }catch(_){} }
  persistSpkResume();
  if(typeof spkMediaSession==="function") spkMediaSession("pause");
  if(typeof updateSpeakButtons==="function") updateSpeakButtons();
}
function spkResumeCurrent(){
  if(!spk.active || !spk.paused) return;
  if(spk.mode==="native"){
    /* 內建語音：從暫停的那一段重念（iOS 的 speechSynthesis.resume() 不穩定） */
    nativeRunFrom(Math.max(0, spk.idx-1));
  }else if(spk.joined){
    /* 背景連續播放（漸進式）：audio 元素還握著這一批的音檔，直接 play() 就從暫停處續下去；
       萬一元素已被 iOS 迴收而 play() 失敗，才退回從暫停的那一段重新串流。 */
    spk.paused=false;
    var okj=false;
    try{ if(window.yun && yun.audio){ var pj=yun.audio.play(); okj=true; if(pj&&pj.catch) pj.catch(function(){ yunPlayJoined(spk.curText||"", spk.curId, Math.max(0, spk.idx-1)); }); } }catch(_){}
    if(!okj) yunPlayJoined(spk.curText||"", spk.curId, Math.max(0, spk.idx-1));
    if(typeof spkMediaSession==="function") spkMediaSession("play");
    if(typeof updateSpeakButtons==="function") updateSpeakButtons();
  }else{
    /* 雲帆：從「暫停的那一段」重新念起，最可靠——iOS 背景後 audio 元素常被迴收，
       單純 play() 可能失效或從頭；改以重念當前段（spk.idx-1）確保「從剛才暫停處」接續。 */
    yunRunFrom(Math.max(0, spk.idx-1));
  }
}
function persistSpkResume(){

function yunFetch(piece){
  var key=ttsVoiceName()+"|"+yunRateAttr()+"|"+TTS_SIL_SENTENCE+"|"+TTS_SIL_COMMA+"|"+TTS_SIL_ENUM+"|"+piece;
  if(yun.cache[key]) return Promise.resolve(yun.cache[key]);   /* 本次工作階段記憶體快取，最快 */

    var aborted=e&&(e.name==="AbortError");
    chat.msgs.push({role:"assistant",text:(aborted?"小智等候得有點久，先暫停一下 🙏 請稍後再試。":"小智暫時連不上線，請稍後再試 🙏")+"\n別忘瞭——最好的同伴是聖靈與神的話，你隨時可以直接向主傾心吐意。"});

function attachFabDrag(fab){
  if(!fab || fab.__dragWired) return; fab.__dragWired=true;
  var sx=0,sy=0,ox=0,oy=0,moved=false,dragging=false;
  fab.addEventListener("pointerdown",function(e){
    var r=fab.getBoundingClientRect();
    sx=e.clientX; sy=e.clientY; ox=r.left; oy=r.top; moved=false; dragging=true;
    fab.style.transition="none";
    try{fab.setPointerCapture(e.pointerId);}catch(_){}
  });
  fab.addEventListener("pointermove",function(e){
    if(!dragging) return;
    var dx=e.clientX-sx, dy=e.clientY-sy;
    if(!moved && (Math.abs(dx)>4||Math.abs(dy)>4)) moved=true;
    if(!moved) return;
    var w=fab.offsetWidth, h=fab.offsetHeight;
    var nx=Math.max(6,Math.min(ox+dx, window.innerWidth-w-6));
    var ny=Math.max(6,Math.min(oy+dy, window.innerHeight-h-6));
    fab.style.left=nx+"px"; fab.style.top=ny+"px"; fab.style.right="auto"; fab.style.bottom="auto";
  });
  function endDrag(e){
    if(!dragging) return; dragging=false; fab.style.transition="";
    try{fab.releasePointerCapture(e.pointerId);}catch(_){}
    if(moved){
      var r=fab.getBoundingClientRect();
      state.xzPos={x:Math.round(r.left), y:Math.round(r.top)}; saveState();
      window.__xzJustDragged=true; setTimeout(function(){window.__xzJustDragged=false;},350);
    }
  }
  fab.addEventListener("pointerup",endDrag);
  fab.addEventListener("pointercancel",endDrag);
}

function sClean(s){return String(s||"").split("⟦b:").join("").split("⟦s:").join("").split("⟦g:").join("").split("⟧").join("").split("\n").join(" ");}
/* 搜尋索引改為「第一次搜尋才建立」，開機不再掃全部課程，加快啟動 */
var SEARCH_INDEX=null;
function getSearchIndex(){
  if(SEARCH_INDEX) return SEARCH_INDEX;
  SEARCH_INDEX=LESSONS.map(function(l){
    var parts=[];
    function add(t){if(t)parts.push(sClean(t));}
    add(l.title);add(l.unit);add(l.verse);add(l.verse_ref);add(l.bigidea);add(l.lead);add(l.focus);
    (l.sections||[]).forEach(function(sec){add(sec.h);(sec.paras||[]).forEach(add);if(sec.pq)add(sec.pq);if(sec.deeper){add(sec.deeper.q);add(sec.deeper.a);}});
    if(l.hope){add(l.hope.t);(l.hope.paras||[]).forEach(add);}
    (l.share||[]).forEach(function(sh){add(sh.q);});
    return {n:l.n,no:l.no,title:sClean(l.title),unit:sClean(l.unit),verse:sClean(l.verse),vref:l.verse_ref||"",hay:parts.join("　")};
  });

}
function searchLessons(q){
  q=(q||"").trim(); if(!q) return [];
  var ql=q.toLowerCase(), res=[];
  getSearchIndex().forEach(function(it){
    var score=0;
    if(it.title.toLowerCase().indexOf(ql)>=0) score+=100;
    if((it.verse+" "+it.vref).toLowerCase().indexOf(ql)>=0) score+=40;
    var hayL=it.hay.toLowerCase(), idx=0, c=0;
    while((idx=hayL.indexOf(ql,idx))>=0){c++;idx+=ql.length;if(c>30)break;}
    score+=c;
    if(score>0) res.push({it:it,score:score});
  });
  res.sort(function(a,b){return b.score-a.score||a.it.n-b.it.n;});
  return res.slice(0,60).map(function(r){return r.it;});
}
function sHi(text,q){
  var t=String(text||""), tl=t.toLowerCase(), ql=q.toLowerCase(), pos=ql?tl.indexOf(ql):-1;
  if(pos<0) return esc(t);
  return esc(t.slice(0,pos))+'<mark class="s-hl">'+esc(t.slice(pos,pos+ql.length))+'</mark>'+esc(t.slice(pos+ql.length));
}
function sSnip(it,q){
  var ql=q.toLowerCase(), src=it.verse, pos=src.toLowerCase().indexOf(ql);
  if(pos<0){src=it.hay;pos=src.toLowerCase().indexOf(ql);}
  if(pos<0) return esc(it.verse).slice(0,70);
  var start=Math.max(0,pos-16), end=Math.min(src.length,pos+ql.length+44);
  return (start>0?"…":"")+esc(src.slice(start,pos))+'<mark class="s-hl">'+esc(src.slice(pos,pos+ql.length))+'</mark>'+esc(src.slice(pos+ql.length,end))+(end<src.length?"…":"");
}

function mtWrap(ctx,text,maxW){

    if(line && ctx.measureText(test).width>maxW && MT_NOSTART.indexOf(ch)===-1){lines.push(line);line=ch;}

function mtDraw(l, ti, type, shape){

  mtSpaced(ctx,"活出基督 · 成為得勝者",cx,H-(sq?(hasId?92:60):(hasId?128:90)),3);
  // 網址 / QR

  var ty=ornY+(sq?46:58);
  for(var j=0;j<Math.min(tl.length,2);j++) ctx.fillText(tl[j],cx,ty+j*(sq?38:46));

  if(c.label) labelH+=sq?50:62;

  ctx.fillStyle=T.verse; ctx.font='600 '+size+'px '+MT_FONT;

function recPut(kind,n,blob,cb){ recDBopen(function(db){ if(!db)return cb&&cb(false);
  try{ var s=recStoreName(kind); var r=db.transaction(s,"readwrite").objectStore(s).put(blob,n);
    r.onsuccess=function(){ cb&&cb(true); }; r.onerror=function(){ cb&&cb(false); };
  }catch(e){ cb&&cb(false); } }); }
function recDel(kind,n,cb){ recDBopen(function(db){ if(!db)return cb&&cb(false);
  try{ var s=recStoreName(kind); var st=db.transaction(s,"readwrite").objectStore(s); var r=st["delete"](n);
    r.onsuccess=function(){ cb&&cb(true); }; r.onerror=function(){ cb&&cb(false); };
  }catch(e){ cb&&cb(false); } }); }
function recSkeleton(kind,n){
  var isNote=(kind==="note");

    return '<div class="rec-card"><div class="rec-title">🎙️ '+(isNote?"口述心得錄音":"宣告錄音")+'</div>'
      +'<div class="rec-note">此瀏覽器不支援錄音。請點右上角 ⋯ 用 <b>Safari／Chrome</b> 開啟並允許麥克風即可錄音；在 LINE／FB 內建瀏覽器或本機檔案下，瀏覽器多半會封鎖麥克風（網路版 https 最穩定）。</div></div>';
  }
  var title=isNote?"🎙️ 錄下口述心得":"🎙️ 錄下你的宣告";
  var sub=isNote?"用說的比用打的更快——把今天的領受、感動與禱告口述錄下來，常常回聽。錄音只存在你自己的裝置。"
                :"親口把這篇宣告禱告出來，錄起來常常聆聽，讓真理刻在心版上。錄音隻存在你自己的裝置。";
  return '<div class="rec-card"><div class="rec-title">'+title+'</div>'
    +'<div class="rec-sub">'+sub+'</div>'
    +'<button class="rec-btn" onclick="recStart(\''+kind+'\','+n+')">● 開始錄音</button></div>';
}
function recShowRecording(kind,n){
  var s=document.getElementById(recSlotId(kind)); if(!s)return;
  s.innerHTML='<div class="rec-card"><div class="rec-recbar"><span class="rec-dot"></span><span>錄音中</span><span id="rec-time">00:00</span></div>'
    +'<button class="rec-btn stop" onclick="recStop()">■ 停止並儲存</button></div>';
}
function recShow(kind,n,blob){
  var s=document.getElementById(recSlotId(kind)); if(!s)return;
  if(recState.url){ try{URL.revokeObjectURL(recState.url);}catch(e){} }
  recState.url=URL.createObjectURL(blob);
  var title=(kind==="note")?"🎧 我的口述心得":"🎧 我的宣告錄音";
  s.innerHTML='<div class="rec-card"><div class="rec-title">'+title+'</div>'
    +'<div class="rec-saved">✓ 已儲存於此裝置</div>'
    +'<audio class="rec-audio" controls preload="metadata" src="'+recState.url+'"></audio>'
    +'<div style="font-size:12px;color:var(--inkFaint);line-height:1.55;margin:-4px 2px 10px;">🔊 聽不到聲音？請把手機側邊的靜音鍵關閉、或調高音量（iPhone 靜音時，網頁錄音不會出聲）。</div>'
    +'<div class="rec-actions"><button class="rec-mini" onclick="recStart(\''+kind+'\','+n+')">↻ 重錄</button>'
    +'<button class="rec-mini del" onclick="recDelete(\''+kind+'\','+n+')">🗑 刪除</button></div></div>';
}
function recShowError(kind,n,err){
  var s=document.getElementById(recSlotId(kind)); if(!s)return;
  var msg="無法啟用麥克風。";
  if(err&&(err.name==="NotAllowedError"||err.name==="SecurityError"||err.name==="NotFoundError")) msg="麥克風權限被拒，或目前環境不允許錄音。";
  s.innerHTML='<div class="rec-card"><div class="rec-title">🎙️ '+((kind==="note")?"口述心得錄音":"宣告錄音")+'</div>'
    +'<div class="rec-note">'+msg+'<br>請改用 <b>Safari／Chrome</b> 開啟並允許麥克風；在 LINE／FB 內建瀏覽器或本機檔案下，瀏覽器多半會封鎖錄音。</div>'
    +'<div class="rec-actions" style="margin-top:12px"><button class="rec-mini" onclick="recStart(\''+kind+'\','+n+')">再試一次</button></div></div>';
}
function recStopStream(){ try{ if(recState.stream) recState.stream.getTracks().forEach(function(t){t.stop();}); }catch(e){} recState.stream=null; }
function recTimerStart(){ recTimerStop(); recState.timer=setInterval(function(){
  var el=document.getElementById("rec-time"); if(!el)return;
  var s=Math.floor((Date.now()-recState.t0)/1000);
  el.textContent=String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");
},250); }
function recTimerStop(){ if(recState.timer){ clearInterval(recState.timer); recState.timer=null; } }
function recCleanup(){
  try{ if(recState.mr&&recState.mr.state==="recording"){ recState.mr.onstop=null; recState.mr.stop(); } }catch(e){}
  recStopStream(); recTimerStop(); recState.mr=null;
  if(recState.url){ try{URL.revokeObjectURL(recState.url);}catch(e){} recState.url=null; }
}
function recHydrate(kind,n){
  if(!window.indexedDB) return;
  recGet(kind,n,function(blob){
    if(!blob) return;
    var s=document.getElementById(recSlotId(kind));
    if(s&&parseInt(s.getAttribute("data-n"),10)===n) recShow(kind,n,blob);
  });
}
window.recStart=function(kind,n){
  if(!recSupported()){ recShowError(kind,n,{name:"Unsupported"}); return; }
  try{
    navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
      recState.stream=stream; recState.chunks=[]; recState.kind=kind; recState.n=n;
      var mime="";
      try{ if(window.MediaRecorder&&MediaRecorder.isTypeSupported){
        if(MediaRecorder.isTypeSupported("audio/webm")) mime="audio/webm";
        else if(MediaRecorder.isTypeSupported("audio/mp4")) mime="audio/mp4";
      } }catch(e){}
      var mr; try{ mr=mime? new MediaRecorder(stream,{mimeType:mime}) : new MediaRecorder(stream); }catch(e){ mr=new MediaRecorder(stream); }
      recState.mr=mr;
      mr.ondataavailable=function(e){ if(e.data&&e.data.size) recState.chunks.push(e.data); };
      mr.onstop=function(){
        var type=(recState.chunks[0]&&recState.chunks[0].type)||mime||"audio/webm";
        var blob=new Blob(recState.chunks,{type:type});
        recStopStream(); recTimerStop();
        recPut(kind,n,blob,function(){ recShow(kind,n,blob); });
      };
      mr.start(); recState.t0=Date.now(); recTimerStart(); recShowRecording(kind,n);
    }).catch(function(err){ recShowError(kind,n,err); });
  }catch(e){ recShowError(kind,n,e); }
};
window.recStop=function(){ try{ if(recState.mr&&recState.mr.state!=="inactive") recState.mr.stop(); }catch(e){} };
window.recDelete=function(kind,n){
  recDel(kind,n,function(){ var s=document.getElementById(recSlotId(kind)); if(s) s.innerHTML=recSkeleton(kind,n); });
  if(recState.url){ try{URL.revokeObjectURL(recState.url);}catch(e){} recState.url=null; }
};

/* ============ 祝福影片（美圖 + 祝福語音 → 短影片）============ */
var blessState={mr:null,chunks:[],astream:null,vstream:null,raf:null,t0:0,timer:null,url:null,blob:null};
function blessSupported(){
  if(!recSupported()) return false;
  try{ var c=document.createElement("canvas"); return !!(c.captureStream && window.MediaStream); }catch(e){ return false; }
}
function blessMime(){
  var c=["video/mp4","video/webm;codecs=vp9,opus","video/webm;codecs=vp8,opus","video/webm"];
  for(var i=0;i<c.length;i++){ try{ if(window.MediaRecorder&&MediaRecorder.isTypeSupported&&MediaRecorder.isTypeSupported(c[i])) return c[i]; }catch(e){} }
  return "";
}
function blessSkeleton(n){
  if(!blessSupported()){
    return '<div class="bless-sec"><div class="bless-lbl">🎁 祝福語音影片</div>'
      +'<div class="rec-note">把上方美圖配上你親口的祝福，合成一段可分享的短影片，送給家人朋友。此功能需用 <b>Safari／Chrome</b> 開啟並允許麥克風（網路版 https 最穩定）；LINE／FB 內建瀏覽器或本機檔案會被封鎖。</div></div>';
  }
  return '<div class="bless-sec"><div class="bless-lbl">🎁 配上祝福語音，做成短影片</div>'
    +'<div class="bless-sub">為某位家人或朋友，把這張美圖加上你親口的祝福，做成一段可以分享的短影片。</div>'
    +'<button class="rec-btn" onclick="blessStart('+n+')">🎙️ 開始錄製祝福影片</button></div>';
}
function blessShowRecording(n){
  var s=document.getElementById("bless-slot"); if(!s)return;
  s.innerHTML='<div class="bless-sec"><div class="rec-recbar"><span class="rec-dot"></span><span>錄製中</span><span id="bless-time">00:00</span></div>'
    +'<div class="bless-sub">對著手機，說出你想為對方獻上的祝福……完成後按下方按鈕。</div>'
    +'<button class="rec-btn stop" onclick="blessStop()">■ 完成並產生影片</button></div>';
}
function blessShow(n,blob){
  var s=document.getElementById("bless-slot"); if(!s)return;
  if(blessState.url){ try{URL.revokeObjectURL(blessState.url);}catch(e){} }
  blessState.url=URL.createObjectURL(blob); blessState.blob=blob;
  s.innerHTML='<div class="bless-sec"><div class="bless-lbl">🎁 你的祝福影片</div>'
    +'<video class="bless-video" controls playsinline preload="metadata" src="'+blessState.url+'"></video>'
    +'<div class="rec-note">💡 <b>長按影片</b>可儲存到相簿；或按下方「分享」，把這段「經文＋祝福」一起送給對方。</div>'
    +'<div class="rec-actions" style="margin-top:12px"><button class="rec-mini" onclick="blessStart('+n+')">↻ 重錄</button>'
    +'<button class="rec-btn" style="padding:11px 22px" onclick="blessShare()">📤 分享祝福影片</button></div></div>';
}
function blessShowError(n,err){
  var s=document.getElementById("bless-slot"); if(!s)return;
  var msg="無法啟用麥克風或錄影。";
  if(err&&(err.name==="NotAllowedError"||err.name==="SecurityError"||err.name==="NotFoundError")) msg="麥克風權限被拒，或目前環境不允許錄音。";
  s.innerHTML='<div class="bless-sec"><div class="bless-lbl">🎁 祝福語音影片</div>'
    +'<div class="rec-note">'+msg+'<br>請改用 <b>Safari／Chrome</b> 開啟並允許麥克風；在 LINE／FB 內建瀏覽器或本機檔案下，多半會被封鎖。</div>'
    +'<div class="rec-actions" style="margin-top:12px"><button class="rec-mini" onclick="blessStart('+n+')">再試一次</button></div></div>';
}
function blessStopTracks(){
  try{ if(blessState.raf) cancelAnimationFrame(blessState.raf); }catch(e){} blessState.raf=null;
  try{ if(blessState.astream) blessState.astream.getTracks().forEach(function(t){t.stop();}); }catch(e){}
  try{ if(blessState.vstream) blessState.vstream.getTracks().forEach(function(t){t.stop();}); }catch(e){}
  blessState.astream=null; blessState.vstream=null;
}
function blessTimerStart(){ blessTimerStop(); blessState.t0=Date.now(); blessState.timer=setInterval(function(){
  var el=document.getElementById("bless-time"); if(!el)return;
  var s=Math.floor((Date.now()-blessState.t0)/1000);
  el.textContent=String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");
},250); }
function blessTimerStop(){ if(blessState.timer){ clearInterval(blessState.timer); blessState.timer=null; } }
function blessCleanup(){
  try{ if(blessState.mr&&blessState.mr.state==="recording"){ blessState.mr.onstop=null; blessState.mr.stop(); } }catch(e){}
  blessStopTracks(); blessTimerStop(); blessState.mr=null;
  if(blessState.url){ try{URL.revokeObjectURL(blessState.url);}catch(e){} blessState.url=null; } blessState.blob=null;
}
window.blessStart=function(n){
  if(!blessSupported()){ blessShowError(n,{name:"Unsupported"}); return; }
  blessCleanup();
  var l=state.lesson; if(!l) return;
  var dataUrl;
  try{ dataUrl=mtDraw(l,mtState.theme,mtState.content,mtState.shape); }catch(e){ blessShowError(n,e); return; }
  var img=new Image();
  img.onload=function(){
    try{
      var W=img.naturalWidth||1080, H=img.naturalHeight||1440;
      var cv=document.createElement("canvas"); cv.width=W; cv.height=H; var cxt=cv.getContext("2d");
      blessState.t0=Date.now();
      function frame(){
        cxt.drawImage(img,0,0,W,H);
        var t=(Date.now()-blessState.t0)/1000, a=0.3+0.4*(0.5+0.5*Math.sin(t*3));
        cxt.save(); cxt.globalAlpha=a; cxt.fillStyle="#D14B4B"; cxt.beginPath(); cxt.arc(78,H-78,17,0,Math.PI*2); cxt.fill(); cxt.restore();
        blessState.raf=requestAnimationFrame(frame);
      }
      frame();
      var vstream=cv.captureStream(20); blessState.vstream=vstream;
      navigator.mediaDevices.getUserMedia({audio:true}).then(function(astream){
        blessState.astream=astream;
        var tracks=vstream.getVideoTracks().concat(astream.getAudioTracks());
        var combined=new MediaStream(tracks);
        var mime=blessMime(), mr;
        try{ mr=mime? new MediaRecorder(combined,{mimeType:mime}) : new MediaRecorder(combined); }catch(e){ mr=new MediaRecorder(combined); }
        blessState.mr=mr; blessState.chunks=[];
        mr.ondataavailable=function(e){ if(e.data&&e.data.size) blessState.chunks.push(e.data); };
        mr.onstop=function(){
          var type=(blessState.chunks[0]&&blessState.chunks[0].type)||mime||"video/webm";
          var blob=new Blob(blessState.chunks,{type:type});
          blessStopTracks(); blessTimerStop();
          blessShow(n,blob);
        };
        mr.start(); blessTimerStart(); blessShowRecording(n);
      }).catch(function(err){ blessStopTracks(); blessShowError(n,err); });
    }catch(e){ blessStopTracks(); blessShowError(n,e); }
  };
  img.onerror=function(){ blessShowError(n,{name:"img"}); };
  img.src=dataUrl;
};
window.blessStop=function(){ try{ if(blessState.mr&&blessState.mr.state!=="inactive") blessState.mr.stop(); }catch(e){} };
window.blessShare=async function(){
  if(!blessState.blob) return;
  var type=blessState.blob.type||"video/mp4";
  var ext=type.indexOf("webm")>=0?".webm":".mp4";
  var fname="晨讀321祝福-第"+(state.lesson?state.lesson.n:"")+"課"+ext;
  try{
    var file=new File([blessState.blob],fname,{type:type});
    if(navigator.canShare&&navigator.canShare({files:[file]})){ await navigator.share({files:[file],title:"晨讀321 · 祝福"}); return; }
  }catch(e){}
  try{ var a=document.createElement("a"); a.href=blessState.url; a.download=fname; document.body.appendChild(a); a.click(); a.remove(); }catch(e){}
};

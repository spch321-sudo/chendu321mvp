<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#7FB9A6">
<link rel="icon" href="./favicon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="./icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="晨讀321">
<meta name="application-name" content="晨讀321">
<title>晨讀321 · 國度321空中團契</title>
<style>
  :root{
    --mint:#7FB9A6; --mintDeep:#5A9B85; --mintDark:#3E7766;
    --mintWash:#EAF3EF; --mintSoft:#F4F9F6;
    --ink:#2C4A40; --inkSoft:#5C7065; --inkFaint:#8A9C93;
    --gold:#C2A24B; --goldSoft:#E9DBB4; --goldWash:#F7F1DE;
    --clay:#B5806A; --claySoft:#F1E4DD;
    --paper:#FBFCFB; --card:#fff; --line:#E2EAE6;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'PingFang TC','Noto Sans TC','Microsoft JhengHei',sans-serif;
    background:var(--paper); color:var(--ink);
    -webkit-text-size-adjust:100%;
  }
  #app{max-width:520px;margin:0 auto;min-height:100vh;background:var(--paper);position:relative;}
  button{font-family:inherit;}
  ::-webkit-scrollbar{display:none;}

  /* home header */
  .home-head{background:linear-gradient(160deg,var(--mintDark) 0%,#1E5C4A 100%);padding:28px 20px 24px;color:#fff;}
  .home-eyebrow{font-size:11px;letter-spacing:2px;opacity:.75;margin-bottom:6px;}
  .home-title{font-size:26px;font-weight:800;line-height:1.3;}
  .home-sub{font-size:13.5px;opacity:.85;margin-top:6px;line-height:1.6;}
  .home-box{margin-top:18px;background:rgba(255,255,255,.12);border-radius:12px;padding:12px 16px;font-size:13.5px;line-height:1.7;}
  .home-box-sep{height:1px;background:rgba(255,255,255,.22);margin:10px 0;}
  .home-box b{font-weight:700;display:block;margin-bottom:4px;}

  .list-wrap{padding:16px;}
  .list-label{font-size:14px;font-weight:700;color:var(--inkFaint);margin-bottom:14px;letter-spacing:.5px;}
  .lesson-card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid var(--line);cursor:pointer;box-shadow:0 1px 6px rgba(0,0,0,.04);}
  .lesson-card:active{box-shadow:0 2px 12px rgba(0,0,0,.08);}
  .unit-badge{font-size:11px;color:var(--mintDeep);font-weight:600;background:var(--mintWash);border-radius:20px;padding:2px 10px;display:inline-block;margin-bottom:6px;}
  .card-title{font-size:16.5px;font-weight:700;color:var(--ink);line-height:1.4;margin-bottom:8px;white-space:pre-line;}
  .card-verse{font-size:13.5px;color:var(--inkSoft);font-style:italic;margin-bottom:10px;line-height:1.6;}
  .card-foot{display:flex;align-items:center;gap:10px;}
  .bar-bg{flex:1;height:5px;background:var(--line);border-radius:3px;}
  .bar-fill{height:100%;background:var(--mint);border-radius:3px;}
  .card-no{font-size:12px;color:var(--inkFaint);min-width:36px;}
  .list-end{text-align:center;padding:20px 0;font-size:13px;color:var(--inkFaint);}

  /* reader */
  .rd-head{position:sticky;top:0;z-index:10;background:var(--paper);border-bottom:1px solid var(--line);padding:12px 16px 0;}
  .rd-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .rd-back{background:none;border:none;cursor:pointer;font-size:20px;color:var(--inkSoft);padding:0;}
  .rd-unit{font-size:11px;color:var(--inkFaint);margin-bottom:2px;}
  .rd-title{font-size:16px;font-weight:700;color:var(--ink);line-height:1.3;white-space:pre-line;}
  .rd-prog{width:40px;height:40px;border-radius:50%;background:var(--mintWash);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .rd-prog span{font-size:11px;font-weight:700;color:var(--mintDark);}
  .rd-barbg{height:3px;background:var(--line);border-radius:2px;}
  .rd-barfill{height:100%;background:var(--mint);border-radius:2px;}

  .tabbar{display:flex;gap:2px;padding:0;margin-bottom:14px;border-bottom:1px solid var(--line);}
  .tab{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 1px;border:none;background:none;border-bottom:2.5px solid transparent;color:var(--inkFaint);cursor:pointer;}
  .tab-ic{font-size:17px;line-height:1;width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--mintWash);border-radius:11px;transition:background .15s;}
  .tab-tx{font-size:11.5px;line-height:1;position:relative;}
  .tab.active{border-bottom-color:var(--mint);color:var(--mintDark);font-weight:700;}
  .tab.active .tab-ic{background:rgba(127,185,166,.34);}

  .rd-body{padding:0 16px;}
  .greet{font-size:13px;color:var(--mintDeep);font-style:italic;text-align:center;margin:12px 0 18px;}
  .verse-card{background:linear-gradient(135deg,var(--mintWash) 0%,var(--goldWash) 100%);border-left:4px solid var(--mint);border-radius:12px;padding:18px 20px;margin:0 0 20px;}
  .verse-txt{font-size:21px;color:var(--ink);line-height:1.85;font-style:italic;}
  .verse-ref{margin-top:8px;font-size:15px;color:var(--mintDark);font-weight:600;}
  .bigidea{background:var(--mintWash);border-radius:10px;padding:14px 16px;margin-bottom:20px;font-size:18px;color:var(--mintDark);line-height:1.85;font-weight:600;}
  .lead{font-size:20px;color:var(--ink);line-height:1.95;margin-bottom:20px;}

  .section{margin-bottom:28px;}
  .sec-h{font-size:21px;font-weight:700;color:var(--mintDark);border-bottom:1.5px solid var(--line);padding-bottom:6px;margin-bottom:12px;}
  .sec-p{font-size:20px;color:var(--ink);line-height:1.95;margin-bottom:12px;}
  .pq{background:var(--goldWash);border-left:3px solid var(--gold);border-radius:8px;padding:12px 16px;margin:14px 0;font-size:18px;color:var(--ink);font-style:italic;line-height:1.8;}
  .deep-btn{background:none;border:1px solid var(--mint);border-radius:20px;padding:6px 14px;font-size:16px;color:var(--mintDeep);cursor:pointer;display:flex;align-items:center;gap:6px;margin-top:12px;}
  .deep-body{display:grid;grid-template-rows:0fr;margin-top:0;opacity:0;transition:grid-template-rows .28s ease,margin-top .28s ease,opacity .22s ease;font-size:18px;color:var(--inkSoft);line-height:1.9;}
  .deep-body.open{grid-template-rows:1fr;margin-top:10px;opacity:1;}
  .deep-inner{overflow:hidden;min-height:0;padding:14px 16px;background:var(--mintSoft);border-radius:10px;}
  .deep-p{margin:0 0 .7em;} .deep-body .mk-p:last-child{margin-bottom:0;}
  .deep-body .mk-note{font-size:13.5px;background:#fff;}

  .pane-icon{text-align:center;margin-bottom:20px;}
  .pane-icon .em{font-size:32px;}
  .pane-icon .lbl{font-size:14px;color:var(--inkFaint);margin-top:4px;}
  .focus-card{background:linear-gradient(135deg,var(--mintWash),var(--goldWash));border-radius:16px;padding:30px 24px;font-size:23px;font-weight:700;color:var(--ink);line-height:1.85;text-align:center;white-space:pre-line;box-shadow:0 2px 16px var(--mintWash);}
  .hope-t{font-size:21px;font-weight:700;color:var(--mintDark);margin-bottom:16px;}
  .hope-p{font-size:20px;color:var(--ink);line-height:1.95;margin-bottom:14px;}
  .still-card{background:var(--mintWash);border-radius:16px;padding:26px 24px;font-size:22px;font-weight:600;color:var(--ink);line-height:1.95;text-align:center;white-space:pre-line;margin-bottom:16px;}
  .still-hint{padding:14px 16px;background:var(--paper);border-radius:10px;font-size:18px;color:var(--inkSoft);line-height:1.85;text-align:center;white-space:pre-line;border:1px dashed var(--line);}
  .pane-h{font-size:19px;font-weight:700;color:var(--mintDark);margin-bottom:16px;}
  .step{display:flex;gap:12px;margin-bottom:16px;align-items:flex-start;}
  .step-num{min-width:30px;height:30px;border-radius:50%;border:2px solid var(--mint);background:#fff;color:var(--mint);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;margin-top:2px;cursor:pointer;transition:all .15s;}
  .step-num.done{background:var(--mint);color:#fff;}
  .step-act{font-size:19px;color:var(--ink);line-height:1.85;cursor:pointer;}
  .step-act.done{color:var(--ink);}
  .step-meta{font-size:17px;color:var(--mintDeep);margin-top:4px;font-style:italic;}
  .declare-card{background:linear-gradient(160deg,var(--mintDark) 0%,#2C6B5A 100%);border-radius:16px;padding:30px 24px;color:#fff;font-size:20px;line-height:2.05;white-space:pre-line;box-shadow:0 4px 24px rgba(62,119,102,.25);}
  .share-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:12px;}
  .pill{display:inline-block;border-radius:20px;padding:3px 13px;font-size:15px;font-weight:600;letter-spacing:.3px;color:var(--mintDark);}
  .share-q{margin:8px 0 0;font-size:20px;color:var(--ink);line-height:1.85;}
  /* 筆記 */
  .note-wrap{padding-top:16px;}
  .note-prompt{font-size:14px;color:var(--inkSoft);line-height:1.7;margin:0 0 12px;background:var(--goldWash);border-radius:12px;padding:12px 14px;}
  .note-prompt b{color:var(--mintDark);}
  .note-area{width:100%;min-height:300px;box-sizing:border-box;border:1px solid var(--line);border-radius:14px;padding:16px;font-family:inherit;font-size:17px;line-height:1.95;color:var(--ink);background:var(--card);resize:vertical;outline:none;box-shadow:0 1px 6px rgba(0,0,0,.04);}
  .note-area:focus{border-color:var(--mint);box-shadow:0 2px 12px rgba(127,185,166,.2);}
  .note-area::placeholder{color:var(--inkFaint);}
  .note-foot{display:flex;align-items:center;justify-content:space-between;margin-top:10px;font-size:13px;color:var(--inkFaint);}
  .note-saved{color:var(--mintDeep);font-weight:600;}
  .note-clear{background:none;border:1px solid var(--line);border-radius:20px;padding:5px 14px;font-size:13px;color:var(--inkSoft);cursor:pointer;}
  .note-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--gold);margin-left:6px;vertical-align:middle;}
  body.fs-lg .note-area{font-size:20px;} body.fs-xl .note-area{font-size:23px;}

  .rd-foot{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:var(--card);border-top:1px solid var(--line);padding:7px 6px calc(7px + env(safe-area-inset-bottom,0px));display:flex;gap:2px;align-items:stretch;}
  #spk-stopbar{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(60px + env(safe-area-inset-bottom,0px));width:100%;max-width:520px;display:none;text-align:center;z-index:60;pointer-events:none;padding:28px 0 6px;background:linear-gradient(to bottom,rgba(251,253,252,0) 0%,rgba(251,253,252,.82) 58%,#fbfdfc 100%);}
  .spk-stop-pill{pointer-events:auto;display:inline-flex;align-items:center;border:none;background:linear-gradient(135deg,var(--mintDeep),var(--mintDark));color:#fff;border-radius:999px;padding:5px 15px;font-size:12.5px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 4px 14px rgba(62,119,102,.34);}
  .spk-stopbar-in{pointer-events:auto;display:inline-flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;}
  .spk-dl-pill{pointer-events:auto;display:inline-flex;align-items:center;gap:4px;background:var(--goldWash);color:#8a6d1f;border:1.5px solid var(--gold);border-radius:999px;padding:9px 15px;font-size:13.5px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 4px 14px rgba(62,119,102,.18);}
  .spk-dl-pill:active{transform:scale(.95);}
  .spk-dl-pill:disabled{opacity:.72;}
  .spk-stop-pill:active{transform:scale(.95);}
  .foot-btn{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:6px 1px;border-radius:12px;border:none;background:none;color:var(--inkSoft);cursor:pointer;transition:all .15s;}
  .foot-btn .fb-ic{font-size:18px;line-height:1;width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--mintWash);border-radius:11px;transition:background .15s;}
  .foot-btn .fb-tx{font-size:10.5px;font-weight:600;white-space:nowrap;line-height:1;position:relative;}
  .foot-btn.active{color:var(--gold);font-weight:700;}
  .foot-btn.active .fb-ic{background:rgba(194,162,75,.20);}
  .foot-btn.nav{color:var(--mintDark);font-weight:700;}
  .foot-btn.nav .fb-ic{font-size:20px;font-weight:800;color:var(--mintDeep);}
  .foot-btn.xz .fb-ic{filter:saturate(1.1);}
  .foot-btn.disabled{opacity:.3;pointer-events:none;}
  .foot-btn:active{transform:scale(.95);}
  .foot-btn.spk-on{color:var(--mintDeep);font-weight:700;}
  .foot-btn.spk-on .fb-ic{background:var(--mint);color:#fff;}
  .xz-spk{display:inline-flex;align-items:center;gap:4px;margin-top:8px;padding:4px 11px;border:1px solid var(--line);border-radius:999px;background:var(--mintSoft);color:var(--mintDark);font-size:12.5px;font-weight:600;cursor:pointer;line-height:1;-webkit-appearance:none;}
  .xz-spk:active{transform:scale(.96);}
  .xz-spk.spk-on{background:var(--mint);border-color:var(--mint);color:#fff;}
  .xz-spk .spk-ic{font-size:13px;}
  .xz-acts{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;align-items:center;}
  .xz-acts .xz-spk{margin-top:0;}
  .xz-act{display:inline-flex;align-items:center;gap:3px;padding:4px 10px;border:1px solid var(--line);border-radius:999px;background:transparent;color:#7b8c84;font-size:12px;font-weight:600;cursor:pointer;line-height:1;-webkit-appearance:none;}
  .xz-act:active{transform:scale(.96);}
  .xz-collapsed-preview{color:#7b8c84;font-size:14px;opacity:.85;}
  .fontbtn.spk-open{border-color:var(--mint);color:var(--mintDark);font-weight:600;}
  .spk-ov{position:fixed;inset:0;background:rgba(20,40,34,.42);z-index:9000;display:flex;align-items:flex-end;justify-content:center;}
  .spk-card{width:100%;max-width:560px;background:var(--card);border-radius:22px 22px 0 0;padding:18px 18px calc(18px + env(safe-area-inset-bottom));max-height:84vh;display:flex;flex-direction:column;box-shadow:0 -8px 30px rgba(0,0,0,.18);}
  .spk-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
  .spk-h-t{font-size:18px;font-weight:800;color:var(--ink);}
  .spk-x{border:none;background:var(--mintWash);width:32px;height:32px;border-radius:50%;font-size:15px;color:var(--inkSoft);cursor:pointer;}
  .spk-sub{font-size:13px;color:var(--inkFaint);margin-bottom:12px;}
  .spk-list{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;margin:-4px -4px 8px;padding:4px;}
  .spk-row{display:flex;align-items:center;gap:8px;width:100%;text-align:left;border:1.5px solid var(--line);background:var(--card);border-radius:14px;padding:12px 14px;margin-bottom:8px;cursor:pointer;}
  .spk-row.spk-sel{border-color:var(--mint);background:var(--mintSoft);}
  .spk-rname{font-size:15px;font-weight:600;color:var(--ink);flex:1;display:flex;align-items:center;gap:7px;}
  .spk-rlang{font-size:12px;color:var(--inkFaint);}
  .spk-rck{color:var(--mintDeep);font-weight:800;}
  .spk-g{font-size:11px;font-weight:700;padding:2px 7px;border-radius:999px;}
  .spk-g-m{background:#E1ECF7;color:#3A6EA5;}
  .spk-g-f{background:#F7E6EE;color:#B5557F;}
  .spk-empty{font-size:14px;color:var(--inkSoft);line-height:1.7;padding:18px 6px;text-align:center;}
  .spk-rate{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--inkSoft);margin:4px 2px 14px;}
  .spk-rate input{flex:1;accent-color:var(--mint);}
  .spk-acts{display:flex;gap:10px;}
  .spk-ver{text-align:center;font-size:11px;color:var(--inkFaint);letter-spacing:.06em;margin:10px 0 2px;}
  .spk-try{flex:1;border:1.5px solid var(--mint);background:var(--mintSoft);color:var(--mintDark);border-radius:14px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;}
  .spk-done{flex:1;border:none;background:var(--mint);color:#fff;border-radius:14px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;}
  .spk-dl{margin:14px 0 4px;}
  .spk-dl-btn{width:100%;border:1.5px solid var(--gold);background:var(--goldWash);color:#8a6d1f;border-radius:14px;padding:13px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;}
  .spk-dl-btn:disabled{opacity:.7;cursor:default;}
  .spk-dl-sub{font-size:12.5px;color:var(--inkFaint);line-height:1.6;margin:8px 2px 0;text-align:center;}
  .spk-tip{font-size:12px;color:var(--inkFaint);line-height:1.6;margin-top:12px;text-align:center;}

  .pad-btm{padding-bottom:90px;}

  /* inline marks */
  strong.b{color:var(--ink);font-weight:700;}
  span.s{color:var(--clay);font-style:italic;}
  span.g{color:var(--mintDark);font-weight:600;}

  /* ===== unit accordion (home, 兩層) ===== */
  .unit-card{background:var(--card);border-radius:16px;margin-bottom:14px;border:1px solid var(--line);box-shadow:0 1px 6px rgba(0,0,0,.04);overflow:hidden;}
  .unit-card.open{box-shadow:0 3px 16px rgba(0,0,0,.08);border-color:var(--mint);}
  .unit-row{display:flex;align-items:center;gap:14px;padding:16px;cursor:pointer;}
  .unit-num{width:54px;height:54px;flex:0 0 54px;border-radius:14px;background:var(--mintDeep);color:#fff;font-size:22px;font-weight:800;display:flex;align-items:center;justify-content:center;}
  .unit-card.open .unit-num{background:var(--mint);}
  .unit-meta{flex:1;min-width:0;}
  .unit-eyebrow{font-size:12px;font-weight:700;color:var(--gold);letter-spacing:1px;margin-bottom:3px;}
  .unit-title{font-size:18px;font-weight:800;color:var(--ink);line-height:1.35;}
  .unit-range{font-size:12.5px;color:var(--inkFaint);margin-top:5px;}
  .unit-chevron{flex:0 0 auto;font-size:14px;color:var(--inkFaint);padding-left:4px;}
  .unit-body{border-top:1px solid var(--line);}
  .u-verse{background:var(--mintSoft);color:var(--mintDark);font-size:13.5px;font-style:italic;line-height:1.7;padding:13px 18px;}
  .u-vref{color:var(--inkFaint);font-style:normal;}
  .u-lesson{display:flex;align-items:center;gap:13px;padding:13px 18px;border-bottom:1px solid var(--line);cursor:pointer;}
  .u-lesson:last-child{border-bottom:none;}
  .u-lesson:active{background:var(--mintWash);}
  .u-lnum{width:34px;height:34px;flex:0 0 34px;border-radius:9px;background:var(--mintWash);color:var(--mintDeep);font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;}
  .u-ltitle{flex:1;font-size:15.5px;font-weight:600;color:var(--ink);line-height:1.4;}
  .u-chev{flex:0 0 auto;color:var(--inkFaint);font-size:18px;}
  .u-soon{padding:18px;text-align:center;color:var(--inkFaint);font-size:13.5px;}

  /* ===== 繼續閱讀 / 進度 / 字級控制 ===== */
  .continue-card{background:linear-gradient(135deg,var(--gold),#A9863A);color:#fff;border-radius:14px;padding:14px 16px;margin-bottom:14px;cursor:pointer;box-shadow:0 3px 14px rgba(194,162,75,.3);}
  .continue-card:active{opacity:.92;}
  .cc-label{font-size:12px;opacity:.85;letter-spacing:1px;margin-bottom:3px;}
  .cc-title{font-size:16px;font-weight:700;line-height:1.4;}
  .cc-go{font-size:13px;opacity:.92;margin-top:6px;text-align:right;}
  .overall{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:12px;}
  .overall-top{display:flex;justify-content:space-between;font-size:13px;color:var(--inkSoft);margin-bottom:7px;font-weight:600;}
  .overall-bar{height:7px;background:var(--mintWash);border-radius:4px;overflow:hidden;}
  .overall-fill{height:100%;background:linear-gradient(90deg,var(--mint),var(--mintDark));border-radius:4px;transition:width .4s;}
  .streak{display:flex;align-items:center;gap:8px;margin-top:11px;padding-top:11px;border-top:1px dashed var(--line);font-size:14px;color:var(--ink);}
  .streak-fire{font-size:18px;}

<script type="application/json" id="lessons-json">[{"n":147,"unit":"第九單元 · 關係——重整生命的次序","title":"上帝旨意的中心，\n是建立關係","no":"147","greet":"願你來到主的面前，得享安息","verse":"你們若遵行我所吩咐的，就是我的朋友了。","verse_ref":"約翰福音 15:14","bigidea":"本課核心：很多人以為遵行上帝旨意就是完成一件事、達成一個目標，但聖經啟示更深的真相——上帝的旨意，不只是做事，乃是建立關係。神創造人是為了關係，復興也是關係被恢復：人與神、人與自己、人與人重新被建立。遵行旨意，不是完成命令，而是回應一段關係。","lead":"恭喜你進入第九單元！前八個單元，我們從邁進大復興、對準耶穌、從心開始、觀念的改變，一路走到無己、謙卑、捨己，再到生命的培養（看聽想講行）。現在這個生命，要流向哪裡？答案是——關係。復興不是抽象的，它的「實際」就是關係被建立。這一課要先看見一個核心真理：上帝旨意的中心，就是建立關係。","sections":[{"h":"一遵行旨意，是建立關係的起點","paras":["「你們若遵行我所吩咐的，就是我的朋友了。」（約15:14）「凡遵行我天父旨意的人，就是我的弟兄姊妹和母親了。」（太12:50）從創世記到新約，神不斷重複一件事——⟦g:要人「聽從祂的話」⟧。亞當失敗因不聽從，亞伯拉罕蒙福因聽從。","這些歷史背後的核心，不是「對錯」，而是「關係」。⟦b:聽從＝信任，遵行＝連結⟧。當一個人願意遵行神的話，他不是在完成命令，而是在回應一段關係——就像孩子聽父親的話，不只是因為規定，而是因為愛與信任。","⟦g:用心順服神 → 建立關係⟧；⟦s:用腦分析神 → 失去關係⟧。⟦b:很多人「懂很多」，卻「離神很遠」，因為用腦不等於用心⟧。"],"deeper":{"q":"想更深？「遵行神的旨意，不是完成命令，而是回應一段關係」——這聽起來很溫暖，但對那些覺得「自己跟神之間根本沒什麼關係感、禱告像對空氣說話」的人，這話會不會反而讓他更挫折？如果我感受不到跟神的「關係」，那我的順服豈不是空洞的？","a":"先溫柔地說：感受不到跟神的「關係感」、禱告像對空氣說話，是很多真誠信徒都經歷過的——這不代表你跟神「沒有關係」，也不代表你的順服是空洞的。要分清「關係的『事實』」與「關係的『感覺』」：⟦g:你與神的關係，根基是「客觀的事實」——你已因信成為神的兒女、神已愛你愛到捨命、祂已應許永不離棄你⟧，這是真的，不因你「此刻有沒有感覺到」而改變；感覺會起伏（連最親密的人之間，也有感覺不到對方的時候），但關係的事實是穩的。所以在「感受不到」的時候，你的順服恰恰「不是空洞的，反而更寶貴」——因為那是「不憑感覺、單憑信心」的順服，像一個孩子在感受不到父親的時候，仍然信任地聽父親的話，這份信任比「有感覺時的順服」更珍貴。而且要知道：⟦b:關係常常是「在順服中漸漸加深的」，而不是「先有滿滿的感覺、才去順服」⟧——你願意在「沒感覺」時仍遵行、仍親近，神往往就在這樣的忠心裡，慢慢讓你經歷祂的真實（就像感情是在一起生活、彼此回應中加深的，不是光等感覺）。所以別因為「感受不到」就否定關係、或覺得順服無意義。⟦g:關係的根基是神已成就的愛（事實），不是你此刻的感覺；在沒感覺時仍順服親近，正是信心，也正是讓關係加深的路⟧。那「感受不到」的乾旱，神也知道，祂在暗中察看、從不離開。"}},{"h":"二遵行旨意，使生命進入永恆價值","paras":["「這世界和其上的情慾都要過去，惟獨遵行神旨意的，是永遠常存。」（約壹2:17）⟦b:世界的一切都會過去，只有一件事是永遠的——遵行神的旨意⟧。為什麼？因為遵行神的旨意，不只是行為正確，而是「連結在神裡面」。","就像一棵樹：⟦g:接在根上的枝子，有生命、會結果⟧；⟦s:離開根的枝子，枯乾、死亡⟧。「我的食物就是遵行差我來者的旨意。」（約4:34）","⟦g:遵行神旨意，不是負擔，是生命的供應⟧——就像吃飯，不是壓力，是維持生命的來源。⟦b:不遵行神旨意，靈裡會枯乾⟧。"],"deeper":{"q":"想更深？「惟獨遵行神旨意的是永遠常存、其餘都要過去」——但那些不信主、卻一生行善、愛人、貢獻社會的好人呢？難道他們所做的一切美善，因為「不是遵行神的旨意」，就全都『要過去』、沒有永恆價值嗎？這對善良的非信徒，不會太武斷嗎？","a":"這是個需要溫柔、不武斷對待的問題。先說幾件聖經給我們的亮光，避免落入狹隘或論斷：⟦g:一、一切的善，源頭都是神⟧——非信徒所行的真善、所付出的真愛，本身就反映了神放在人裡面的形像與「普遍恩典」，神看見、也珍視這些美善，絕不是說它們「毫無意義、純屬虛空」；⟦g:二、「永遠常存」這節經文的重點⟧，是在對比「自我中心、隨世界過去的事」與「連於神、出於神的事」——它要說的是「什麼樣的生命有永恆的份量」，而不是要我們去武斷論斷某個善人的永恆歸宿。至於那善良非信徒所行的美善有沒有永恆價值？⟦b:這課真正的對象其實是「我們自己」——它是要提醒「我」：別把人生投資在會過去的事上，要連於那永遠常存的神⟧。而每個人最終的歸宿與賞罰，是神的主權與恩典，審判權在祂、不在我們，我們不該越權去斷定誰的善「沒有價值」。所以正確的態度是：⟦g:不武斷論斷非信徒善行的永恆價值（那是神的事）；卻認真領受對「我自己」的提醒——把生命連於神、讓所做的出於對神的愛，這樣的生命才真正存到永遠⟧。⟦b:這節經文是給我的鏡子（我連於神了嗎？），不是給別人的判詞（他的善有沒有用？）⟧。而我們能做的，是把那位一切美善的源頭——神，介紹給每一個善良尋求的人，讓他們所行的善，連於那永不過去的根。"}},{"h":"三遵行旨意的三個層次：活在、死在、傳承","paras":["「一粒麥子不落在地裡死了，仍舊是一粒；若是死了，就結出許多子粒來。」（約12:24）遵行神的旨意，不只是「做一次」，而是三個層次。⟦g:第一，活在上帝的旨意——開始順服，願意照神的話去做⟧（但這階段常遇困難掙扎）。","⟦g:第二，死在上帝的旨意——堅持到底，不因環境放棄⟧。耶穌在十字架上就是最完全的榜樣：不是只「開始順服」，而是「順服到底，甚至死在十字架上」。","⟦g:第三，傳承上帝的旨意——不只自己活出來，也幫助別人活出來⟧（摩西帶出約書亞，耶穌帶出門徒）。⟦b:真正的復興＝生命繁殖生命⟧。⟦s:有己 → 只停在自己⟧；⟦g:無己 → 才能傳承⟧。"],"pq":"上帝的旨意不是一條任務清單，而是一條關係的道路。","deeper":{"q":"想更深？把「遵行上帝旨意」說成「建立關係」，會不會太抽象、太軟性了？神明明在聖經裡給了很多具體的命令要我們「去做」，這不就是「做事」嗎？","a":"這是一個很好的釐清，因為它觸及「做事」與「關係」之間那個常被誤解的關係——這兩者其實不是對立的，而是「裡」與「外」、「目的」與「途徑」的關係。先承認問題的合理之處：聖經確實充滿了具體的命令——要愛人、要饒恕、要傳福音、要照顧孤兒寡婦、要誠實、要殷勤。這些都是實實在在「要去做的事」，神的旨意絕不是一團不必行動的、軟綿綿的「感覺」。所以這一課絕不是說「不必做事，只要有關係的感覺就好」。關鍵的分辨在於：這些「事」，本身是「目的」，還是「途徑」？世界的眼光（也是我們的天然眼光）是把「事」當成目的——衡量一個人，看他「完成了多少、做出了什麼成果」，事情本身就是終點。但聖經啟示，神給的這一切命令，背後都指向一個更深的「目的」——關係。你看耶穌怎麼總結全部的律法和先知：不是總結成一份「該做的事項清單」，而是總結成兩個關係：「愛神」和「愛人」。所有具體的命令，都是這兩個關係的「具體表達途徑」。神要你「饒恕」，不是為了完成「饒恕」這個動作本身，而是為了「恢復一段破裂的關係」；神要你「誠實」，是為了維護關係中的「信任」；神要你「孝敬父母」，是為了那份「親子的關係」；神要你「遵行祂的話」，最終是為了與祂「連結、同行、作祂的朋友」（這正是本課的金句）。所以「事」是真實的、必須去做的，但「事」是為了「關係」而存在的途徑，不是與關係無關的、可以脫離關係單獨追求的目的。這個分辨為什麼極其重要？因為一旦把「事」從「關係」中抽離、當成獨立的目的來追求，就會出大問題——你會看見一種人，把神的命令當成一份「業績清單」拚命完成，禱告、聚會、奉獻、服事樣樣不缺，數字很漂亮，卻在這過程中傷害了人、冷落了神、失去了愛（這正是下一課林前十三章警告的「有恩賜、有奉獻，卻沒有愛，就算不得什麼」）。他「做了很多事」，卻完全偏離了這些事背後的「目的」——關係。這就像一個丈夫，把婚姻當成一份「該盡的責任清單」：賺錢、做家事、接送孩子，樣樣完成，卻從不與妻子交心、相愛——他「做了所有該做的事」，卻失去了婚姻真正的目的（兩人的關係）。所以「上帝旨意的中心是建立關係」這句話，非但不抽象、不軟性，反而給了我們所有「做事」一個正確的、扎心的「校準點」：我做這件事，是在拉近關係，還是在不知不覺中、用做事取代了關係、甚至破壞了關係？這也正是接下來幾課要深入的——當你做的「事」與「人（關係）」衝突時，神要你「先人後事」；當你忙於「事工」卻冷落了「與神的關係」時，神說「聽命勝於獻祭」。所以結論是：照樣積極地去做神吩咐的每一件事（不偷懶、不逃避），但做的時候，眼睛要看著那件事背後真正的目的——與神、與人的關係。讓「做事」成為「建立關係」的途徑，而不是取代關係的偶像。如此，你的「做事」就不再是冷冰冰的任務完成，而是有溫度、有生命、通向永恆的關係建造。"}}],"focus":"我為神、為人所做的那些「事」，\n是正在拉近我與神、與人的關係，\n還是不知不覺中，\n用「做事」取代了、甚至傷害了關係？","hope":{"t":"✺ 你做的每件事，都是通向關係的途徑","paras":["拚命為神、為家、為人做事，卻越做越累、越做越空——很可能是因為我們把「事」本身當成了目的，忘了它真正要通向哪裡。這一課把焦點調正：⟦b:上帝旨意的中心，不是做事，而是建立關係；事，是通向關係的途徑。⟧","你不必停下手中的事——⟦g:只要在做的時候，眼睛看著那件事背後真正的目的：與神、與人的關係⟧。讓饒恕去恢復關係、讓誠實去守護信任、讓順服去回應那位愛你的天父。當「做事」成為「建立關係」的途徑，而不是取代關係的負擔，你會發現，同樣的忙碌裡，多了溫度、多了生命，也多了永恆的價值。"]},"still":"此刻安靜——\n我最近忙著做的這些事，\n讓我與神、與身邊的人，\n是更靠近了，\n還是更疏遠了？","still_hint":"不必盤點做了多少。\n安靜一分鐘，\n回到那位以友相待的主：\n「主啊，我不只要為祢做事，我更要與祢同行。」","steps":[{"act":"每天問自己：我現在是在做事，還是在建立關係？檢視我的看、聽、想、講、行，是讓關係更靠近，還是更疏遠。","meta":""},{"act":"操練「用心順服」而非「用腦分析」：神的話臨到時，不先分析合不合理，先回應「主，我願意」。","meta":""},{"act":"刻意建立一段關係，而不只是完成一件事：每天主動關心一個人——一通電話、一句鼓勵、一個傾聽。","meta":""}],"declare":"主啊，我不再只是做事的人，\n我要成為建立關係的人。\n我選擇用心順服祢，不再用腦分析祢。\n我要活在祢的旨意中、死在祢的旨意中，也要傳承祢的旨意。\n讓我的生命，不只是完成事情，\n而是連結於祢、影響他人，結出永恆的果子。\n奉主耶穌的名，阿們。","share":[{"tag":"領受","q":"「上帝的旨意不是任務清單，是關係的道路。」這個看見，怎麼改變你對「遵行神旨意」的理解？"},{"tag":"省察","q":"誠實檢視：你有沒有不知不覺「用做事取代了關係」（與神，或與某個人）？"},{"tag":"同行","q":"「遵行旨意的三層次：活在、死在、傳承。」你目前在哪一層？這週你願意在哪一段關係上，主動跨出一步？與小家分享。"}],"next":"神的旨意，總歸就是愛","prog":"10"},{"n":148,"unit":"第九單元 · 關係——重整生命的次序","title":"神的旨意，\n總歸就是愛","no":"148","greet":"願你來到主的面前，得享安息","verse":"我賜給你們一條新命令，乃是叫你們彼此相愛；我怎樣愛你們，你們也要怎樣相愛。","verse_ref":"約翰福音 13:34","bigidea":"本課核心：上帝的旨意並不隱藏、不複雜，早已啟示在聖經中——可以總結為一個字：愛。愛神、愛人、彼此相愛。沒有愛，一切屬靈行為都失去價值。能建立關係的，就是神的旨意；破壞關係的，就不是。焦點不是對錯、不是輸贏，是關係、是連結。","lead":"上一課我們看見上帝旨意的中心是建立關係。但很多人仍會問：上帝的旨意到底是什麼？我怎麼知道自己有沒有走在祂的旨意裡？其實，上帝的旨意並不隱藏，也不複雜——祂早已清楚啟示在聖經中。問題不是「不知道」，而是「有沒有活出來」。","sections":[{"h":"一上帝的旨意已經顯明：愛神、愛人","paras":["⟦s:很多人以為神的旨意很奧秘，需要很長時間禱告才知道⟧。但聖經告訴我們：⟦g:神的旨意已經寫在祂的話語裡⟧。耶穌親自把所有誡命總結成兩句話——愛神、愛人（太22:37-40），並再加上一個更具體的命令：「你們要彼此相愛。」（約13:34）","⟦b:這三個命令的核心只有一個字——愛⟧。⟦g:上帝的旨意＝活在愛裡⟧；不是做多少事，而是愛得多真實。","⟦g:用心愛 → 在神旨意裡⟧；⟦s:用腦做 → 容易離開神⟧。⟦b:很多人忙著服事，卻沒有愛，結果越做越累、關係越來越遠⟧。"],"deeper":{"q":"想更深？「神的旨意就是愛、已經顯明在聖經裡，不必苦苦尋求」——但現實中我們常為「具體的決定」困惑：該選哪份工作、要不要結婚、搬不搬家。這些「神的旨意是什麼」的掙扎，難道一句「神的旨意就是愛」就解決了嗎？","a":"好問題——這要分清神旨意的「兩個層面」，「神的旨意就是愛」回答的是第一層，但它對第二層（具體抉擇）也大有幫助。⟦g:第一層：神的「道德旨意／普遍旨意」⟧——這是神對「所有人、所有時候」已清楚啟示在聖經裡的，核心就是「愛神愛人、過聖潔的生活」，這部分不必苦苦尋求，是清楚的。⟦g:第二層：神的「個別引導」⟧——具體該選哪份工作、跟誰結婚、搬不搬家，聖經沒有直接寫明，需要禱告、尋求、智慧。而「神的旨意就是愛」對第二層的掙扎，其實有極大的幫助和釋放：⟦b:一、它先卸下重擔⟧——很多人對抉擇的焦慮，是怕「選錯了那個唯一正確答案、神就不喜悅我了」；但既然神最在乎的是「你在哪裡都愛神愛人」，那麼在「合乎聖經、不違背愛」的範圍內，常常不只一個選擇是神可以悅納的，你不必活在「選錯就完了」的恐懼裡。⟦b:二、它給了篩選的準則⟧——面對抉擇，可以問：「哪個選擇更能讓我愛神、愛人、活出聖潔？哪個是出於愛、哪個是出於私慾與懼怕？」這比「苦等一個神祕的指示」實際得多。⟦b:三、其餘的⟧，在愛神愛人的大前提下，結合禱告、聖經原則、智慧、敬虔人的建議、內心的平安去決定，並信靠神在你真心尋求時會引導。所以「神的旨意就是愛」不是迴避具體抉擇，而是：先抓住那清楚的大方向（愛），它既釋放你脫離「選錯就完了」的焦慮，又給你篩選具體選擇的準則。焦點對準愛，許多抉擇的迷霧就清朗了。"}},{"h":"二沒有愛，一切屬靈行為都失去價值","paras":["「我若能說萬人的方言……卻沒有愛，我就成了鳴的鑼、響的鈸一般。」（林前13:1-3）⟦s:有恩賜沒有愛 → 沒有價值；有知識沒有愛 → 沒有意義；有奉獻沒有愛 → 仍然無益⟧。","⟦b:神看重的，不是你做了什麼，而是你裡面是否有愛⟧——因為愛的本質，就是關係。沒有愛的服事，就像沒有電的燈，只是外殼；像沒有生命的身體，只是形式。","「你們若遵守我的命令，就常在我的愛裡。」（約15:10）⟦g:真正的順服，是從愛流出來的⟧。⟦s:有己的愛是「我得什麼」⟧；⟦g:無己的愛是「我能給什麼」⟧。⟦b:無己，才能真愛⟧。"],"deeper":{"q":"想更深？「沒有愛，恩賜、知識、奉獻都沒有價值，成了鳴的鑼響的鈸」——這標準會不會太絕對、太令人沮喪？難道一個人若在愛上還不完全（誰能完全呢？），他所有的服事、奉獻、傳福音，就全都歸零、毫無價值、白做了嗎？","a":"先安心：林前13說「沒有愛就無益」，不是要宣判「你的愛只要不完全，一切就歸零、白做」——若是那樣，沒有人的服事能存留了（誰的愛是完全的？）。要正確理解保羅的意思：⟦s:他對付的，是一種「完全沒有愛、純粹為自我」的極端——把恩賜當表演、把奉獻當交易、把屬靈當成就自己的工具，裡面「絲毫不是為了愛神愛人」⟧；那種「以自我為中心、毫無愛的源頭」的屬靈行為，才是「鳴的鑼、響的鈸」。他不是說「你的愛只要還不夠完美，服事就全部作廢」。要分清「不完全的愛」與「沒有愛」：⟦g:不完全的愛——你真心想愛神愛人，卻還軟弱、還夾雜私心、還在成長——這是「真實但不完美的愛」，神悅納、也會煉淨它，你的服事在祂眼中有價值⟧；⟦s:沒有愛——根本不在乎神與人，純為自己的名聲、利益、成就而做——這才是保羅說的「無益」⟧。所以這節經文不是要叫真心服事卻不完美的你沮喪歸零，而是要「校正方向」：⟦b:提醒你「別讓服事變成沒有愛的表演與成就」，把焦點從『做了多少、多有恩賜』，轉回『有沒有愛』⟧。而且真正的愛，源頭是神（我們愛因神先愛我們），不是靠自己擠出來的——⟦g:無己，才能真愛；當你越降服、越讓基督在裡面活，祂的愛就越透過你流出⟧。所以這不是定罪你的不完全，是邀請你「回到愛、並從神支取愛」。神不嫌棄不完美卻真實的愛，祂只光照「毫無愛、純為自己」的空殼——你願意以愛為念，就不在那空殼之列。"}},{"h":"三建立關係，是衡量是否在神旨意中的標準","paras":["上帝救贖我們的目的，不只是赦罪，而是恢復關係、建立關係（弗1:4-5）。從起初——「那人獨居不好。」（創2:18）神創造人，就是為了與神、與人的關係。","但人犯罪後，「你所賜給我的女人……」（創3:12）⟦s:開始推卸責任、關係破裂、人與神隔離、人與人破裂⟧。⟦b:這就是罪的本質——破壞關係⟧。而神的救恩，就是恢復關係：「我要作你們的神，你們要作我的子民。」（利26:12）","⟦b:能建立關係的，就是神的旨意；破壞關係的，就不是神的旨意⟧。甚至連饒恕也是：「你們饒恕人的過犯，你們的天父也必饒恕你們。」（太6:14）⟦g:饒恕＝恢復關係；不饒恕＝斷開關係⟧。⟦b:焦點不是對錯，是關係；不是輸贏，是連結⟧。"],"pq":"你可以做很多對的事，卻仍活在錯的方向裡——若你失去了愛、破壞了關係。","deeper":{"q":"想更深？「能建立關係的就是神的旨意，破壞關係的就不是」——這個標準會不會太危險？難道為了「不破壞關係」，就該一味討好、不堅持真理、對罪睜一隻眼閉一隻眼嗎？有時候堅持真理，恰恰會「破壞關係」啊。","a":"這是一個極其重要、也必須謹慎分辨的問題，因為「以關係為標準」若被誤用，真的會墮落成一種「為了和諧而犧牲真理」的鄉愿。要解開這個結，關鍵在於分辨清楚兩件事：什麼是「真正的關係」，以及「破壞關係」的責任到底在誰。先看一個根本的事實：耶穌——那位把愛、把關係看得最重的主——祂自己卻不斷地說真理、責備罪、甚至嚴厲地斥責法利賽人，祂的真理常常讓人「不舒服」、甚至讓很多人「離開祂」（約翰福音六章，許多門徒因祂的話太難就退去了）。可見「以關係（愛）為中心」，從來不等於「一味討好、迴避真理」。耶穌是「滿有恩典」也「滿有真理」（約1:14），兩者在祂身上完美地結合。所以第一個分辨是：真正的愛，本身就包含真理。為什麼？因為愛的目的，是「使對方得益處、得生命」。如果一個人正走在毀滅自己的路上，真正愛他的人會「告訴他真相、攔阻他」，而不是為了維持表面和諧而看著他往下跳——後者不是愛，是冷漠，甚至是縱容（這正是第155、156課要深講的：真正的愛不是縱容，是為了拯救）。所以「堅持真理」與「愛、建立關係」根本不矛盾，因為真理是愛的內容之一。「用愛心說誠實話」（弗4:15）——既要有愛（方式、動機、為對方好），也要有誠實話（真理、不迴避）。第二個關鍵分辨是：當你「用愛心說了誠實話」，對方卻因此跟你決裂、關係破裂了，這「破壞關係」的責任在誰？這裡要非常小心，不能把「凡是讓關係變緊張的，都算我破壞了關係」。如果你是出於愛、帶著謙卑、在合適的關係與時機裡，說了該說的真理（不是論斷、不是發洩、不是自以為義），而對方因為不願面對真理而離開——那破壞關係的，不是「真理」，也不是「你」，而是「對方對真理的拒絕」。耶穌說真理而有人離開，破壞關係的不是耶穌，是那些不肯接受的人。保羅責備犯錯的教會而被人攻擊，破壞關係的不是保羅的愛，是對方的剛硬。所以「破壞關係的就不是神的旨意」這個標準，要對準的是「我這個行為的動機與本質」，而不是「結果上關係有沒有變緊張」。要分辨的是兩種完全不同的「說真話」：一種是「為了證明我對、發洩情緒、自以為義地論斷」——這種「真話」的動機是「己」，目的是「贏」、是「定罪」，它本質上就是在破壞關係，這才是神所不喜悅的。另一種是「為了對方的益處、帶著愛與謙卑、忍痛說出的誠實話」——這種「真話」的動機是「愛」，目的是「挽回、得人」，即使結果上對方一時無法接受、關係暫時緊張，它的本質仍是在「為建立關係而努力」，這是神的旨意。所以正確地理解這個標準是：神的旨意，是「以愛為動機、以恢復關係、得到人為目的」的一切——它既包括了溫柔的接納，也包括了忍痛的真話；它反對的，是那些「以己為中心、為了贏、為了定罪、為了發洩」而說的話與做的事，因為那些才是真正在破壞關係。一個實際的檢驗：當你要堅持一個真理、說一句逆耳的話時，誠實地問自己——我這樣做，動機是「為了得到他、挽回他、幫助他」（這是愛、是建立關係），還是「為了贏過他、證明我對、讓他難堪」（這是己、是破壞關係）？前者，即使讓關係一時緊張，仍走在神的旨意中；後者，即使包裝得再屬靈，也偏離了神的心。所以這個標準非但不會讓你變成鄉愿，反而會幫你分辨：你的「堅持真理」，到底是出於愛的勇敢，還是出於己的好勝。真理要堅持，但要用愛的方式、為著愛的目的去堅持——這才是「以建立關係為中心」的真義。"}}],"focus":"當我要堅持一個真理、說一句逆耳的話時，\n我的動機是「為了得到他、挽回他」，\n還是「為了贏過他、證明我對」？","hope":{"t":"✺ 真理與愛，從來不必二選一","paras":["想愛人、想維持關係，卻又怕一味討好、失了真理；想堅持真理，又怕傷了和氣、破壞關係——這份兩難，常讓人左右為難。這一課把出路指明：⟦b:真正的愛，本身就包含真理；耶穌是滿有恩典，也滿有真理。⟧","你不必在「愛」與「真理」之間二選一——⟦g:用愛心說誠實話，既有愛（方式、動機為對方好），也有誠實話（不迴避真理）⟧。分辨的關鍵在動機：你堅持真理，是「為了得到他、挽回他」，還是「為了贏過他、證明我對」？前者即使讓關係一時緊張，仍走在神的旨意中。愛，給了你的真理一個正確的方向；真理，給了你的愛一份扎實的內容。"]},"still":"此刻安靜——\n我與某人之間的張力，\n是因為我為愛、忍痛說了真話，\n還是因為我為了贏、\n說了傷人的話？","still_hint":"不必急著證明自己對。\n安靜一分鐘，\n求主對付動機：\n「主啊，讓我以愛為動機，為得到人而說、而行。」","steps":[{"act":"每天檢視：我今天是否活在愛裡？不是問「我做了多少事」，而是問「我有沒有真正愛人」。","meta":""},{"act":"操練「讓關係比事情更重要」：衝突或壓力中，先停三秒問——這句話會建立關係，還是破壞關係？","meta":""},{"act":"主動修復一段關係：若心中有不饒恕、隔閡，主動跨出一步——道歉、關心、饒恕。","meta":""}],"declare":"主啊，我願意活在祢的旨意中，\n不是只做對的事，而是活出真實的愛。\n我要愛祢、愛人、彼此相愛。\n讓我所說的真理，都以愛為動機、以得人為目的；\n讓我所做的一切，都帶來關係的建立，不是破壞。\n使我的生命，連結於祢，也連結於人。\n奉主耶穌的名，阿們。","share":[{"tag":"領受","q":"「沒有愛，一切屬靈行為都失去價值。」林前13章對你是提醒、是釋放，還是扎心？"},{"tag":"省察","q":"「真理與愛不必二選一。」你比較容易偏哪一邊（為和諧迴避真理，或為真理失了愛）？"},{"tag":"同行","q":"「饒恕＝恢復關係。」你心中有沒有一段需要修復的關係？這週願意主動跨出哪一步？讓小家陪你、為你禱告。"}],"next":"先與神，再與一切","prog":"20"},{"n":149,"unit":"第九單元 · 關係——重整生命的次序","title":"先與神，\n再與一切","no":"149","greet":"願你來到主的面前，得享安息","verse":"認識你獨一的真神，並且認識你所差來的耶穌基督，這就是永生。","verse_ref":"約翰福音 17:3","bigidea":"本課核心：不是所有關係都是上帝的旨意，關鍵在於「次序」。關係的第一優先，是與神的關係——永生就是認識神、與神建立關係。它是一切關係的根基；沒有這根基，與人、與自己、與事的關係都會扭曲。次序一錯，再對的事也變錯（如掃羅把事與人放在神前面）。神要的不是工人，是兒子。","lead":"前兩課我們看見上帝的旨意是建立關係、總歸就是愛。但這一課要更進一步：不是所有關係都是上帝的旨意，關鍵在於「次序」。很多人的問題，不是沒有關係，而是「關係的次序錯了」。次序錯了，好的事情也會變成錯的，屬靈的行動也可能得罪神。","sections":[{"h":"一關係的第一優先：與上帝的關係","paras":["「認識你獨一的真神，並且認識你所差來的耶穌基督，這就是永生。」（約17:3）⟦s:很多人以為永生是死後上天堂、永遠不死⟧；⟦g:但耶穌清楚說：永生＝認識神＝與神建立關係⟧。","⟦b:這代表——人生最重要的，不是成功、不是成就，而是「與神的關係」⟧。「我們愛，因為神先愛我們。」（約壹4:19）所有愛的源頭，都是從神來。","⟦b:與神的關係，是一切關係的根基⟧。⟦s:沒有這根基，與人的關係會扭曲、與自己的關係會混亂、與事的關係會失衡⟧。⟦g:焦點在耶穌 → 次序就對⟧；⟦s:焦點在自己 → 次序就亂⟧。"],"deeper":{"q":"想更深？「永生就是認識神、與神建立關係，不是死後上天堂永遠不死」——但這會不會把「永生」說得太抽象、太『現世化』了？聖經明明也應許了復活、新天新地、永遠的生命。把永生只說成「認識神的關係」，會不會反而淡化了那實實在在的、死後永恆的盼望？","a":"好的平衡問題——這課強調「永生＝認識神」，不是要否定或淡化「死後復活、新天新地、永遠的生命」，那些都是聖經實實在在的應許，是我們確據的盼望。它要補上的，是一個常被忽略的真相：⟦b:永生不「只是」未來、死後才開始的東西，它「現在」就已經開始了⟧。約17:3是耶穌自己給「永生」下的定義——「認識獨一的真神…這就是永生」。這告訴我們兩件都是真的、且相連的事：⟦g:一、永生的「核心與本質」，是「與神的關係」（認識神）⟧——它不只是「無止盡地活著」（那若沒有神，反而可能是無止盡的空虛），而是「在與神的愛中，有份於神自己的生命」；⟦g:二、這份生命「現在」就因信開始了⟧（你已經有永生、已經進入這關係），並要在「將來的復活、新天新地」裡完全、永遠地實現。所以兩者不衝突，而是同一份生命的「現在」與「將來」：⟦b:現在——與神的關係已經開始（永生已得到）；將來——這關係在復活的身體、新天新地裡，面對面、永不止息地完全（永生的圓滿）⟧。這課強調「現在的關係」，正是要對付一個偏差——把信仰只當成「買一張死後的天堂門票」，卻錯過了「現在就可以認識神、與神同行」的生命。所以死後的永恆盼望是真的、寶貴的，而它的核心，正是「永遠與這位你現在就開始認識的神，面對面同在」。"}},{"h":"二次序錯了，再對的事也變錯","paras":["「聽命勝於獻祭，順從勝於公羊的脂油。」（撒上15:22）⟦s:掃羅的例子是最清楚的警告——他獻祭（屬靈的事）、留住百姓（人際的事），看起來都很好，但他沒有等神、沒有順服神⟧。結果王位被奪、被神棄絕。","為什麼？⟦s:因為他把「事」和「人」，放在「神」的前面⟧。⟦b:關係的次序一錯，一切就錯⟧——即使是為神做的事、看起來正確的行動，只要破壞了與神的關係，就不是神的旨意。","⟦s:有己 → 以事為中心，為了達成目的，可以犧牲關係⟧；⟦g:無己 → 以神為中心，為了守住關係，願意放下事情⟧。"],"deeper":{"q":"想更深？「掃羅把事和人放在神前面、次序錯了再對的事也變錯」——但有時「與神的關係」和「該做的事、該顧的人」會真實地衝突：為了靈修禱告就顧不上家人、為了等候神就錯過了時機。難道「先與神」就意味著可以為了屬靈，而忽略現實的責任與身邊的人嗎？","a":"好問題——「先與神」絕不意味著「為了屬靈，可以忽略責任、冷落身邊的人」。這其實是個常見的誤解，要釐清「次序」的真意。⟦b:「與神的關係第一」，不是「在時間上、注意力上，神要獨佔、把人和事都擠掉」，而是「神是『根基與源頭』，其他一切關係與責任，都從這根基裡流出、被它扶正」⟧。關鍵在：⟦g:真正「與神關係對」的人，神會帶領他「更好地」愛家人、盡責任——因為神的旨意本身，就包含了「愛人、盡你的本分、看顧親屬」⟧（聖經說不看顧親屬的比不信的還不好）。所以若你的「靈修禱告」讓你「理直氣壯地冷落、虧待家人」，那很可能不是真的「先與神」，而是把「宗教活動」當成了逃避責任的藉口——因為真與神親近，必使你更愛人、更盡責，不是更冷漠。掃羅的問題，也不是「他太顧人和事、不夠屬靈」，而是「他為了人和事，違背了神清楚的命令、把神請出了主權的位子」——是「悖逆神」，不是「太負責任」。所以「先與神」的真義是：⟦g:讓與神的關係作根基，從這根基裡，神引導你「合神心意地」去愛人、盡責、做事——神、人、事不是互相排擠，而是有正確次序的整體⟧。至於現實中「靈修 vs 顧家」的張力，往往不是「二選一」，而是「智慧地安排」（神自己就重視家庭責任）。⟦b:先與神，不是用屬靈擠掉責任與人，是讓神成為源頭，使你更有能力、更合祂心意地去愛人盡責⟧。真親近神的記號，是更愛人，不是更冷漠。"}},{"h":"三上帝看重關係，勝過事奉","paras":["在永恆裡，留下的是什麼？⟦b:不是事工、不是成就，而是關係——人與神的關係⟧。「我要作他的神，他要作我的兒子。」（啟21:7）這讓我們看見：神最在意的，不是你為祂做什麼，而是你是否與祂同行。","「我將萬事當作有損的……為要得到基督。」（腓3:8）⟦g:保羅的生命告訴我們——不是得到什麼，而是「得到基督」⟧。一個孩子若只幫父親做事卻沒有關係，父親不會滿足。","⟦b:神不要「工人」，神要「兒子」⟧。⟦g:人比事重要，關係比東西重要⟧。所以每天要先建立與神的關係，再進入一天的事——不要先看手機、先忙碌，而是先來到神面前，對焦耶穌。"],"pq":"你可以很忙於事奉，卻遠離神；可以做很多對的事，卻活在錯的次序裡。","deeper":{"q":"想更深？「先與神建立關係，再做事」聽起來很對，但現實是我每天一睜眼就有一堆事等著做、有一堆人等著回應，哪有那個餘裕「先安靜親近神」？這次序在忙碌的現實裡，真的做得到嗎？","a":"這是一個極其真實、幾乎每個認真生活的人都會遇到的張力——道理我懂，但現實的忙碌排山倒海，「先與神」聽起來像一個奢侈品。要面對這個問題，需要先打破一個誤解，再給一個務實的看見。先打破的誤解是：「先與神建立關係」不等於「每天必須先空出一大段安靜的時間，否則就不算」。很多人因為做不到「每天早起一小時靈修」就放棄了，覺得「我這麼忙根本辦不到」。但「次序」的重點，不在於「時間的長短」，而在於「心的朝向」與「優先的對象」。它問的不是「你花了多久親近神」，而是「在你開始這一天、面對這堆事和人之前，你的心有沒有先轉向神、先對齊祂」。這可以是早晨睜眼後的一分鐘，把這一天交託給主；可以是出門前一句簡短的禱告：「主，今天我要與祢同行」;可以是在通勤的路上、在洗漱的時候，把心安靜下來對準神。次序是「優先順位」的問題，不是「時間配額」的問題。再給一個更深的看見:你說「忙到沒餘裕先親近神」，這恰恰反過來證明了「先與神」的必要，而不是它的不可行。想想看，為什麼耶穌——那位事工最繁忙、需求最多、時間最寶貴的人——反而「天未亮就起來，到曠野去禱告」(可1:35)?在祂最忙、眾人都找祂的時候，祂不是「忙到沒空禱告」，而是「正因為要面對這麼多，所以更需要先與父連結」。這給我們一個顛覆性的看見:「先與神」不是在你「有餘裕」時才做的奢侈品，而是在你「沒餘裕」時最需要的必需品。一個忙碌的人若不先與神對齊，他會帶著焦慮、自己的力量、混亂的次序去衝撞那一整天的事和人——結果往往是事情做了一堆，卻心力交瘁、關係磨損、還偏離了神的心意，最後得花更多時間和代價去收拾。反過來，一個願意「先與神」哪怕只是片刻的人，他是帶著從神而來的安穩、力量和正確的次序進入這一天——他做的事可能一樣多，但裡面有平安，分得清輕重緩急，在忙碌中仍守得住與人的關係、與神的連結。這就像馬大與馬利亞的對比:馬大不是做錯事，她的問題是「為許多的事思慮煩擾」，在忙碌中失了次序、失了與主同坐的那一份;馬利亞選擇了「先坐在主腳前」這上好的福分，反而抓住了那不能被奪去的。所以面對忙碌，實際的操練不是「等我不忙了再親近神」(那一天永遠不會來)，而是:第一，把「先與神」從「一大段時間」縮小成「一個朝向」——哪怕是睜眼的一分鐘、出門的一句禱告，先把心轉向祂。第二，把「親近神」融進忙碌本身——在做事的當下，隨時用心轉向主:「主，這件事我與祢一起做。」讓整天的忙碌，成為與神同工、同行的過程，而不是把神排除在外、靠自己硬撐的過程。第三，越忙，越要刻意守住那個「先」——因為越忙，越容易被事推著走、越容易失了次序。所以這次序在忙碌的現實裡不但做得到，而且正是忙碌的人最需要的。它要的不是你「有空才給神時間」，而是你「無論多忙，都先讓心朝向神」。先把心轉向那位掌管你一整天的主，你會發現，不是忙碌讓你沒空親近神，而是先親近神，讓你在忙碌中仍站立得穩。"}}],"focus":"我這一天，是先被一堆事和人推著走，\n還是先讓心朝向神、先與祂對齊，\n再帶著從祂而來的安穩，\n進入這一切?","hope":{"t":"✺ 越忙，越需要先與神對齊","paras":["每天睜眼就是排山倒海的事和人，「先與神建立關係」聽起來像奢侈品——忙到喘不過氣，哪有那個餘裕?這一課把這個看見翻轉過來:⟦b:「先與神」不是有餘裕時才做的奢侈品，是沒餘裕時最需要的必需品。⟧","耶穌最忙、眾人都找祂的時候，反而天未亮就先去禱告——⟦g:不是忙到沒空親近神，而是正因要面對這麼多，更需要先與父連結⟧。次序不是「時間配額」，是「心的朝向」:哪怕睜眼的一分鐘、出門的一句禱告，先把心轉向祂。不是忙碌讓你沒空親近神，而是先親近神，讓你在忙碌中仍站立得穩。"]},"still":"此刻安靜——\n明天一早睜開眼，\n我的心會先飄向那堆待辦的事，\n還是先轉向那位\n掌管我一整天的主?","still_hint":"不必排出一大段時間。\n安靜一分鐘，\n單純地把次序交給主:\n「主啊，讓祢成為我生命、我每一天的第一。」","steps":[{"act":"每天先建立與神的關係，再進入一天的事:不先看手機、先忙碌，而是先禱告、親近神、對焦耶穌(哪怕一分鐘)。","meta":""},{"act":"做每件事前先問:這會影響我與神的關係嗎?是讓我更親近神，還是遠離神?","meta":""},{"act":"當事與人衝突時，選擇守住與神的關係:遇壓力時先禱告一句——「主，我選擇先對齊祢。」","meta":""}],"declare":"主啊，我要調整我生命的次序，\n讓祢成為我生命的第一。\n我不再把事放在祢前面，不再用忙碌取代關係。\n求祢幫助我，無論多忙，都先讓心朝向祢、先與祢對齊，\n再帶著從祢而來的安穩，面對一切人與事。\n讓我一生與祢同行，活出基督。\n奉主耶穌的名，阿們。","share":[{"tag":"領受","q":"「永生＝認識神＝與神建立關係。」這個對永生的定義，和你過去的理解有什麼不同?"},{"tag":"省察","q":"誠實地說，你近來比較像「忙於事奉卻遠離神」的掃羅，還是「先與神對齊」的馬利亞?"},{"tag":"同行","q":"「先與神不是時間配額，是心的朝向。」這週你願意操練哪一個「先轉向神」的小習慣(睜眼一分鐘、出門一句禱告)?說給小家聽，彼此提醒。"}],"next":"與神對齊，與自己一致","prog":"30"},{"n":150,"unit":"第九單元 · 關係——重整生命的次序","title":"與神對齊，\n與自己一致","no":"150","greet":"願你來到主的面前，得享安息","verse":"賜生命聖靈的律，在基督耶穌裡釋放了我，使我脫離罪和死的律了。","verse_ref":"羅馬書 8:2","bigidea":"本課核心:關係的第二個次序，是與自己的關係。愛人「如己」——你怎麼對自己，就會怎麼對人。與自己的關係來自與神的關係:因神先接納我，我才能接納自己。與自己有好關係的標誌是「內外一致」(信、想、說、行都一致);靠自己會掙扎，靠聖靈才得勝、才裡外一致。","lead":"上一課我們看見關係的第一優先是與神。這一課要進入第二個次序——與自己的關係。很多人以為問題在環境、在人際，但很多痛苦的根源是:人與自己沒有好的關係。裡面矛盾、掙扎、不一致，外面就會混亂、疲累、不快樂。若沒有與神的關係，就不會有與自己的關係;若沒有與自己的關係，就不會有與人的關係。","sections":[{"h":"一愛人如己的前提:先與自己有健康的關係","paras":["「要愛人如己。」(太22:39)⟦b:耶穌的話裡有一個關鍵——愛人「如己」，意思是:你怎麼對自己，就會怎麼對人⟧。⟦s:很多人不能愛人，不是因為別人不好，而是自己裡面沒有愛⟧。","「我們只管坦然無懼地來到施恩的寶座前。」(來4:16)⟦g:為什麼我們可以接納自己?因為耶穌先接納我們⟧。當我們真正明白神無條件愛我、完全接納我，我們才會開始接納自己、不再定罪自己、不再否定自己。","⟦b:與自己的關係，來自與神的關係⟧。⟦s:有己 → 不是自卑，就是驕傲⟧;⟦g:無己 → 在基督裡，安穩、真實、自由⟧。"],"deeper":{"q":"想更深？「愛人如己、要先接納自己、不定罪自己」——但這會不會跟聖經要我們『捨己、向己死、不可自我中心』互相矛盾？一邊叫我「接納自己、愛自己」，一邊叫我「捨己、無己」，到底我該愛自己還是該捨己？這兩者怎麼並存？","a":"好問題，這看似矛盾，其實對付的是兩個完全不同的東西，並不衝突。關鍵在分清「捨己／無己」要捨的「己」，和「接納自己」要接納的「自己」，根本不是同一個：⟦s:「捨己、向己死」要捨的「己」，是那個「以自我為中心、要自己作王、篡奪神主權」的「有己／老我」——這個要死⟧；⟦g:「接納自己、不定罪自己」要接納的「自己」，是「神所造、神所愛、神已在基督裡接納並稱義的那個你」——這個要被恩典地接納⟧。所以兩者不但不矛盾，還是同一件事的兩面：⟦b:正因為我「無己」——不再靠自己的表現、成就、別人的眼光來定義價值（那是有己的自我中心），我才能真正「接納自己」——因為我的價值穩穩建立在「神白白的愛與接納」上⟧。反過來看：⟦s:「不能接納自己、不斷自我定罪」，其實往往是另一種「有己」——它表面是貶低自己，骨子裡是「我要靠自己夠好才配被愛、不肯單單接受神白白的恩典」，還是以「自己的表現」為中心⟧。所以：捨己——捨掉那個「靠自己、要作王」的老我；接納自己——領受神對「祂所造、所愛的你」的接納；一個是放下自我中心，一個是安息在神的愛裡，兩者都指向「焦點從自己轉向神」。⟦b:捨己不是「恨惡、否定神所造的你」，接納自己也不是「高舉自我中心的老我」——真正無己的人，既不靠自己（捨己），也不定罪自己（在神的愛裡接納自己），因為他的價值完全在基督裡⟧。"}},{"h":"二與自己有好關係:內外一致的生命","paras":["什麼是與自己沒有好關係?⟦s:聽一套、想一套、說一套、做一套——這就是「自己欺哄自己」(雅1:22)⟧。心裡相信的沒有活出來，口裡說的自己也做不到，這樣的人裡面衝突、活得痛苦、沒有平安。","相反的，⟦g:當心裡信的、思想想的、口中說的、行為做的，都一致時，人就會喜樂、自由、輕省⟧。⟦b:與自己關係好的標誌＝內外一致⟧。","就像一台車:⟦s:方向盤向左、輪胎向右 → 車會失控⟧;⟦g:方向一致 → 車就平穩⟧。⟦g:用心活 → 一致⟧;⟦s:用腦活 → 分裂⟧。"],"deeper":{"q":"想更深？「與自己關係好的標誌是內外一致、信想說行都一致」——但這標準會不會太高？人本來就充滿矛盾與掙扎：相信的活不出來、想做的做不到、心口不一是常態。若『內外一致』才算健康，那豈不是人人都『與自己關係破裂』、永遠達不到？","a":"好的提醒——「內外一致」是「方向與目標」，不是「立刻要達到的及格線」，所以不必因為「還做不到完全一致」就判定自己「與自己關係破裂、無可救藥」。要分清這課對付的，是哪一種「不一致」：⟦s:它對付的，是雅各書說的「自己欺哄自己」——那種「明知故犯卻假裝沒事、心口不一還自我感覺良好、根本無意讓裡外一致」的虛偽與自欺⟧；⟦g:而「真心想活出來、卻還軟弱、還有掙扎、信的暫時活不出來」——這不是「自欺」，而是「真實地走在邁向一致的路上」⟧，連保羅都有「立志為善卻行不出來」的掙扎。兩者的分野：⟦b:自欺的人「不在意、不想改、假裝一致」；真實掙扎的人「在意這份不一致、為它痛苦、渴望並努力走向一致」⟧——後者那份「不安與渴望」，本身就證明他沒有自欺，反而是健康的記號。所以「內外一致」是「方向」：健康，不是「已經完全一致（沒有人完全做到）」，而是「誠實面對自己的不一致、不假裝、並靠聖靈一天天朝著一致前進」。而且這課給了關鍵——⟦g:靠自己，永遠在掙扎、達不到一致；唯有靠聖靈（賜生命聖靈的律），生命才漸漸被整合、裡外趨於一致⟧。所以不是「達不到就破裂」，而是：⟦b:健康的標誌，是「不自欺、誠實、並靠聖靈朝一致成長」，不是「已經完美一致」——方向對了，就在健康裡，即使還在路上⟧。神不要求你立刻完美一致，祂要的是你誠實、不自欺，並讓祂一天天整合你的生命。"}},{"h":"三從內在掙扎到得勝:靠聖靈，不靠自己","paras":["「我所願意的善，我反不做;我所不願意的惡，我倒去做。」(羅7:15)⟦s:保羅描述一種很真實的狀態——想做好卻做不到，知道對卻活不出來，這就是與自己沒有良好關係⟧。很多人在這裡掙扎，為什麼?⟦s:因為靠自己⟧。","但答案在這裡:「賜生命聖靈的律，在基督耶穌裡釋放了我。」(羅8:2)⟦g:不是靠努力，是靠聖靈⟧。當我們回到與神的關係、依靠聖靈，信心與行為就開始一致。","⟦s:靠自己 → 掙扎⟧;⟦g:靠聖靈 → 得勝⟧。⟦g:用心靠聖靈 → 活出來，裡外一致、心中平安、活得喜樂⟧——這就是與自己有好的關係。所以每天用真理宣告自己的身份(「我是被神愛的、被接納的」)，軟弱時不自責，立刻轉向聖靈。"],"pq":"你最大的敵人，不是別人，而是「裡面不一致的自己」。","deeper":{"q":"想更深?「接納自己、不定罪自己」——這會不會變成放縱、自我感覺良好、不肯面對自己的罪和缺點?基督徒不是應該常常省察、認罪、對付自己嗎?「接納自己」跟「對付自己」不是矛盾嗎?","a":"這是一個很需要分辨的問題，因為「接納自己」這個概念若不小心，真的會被誤解成兩種偏差:一種是世俗心理學式的「自我感覺良好、怎樣都好、不必改變」，另一種是因為怕「放縱」而走向另一個極端——永遠定罪自己、活在自我厭惡裡。聖經所說的「接納自己」，和這兩者都不同，而「接納自己」與「對付自己的罪」非但不矛盾，反而必須建立在同一個根基上，才能健康地並存。關鍵在於先看清楚:這裡的「接納自己」，接納的是什麼?它接納的，不是「我的罪、我的軟弱很好，不必改」，而是「神在基督裡所宣告的、我的身份和價值」。也就是說，「接納自己」的根基，不是「我自己夠好」(那是自我感覺良好)，而是「神先接納了我」(那是恩典)。這個分辨太重要了:世俗的自我接納說「我本來就很好，我接納我自己」;聖經的自我接納說「我本來不好、是個罪人，但神竟然在我還軟弱、還是罪人的時候就愛我、接納我，所以我可以坦然來到祂面前，接納這個被祂所愛、所接納的我」。前者把根基放在「自己」，後者把根基放在「神的恩典」。那這樣的「接納自己」，怎麼跟「對付罪、省察認罪」並存，甚至互相成全呢?關鍵的洞見是:正是因為我「被神無條件接納」，我才有「安全感」去誠實面對自己的罪。想想看，一個活在「不被接納」恐懼裡的人，他面對自己的罪會怎樣?他要麼會「否認、掩飾、合理化」(因為承認罪太可怕了，意味著被棄絕)，要麼會「在罪中崩潰、自我定罪、絕望」(因為他覺得罪讓他失去了一切價值)。這兩種反應，都讓他無法真正「對付」罪——前者是逃避，後者是被罪壓垮。但一個確知自己「已被神在基督裡接納」的人，他面對罪時是安全的:他不必否認、掩飾(因為他的價值不建立在「我沒有罪」上，而建立在「基督為我死」上)，他也不會被定罪壓垮(因為「如今那些在基督耶穌裡的，就不定罪了」)。於是他可以「坦然無懼地來到施恩的寶座前」，誠實地、不逃避地把罪攤開在神面前，認罪、悔改、求神對付——這恰恰是最健康、最有力的「對付自己」。所以你看，真正的次序是:先「在基督裡接納自己(被神接納的身份)」，這個安全的根基，才使我們有能力「不逃避地對付自己的罪」。亞當犯罪後，因為失去了與神「被接納」的安全感，第一個反應就是「躲藏、遮掩、推卸」——這就是不健康的「不接納自己」帶來的逃避。而大衛犯了大罪後，卻能寫下詩篇五十一篇，赤裸裸地、毫不掩飾地向神認罪——為什麼他敢?因為他深知神的慈愛與接納，所以他有安全感去面對最不堪的自己。所以「接納自己」絕不是「放縱、不對付罪」，恰恰相反，它是「健康地對付罪」的前提。那「對付自己」呢?要對付的，是「罪、是己、是舊人的行為」;而要接納的，是「神在基督裡所賜的、不再被定罪的新身份」。我們是「恨惡自己的罪，卻接納神所愛的自己」;是「不接納自己的罪行，卻接納自己在基督裡的身份」。這跟前面學過的「不是對付有己，是培養無己」也完全一致:你不是靠「厭惡自己、定罪自己」來改變(那是靠己力、是律法，只會帶來羅馬書七章的掙扎)，而是靠「安穩在神的愛與接納裡」，讓聖靈的生命在你裡面更新你(那是恩典、是羅馬書八章的得勝)。一個被愛、被接納的孩子，才有力量、有意願去改正錯誤;一個活在被棄絕恐懼裡的孩子，只會掩飾或崩潰。所以，大膽地接納那個「被神所愛、所接納」的你吧——正是這份接納帶來的安全與愛，會給你最大的力量，去誠實面對、並靠著聖靈對付那個還需要被更新的你。接納自己的身份，對付自己的罪——這兩者，在恩典裡完美地合一。"}}],"focus":"我面對自己的罪與軟弱時，\n是因怕被棄絕而「掩飾、逃避」，\n還是因深知被神接納，\n而能「坦然面對、誠實認罪」?","hope":{"t":"✺ 因為被神接納，你才敢誠實面對自己","paras":["面對自己一再重複的軟弱與失敗，我們常活在自我定罪裡——越厭惡自己，越無力改變;或乾脆掩飾逃避，不敢正視。這一課帶來一個釋放的根基:⟦b:接納自己，接納的不是「我的罪很好」，而是「神在基督裡已經接納了我」。⟧","正是這份「已被接納」的安全感，讓你有能力誠實面對罪——⟦g:你不必否認掩飾(價值不在「我沒罪」，而在「基督為我死」)，也不會被定罪壓垮(在基督裡不再定罪)⟧。大衛敢赤裸裸地認罪，因他深知神的慈愛。所以大膽接納那個被神所愛的你吧——這份愛帶來的安全，正是你誠實面對、並靠聖靈對付軟弱的最大力量。"]},"still":"此刻安靜——\n我願不願意相信:\n在我還軟弱、還會跌倒的時候，\n神已經完全接納了我，\n我可以坦然來到祂面前?","still_hint":"不必先把自己變好才來。\n安靜一分鐘，\n領受那份接納:\n「主啊，謝謝祢在我還軟弱時就接納我，我也接納祢所愛的我。」","steps":[{"act":"每天宣告並領受神的愛，學習接納自己:不用過去、失敗、表現定義自己，而是用真理宣告身份——「我是被神愛的、被接納的」。","meta":""},{"act":"操練「說到做到」，建立內外一致的生命:今天聽到的真理，今天就去做一件最簡單的順服。","meta":""},{"act":"軟弱時不靠自己，轉向聖靈:做不到時不自責、不放棄，立刻禱告——「主，我做不到，求祢幫助我。」","meta":""}],"declare":"主啊，我要建立與自己的正確關係，\n不再否定自己，不再欺騙自己。\n我要在祢的愛中接納自己，在聖靈裡活出真理。\n讓我的心、思想、言語、行為，都一致在祢裡面。\n我接納祢所愛的我，也願意誠實面對、靠祢對付我的軟弱，\n活出平安、喜樂、自由的生命。\n奉主耶穌的名，阿們。","share":[{"tag":"領受","q":"「接納自己的根基，不是我夠好，是神先接納我。」這個分辨，怎麼改變你看待自己的方式?"},{"tag":"省察","q":"「與自己關係好的標誌＝內外一致。」誠實檢視:你目前在哪一方面最「裡外不一致」(信的、說的、做的不同)?"},{"tag":"同行","q":"「靠自己掙扎，靠聖靈得勝。」你有沒有一個「想做卻做不到」的掙扎?這週願意操練「立刻轉向聖靈」而非自責嗎?與小家彼此守望。"}],"next":"愛神的，必愛人","prog":"40"},{"n":151,"unit":"第九單元 · 關係——重整生命的次序","title":"愛神的，\n必愛人","no":"151","greet":"願你來到主的面前，得享安息","verse":"人若說「我愛神」，卻恨他的弟兄，就是說謊話的;不愛他所看見的弟兄，就不能愛沒有看見的神。","verse_ref":"約翰一書 4:20","bigidea":"本課核心:關係的第三個次序，是與人的關係。與人的關係不是技巧問題，是生命問題——它是與神關係的流露與證明:愛神必愛人，不愛人就不是真愛神。愛的最高層次是愛仇敵(這是神的生命，不是人的能力)。與人的關係更是為了傳承、完成神的計畫——生命影響生命、繁殖生命，合一帶來復興。","lead":"前面我們走過與神、與自己的關係。這一課進入第三個次序——與人的關係。很多人把焦點放在人際技巧、溝通方法，但聖經讓我們看見更深的根源:與人的關係，不是技巧問題，是生命問題。若沒有從神來的愛，人再努力，也無法真正愛人。","sections":[{"h":"一與人的關係，是與神關係的證明","paras":["「我們應當彼此相愛，因為愛是從神來的。」「人若說我愛神，卻恨他的弟兄，就是說謊話的。」(約壹4:7、20)⟦b:愛神，必然會愛人;不愛人，就不是真的愛神⟧——因為神就是愛。當一個人與神連結，神的愛會流出來，自然會去愛人。","「你們若有彼此相愛的心，眾人因此就認出你們是我的門徒了。」(約13:35)⟦g:愛，是門徒最明顯的記號⟧——不是恩賜、不是能力、不是知識，而是愛。","⟦b:與人的關係，是與神關係的外顯⟧。⟦g:與神對了 → 與人就會對⟧;⟦s:與神錯了 → 與人一定出問題⟧。"],"deeper":{"q":"想更深？「不愛人就不是真愛神」——但若有人因人際關係受過很深的傷、有社交障礙、或天生內向難與人連結，他對人的愛確實很有限。難道就因此判定他「不是真的愛神」嗎？這對受傷或內向的人，會不會太重、太不公平？","a":"不，絕不能用這節經文去「判定」一個受傷或內向的人「不愛神」——那是誤用，也違背神的憐憫。要分清幾件事：⟦b:一、「愛人」不等於「外向、社交能力強、人緣好」⟧——內向、慢熟、不善交際，是性格與恩賜的不同，不是「沒有愛」；一個安靜內向的人，可以用深刻的陪伴、忠誠、代禱、默默的服事，愛得非常真實。⟦b:二、受過傷、有社交困難的人，「愛人的能力受損」是「需要被醫治的傷」，不是「不愛神的罪證」⟧——神對這樣的人，是溫柔的醫治者，不是嚴厲的審判官。那這節經文真正在說什麼？⟦s:約翰對付的，是一種「明明心裡恨弟兄、卻口稱愛神」的虛偽與自欺——是「恨」與「假愛神」並存的矛盾，不是在量度「你愛人的能力夠不夠強」⟧。它的重點是「方向與真實」：真愛神的人，心會「朝著愛人的方向」，即使能力有限、即使因傷而艱難——那份「願意去愛、為自己的不能愛而難過」的心，本身就是真愛神的記號。所以對受傷或內向的人，這節經文不是定罪，而是邀請與盼望：⟦g:你不必先變得外向、先愛得完美；你只要讓那位「先愛你」的神，先醫治你、先用祂的愛充滿你，愛就會用你獨特的方式，漸漸從你裡面流出來⟧。神先愛我們，我們才能愛——所以先回到祂的愛裡被充滿，而不是逼自己擠出愛。"}},{"h":"二愛人的最高層次:愛仇敵","paras":["「要愛你們的仇敵，為那逼迫你們的禱告。」(太5:44)⟦b:這是耶穌給我們最不容易的命令——愛不可愛的人、愛傷害你的人⟧。為什麼這麼難?⟦g:因為這不是人的能力，這是神的生命⟧。","⟦s:當我們還在計較、報復、論斷，代表還活在「有己」裡⟧;⟦g:但當我們願意饒恕、祝福、為對方禱告，就顯明我們活在天父的生命裡⟧。","⟦b:愛仇敵＝活出神的生命⟧。⟦g:無己 → 才能愛仇敵⟧;⟦s:有己 → 只會愛自己人⟧。"],"deeper":{"q":"想更深？「要愛仇敵、為逼迫你的禱告」——但對正在被傷害、被虐待、被霸凌的人，叫他「愛仇敵」會不會變成一種屬靈勒索：要求受害者繼續忍受、不能反抗、還得對加害者好？「愛仇敵」是不是意味著放棄自我保護、任人傷害？","a":"絕對不是。「愛仇敵」從來不等於「繼續任人傷害、放棄自我保護、不可尋求公義」——把它扭曲成「要求受害者忍受加害」，是極危險的屬靈勒索，絕非耶穌的心意。要分清「愛仇敵」是什麼、不是什麼：⟦g:它「是」：心裡不存報復、不以惡報惡、願意為對方的靈魂禱告、把伸冤交給神⟧；⟦s:它「不是」：不是「假裝沒受傷」、不是「不可設立界線」、不是「必須繼續待在被傷害的處境裡」、更不是「放棄尋求保護與公義」⟧。事實上，聖經一面說愛仇敵，一面也保護受欺壓的、伸張公義、容許人逃離危險（大衛多次躲避掃羅、保羅也用合法權利保護自己）。⟦b:愛仇敵是「內心的釋放」（不被仇恨綑綁），不是「外在的任人宰割」⟧。所以對正在被傷害、被虐待、被霸凌的人，正確的話絕不是「你要繼續忍、還要對他好」，而是：⟦g:首先，尋求安全、設立界線、向信任的人與該求助的管道求助——保護自己是對的、是神所允許的⟧；⟦g:其次，「愛仇敵」是「在安全與被醫治之後，神慢慢在你心裡動的工」——讓你最終不被苦毒囚禁、能把那人交給神，而這往往是一段長路，急不得，也不該被逼迫⟧。⟦b:愛仇敵是神在你裡面釋放你脫離仇恨的恩典，不是要你繼續受害的枷鎖——它的目的是你的自由，不是你的犧牲⟧。若你正在受傷，神首先要你做的是安全，不是去愛那傷你的人。"}},{"h":"三與人的關係，是為了傳承與完成神的計畫","paras":["「你們要去，使萬民作我的門徒。」(太28:19)⟦b:與人建立關係，不只是相處愉快、彼此支持，更是傳承生命、建立門徒⟧。上帝的工作從來不是一個人完成，而是一代接一代、生命影響生命——摩西帶約書亞、以利亞帶以利沙、末底改帶以斯帖。","「焉知你得了王后的位分不是為現今的機會嗎?」(斯4:14)⟦g:關係，是為了神的計畫而存在⟧。⟦b:真正的關係，是帶來傳承的關係⟧——不是停在「我很好、你很好」，而是一起完成神的旨意。","並且，上帝的心意不只是個人、小組，而是整個國度的連結。⟦s:教會之間彼此競爭 → 神的國受損;世代之間彼此對立 → 傳承斷裂⟧;⟦g:彼此連結、彼此配搭(年輕人的熱情＋年長者的智慧)→ 神國的能力、復興臨到⟧。⟦b:合一帶來復興，分裂帶來虧損⟧。"],"pq":"你與誰建立關係，決定你是否在神的旨意裡;不要只是「做人際」，要「做門徒」。","deeper":{"q":"想更深?「愛神必愛人，不愛人就不是真愛神」——可是我裡面明明對某個傷害過我的人，就是愛不起來、恨意難消。難道這就證明我根本沒有真愛神、信仰是假的嗎?這話會不會把人定罪得太重了?","a":"這是一個很真實、也很容易讓人陷入自我定罪的掙扎，所以需要很有恩慈、也很有分辨地來回答。首先要安慰你:約翰一書這節經文的目的，不是要拿來「定罪」一個正在愛的掙扎中、想愛卻愛不出來的人，而是要「揭穿」一種「自欺」——那種「嘴上宣稱愛神，生命裡卻持續地、心安理得地、毫無掙扎地恨弟兄、卻覺得這跟我愛不愛神無關」的虛假。這兩種狀態，天差地別。一個「想愛卻愛不出來、為著自己心裡的恨意而痛苦、而到神面前掙扎呼求」的人，恰恰證明他「在乎」——他在乎神的命令、在乎這份恨不對、渴望能愛卻苦於做不到。這份痛苦和掙扎本身，就是聖靈在他裡面動工的記號，證明他「真的」與神有關係、真的想愛。這跟那種「理直氣壯地恨、覺得恨得有理、根本不覺得這有什麼問題」的自欺，是完全不同的。所以，你會為「愛不起來」而痛苦，這不是你信仰虛假的證據，恰恰是你信仰真實的記號。那實際上怎麼辦呢?關鍵要回到這個單元一再強調的核心:愛人，尤其是愛仇敵，「不是人的能力，是神的生命」。你「靠自己」愛不起來那個傷害你的人，這是「正常」的、是「真實」的——因為那本來就超過人天然的能力!如果你能輕鬆地靠自己愛仇敵，那反而不需要神了。所以，「愛不起來」不是要你更用力地去擠出愛(那是靠己力，注定失敗，只會帶來更深的自責)，而是要你做幾件事。第一，誠實。不要假裝你已經愛他了、不要壓抑你的恨意去演一個屬靈的樣子(那是自欺)。誠實地來到神面前承認:「主啊，我恨他，我愛不起來，我裡面充滿了苦毒，我做不到。」這份誠實，是醫治的開始。第二，求神把祂的愛分給你。既然這愛是「神的生命」而非「你的能力」，那出路就是求那位是愛的神，把祂的愛、祂對那人的眼光，放進你裡面:「主啊，我沒有愛他的能力，但祢有;求祢把祢的愛、祢的饒恕，從我裡面流出來。」第三，從「行動」開始，而非等「感覺」。耶穌說「愛仇敵」的具體方式是「為逼迫你的禱告」——注意，祂沒有說「先對他有好感、有愛的感覺」，而是「為他禱告」。你可以在還恨他的時候，就憑著順服，開始「為他禱告」(哪怕一開始是咬著牙、不情願地禱告)。這是一個奇妙的屬靈秘訣:當你持續為一個人禱告，神會漸漸地、不是靠你硬擠而是靠恩典，軟化你的心、改變你對他的眼光、把愛一點一點放進去。饒恕和愛，往往是先有「意志的選擇」(我選擇饒恕、選擇為他禱告)，「感覺」才慢慢跟上，而不是等感覺到了才行動。第四，給自己時間和恩典。饒恕一個深的傷害、愛一個傷你的人，常常不是一次完成的，而是一個過程——你可能今天饒恕了，明天傷痛湧上來又恨了，需要再次選擇饒恕。這不代表你失敗，這是真實的醫治過程。神知道你的傷有多深，祂有耐心，你也要對自己有耐心。所以，回到那個讓你不安的問題:「我愛不起來，是不是信仰就是假的?」答案是:你「為此痛苦、想愛、來到神面前掙扎」，正證明了你信仰的真實。約翰一書要對付的是「假冒」，不是「掙扎」。你不是被定罪的對象，你是被邀請的對象——被邀請承認自己的無能，然後轉向那位能把「神的愛」分給你的神，讓祂的生命，去愛那個你靠自己愛不了的人。這份愛，不是你的成就，是祂的恩典;你只要誠實、願意、並從為他禱告開始，剩下的，交給那位是愛的主，在你裡面慢慢成全。"}}],"focus":"我對那個傷害過我、愛不起來的人，\n是理直氣壯地恨、覺得理所當然，\n還是為著自己心裡的恨意而痛苦、\n渴望能愛卻苦於做不到?","hope":{"t":"✺ 愛不起來的痛苦，正是信仰真實的記號","paras":["對某個傷害過自己的人，就是愛不起來、恨意難消——這常讓人陷入更深的自我定罪:「我是不是根本沒有真愛神?信仰是不是假的?」這一課帶來安慰與出路:⟦b:你為「愛不起來」而痛苦、想愛卻苦於做不到，這恰恰證明你信仰的真實，不是虛假。⟧","愛仇敵本就不是人的能力，是神的生命——⟦g:你靠自己愛不起來是正常的;出路不是更用力擠出愛，而是誠實承認無能、求神把祂的愛分給你、並從「為他禱告」這個行動開始⟧。饒恕常是先有意志的選擇，感覺才慢慢跟上。給自己時間和恩典，讓那位是愛的主，在你裡面慢慢成全那份你靠自己給不出的愛。"]},"still":"此刻安靜——\n那個我愛不起來的人，\n我願不願意先不勉強自己「有好感」，\n而是誠實地對主說:\n「我做不到，求祢的愛從我裡面流出來」?","still_hint":"不必逼自己立刻原諒。\n安靜一分鐘，\n憑著順服，為那個人禱告一句:\n「主啊，我把他交給祢，求祢祝福他，也軟化我的心。」","steps":[{"act":"每天主動去愛一個人，而不是等被愛:一句鼓勵、一個關心、一次陪伴。","meta":""},{"act":"操練饒恕與祝福，特別是對困難的人:為一個你不容易愛的人，憑順服禱告三天。","meta":""},{"act":"刻意建立「傳承型關係」:開始固定關心一位屬靈同伴或初信者，幫助他更認識神。","meta":""}],"declare":"主啊，我要建立合祢心意的人際關係，\n不只是被愛，更是主動去愛。\n那個我愛不起來的人，我誠實承認:靠我自己做不到，\n求祢把祢的愛、祢的饒恕，從我裡面流出來。\n我憑順服為他禱告，求祢軟化我的心。\n使我的生命去影響生命、傳承生命，讓更多人認識祢。\n奉主耶穌的名，阿們。","share":[{"tag":"領受","q":"「愛是門徒最明顯的記號。」不是恩賜、能力、知識，而是愛——這對你有什麼提醒?"},{"tag":"省察","q":"「愛不起來的痛苦，是信仰真實的記號。」你心中有沒有一個愛不起來的人?這個看見怎麼釋放你的自我定罪?"},{"tag":"同行","q":"「從為他禱告開始，感覺才慢慢跟上。」這週你願意為一個「不容易愛的人」憑順服禱告嗎?請小家陪你一起，彼此守望。"}],"next":"先關係，後事工","prog":"50"},{"n":152,"unit":"第九單元 · 關係——重整生命的次序","title":"先關係，\n後事工","no":"152","greet":"願你來到主的面前，得享安息","verse":"耶穌對西門彼得說：「你愛我比這些更深嗎？」……耶穌說：「你餵養我的小羊。」","verse_ref":"約翰福音 21:15","bigidea":"本課核心：關係的最後一個次序，是與事的關係——也最容易被放錯位置。神看重的不是事情，是關係中的人；不是成效，是忠心；不是成果，是按神的心意而行。耶穌對彼得的次序很清楚：先問「你愛我嗎」（關係），再說「餵養我的羊」（事工）。先有對的人，才有對的事；生命流出事工，不是事工產生生命。","lead":"這是「關係的次序」的最後一課。我們走過與神、與自己、與人，現在來到與事的關係——也是最容易被放錯位置的。很多人把人生的重心放在做事：做得多不多、好不好、有沒有果效。但上帝的眼光完全不同：神看重的不是事情，是關係中的人。","sections":[{"h":"一與事的關係：神看重忠心，不是成效","paras":["「所求於管家的，是要他有忠心。」（林前4:2）「你在不多的事上有忠心，我要把許多事派你管理。」（太25:21）⟦b:上帝看事情的標準，不是成功或失敗、大或小、多或少，而是忠心⟧。無論大事小事，神看的是你是否忠心、是否按祂的心意而行。","⟦g:用心做 → 忠心⟧；⟦s:用腦算 → 比較、壓力⟧。⟦s:有己的人在乎成果、比較、表現⟧；⟦g:無己的人在乎是否忠於神⟧。","並且，真正的忠心，不只是做到底、不放棄，更是「按神的心意做」。⟦s:很多人很努力，但方向錯了——熱心卻不合神心意，勤奮卻不在神旨意中⟧，因為沒有先建立與神的關係。⟦b:忠心的根基＝與神的關係⟧。"],"deeper":{"q":"想更深？「神看重忠心，不是成效、不是成果」——但這會不會變成「反正神只看忠心，做不出成果也沒關係」的藉口，讓人不必追求果效、可以容忍低效甚至失敗？難道結果、成效在神眼中真的完全不重要嗎？","a":"「神看重忠心」不是說「成效完全不重要、做不出成果也無所謂」——那是誤解。神當然看重果子（耶穌咒詛不結果子的無花果樹、稱許那「賺了五千」的忠僕）。要正確理解「忠心 vs 成效」的對比：⟦s:它對付的，是一種「以成果論英雄、用數字與表現來定義價值、為求成效不擇手段或踐踏人」的偏差，而不是說「可以不追求果效」⟧。兩者的關係其實是：⟦g:忠心是「根與本」，成效是「果與結」——真忠心的人，必盡心竭力、追求把事做好、渴望結出果子（這正是忠心的一部分）⟧；只是，⟦b:最終的「成效大小」，有許多不在人手中（土壤、時機、人心、神的主權），那部分交給神；人能負責的，是「按神的心意、盡心忠心地做」⟧。所以「神看重忠心」要釋放的，是兩種人：⟦g:一、那因「成果不如人、果效不彰」而被定罪、灰心的忠心人——你已盡力按神心意忠心去做，成效在神手中，你在祂眼中是「又良善又忠心的僕人」⟧；⟦s:二、那為求成效而比較、表現、甚至犧牲人與原則的人——提醒他：神要的是「忠於祂、按祂心意」，不是「不擇手段的漂亮數字」⟧。所以這不是「不必追求成效的藉口」，而是「把成效放回正確的位置」：⟦b:盡心追求把事做好（這是忠心），卻不靠成果定義自己的價值、不為成效犧牲人與神的心意——盡人事（忠心），聽天命（成效交神）⟧。真正的忠心，從不馬虎，但也不被成敗綁架。"}},{"h":"二先關係，後事工：人對了，事就對了","paras":["「你愛我比這些更深嗎？……你餵養我的小羊。」（約21:15）⟦b:耶穌對彼得的次序非常清楚——先問「愛我嗎？」（關係），再說「餵養我的羊」（事工）⟧⟦g:先關係，後事工⟧。","⟦s:很多人相反——先做事，再談關係，結果越做越累、關係破裂、心裡空虛⟧。⟦b:先有對的人，才有對的事⟧。彼得能醫治瘸子（徒3章），是因為他裡面有主，不是做事，而是流出生命。","⟦g:生命流出事工，不是事工產生生命⟧。「我們所看見所聽見的，不能不說。」（徒4:20）他不是為事說話，而是因為與主的關係，不能不說。「你們或吃或喝，無論做什麼，都要為榮耀神而行。」（林前10:31）⟦b:做什麼不重要，為誰做才重要⟧。"],"deeper":{"q":"想更深？「先關係後事工、先問你愛我嗎再餵養羊」——但現實的服事與工作裡，常常是「事」推著人走：有截止日、有責任、有等著被服事的人。難道要等「關係都對了、生命都豐盛了」才開始做事嗎？那很多急需的事工豈不是都得停擺？","a":"「先關係後事工」的「先」，是「優先次序與根基」，不是「時間上要先把關係修到完美、才准開始做事」——所以它絕不會讓急需的事工停擺。要正確理解它：⟦b:它不是說「關係沒到滿分就不能服事」，而是說「讓與神、與人的關係，作為事工的『根與源頭』，而不是為了事工去犧牲關係」⟧。在真實的、被事推著走的服事裡，它這樣落實：⟦g:一、根基上⟧——再忙、再趕，也要持守與神的連結作為事工的源頭（從關係裡流出服事，而不是用服事取代關係、做到與神疏遠）；⟦g:二、過程中⟧——不為了「把事做完」而踐踏、利用、犧牲身邊的人（事工的對象是人，不是達標的工具）；⟦g:三、次序上⟧——當「事」與「人／與神的關係」真的衝突時，知道哪個是根、哪個是果。彼得正是榜樣：耶穌不是叫他「等到愛得完美才去餵羊」，而是「在恢復了與主的關係後，從那關係裡『流出』餵養羊的服事」——關係與事工是「同時並進、有正確次序」的，不是「先閉關修煉、再出來做事」。所以你照樣可以、也該即時去做急需的事工。⟦b:重點只是：讓服事「從與主、與人的關係裡流出」，而不是「為了事工榨乾關係」；邊服事，邊保守那作為源頭的關係——這樣才不會越做越累、越做越空⟧。不是停下事工等關係，是讓關係成為事工不枯竭的活泉。"}},{"h":"三忠心的管家：在關係中做事，建立關係","paras":["「你……所聽見的，也要交託那忠心能教導別人的人。」（提後2:2）⟦b:上帝的心意，不只是事情完成，而是生命傳承、關係建立⟧。忠心的管家，做事時不破壞關係，做事時建立關係——因為神看重的是關係。","⟦g:人對 → 事就對；⟧⟦s:人錯 → 事就錯⟧。這裡的「人對」是指：與神對、與自己對、與人對。⟦b:當這三個關係都對了，所做的事，自然會對⟧。","所以每天檢視：我是在做事，還是在與神同工？操練忠心於小事，而不是追求大事；在做事中刻意建立關係，而不是犧牲關係。⟦b:很多人失敗，不是因為不努力，而是把事情放在關係之上——為了做事失去神、為了完成失去人⟧。"],"pq":"人生的最後，不是看你做了多少事，而是看你是否忠於神、是否建立了關係。","deeper":{"q":"想更深？走完了「關係的次序」（149-152）——與神、與自己、與人、與事，如果要把這四個次序對我的人生意義講清楚，這個「次序」為什麼這麼關鍵？把次序擺對，到底能解決我生命中的什麼問題？","a":"走到「關係的次序」最後一課，正好把這四個次序串起來，看見它對人生的決定性意義。先回顧這個次序：第一，與神的關係；第二，與自己的關係；第三，與人的關係；第四，與事的關係。神、己、人、事——這是一個有先後、有根基的次序。為什麼這個次序這麼關鍵？因為它是一個「源頭與流向」的結構，每一層都是下一層的根基和源頭，一旦次序顛倒，整個生命就會從根上扭曲。讓我們看這個次序如何環環相扣：「與神的關係」是源頭中的源頭——因為神就是愛，一切愛的能力、一切正確的次序，都從這個根源流出。當你與神的關係對了，你才能正確地對待自己（因為神先接納你，你才能接納自己）；與自己的關係對了（內外一致、在基督裡安穩），你才能正確地愛人（因為你怎麼對自己就怎麼對人，裡面有愛才流得出愛）；與人的關係對了，你所做的「事」才會在愛和關係中進行，而不是冷冰冰地完成、甚至傷害人。你看，這是一條從神出發、流經己、流向人、最後落實在事的「生命之河」。那次序顛倒會怎樣？這正是現代人、甚至許多基督徒生命混亂痛苦的根源——他們把這個次序「倒過來」活了。最常見的顛倒是「以事為首」：把「事」（成就、業績、果效、忙碌）放在第一位，為了把事做成，可以犧牲與人的關係、可以忽略自己的內在、甚至可以冷落與神的關係（用為神做事取代與神同行）。結果呢？這一整個單元描繪的悲劇就出現了：越做越累、關係破裂、裡面空虛、最後連與神都疏遠了——因為他在沒有源頭的情況下，拚命想流出河水，只能耗盡自己。另一種顛倒是「以人為首」:把某個人(或別人的看法、認同)放在神之上，結果在這段關係裡患得患失、失去自己、也偏離了神。還有「以己為首」:一切以自我為中心(這正是「有己」的本質)，神、人、事都成了滿足自己的工具，結果是孤立和敗壞。所以，把次序擺對，到底解決了什麼問題?它解決的是「生命的根基和動力來源」的問題——也就是，你整個生命是「從哪裡支取力量、為誰而活、按什麼順序投注你有限的時間心力」。當次序對了:你從「與神的關係」這個永不枯竭的源頭支取愛和力量(不再靠自己硬撐);你在「與自己的關係」裡得到內在的一致與安穩(不再裡外分裂、自我消耗);你在「與人的關係」裡讓神的愛流動、傳承生命(不再孤立或傷害);你在「與事的關係」裡帶著忠心和生命去做(不再被成果綁架、為事失人失神)。一個次序對的人，即使做一樣多的事，裡面卻有源源不絕的供應、有平安、分得清輕重、守得住關係——因為他是「從源頭流出」地活，而不是「靠自己擠出」地活。這也正是321理念核心的「先生命、再關係、後事工」的具體展開:生命(與神、與己的關係)是根，關係(與人)是幹，事工(與事)是果。你不能要一棵樹先結果再長根，次序錯了，再努力也是枯乾。所以這四個次序，不是一套要你死守的規條，而是一張「生命如何健康運轉」的藍圖。它要解決的，是我們最深的疲憊、空虛和混亂的根源——把那個被我們顛倒了的次序，重新擺正:讓神回到第一，讓己安穩在神的愛裡，讓愛流向人，讓事在關係中完成。當這個次序對了，你會驚訝地發現，生命不再是一場耗盡自己的硬撐，而是一條從神流出、滋潤自己、流向他人、結出果子的活水江河。下一段「重整次序」(153-156)，就是要實際地幫助我們，把那些被顛倒的次序，一個一個地校正回來。"}}],"focus":"我的生命次序，是「神、己、人、事」，\n還是不知不覺被我倒過來活成了\n「事、人、己、神」——\n為了把事做成，連神都被擠到了最後？","hope":{"t":"✺ 次序對了，生命就從源頭流出","paras":["拚命做事、努力維持關係，卻越活越累、越空虛——很可能不是你不夠努力，而是生命的「次序」被顛倒了：把「事」放第一，為了做成，犧牲了人、忽略了己、冷落了神。這一課把藍圖交給你：⟦b:正確的次序是神、己、人、事——一條從神流出、滋潤自己、流向他人、結出果子的活水江河。⟧","把次序擺正，解決的是「你從哪裡支取力量、為誰而活」的根本問題——⟦g:讓神回到第一（永不枯竭的源頭），讓己安穩在神的愛裡，讓愛流向人，讓事在關係中完成⟧。當次序對了，同樣的忙碌裡，你不再是耗盡自己地硬撐，而是從源頭源源不絕地流出。先生命、再關係、後事工——這是生命健康運轉的藍圖。"]},"still":"此刻安靜——\n我願不願意讓聖靈光照：\n我的「神、己、人、事」這個次序，\n哪一處被我悄悄顛倒了？","still_hint":"不必急著重排一切。\n安靜一分鐘，\n先把第一位交還給神：\n「主啊，求祢重新回到我生命的第一位。」","steps":[{"act":"每天檢視：我是在做事，還是在與神同工？做一件事前先禱告一句——「主，這是祢要我做的嗎？」","meta":""},{"act":"操練忠心於小事，而非追求大事：每天認真做好一件「看似不起眼的小事」。","meta":""},{"act":"在做事中刻意建立關係，而不是犧牲關係：今天刻意在一件事情中「優先顧到人」。","meta":""}],"declare":"主啊，我要調整我與事情的關係，\n不再以事情為中心，而是以祢為中心。\n我要做一個忠心的管家，在每一件事上按祢的心意而行。\n我要先與祢建立關係，再與人建立關係，然後在關係中做事。\n求祢重整我生命的次序——神、己、人、事，\n使我所做的一切，都榮耀祢、建立關係。\n奉主耶穌的名，阿們。","share":[{"tag":"領受","q":"「先關係，後事工。」耶穌先問彼得「你愛我嗎」再說「餵養我的羊」，這個次序給你什麼提醒？"},{"tag":"省察","q":"「神、己、人、事」這個次序，你目前哪一處被顛倒了？從什麼地方看得出來（如：越做越累、關係磨損）？"},{"tag":"同行","q":"「神看重忠心，不是成效。」你願意這週操練「忠心於一件小事」，而非追求亮眼成果嗎？說給小家聽，彼此鼓勵。"}],"next":"建立關係，不只是解決問題","prog":"60"},{"n":153,"unit":"第九單元 · 關係——重整生命的次序","title":"建立關係，\n不只是解決問題","no":"153","greet":"願你來到主的面前，得享安息","verse":"你們要去，使萬民作我的門徒，奉父、子、聖靈的名給他們施洗。","verse_ref":"馬太福音 28:19","bigidea":"本課核心：當關係的次序錯了，人生就亂；對了，一切就對。一個核心選擇決定生命方向——我們是在「解決問題」，還是在「建立關係」？關係對了，事情自然會對（與神好就甘心、與己好就開心、與人好就同心）。只解決問題會失去人心；神處理我們是「關係優先」（先恢復關係）。神的心意不是建立事情，是建立人、建立門徒。","lead":"從這一課起的最後四課，是「重整次序」——把被顛倒的次序，一個一個校正回來。很多人一生忙碌、疲累、灰心，不是因為不努力，而是次序錯了。這一課要面對一個決定生命方向的核心選擇：我們的人生，是在「解決問題」，還是在「建立關係」？","sections":[{"h":"一關係對了，事情自然會對","paras":["有一句話說得很好：⟦b:有關係，就沒關係；沒關係，就有關係⟧——當關係對了，問題就容易解決；當關係錯了，問題就越來越多。當一個人⟦g:與神關係好 → 就會甘心；與自己關係好 → 就會開心；與人關係好 → 就會同心⟧。","這樣的人做事，有動力、有喜樂、有合一。⟦s:反過來，關係不好 → 不甘心、不開心、不合一⟧，事情再簡單，也會變得困難。","⟦b:神的工作，不是靠壓力推動，是靠關係帶動⟧。⟦g:用心建立關係 → 生命流動⟧；⟦s:用腦解決問題 → 壓力增加⟧。"],"deeper":{"q":"想更深？「關係對了，事情自然會對」——但這會不會把「關係」過度理想化？現實中有些問題就是技術性、結構性的（流程缺陷、資源不足、能力不夠），光有好關係根本解決不了。難道關係好，專業能力、制度、效率這些就都不需要了嗎？","a":"「關係對了事情自然會對」不是說「有了好關係，就不需要專業、制度、效率」——那是把這原則推到極端的誤解。它要對付的，是另一個更常見的偏差：「只重事不重人、為了把事做成而犧牲關係、用冰冷的制度與效率輾過人」。要平衡地看：⟦g:一、技術性、結構性的問題，當然需要專業、制度、資源、能力去解決——神也賜下智慧與才幹，要我們善用，好關係不會自動修好一個有缺陷的流程⟧；⟦g:二、但「關係」是讓這一切能「健康運作、且不傷人」的土壤⟧——同樣解決一個技術問題，在「關係對」的團隊裡，人們甘心、同心、願意配搭、能誠實溝通，問題解決得又好又不傷人；在「關係破裂」的團隊裡，即使方法再對，也推不動、彼此防備、越解決越多衝突。所以這原則的真意是：⟦b:不是「關係好就不用專業制度」，而是「專業、制度、效率，要在『對的關係』裡運行，才能既把事做成、又不失去人」⟧。換句話說：關係不是「取代」專業能力的，是「承載」它的。「有關係就沒關係」說的是——關係對了，溝通、配搭、解決問題的「過程」會順暢得多，且不會「贏了事、輸了人」。所以答案是：兩者都要——⟦g:用專業與智慧去解決技術問題，同時用愛與關係去對待過程中的人⟧。不是關係 vs 專業，是「在愛的關係裡，把專業發揮出來」。"}},{"h":"二只解決問題，會失去人心","paras":["⟦s:很多人習慣對事不對人，用制度、規則、效率處理問題，看起來很好，但忽略了「人」⟧——結果問題解決了，人卻受傷了；事情完成了，關係破裂了。這樣的代價，其實更大。","「世人都犯了罪……如今卻蒙神的恩典……白白地稱義。」（羅3:23-24）⟦g:神處理我們的問題，不是用「審判優先」，而是用「關係優先」⟧。耶穌為我們付上代價，不是先解決問題，而是先恢復關係。","醫生若只看病、不看人，可能治好病，卻傷了心。⟦s:只解決問題 → 失去人⟧；⟦g:建立關係 → 得到人⟧。⟦b:人比事重要，關係比結果重要⟧。"],"deeper":{"q":"想更深？「神處理我們是關係優先、不是審判優先，耶穌先恢復關係」——但聖經裡神也有審判、有公義、有對罪的嚴厲處置（如洪水、所多瑪）。把神說成「總是關係優先」，會不會選擇性地只講慈愛、淡化了神公義審判的那一面？","a":"好的平衡——這要兼顧神「慈愛」與「公義」的兩面，不可偏廢，也不可對立。聖經啟示的神，確實「既是慈愛的、也是公義的」，祂有審判、有對罪的嚴厲處置（洪水、所多瑪都是真的）。但這課說「關係優先」，並不淡化公義，理由是：⟦g:一、神的審判與公義，「目的」往往仍是「挽回與保護」⟧——管教是為了兒子回轉，審判惡是為了保護受欺壓的、止住罪的蔓延；神的公義不是「以洩憤為目的的報復」，而是與祂的愛和聖潔一致的。⟦b:二、最深刻的是：在十字架上，神的「公義」與「慈愛」完全交會⟧——神沒有「淡化、跳過」對罪的審判（罪必須被處置，這是公義），祂是「讓耶穌『擔當』了那審判」（這是慈愛），好「既不廢公義、又恢復關係」。所以「關係優先」不是「沒有公義」，而是：⟦g:神為了恢復與我們的關係，自己付上了「滿足公義」的代價（耶穌的死）——這正是福音：羅3:24-26 說神「顯明祂的義」，同時「白白稱罪人為義」⟧。那神對「持續不悔改的惡」呢？祂的恩典與忍耐總是給人回轉的機會（挪亞造方舟一百多年、所多瑪若有十個義人就不毀滅），但對「終究剛硬到底、不肯悔改、持續傷害人」的，公義的審判仍會臨到（下兩課正講「分辨軟弱的人與惡人」）。⟦b:所以神不是「只有慈愛沒有公義」，而是「慈愛與公義在十字架上合一」——祂渴望關係、為此滿足了公義；但祂的恩典不是縱容，對剛硬不悔改的，公義仍然成立⟧。真正的福音，從不在慈愛與公義之間二選一。"}},{"h":"三重整次序：回到神的心意","paras":["為什麼我們會顛倒次序？⟦s:第一，不願付代價——建立關係需要時間、陪伴、禱告、忍耐，而解決問題快、有效率、看得到結果，所以人很容易選擇快的方法，而不是對的方法⟧。但⟦b:快不代表對，對才會長久⟧。⟦s:第二，看重時間與成果——關係不容易量化、不容易立刻看見，所以人就放棄關係、追求成果，結果反而花更多時間補救關係⟧。","「你們要去，使萬民作我的門徒。」（太28:19）⟦b:神的心意不是建立事情、建立制度，而是建立人、建立門徒、建立關係⟧。","⟦g:當我們把焦點從「事」轉回「人」，生命就會被改變、教會就會被更新、復興就會臨到⟧。⟦b:先生命 → 再關係 → 後事工⟧。順序一對，生命會流動、關係會連結、事工自然結果。"],"pq":"你可以很有效率，卻沒有果效——因為沒有關係，就沒有生命。","deeper":{"q":"想更深？「建立關係勝過解決問題」聽起來很美，但現實中問題就是擺在那裡逼著你解決啊——孩子的成績、團隊的進度、家裡的爛攤子。難道為了「建立關係」，就放著問題不管、任它惡化嗎？這在現實中行得通嗎？","a":"這是一個很實際的問題，它擔心的是「建立關係優先」會不會變成「對問題不負責任、放任不管」。要解開這個結，關鍵在於看清楚：這一課從來不是說「不要解決問題」，而是說「不要『只』解決問題、不要『顛倒』關係與問題的次序」。問題當然要解決——孩子的成績要管、團隊的進度要推、家裡的爛攤子要收拾，這些都是真實的責任，逃避它們不是屬靈，是不負責任。所以這一課反對的，不是「解決問題」這個行動，而是「以解決問題為唯一目標、為了解決問題而犧牲關係」的這種「次序顛倒」。差別在哪裡？關鍵在於：你是「在關係中解決問題」，還是「為了解決問題而破壞關係」。讓我用最具體的例子——孩子的成績差（一個真實、逼人的問題）。「為了解決問題而破壞關係」的做法是：眼裡只有「成績」這個問題，於是用責罵、施壓、比較、懲罰去逼孩子，目標是「把分數弄上去」，至於孩子的心受傷了、親子關係裂了、孩子對學習更厭惡了——這些都被忽略，因為「解決問題」是唯一目標。結果常常是:分數沒上去多少，關係卻嚴重受損，而關係一旦壞了，你連影響他、幫助他的「入口」都失去了，問題反而更難解決。這就是「只解決問題，失去人心」。「在關係中解決問題」的做法則是:你同樣要面對和處理「成績」這個問題(不逃避、不放任)，但你的眼裡不是「只有分數」，而是「分數背後那個人」。你會先顧到關係:先了解孩子為什麼成績差(是聽不懂?有壓力?還是別的困擾?)，先讓他感受到「無論你成績如何，我都愛你、我和你一起面對」(這是關係)，然後在這份安全的關係裡，陪他一起想辦法、給他支持和方向(這是在關係中解決問題)。你看，問題照樣在解決，但因為「關係」是根基、是先於問題的，所以解決問題的過程，反而「建立」了關係，而不是「破壞」了關係。而且，在好的關係裡解決問題，往往「更有效」——一個感受到被愛、被支持的孩子，比一個被責罵、被施壓的孩子，更有動力去改善。所以「關係優先」不是「不解決問題」，恰恰是「為了能真正、長久地解決問題」。這背後其實是一個次序與目標的智慧:把「人」當目標，「事」當途徑——解決問題(事)是為了幫助人(成長、得益處)，而不是把人當工具去達成事。當你記得「我處理這個問題，終極是為了這個人好」，你就不會為了把事做成而碾壓了人。再看神自己怎麼做:我們的「罪」是一個天大的「問題」，神當然要解決它(祂沒有放任不管，十字架就是祂對罪問題最徹底的處理)。但神解決「罪」這個問題的方式，不是冷冰冰地、為了「擺平罪」而審判我們、毀滅我們(那是只解決問題、失去人);而是「在恢復關係的大框架下」解決罪——祂差耶穌來，先向我們顯明愛、先要得回我們這個「人」，然後藉著十字架同時解決了「罪的問題」並「恢復了關係」。神是又解決了問題、又得到了人。這就是我們的榜樣。所以，面對你生命中那些逼著你解決的問題，正確的態度不是「放著不管去經營關係」，也不是「只顧解決問題而碾壓關係」，而是:在關係中、為了人的益處，去解決問題。先穩住關係這個根基(讓對方知道你愛他、與他同一陣線)，再在這份關係裡一起面對問題。慢一點，但對一點;先顧人，再顧事——你會發現，問題不但解決了，人也得到了，關係還更深了。這才是神所要的、既有果效又有溫度的「解決問題」。"}}],"focus":"面對眼前那個逼著我解決的問題（孩子、團隊、家庭），\n我是「為了把事做成」而不惜碾壓關係，\n還是「在關係中、為了人好」，\n陪著一起面對？","hope":{"t":"✺ 在關係中解決問題，問題與人都得到","paras":["問題擺在眼前逼著你解決——孩子的成績、團隊的進度、家裡的爛攤子，「建立關係優先」聽起來像放任不管。這一課把分辨講清楚：⟦b:重點不是「不解決問題」，而是「在關係中解決問題」，而非「為了解決問題而破壞關係」。⟧","把「人」當目標、「事」當途徑——⟦g:先穩住關係這個根基（讓對方知道你愛他、與他同一陣線），再在這份關係裡一起面對問題⟧。在好的關係裡解決問題，往往「更有效」：被愛、被支持的人，比被責罵、被施壓的人更有動力改善。神解決我們「罪」的問題，正是在「恢復關係」的大框架下完成的——祂又解決了問題，又得到了人。先顧人，再顧事，你會發現：問題解決了，人也得到了。"]},"still":"此刻安靜——\n我最近處理的某個難題，\n是把對方當成「要擺平的問題」，\n還是當成「要愛、要幫助的人」？","still_hint":"不必急著想怎麼解決。\n安靜一分鐘，\n先把那個「人」放回心上：\n「主啊，幫我先愛他、與他同行，再一起面對問題。」","steps":[{"act":"今天刻意「先人後事」：在一件事情中，先花時間了解對方的感受，再處理事。","meta":""},{"act":"遇到問題時，先問「關係如何」，再問「怎麼解決」：衝突時先停下來檢查我和這人的關係。","meta":""},{"act":"選擇「慢一點，但對一點」：刻意在一件事情中放慢速度，優先建立關係。","meta":""}],"declare":"主啊，我要重整我生命的次序，\n不再只追求解決問題，而是學習在關係中解決問題。\n讓我看重人勝過事情，看重關係勝過成果。\n給我耐心、愛心與智慧，願意付代價去建立真正的關係，\n先顧人、再顧事，使問題得解決，人也被得到。\n讓我成為帶出生命、建立門徒的人。\n奉主耶穌的名，阿們。","share":[{"tag":"領受","q":"「在關係中解決問題 vs 為解決問題破壞關係」的分辨，碰到你生活中哪一個具體的難題？"},{"tag":"省察","q":"「我們會顛倒次序，因為不願付代價、看重成果。」誠實地說，你比較容易因哪一個而把「事」放在「人」前面？"},{"tag":"同行","q":"「慢一點，但對一點。」這週你願意在哪一件事上，刻意放慢、先建立關係嗎？說給小家聽，彼此提醒。"}],"next":"禱告，不是為了解決問題","prog":"70"},{"n":154,"unit":"第九單元 · 關係——重整生命的次序","title":"禱告，\n不是為了解決問題","no":"154","greet":"願你來到主的面前，得享安息","verse":"所以你們禱告要這樣說：我們在天上的父，願人都尊你的名為聖。","verse_ref":"馬太福音 6:9","bigidea":"本課核心：禱告的本質，不是解決問題的工具，而是建立關係。耶穌教導禱告的第一句不是「主啊幫助我」，而是「我們在天上的父」——起點是關係，不是問題。只求神蹟的信心不能持久（以色列人三天就抱怨）；建立在關係上的信心才穩固。建立關係的人，在患難中仍與神的愛緊緊相連，靠關係得勝、不靠環境得勝。","lead":"上一課我們看見重整次序的核心——建立關係勝過解決問題。這一課要把這個原則用在最核心的屬靈操練上：禱告。很多人把禱告當作「解決問題的工具」，有需要時才來到神面前。但耶穌帶我們回到一個更深的核心——禱告的本質，不是解決問題，而是建立關係。","sections":[{"h":"一禱告的本質：不是解決問題，是建立關係","paras":["「我們在天上的父，願人都尊你的名為聖。」（太6:9）⟦b:耶穌教導禱告時，第一句話不是「主啊，幫助我」，而是「我們在天上的父」⟧。這是一個極深的啟示：⟦g:禱告的起點，不是問題，是關係⟧。","⟦s:當人把禱告當作「解決問題的工具」，就會在有需要時才來到神面前——有問題才禱告，沒問題就遠離神。這其實不是信心，而是利用神⟧。","⟦g:但當禱告是為了「建立關係」，人就會渴望親近神、認識神、與神同行⟧。⟦b:焦點在耶穌，不在問題；用心親近神，不用腦分析問題⟧。當我們回到關係，問題就不再主導我們。"],"deeper":{"q":"想更深？「有問題才禱告、是利用神，不是信心」——但人本來就常常在有需要、有困難時才特別會想到神、會迫切禱告，這是很自然的人性。難道在困難中向神呼求、為解決問題禱告，就是「利用神」、是錯的嗎？難道不能為自己的需要禱告？","a":"不，在困難中向神呼求、為需要禱告，完全不是錯的，更不是「利用神」——聖經處處鼓勵我們「凡事藉著禱告祈求，將所要的告訴神」、「在患難中求告我」。神是慈愛的父，祂歡迎兒女在困難中奔向祂、為需要呼求，這正是親密關係的自然表現。所以這課絕不是說「不可以為問題禱告」。它要對付的，是一種「特定的偏差」，要分清楚：⟦s:它對付的是「只『在』有問題時才想到神、問題一解決就忘記神、把神純粹當成『解決問題的工具』——平時不理祂，有事才找祂」這種「以自己為中心、把神工具化」的態度⟧；⟦g:它推崇的，不是「不准為問題禱告」，而是「除了為問題禱告之外，更渴望親近神、認識神、與神同行——把禱告的『根基與重心』放在『關係』上」⟧。所以差別不在「有沒有為問題禱告」，而在「我與神的關係，是不是只剩下『有事才求』」。打個比方：兒女有需要時向父母開口要幫助，是親情的自然，父母也樂意給；但若一個孩子「只在要錢時才出現、平時從不理父母」，那關係就出問題了——⟦b:問題不在「開口要」，在「只剩下要」⟧。所以放心為你的需要禱告、在困難中盡情呼求祂——只是別讓禱告「只」剩下求問題，也讓它成為你「親近這位愛你的父」的時光。神歡迎你帶著難處來，更渴望你帶著心來。"}},{"h":"二只求神蹟的信心，不能持久","paras":["「百姓就向摩西發怨言，說：我們喝什麼呢？」（出15:24）⟦s:以色列人經歷紅海分開這麼大的神蹟，信心卻只維持了三天，一遇到「水苦」的問題，立刻抱怨⟧。","⟦b:若信心建立在「神蹟」，就無法持久；若信心建立在「關係」，才會穩固⟧。⟦s:當人只想要神解決問題，就會陷入一個循環——問題就求神，問題解決就忘記神，再遇問題再求神⟧。這就是「有己」的生命：以自己為中心，利用神解決困難。","⟦s:用腦靠自己 → 追求結果⟧；⟦g:用心靠聖靈 → 建立關係⟧。⟦b:只有「無己」、讓耶穌作王，我們的信心才會穩定，不被環境搖動⟧。"],"deeper":{"q":"想更深？「信心建立在神蹟不能持久、建立在關係才穩固」——但聖經裡神也常用神蹟來建立、堅固人的信心（紅海、五餅二魚）。那神蹟對信心到底是好是壞？我們該不該渴望、尋求神蹟？追求經歷神的大能，是錯的嗎？","a":"神蹟本身是好的、是神真實的作為，渴望經歷神的大能也不是錯——這課不是要貶低神蹟、或叫人不可尋求。神確實用神蹟向人顯明祂的真實、堅固人的信（約翰福音稱神蹟為「神蹟」，正是「指向神的記號」）。問題不在「神蹟」，而在「信心『建立在』什麼之上、神蹟在我心中佔什麼位置」。要分清：⟦s:不健康的——信心「建立在神蹟之上」：把神蹟當成信心的「根基與條件」，有神蹟才信、沒神蹟就動搖，焦點是「神為我做了什麼、給我什麼經歷」，本質仍是「以自己的需要為中心」⟧（以色列人見了大神蹟卻三天就抱怨，正因信心的根是「神蹟」不是「神」）；⟦g:健康的——信心「建立在與神的關係之上」：神蹟是「加分、是恩典的記號」，但即使沒有神蹟、在患難中，我仍信靠神、仍與祂的愛相連，焦點是「神是誰、我與祂的關係」，而不只是「祂給我什麼」⟧。所以神蹟的「正確位置」是：⟦b:它是「指向神的路標」，要引你去「認識、信靠那位行神蹟的神（關係）」，而不是停在「路標」本身、只迷戀經歷⟧。耶穌也曾對只為餅而跟隨祂的群眾說「你們找我，是因吃餅得飽」（約6:26），提醒他們別只要神蹟、要的是那賜生命的主自己。所以可以渴望、尋求神蹟（那是好的），但別讓信心「建立在神蹟上」——要建立在「神自己、與神的關係」上；這樣，有神蹟時感恩、沒神蹟時仍站立得穩。渴慕神的大能，卻更渴慕那位大能的神。"}},{"h":"三建立關係的人，在一切中都得勝","paras":["「誰能使我們與基督的愛隔絕呢？……都不能叫我們與神的愛隔絕。」（羅8:35-39）⟦g:保羅不是沒有問題，而是在問題中仍然緊緊連於神——他不是靠環境得勝，是靠關係得勝⟧。","⟦g:當人真正與神建立關係，問題仍在，但心不被攪動；環境改變，但信心不動搖；外面震動，裡面安穩⟧——這正是得勝者的生命。","⟦g:無己 → 與基督合一；合一 → 就得勝⟧。所以每天建立「沒有目的的禱告」——只為關係，不為問題；問題來時先問「神的心意是什麼」，讓問題成為認識神的入口；無論順逆，持續與神連結。⟦b:不是問題解決帶來平安，是關係建立帶來平安⟧。"],"pq":"不要把焦點放在問題，要把焦點放在耶穌；用心靠聖靈就開心，用腦靠自己就煩惱。","deeper":{"q":"想更深？「禱告不是為了解決問題」「沒有目的的禱告」——可是聖經明明叫我們「凡事藉著禱告祈求，將所要的告訴神」啊！把需要、把問題帶到神面前求祂解決，難道不對嗎？這不是矛盾嗎？","a":"這是一個很重要的釐清，因為這一課若被誤解，會讓人以為「為自己的需要、為問題禱告」是不屬靈的、是錯的——但這完全不是聖經的意思，也不是這一課的意思。聖經確實清楚地教導、甚至鼓勵我們「將所要的告訴神」：耶穌教我們求「日用的飲食」，保羅說「凡事藉著禱告、祈求和感謝，將你們所要的告訴神」，雅各說「你們得不著，是因為你們不求」。神是我們的天父，祂樂意我們把一切的需要、難處、重擔都帶到祂面前求祂——這不但沒錯，還是兒女對父親該有的信任和依靠。所以這一課絕不是說「不可以為問題禱告」。那它到底在說什麼？關鍵又是那個反覆出現的詞——「次序」和「根基」。這一課要對付的，不是「為問題禱告」這件事，而是「把禱告『僅僅』當成解決問題的工具」這種「本末倒置」。差別在於：禱告的「根基和核心」是什麼？是「關係」，還是「問題」？用一個親子的比喻最清楚：一個孩子當然可以、也應該向父親開口求他需要的東西（要學費、要幫助、遇到困難求爸爸出手）——這是正常、健康的。但如果這個孩子「只有」在「要東西」的時候才來找爸爸，平常從不跟爸爸說話、不想親近他、不在乎與他的關係，把爸爸「純粹」當成一台「提款機」或「問題解決器」——那這段父子關係就出問題了，孩子是在「利用」父親，而不是「愛」父親。反過來，一個與父親關係親密的孩子，他會「常常」跟爸爸聊天、分享生活、單純享受在一起（這是「為關係」的相處），而在這份親密的關係「之中」，他也自然地、坦然地向爸爸開口求他需要的（這是「為問題」的祈求）。你看，後者並沒有「不求」，他照樣求；但他的「求」，是建立在「關係」的根基上，是關係裡的一部分，而不是關係的「全部」或「唯一目的」。這就是這一課的真義：神完全歡迎你為問題禱告、為需要祈求——但祂不要你「只有」在有問題時才來找祂、把禱告窄化成一台解決問題的機器。祂要的是，你以「與祂的關係」為禱告的根基和核心，在這份愛的關係裡，自然地、坦然地把你一切的需要和問題也帶給祂。所以「沒有目的的禱告」這個操練，不是要取代「為問題禱告」，而是要「平衡」和「校正」我們——因為我們太容易掉進「只在有事時才禱告」的陷阱了。刻意練習「只為親近神、不為求什麼」的禱告，是為了把我們與神的關係，從「交易」(我求、祢給)拉回到「相愛」(我愛祢、親近祢);而當這個「關係」的根基穩固了，你再為問題禱告時，整個性質就不同了:你不再是焦慮地、把神當工具地求，而是像一個深愛、信任父親的孩子，安穩地把難處交給祂，並且——這是最關鍵的轉變——你會更在乎「祂的心意」過於「我的答案」。這就帶出這一課的另一個寶貴提醒:當問題來時，除了求解決，更要問「主，祢要我在這件事學什麼?祢要我更認識祢哪一方面?」——讓問題不只是「被解決的對象」，更成為「認識神、深化關係的入口」。這樣，即使問題一時沒有照你的意思解決，你也不會信心崩潰(像以色列人那樣)，因為你的信心、你的平安，根基不在「問題有沒有解決」，而在「我與神的關係」。所以結論是:儘管放心地、坦然地為你的問題和需要禱告吧，神樂意聽!只是別讓禱告「淪為」只在有事時才用的工具，也別讓你的信心建立在「問題有沒有被解決」上。以關係為根基，在愛裡親近祂、也在愛裡向祂祈求;以認識祂為核心，讓每一個問題都成為更深認識祂的契機。如此，你既得到了一位樂意垂聽的天父，也得到了那不被環境動搖的、真正的平安。"}}],"focus":"我的禱告，是「只有」在有問題時才出現，\n把神當成解決問題的工具，\n還是以「與神的關係」為根基，\n在愛裡親近祂、也向祂祈求？","hope":{"t":"✺ 放心為問題禱告，但別只在有事時才來","paras":["聽到「禱告不是為了解決問題」，常為需要、為難處禱告的你可能會困惑甚至自責：難道把問題帶到神面前求祂解決，是不屬靈的嗎？這一課把這份顧慮解開：⟦b:神完全歡迎你為問題、為需要禱告——祂要校正的，是「只」把禱告當成解決問題的工具。⟧","就像一個孩子當然可以向父親開口求他需要的——⟦g:只是別「只有」要東西時才來找他，把他當提款機；而要以「相愛的關係」為根基，在親密裡自然地也把需要交給他⟧。當關係穩固了，你為問題禱告時就不再焦慮，更會在乎「祂的心意」過於「我的答案」，讓每個問題都成為更深認識神的入口。儘管放心禱告——只是讓平安的根基，從「問題解決了沒」，挪回「我與神的關係」。"]},"still":"此刻安靜——\n我願不願意，\n不為求什麼，\n單單安靜在神面前一會兒，\n享受作祂兒女、與祂同在的福分?","still_hint":"不必帶著一串祈求清單。\n安靜一分鐘，\n單純地親近祂:\n「天父，我來到祢面前，不是為求什麼，是要親近祢。」","steps":[{"act":"每天建立「沒有目的的禱告」：預留一段時間，不為求什麼，單單親近神、享受與神同在。","meta":""},{"act":"問題來時先問「神的心意是什麼？」：除了求解決，更問——「主，祢要我在這件事學什麼？更認識祢哪一方面？」","meta":""},{"act":"操練在環境中持守關係：無論順逆，每天持續與神連結，提醒自己——我不是因環境親近神，是因愛神而親近祂。","meta":""}],"declare":"主耶穌，我宣告：\n我不再把禱告當成只在有事時才用的工具，\n我要以與祢的關係為禱告的根基。\n我要在愛裡親近祢，也坦然把需要交給祢。\n無論環境如何，我都要認識祢、倚靠祢；\n我相信沒有任何事能使我與祢的愛隔絕，\n讓我成為穩定、喜樂、得勝的人。\n奉主耶穌的名，阿們。","share":[{"tag":"領受","q":"「禱告的起點不是問題，是關係。」主禱文第一句「我們在天上的父」給你什麼新的看見？"},{"tag":"省察","q":"誠實地說，你的禱告比較像「有事才來的交易」，還是「常常親近的相愛」？"},{"tag":"同行","q":"「問題是認識神的入口。」你目前有沒有一個未解的難處？這週除了求解決，願意也問「主，祢要我從中認識祢什麼」嗎？與小家分享。"}],"next":"管教，是為了挽回","prog":"80"},{"n":155,"unit":"第九單元 · 關係——重整生命的次序","title":"管教，\n是為了挽回","no":"155","greet":"願你來到主的面前，得享安息","verse":"耶和華神呼喚那人，對他說：「你在哪裡？」","verse_ref":"創世記 3:9","bigidea":"本課核心：面對人的犯錯，神在乎的不只是「你做錯了什麼」，更是「你這個人現在在哪裡」。以解決問題為中心的紀律（控制、施壓、懲罰）會失去人心；以愛為中心的紀律是「我陪你改變」。神的管教不是為了懲罰人，而是為了挽回人——亞當犯罪後，神的第一句話不是「你做了什麼」，而是「你在哪裡」。","lead":"重整次序來到「紀律」這一面。當人犯錯時，我們第一個反應往往是：如何糾正錯誤、解決問題、讓事情恢復正常。但神的心卻不是這樣——神在乎的，不只是「你做錯了什麼」，而是「你這個人現在在哪裡」。真正屬神的紀律，不是為了解決問題，而是為了挽回關係。","sections":[{"h":"一以解決問題為中心的紀律，會失去人心","paras":["「耶和華你神管教你，好像人管教兒子一樣。」（申8:5）⟦s:當人用紀律只是為了「解決問題」，本質其實是用規條控制人、用壓力逼人改變、用懲罰達到效果⟧。這樣看起來有效，因為短期內事情被控制住了。","但人的心卻發生了什麼？⟦s:感到被拒絕、被否定、沒有能力再站起來⟧。這會帶來一個惡性循環：問題 → 懲罰 → 反彈 → 更強的懲罰 → 關係破裂 → 人心流失。","⟦s:重事不重人 → 失去人心⟧。⟦b:當我們把「事」放在「人」之前，最後連事也做不好⟧。"],"deeper":{"q":"想更深？「只為解決問題的紀律是控制、施壓、懲罰，會失去人心」——但有時就是需要明確的規矩、後果、紀律才能維持秩序（家庭、教會、團隊都需要規範）。難道為了「不失人心」，就不能有規矩、不能執行後果、什麼都得溫柔以對嗎？","a":"不，這課不是要廢掉規矩、後果與紀律——家庭、教會、團隊確實需要清楚的規範與界線，神自己也設立律法與管教，規矩與後果本身是好的、是必要的、也是愛的一部分（沒有界線反而是放任，不是愛）。它要對付的，不是「有沒有規矩」，而是「執行紀律的『心與目的』」：⟦s:它批評的「以解決問題為中心」，是指「規矩與懲罰的目的只是『控制、達到效果、把問題壓下去』，眼中只有『事』、沒有『人』，用施壓與懲罰來輾過人」——這樣即使短期見效，卻傷了人心、破壞了關係⟧；⟦g:它推崇的「以愛為中心」，不是「沒有規矩、一味溫柔放任」，而是「同樣有清楚的規矩與後果，但執行的『心』是愛、目的是『挽回這個人』，而不只是處理這件事」⟧。所以關鍵不在「要不要規矩」，而在「規矩背後是『控制』還是『挽回』、眼中是『事』還是『人』」：⟦b:同樣執行一個後果，可以是冷冰冰的「你違規了，自食其果」（只解決問題），也可以是帶著愛的「我要讓你承擔這後果，因為我在乎你、要幫助你成長」（以愛挽回）——規矩一樣，心不一樣，結果天差地別⟧。神自己正是榜樣：祂有清楚的標準與管教（規矩與後果都在），但祂管教「如同待兒子」，目的是挽回，不是擊垮。所以該有的規矩、後果、紀律都要有（那是負責任的愛），只是執行時，眼中要有『人』、心裡要有『挽回』。溫柔不等於沒有原則，有原則也不等於冷酷。"}},{"h":"二以愛為中心的紀律，是「我陪你改變」","paras":["「你們所忍受的，是神管教你們，待你們如同待兒子。」（來12:7）⟦g:神的紀律，不是丟下一句「你自己改！」，而是說「我陪你改變」⟧——這就是天父的心。「疼愛兒子的，隨時管教。」（箴13:24）","真正的管教有三個核心：⟦g:第一是關係——不是對罪的反應，而是從愛出發；第二是陪伴——不是要求改變，而是陪著走過改變；第三是恢復——不是定罪，而是把人帶回正確的位置⟧。","⟦g:生命 → 關係 → 事工，先得人心，再談改變⟧。⟦b:當人被愛接納，他才有力量改變⟧。"],"deeper":{"q":"想更深？「真正的管教是『我陪你改變』、被愛接納才有力量改變」——這很美，但會不會太理想化？有些人你越是愛他、陪他、接納他，他反而越得寸進尺、把你的愛當軟弱、繼續犯錯不改。難道對這種人，也只能無止盡地「陪他、接納他」嗎？","a":"不，「我陪你改變」的愛，不是「無止盡地縱容、任人得寸進尺」——這課的下一課（156課）正要補上這個關鍵的平衡：要分辨「軟弱願悔改的人」與「剛硬不悔改的惡人」，對前者扶持挽回，對後者要用真理對付。所以要分清：⟦g:「我陪你改變」這份愛，最適切的對象，是「願意悔改、心裡仍敬畏神、只是軟弱跌倒」的人——對這樣的人，愛的接納與陪伴，正是給他力量重新站起來⟧；⟦s:但對「把你的愛當軟弱、刻意利用、持續傷害、毫無悔意」的人——「真正的愛」不是繼續無底線地縱容（那不是愛，是害他、也害己），而是「有界線、有真理的愛」：設立清楚的界線、讓他承擔後果、必要時拉開距離⟧。因為：⟦b:真正的愛，目的是「對方的益處與生命的改變」，不是「讓對方繼續沉淪、利用你」——所以對剛硬的人，設界線、執行後果、甚至嚴正對質，反而才是「更深的愛」⟧。而且「陪你改變」與「設立界線」並不矛盾：⟦g:你可以一面真心愛他、為他禱告、心門不關，一面清楚地說「這樣的行為我不能接受、必須承擔後果」——愛他的人，不等於任他傷害你⟧。神自己正是如此：祂滿有恩慈、給人一次次悔改的機會（陪你改變），但對終究剛硬不悔改的，公義的對付仍會臨到（設界線）。所以「我陪你改變」是對「願改變的人」最美的愛；對「利用愛、不肯改的人」，有界線、有真理的對付，才是真愛。接納不等於縱容，陪伴不等於沒有底線。"}},{"h":"三神的管教，是為了挽回人，而不是懲罰人","paras":["「耶和華神呼喚那人，對他說：你在哪裡？」（創3:9）⟦b:當亞當犯罪後，神的第一句話不是「你做了什麼？」，而是「你在哪裡？」⟧——這句話充滿了天父的心。神關心的不是事件，而是人與祂的關係。","接著我們看見神的作為：⟦g:應許救贖（女人的後裔，創3:15）、為他們做衣服遮羞（創3:21）⟧，甚至把他們趕出伊甸園，也是為了保護他們，不讓罪永遠存在。⟦b:神的管教是帶著愛，神的行動是為了恢復關係，神的心意是要得回人⟧。","「神所懲治的人是有福的！」（伯5:17）⟦g:謙卑接受管教 → 得恩典⟧；⟦s:拒絕管教 → 落在驕傲⟧。⟦b:神的管教，不是要打倒我們，而是要恢復我們，使我們成為得勝者⟧。"],"pq":"紀律若沒有愛，會傷人；紀律若在愛中，會救人。","deeper":{"q":"想更深？「管教是陪你改變、是為了挽回」聽起來很溫暖，但這會不會變成沒有原則、太軟弱？面對一個一犯再犯的人（孩子、同工），總不能永遠只是溫柔陪伴、不設界線、不讓他承擔後果吧？","a":"這是一個很重要的平衡問題，因為「以愛為中心的管教」若被誤解成「沒有原則、無限縱容、不設界線」，那就走偏了，也不是聖經的意思。要分辨清楚，關鍵在於看見：真正的愛，本身就包含「界線」和「後果」，而「挽回的目標」與「設立界線」非但不衝突，後者常常正是前者的途徑。先打破一個誤解：「以愛為中心」不等於「沒有原則」。看神自己——祂是愛的源頭，祂的管教是為了挽回，但祂的管教絕不是沒有原則、沒有後果的。神愛亞當，但亞當犯罪後，神仍讓他承擔了後果（被趕出伊甸園、勞苦耕地）；神愛以色列民，但他們悖逆時，神仍管教他們、讓他們嘗到悖逆的苦果。神的愛，從來不是「無論你做什麼都沒關係、都不必承擔後果」的溺愛，而是「即使讓你承擔後果、即使設立界線，背後的動機和目標，始終是要挽回你、得回你」的真愛。所以分辨的重點，不在於「有沒有界線和後果」(該有的還是要有)，而在於「設立界線、讓人承擔後果的『動機和目標』是什麼」。這就帶出兩種看似都在「管教」、骨子裡卻完全不同的東西。第一種是「以懲罰為目標」:設立界線、施加後果，是為了「報復、發洩、控制、讓他付出代價」——它的眼睛盯著「罪、盯著事」，目標是「擺平問題、出一口氣」，過程中傳遞的訊息是「你很糟、我要懲罰你、我否定你」。這種「管教」即使有界線，也只會把人越推越遠。第二種是「以挽回為目標」:設立界線、讓人承擔後果，是為了「幫助他、喚醒他、保護他、把他帶回正路」——它的眼睛盯著「人、盯著關係」，目標是「得回這個人」，過程中傳遞的訊息是「我愛你、正因為我愛你，我不能看著你繼續這樣下去傷害自己，所以我要設這個界線、讓你承擔這個後果，而且我會陪你一起面對改變」。看出來了嗎?同樣是「設界線、讓他承擔後果」，以挽回為目標的管教，恰恰可能「需要」界線和後果——因為對一個一犯再犯的人，一味沒有界線的「溫柔」，反而是害他、是縱容，讓他在錯誤裡越陷越深。真正愛他、真正想挽回他，有時「必須」設立界線、「必須」讓他承擔自然的後果，因為這些界線和後果，正是神用來「喚醒」他、讓他「回頭」的工具(浪子是在嘗到了悖逆的苦果、餓到要吃豬食時，才醒悟過來、決定回家的——父親愛他，卻也尊重他的選擇、讓他去經歷那後果)。所以「以愛、以挽回為中心」非但不軟弱、不無原則，反而需要更深的愛和智慧——因為它要拿捏的，不是「要不要設界線」，而是「在愛中、為了挽回，設怎樣的界線」。它和「縱容」的差別是:縱容是「不敢設界線、怕衝突、怕對方不高興，於是放任」(這其實是一種自私的軟弱，顧的是自己的舒服，不是對方的益處);而以挽回為中心的管教，是「忍痛設立界線、讓他承擔後果，因為真愛他、為他長遠的益處著想」(這是捨己的剛強)。所以面對一個一犯再犯的人，正確的態度不是「永遠只溫柔陪伴、不設界線」(那是縱容)，也不是「冷酷地懲罰、讓他承擔後果就丟下他」(那是定罪);而是:帶著「我愛你、我要得回你」的心，設立該設的界線、讓他承擔該承擔的後果，同時讓他知道「我設這界線不是要否定你、丟棄你，而是因為我不放棄你、我陪你一起面對改變」。界線中有愛，後果中有挽回的盼望——這才是天父的管教。下一課還會更進一步幫助我們分辨:對「軟弱卻願意悔改的人」和「剛硬不肯回頭的人」，愛的回應方式是不同的。所以，真正以愛為中心的管教，不是沒有原則的軟弱，而是「在堅定的界線裡，始終懷著挽回的愛」——既不縱容，也不定罪，剛柔並濟，只為得回那個人。"}}],"focus":"當我管教、糾正一個人時，\n我設立的界線與後果，\n是為了「懲罰、出一口氣、控制」，\n還是為了「挽回他、把他帶回正路」？","hope":{"t":"✺ 界線中有愛，後果中有挽回的盼望","paras":["面對一個一犯再犯的人，我們常在兩難中：嚴厲怕傷了關係、推遠了人，溫柔又怕變成縱容、害了他。這一課指出第三條路：⟦b:真正以愛為中心的管教，不是沒有原則的軟弱，而是「在堅定的界線裡，始終懷著挽回的愛」。⟧","神愛亞當，卻仍讓他承擔後果——⟦g:真愛包含界線；分別不在「有沒有界線」，而在「設界線的動機」：是為了懲罰、控制，還是為了喚醒、挽回、把他帶回正路⟧。縱容是怕衝突的軟弱，挽回是忍痛的剛強。所以可以設立該設的界線、讓他承擔該承擔的後果，同時讓他知道：「我設這界線，不是要丟棄你，而是因為我不放棄你、我陪你面對改變。」既不縱容，也不定罪，只為得回那個人。"]},"still":"此刻安靜——\n神在我犯錯、軟弱、躲藏時，\n對我說的不是「你做了什麼」，\n而是溫柔地問「你在哪裡」——\n我願意回應這份挽回的愛嗎？","still_hint":"不必逃避、不必合理化。\n安靜一分鐘，\n回應那位尋找你的天父：\n「主啊，我在這裡，我願意被祢挽回、被祢改變。」","steps":[{"act":"用「關係優先」看待錯誤：別人犯錯時，不第一時間想「怎麼處理」，而先問——我怎麼幫他回到正確的關係、感受到被接納？","meta":""},{"act":"操練「我陪你改變」的態度：不只要求對方改變，而是用行動表達——我願意陪你走這段路，我不放棄你。","meta":""},{"act":"謙卑接受神的管教：當神光照、責備你時，不逃避、不合理化，禱告——「主，我願意被祢改變，幫助我回轉。」","meta":""}],"declare":"主耶穌，我宣告：\n我不再用人的方式對待錯誤，我要用祢的心來看人。\n我選擇關係重於事情，選擇用愛帶出改變。\n設界線時，我要懷著挽回的愛，不為懲罰、不為控制。\n我也願意謙卑接受祢的管教，\n讓我的生命被祢更新、被祢塑造，\n成為能恢復人、帶出生命的人。\n奉主耶穌的名，阿們。","share":[{"tag":"領受","q":"「神的第一句不是『你做了什麼』，而是『你在哪裡』。」這句話，讓你看見天父怎樣的心?"},{"tag":"省察","q":"「界線中有愛 vs 沒有原則的縱容 / 冷酷的懲罰」——你管教人時，比較容易偏向哪一邊?"},{"tag":"同行","q":"「我陪你改變。」你身邊有沒有一個正在犯錯、軟弱的人?這週你願意怎樣用「挽回的愛」對待他?與小家一起求智慧。"}],"next":"丟繩子，不丟石頭","prog":"90"},{"n":156,"unit":"第九單元 · 關係——重整生命的次序","title":"丟繩子，\n不丟石頭","no":"156","greet":"願你來到主的面前，得享安息","verse":"弟兄們，若有人偶然被過犯所勝，你們屬靈的人就當用溫柔的心把他挽回過來。","verse_ref":"加拉太書 6:1","bigidea":"本課核心：當人跌倒時，最顯出生命真實狀態的，是我們怎麼回應——丟石頭（定罪），還是丟繩子（挽回）。神的心：恨惡罪，卻愛罪人。要分辨軟弱的人（願悔改，當扶持饒恕）與惡人（不怕神、不悔改，當對付）。建立關係不等於縱容罪——真正的愛不是縱容，是為了拯救。不丟石頭，只丟繩子。","lead":"這是第九單元的最後一課。當人跌倒時，最能顯出我們生命真實狀態的，不是我們說了什麼，而是我們「怎麼回應」——是丟石頭，還是丟繩子？是定罪，還是挽回？當次序對了，我們就會用愛挽回人。這一課，神要帶我們學會用神的心，面對跌倒中的人。","sections":[{"h":"一神的心：恨惡罪，卻愛罪人","paras":["「惟有基督在我們還作罪人的時候為我們死，神的愛就在此向我們顯明了。」（羅5:8）⟦b:神對罪的態度是清楚的——祂恨惡罪；但神對人的態度更清楚——祂愛罪人⟧。「他沒有按我們的罪過待我們。」（詩103:10）","這就是福音的核心：⟦g:神不是先要求你改變才愛你，神是在你還軟弱時就愛你⟧。「你們屬靈的人，就當用溫柔的心把他挽回過來。」（加6:1）屬神的人也應如此——不用石頭打人，用溫柔挽回人。","⟦g:無己 → 才能愛人⟧；⟦s:有己 → 容易定罪⟧。⟦b:當人裡面充滿自己，就會論斷；當人裡面充滿基督，就會憐憫⟧。"],"deeper":{"q":"想更深？「恨惡罪、卻愛罪人」——這句話常被引用，但實際上「罪」和「人」真的能這樣切割嗎？罪不是抽象的，是「那個人」做出來的；當有人持續、刻意地作惡傷人，要一邊恨他的惡、一邊愛他這個人，會不會只是一句說起來漂亮、做起來不可能的口號？","a":"你的質疑很真實——「恨惡罪、愛罪人」確實常被輕率地當口號，而真要活出來，極不容易，甚至靠人自己根本做不到。但它不是空話，理由在於：⟦b:這正是「神自己對我們」所做的，也是神的生命才能活出來的⟧。先說它「能成立」的根據：⟦g:人「不等於」他的罪——一個人是神按祂形像所造、有永恆價值的；罪是「附在他身上、扭曲他、毀壞他、也轄制他」的東西⟧；所以恨那毀壞人的罪、卻仍看重那被罪轄制的人，在邏輯上是可分的（就像你可以恨那啃噬至親的癌症、卻深愛那病人）。但你說得對：當有人「持續、刻意」作惡，要做到這分辨，⟦s:靠人的血氣確實不可能——這正是這課說的「無己才能愛人，有己只會定罪」⟧；它「不是人的能力，是神的生命」：唯有當基督的生命在我裡面，我才可能一面「不縱容、嚴正對待他的惡」（恨惡罪），一面「仍不放棄這個人、為他靈魂的得救禱告、心門不對他永遠關上」（愛罪人）。而且要誠實：⟦b:「愛罪人」不等於「沒有感覺、不會憤怒、要繼續被他傷害」——你可以對他的惡有義怒、可以設界線保護自己與他人、可以讓他承擔後果，這些與「不咒詛他的靈魂、仍盼望他悔改」可以並存⟧。所以這不是漂亮的口號，而是「我自己做不到、但讓基督在我裡面活就漸漸可能」的恩典——它的記號不是「沒有界線地容忍」，而是「即使對付他的惡，心底仍不咒詛這個人、仍把他交給能拯救的神」。連十字架上的耶穌，都能對釘祂的人說「父啊，赦免他們」——那不是人的能力，是神的生命。"}},{"h":"二分辨：軟弱的人 vs 惡人","paras":["「耶和華扶持謙卑人，將惡人傾覆於地。」（詩147:6）⟦g:神的愛是完全的，但神的原則也是清楚的⟧。聖經讓我們看見兩種不同的人。⟦g:軟弱的人——會跌倒，但願意悔改，心裡仍敬畏神⟧。「我們若認自己的罪，神是信實的、是公義的，必要赦免我們。」（約壹1:9）這樣的人，神的回應是扶持、饒恕、挽回。","⟦s:惡人——心中不怕神，持續傷害人，不願悔改⟧。「神阻擋驕傲的人，賜恩給謙卑的人。」（雅4:6）這樣的人，神的回應是阻擋、對付。⟦g:謙卑 → 得恩典⟧；⟦s:驕傲 → 被阻擋⟧。","因此，在紀律中我們需要屬靈的分辨：⟦g:對軟弱的人，用愛扶持；對剛硬的人，用真理對付⟧。⟦b:這不是沒有愛，而是更深的愛⟧。"],"deeper":{"q":"想更深？這是整個關係單元的收尾——要分辨「軟弱的人」與「惡人」，對前者扶持、對後者對付。但人心難測，我怎麼分得清誰是「會悔改的軟弱者」、誰是「不悔改的惡人」？萬一判斷錯了，把軟弱者當惡人棄絕、或把惡人當軟弱者縱容，豈不是害人？這分辨怎麼做才不致出錯？","a":"你問到了這份分辨最難、也最需要謙卑的地方——人心難測，我們沒有神洞察人心的能力，所以這分辨必須「謹慎、謙卑、帶著愛」，並有幾個原則幫助我們不致大錯：⟦g:一、看「果子與軌跡」，而非一兩件事或內心揣測⟧——不憑感覺斷定一個人「是惡人」，而是看「持續的模式」：他面對被指出的錯，是『願意承認、悔改、努力改變』（軟弱者的記號），還是『毫無悔意、合理化、繼續刻意傷害、把恩待當軟弱來利用』（剛硬的記號）？「憑著他們的果子，就可以認出他們來」。⟦g:二、給恩典留餘地，寧可先當「軟弱者」對待⟧——既然會看錯，就先傾向「給機會、用溫柔挽回」（加6:1），用時間和悔改與否來顯明；真悔改的會回轉，真剛硬的會在持續的模式中漸漸顯明，這比一開始就棄絕安全得多。⟦b:三、永不「棄絕這個人」，只是調整「對待的方式」⟧——分辨「軟弱 vs 剛硬」，不是為了決定「愛誰、不愛誰」（對兩者都仍要愛、都不咒詛其靈魂），而是為了決定「用哪種愛的方式」：對軟弱者用扶持挽回，對剛硬者用界線與真理對付——但「對付」仍是愛（為了止住他的惡、保護人、盼他醒悟），不是棄絕。⟦g:四、不獨自論斷，在群體與禱告中分辨⟧——正因人心難測，重大的分辨不該一個人憑己意拍板，要在禱告中求神給智慧、在信得過的屬靈群體中一起看，免得自己的情緒、偏見、傷害影響判斷。⟦g:五、最終的審判權在神，不在我⟧——我們只能按「可見的果子」謹慎回應，人心最終的光景與歸宿，交給那位察驗人心的神。所以這份分辨，不是要你變成洞察人心的審判官（那會落入論斷），而是：帶著愛與謙卑，看持續的果子，先給恩典、用溫柔挽回，在群體與禱告中智慧回應，並永遠不放棄為對方的靈魂禱告。⟦b:把「人」交給神，把「回應的智慧」向神支取——這正是整個關係單元的總結：恨惡罪、愛罪人，不丟石頭、只丟繩子；而那繩子，有時是溫柔的扶持，有時是帶界線的真理，但永遠是為了挽回，不是為了定罪⟧。"}},{"h":"三建立關係，但不縱容罪","paras":["「倘若你的弟兄得罪你，你就去……趁著只有他和你在一處的時候，指出他的錯來。」（太18:15）⟦g:耶穌給我們一個清楚的原則——先私下挽回（關係優先），再帶人同行，最後交給教會⟧，這是一條從愛出發的路。","但若對方仍然不悔改，「就看他像外邦人和稅吏一樣」，甚至「要把這樣的人交給撒但……使他的靈魂可以在主耶穌的日子得救」（林前5:5）。⟦b:真正的愛，不是縱容；真正的愛，是為了拯救⟧。","⟦b:關係優先，不等於沒有原則；愛人，不等於認同罪⟧。當次序正確：⟦g:我們用愛建立人，用真理保護群體⟧——這才是屬神的體系。撒但的工作是讓人跌倒、定罪、彼此隔離；⟦g:神的工作是扶持、挽回、建立關係⟧。⟦b:不要成為丟石頭的人，要成為丟繩子的人⟧。"],"pq":"撒但讓人跌倒、定罪、隔離；神扶持、挽回、建立關係——不丟石頭，只丟繩子。","deeper":{"q":"想更深？走完了整個第九單元（147-156）——從「上帝旨意的中心是建立關係」，到關係的次序、重整次序，如果要把這一整個單元收攏成一句話帶走，這條「建立關係」的路，在整個321的旅程裡，把我帶到了哪裡？","a":"走到第九單元的最後一課，正好把這條「建立關係」的路收攏，也看見它在整個321旅程裡的關鍵位置。先回顧這個單元走過的路：它開頭就立定一個顛覆性的根基——「上帝旨意的中心，不是做事，而是建立關係」（147-148），復興的「實際」，就是關係被恢復。接著，它給了我們關係的「正確次序」（149-152）：與神、與自己、與人、與事——這四個次序，是一條從神流出、滋潤自己、流向他人、落實於事的生命之河，次序一顛倒，生命就從根上扭曲。最後，它實際地幫我們「重整」那些被顛倒的次序（153-156）：在一切中以「建立關係」重於「解決問題」；連禱告，本質都是關係而非解決問題的工具；連管教，目標都是挽回而非懲罰；連面對跌倒的人，都要丟繩子而非丟石頭。所以若用一句話帶走整個第九單元，那就是：「神旨意的中心是關係；把生命的次序重新擺正為神、己、人、事，並在一切事上以建立關係、挽回人、得到人為念——這就是復興落地的實際。」那這條路在整個321旅程裡，把我帶到了哪裡？讓我們看見這個單元承上啟下的位置。回顧整個旅程：我們從「邁進大復興、對準耶穌」開始，學了「從心開始、觀念的改變」，進入「無己、謙卑、捨己」，再到第八單元「生命」的培養（看聽想講行）。你會發現，前面這一大段，主要是在處理「我」——我的觀念、我的己、我的生命如何被更新。這是必要的根基:因為一個還活在「有己」裡、生命還沒被培養的人，是無法建立真正健康的關係的(他的愛會變成交易、他的關係會以自我為中心)。所以，必須先有第八單元那個「被培養、活出來的無己生命」，才能有第九單元這個「流向他人的健康關係」。這正是321一再強調的次序:「先生命，再關係，後事工。」第八單元是「生命」，第九單元就是「關係」——當那個無己的、被基督充滿的生命真實地長成了，它「必然」會流溢出來，流向關係:流向與神更深的連結、與自己的和好、與人的相愛、甚至流向那些跌倒的、難愛的人。換句話說，第九單元是第八單元那個「生命」的「自然流向和證明」——一個生命真正成長的人，標記不是他懂多少、做多少，而是他「愛的能力」、他「建立關係」的生命。而這也直接通向最後一個單元(第十單元:服侍)。因為當生命流向關係、當你開始真正地愛人、得人、挽回人，這份愛「必然」會進一步流向「服侍」——服侍，就是這份愛與關係最具體、最捨己的表達。所以這條線是清楚的:無己的生命(第八單元)→ 流向關係(第九單元)→ 落實為服侍(第十單元)。第九單元把你帶到的地方，正是「從專注於『我的生命被更新』，轉向『我的生命流向他人』」的關鍵轉折。它讓你明白:321理念的終極，從來不是讓你自己變成一個屬靈的、無己的「個人」就好了——神更新你的生命，是為了讓這生命能去愛、去連結、去建立關係、去得到人、去傳承，最終建立起「屬神的體系」、神國的領域。一個只顧自己屬靈、卻不會愛人、不肯建立關係的人，還沒有真正明白321。所以，走完第九單元，你被帶到了一個美麗的轉向:你裡面那個被神一路更新、培養出來的生命，現在要學習「流出去」——流向神、流向自己、流向每一個神放在你身邊的人，在愛中建立關係，在關係中傳承生命。因為復興的實際，從來不是一個孤立的、完美的「我」，而是一張被神的愛重新連結起來的「關係的網」、一個彼此相愛、彼此挽回、彼此成全的「屬神的群體」。當許多被更新的生命，在正確的次序裡彼此相愛、連結，神的國度就在地上被建立起來了——這，就是復興的實際。接下來的第十單元，要帶我們看這份愛與關係，如何在「服侍」中，活出最深的捨己與榮耀。"}}],"focus":"面對一個跌倒的人，\n我的第一反應，\n是拿起「定罪的石頭」，\n還是遞出「挽回的繩子」？","hope":{"t":"✺ 神是丟繩子的神，你也可以是","paras":["看見別人跌倒，我們的本能常常是評斷、定罪、保持距離——而當自己跌倒時，又最害怕被人這樣對待。這一課把神的心交給我們：⟦b:撒但讓人跌倒、定罪、彼此隔離；神卻扶持、挽回、建立關係。不要做丟石頭的人，要做丟繩子的人。⟧","神在我們還作罪人的時候就為我們死——⟦g:祂恨惡罪，卻深愛罪人；祂不是先要求你改變才愛你，而是在你還軟弱時就愛你⟧。這份「先被挽回」的愛，正是你能去挽回別人的源頭。當你裡面充滿基督，你看跌倒的人，看見的就不再是「該被定罪的罪」，而是「該被挽回的人」。遞出那條繩子吧——因為神，先向你遞出了。"]},"still":"此刻安靜——\n回顧整個「關係」的單元，\n聖靈最深地光照我、\n邀請我去「丟繩子」挽回的，\n是哪一個人？","still_hint":"不必論斷，也不必勉強。\n安靜一分鐘，\n把那個人交給主：\n「主啊，給我祢的眼光與愛，讓我成為遞繩子的人。」","steps":[{"act":"操練「丟繩子」而非「丟石頭」：看見人跌倒時，不急著批評論斷，而問——我怎麼幫他站起來？用鼓勵、陪伴、禱告成為他的繩子。","meta":""},{"act":"操練屬靈分辨力：分辨對方是軟弱（願悔改）還是剛硬（持續抗拒），跟隨聖靈、用智慧回應，不用同一種方式對待所有人。","meta":""},{"act":"每一個選擇以「建立關係」為中心：在看聽想講行中問——這反應是在建立關係，還是破壞關係？選擇帶來合一、恢復、連結的。","meta":""}],"declare":"主耶穌，我宣告：\n我要用祢的心來看人，不再論斷，不再定罪。\n我要成為一個丟繩子的人，在別人跌倒時，幫助他站起來。\n求祢給我智慧分辨，也給我愛心挽回；\n因為祢在我還作罪人時就先愛了我、挽回了我。\n讓我活出關係的次序，成為帶來恢復與合一的人。\n奉主耶穌的名，阿們。","share":[{"tag":"領受","q":"走完整個「關係」的單元（與神、與己、與人、與事、重整次序），哪一課、哪一個真理，是聖靈對你說得最深的？"},{"tag":"省察","q":"「丟石頭 vs 丟繩子」——回想最近一次有人跌倒，你的第一反應是哪一個？"},{"tag":"同行","q":"一個單元的結束，是一段同行的見證。請每位家人分享：這個「關係」的單元，神在你哪一段關係（與神、與己、與人）上動了工？並彼此守望那個你要去「丟繩子」挽回的人。"}],"next":"服事，到底是什麼？","prog":"100"},{"n":157,"unit":"第十單元 · 服侍——靈悟命侍神的得勝之路","title":"服事，\n不只是做事","no":"157","greet":"願你來到主的面前，得享安息","verse":"人子來，不是要受人的服事，乃是要服事人，並且捨命，作多人的贖價。","verse_ref":"馬太福音 20:28","bigidea":"本課核心：服事不只是「在教會做事」，而是「為誰做、為什麼做」。當我們得到耶穌的生命，整個人生都成為服事——不再分屬靈與世俗，而是凡事為主而行。服事，是無己生命的自然流露。","lead":"走完了「謙卑、捨己、生命、關係」的單元，我們來到最後一個單元——服侍。很多人一聽到「服事」，想到的是在教會做事、參與事工、有職分角色。但耶穌對服事的定義，遠遠超過這些。服事不只是做什麼，而是為誰做、為什麼做。當我們真正明白服事，人生就不再分「屬靈」與「世俗」，而是整個生命都成為服事。","sections":[{"h":"一服事的本質：活出耶穌的生命","paras":["「人子來，不是要受人的服事，乃是要服事人，並且捨命，作多人的贖價。」（太20:28）⟦b:耶穌來到世上，不是為自己，而是為人——祂的生命，就是服事；祂的生活，就是給出去⟧。因此服事不是一份「工作」，而是一個「生命的流露」。","「他就設立十二個人，要他們常和自己同在，也要差他們去傳道。」（可3:14）⟦g:門徒先「與主同在」，才「被差出去服事」⟧。當我們得到耶穌的生命，不再以自己為中心，開始為神、為人而活，這就是服事的開始。","⟦g:生命 → 關係 → 事工⟧。⟦b:沒有生命，就沒有真正的服事；沒有與主的關係，就沒有服事的能力⟧。次序對了，服事就從「我撐著做」變成「從生命流出來」。"],"deeper":{"q":"想更深？我已經在教會做了很多事——招待、詩班、行政、開車接送……這些「不算」服事嗎？為什麼要把服事講得這麼「生命」、這麼複雜？","a":"這是一個很實際、也很重要的問題。先說清楚：你所做的招待、詩班、行政、接送，每一樣都「可以」是極寶貴的服事——這一課完全沒有要否定它們。它要更新的，不是你「做的事」，而是你「做事的根」。同一件「開車接送」，可以是兩種完全不同的東西：一種是「我在教會做一件事」——是任務、是責任、是排班表上的一格，做久了會累、會比較、會問「為什麼又是我」；另一種是「我為主、為這個人，活出耶穌服事人的生命」——同樣是開車，裡面卻是基督的愛在流動，是與主同工。外面看一模一樣，裡面卻天差地別。為什麼要講得這麼「生命」？因為耶穌對服事下的定義（太20:28）從來不是「做了多少事」，而是「祂整個生命為人傾倒」。如果服事只是「做事」，那它遲早會變成重擔——你會發現自己越服事越乾、越做越想放棄，因為「事」是會做完、會排不完、會讓人累的。但若服事是「生命的流露」，它就會像活水一樣，越流越有。這正是321的次序：「先生命、再關係、後事工。」不是要你停下手上的事去追求一個玄妙的「生命」，而是要你把那同一件事的「源頭」接回耶穌——讓它從「我在做」變成「基督在我裡面做」。所以你做的事一點都不白費，神反而要把它們「升級」：從一份工作，升級成一個生命的見證；從你撐著做，升級成主帶著你做。當源頭對了，你會驚訝地發現——原來同樣的事，可以這麼輕省、這麼喜樂。"}},{"h":"二服事的核心：為主而做，不為自己","paras":["「凡為我名接待一個像這小孩子的，就是接待我。」（可9:37）⟦b:服事的關鍵，不在事情大小，而在是否「為主的名」⟧。一個看似微小的行動——接待一個孩子、給人一杯水、關心一個人——若是為主做的，就是服事主。","「這些事你們既做在我這弟兄中一個最小的身上，就是做在我身上了。」（太25:40）⟦g:這顛覆了我們的觀念——服事不只是講台，服事是生活⟧。","⟦g:為耶穌（Jesus）、為別人（Others）、不為自己（You）⟧——這就是「無己」的生命。⟦s:當人服事是為了被看見、被肯定、被需要，就仍在「有己」裡⟧；⟦b:當人不再為自己，就開始真正進入服事⟧。"],"deeper":{"q":"想更深？「不為自己」聽起來很高，但說實話，我服事時心裡多少會希望被看見、被肯定。這樣是不是就「不純」、不蒙神悅納了？我該怎麼辦？","a":"先給你一個釋放：「希望被看見、被肯定」是人非常真實、非常普遍的渴望，它不是十惡不赦的罪，而是一個「還沒被滿足、所以向人討」的心。神不是要你假裝沒有這個渴望、不是要你用力把它壓下去（那只會更累、更假），祂是要從根上「滿足」這個渴望——讓你在祂裡面先被看見、先被愛、先被肯定，於是你不再需要從服事、從人的掌聲裡去討。這就是「無己」真正的意思：無己不是「沒有自己、貶低自己」，而是「自己這個無底洞，已經被基督的愛填滿了」，所以你不必再抓。所以該怎麼辦？不是審判自己「我好不純」，而是把這個渴望「帶到主面前」說：「主啊，我發現我又在討人的肯定了，求祢來滿足我，讓我知道在祢眼中我已經是被愛、被悅納的。」這個「看見—承認—交給主」的動作，本身就是在操練無己。還有一個很實際的角度：不要因為「動機還不夠純」就不服事——若要等動機百分之百純了才服事，沒有人能服事。神的方式恰恰相反——祂讓你「在服事中」被對付、被煉淨。你會發現，正是一次次的服事，把你裡面那個「想被看見的己」一層層照出來、一次次交給主，你的動機才漸漸被煉純。所以動機不純不是停下來的理由，而是繼續走、讓主繼續煉的邀請。焦點慢慢從「我有沒有被看見」轉向「耶穌有沒有被看見」——這一轉，服事就從重擔變成了享受。"}},{"h":"三服事的範圍：整個人生都是服事","paras":["「無論做甚麼，都要為榮耀神而行。」（林前10:31）⟦g:服事不只是在教會裡，而是在生活的每一個角落⟧——在家中愛家人、包容、付出；在職場認真、誠實、正直；在生活中影響身邊每一個人。","「但聖靈降臨在你們身上，你們就必得到能力……作我的見證。」（徒1:8）⟦b:真正的服事，不只是行動，而是生命影響生命⟧——從個人，到家庭，到群體，到世界。","⟦g:無己 → 聖靈充滿；聖靈充滿 → 生命影響生命⟧。這就是復興的路。⟦b:當你的整個人生都成為服事，你就成為一個行走的見證——別人在你身上，看見的不是你，而是耶穌⟧。"],"pq":"服事，不是你做了多少，而是你為誰而做；當你為主而活，你的一切，就都成為服事。","deeper":{"q":"想更深？如果「整個人生都是服事」，那會不會把人壓得喘不過氣——連吃飯睡覺都要「為主」、隨時都在服事，這不是更累嗎？「凡事為主」到底是重擔還是釋放？","a":"這個顧慮非常真實，而答案恰恰相反：「整個人生都是服事」不是把更多的「事」壓在你身上，而是把你從「事」的捆綁裡釋放出來。我們先看清楚那個讓人喘不過氣的，到底是什麼。讓人累的，從來不是「事多」，而是「己在撐」——是那個「我要做好、我要被看見、我要證明自己」的「己」，在每件事上加上重量。當這個「己」在運作，連休息都會有罪惡感，連服事都變成表演，當然喘不過氣。但「凡事為主」要做的，是把每件事的「重量」從你肩上「拿走」，交給主。「為榮耀神而行」不是要你在每件事上「更用力」，而是讓你在每件事上「更交託」——吃飯時，是領受神的供應而感恩，不是焦慮地計算；工作時，是與主同工，不是獨自硬撐；連睡覺，都是把一天交還給神而安息，因為「祂所親愛的，必叫他安然睡覺」（詩127:2）。你看，這不是加重，是卸下。這正是321的核心：「用心靠聖靈，就開心；用腦靠自己，就煩惱。」「整個人生都是服事」若用「腦」去理解，會變成一張永遠做不完的待辦清單，當然壓垮人；但若用「心」去經歷，它其實是「整個人生都有耶穌同在」——是祂在你的家、你的工作、你的飯桌、你的睡眠裡，與你同行、替你擔當。所以這不是「我隨時都要服事神」的重擔，而是「神隨時都與我同在、為我做工」的釋放。真正活出這句話的人，不會更緊張，反而更輕省、更喜樂——因為他知道，不是他在撐起整個人生，是耶穌與他一同活出這整個人生。"}}],"focus":"我心裡的「服事」，\n還停在「在教會做的事」，\n還是已經擴大成——\n「為主而活的整個生命」？","hope":{"t":"✺ 你的一生，都可以成為一場服事","paras":["也許你曾覺得「服事」是少數有恩賜、有時間、有職分的人的事，而你只是個「做小事的人」。但這一課把耶穌的眼光交給你：⟦b:服事的關鍵不在事情大小，而在你為誰而做；一杯水、一句關心、一個微笑，若是為主，就是服事主⟧。","⟦g:你不需要等一個更大的舞台、更多的恩賜、更整齊的生命，才開始服事⟧。你今天就可以，在你所在的地方——你的家、你的工作、你遇見的每一個人身上——為主而活。當你為主而活，你的一切就都成為服事；當你活出基督，你的人生就充滿了影響力。這，就是真正的服事，也是復興最樸實的開始。"]},"still":"此刻安靜——\n求聖靈光照：\n在我的生活裡，\n有哪一件「平凡的事」，\n其實神正邀請我，\n為祂、為人重新去做？","still_hint":"不急著規劃，也不必有壓力。\n安靜一分鐘，\n把你的一天交給主：\n「主啊，讓我今天所做的一切，\n都成為服事祢、愛人的器皿。」","steps":[{"act":"操練「凡事為主而做」：今天做任何事之前，先問自己——我是為誰做這件事？我能不能為主來做？把日常生活轉化為服事。","meta":""},{"act":"操練從小事開始服事：不要等「大機會」，從一句關心、一個幫助、一個微笑開始。忠心在小事上，神就擴大你的影響力。","meta":""},{"act":"操練「無己」的服事：在服事中常常檢視——我是為自己，還是為主？是求表現，還是求榮耀神？學習放下自己，讓耶穌在裡面活。","meta":""}],"declare":"主耶穌，我宣告：\n我的生命是為了服事祢而活！\n我不再為自己，我要為祢、為人而活。\n無論做什麼，我都要為祢的名去做。\n求祢讓我活出無己的生命，\n讓我的一生，成為榮耀祢的服事。\n奉主耶穌的名，阿們。","share":[{"tag":"領受","q":"這一課把「服事」從「在教會做的事」擴大成「為主而活的整個生命」。這個更新，對你最大的衝擊或釋放是什麼？"},{"tag":"省察","q":"誠實地問自己：我的服事（或我不願服事），背後最深的動機，比較接近「為主、為人」，還是「為自己被看見、怕麻煩、覺得自己不夠」？"},{"tag":"同行","q":"這禮拜，請你刻意選一件「平凡的小事」，為主、為人重新去做（一句關心、一個幫助）。說出來，讓小家的家人陪你一起、彼此守望。"}],"next":"服事，是誰的需要？","prog":"7"},{"n":158,"unit":"第十單元 · 服侍——靈悟命侍神的得勝之路","title":"服事，\n是我的需要","no":"158","greet":"願你來到主的面前，得享安息","verse":"我們原是他的工作，在基督耶穌裡造成的，為要叫我們行善，就是神所預備叫我們行的。","verse_ref":"以弗所書 2:10","bigidea":"本課核心：服事不只是「別人的需要」，更是「我們生命的需要」。神造我們、救我們，本就是為了服事——服事是我們得救的目的，是操練與主同作王的途徑。沒有服事，人就容易落入「有己」、想被服事的生命。","lead":"很多人以為服事是因為「別人有需要、教會有需要」，所以才去服事。但若服事只是因為「外在需要」，人很快就會疲累、抱怨，甚至想放棄——因為那不是從裡面出來的動力。今天神要帶我們看見一個關鍵真理：服事，不只是別人的需要，更是我們生命的需要。當這個觀念被更新，服事就會從「勉強」變成「喜樂」。","sections":[{"h":"一服事是我們得救的目的","paras":["「我們原是他的工作，在基督耶穌裡造成的，為要叫我們行善，就是神所預備叫我們行的。」（弗2:10）⟦b:我們得救，不只是為了上天堂，更是為了活出神的心意——而這心意，就是服事⟧。在我們還沒出生以前，神就已預備好我們一生要走的路、要做的善事、要影響的人。","「把這無用的僕人丟在外面黑暗裡。」（太25:30）⟦s:不服事，不只是損失，更是失去生命的意義⟧。當人不活在服事中，就會開始以自己為中心，生命就失去方向與價值。","⟦g:人被造 → 為了神；得救 → 為了服事⟧。⟦b:服事不是得救之後「額外的加分項」，而是神救你時，就放在你生命裡的「目的」⟧。"],"deeper":{"q":"想更深？我一直以為「因信稱義」、得救是「白白的恩典」，不靠行為。那這裡說「得救是為了服事、為了行善」，會不會變成「要靠服事才能得救」？這兩者會不會矛盾？","a":"這是一個極重要、也常被混淆的問題，分清楚了會大大釋放你。關鍵在「次序」。聖經從來沒有說「靠服事得救」，而是說「得救是為了服事」——這是兩件完全不同、且不可顛倒的事。我們用同一節經文就能看清：「我們原是他的工作，在基督耶穌裡造成的（這是恩典——你是被造、被救的，完全是神白白的工作），為要叫我們行善（這是目的——救你是為了讓你能行善、能服事）。」所以服事不是「得救的條件」（放在前面，靠它換救恩），而是「得救的結果與目的」（放在後面，是救恩自然結出的果子）。打個比方：一棵蘋果樹結出蘋果，不是「為了變成蘋果樹」（它早就是了），而是「因為它本來就是蘋果樹」。同樣，我們服事、行善，不是「為了得救」（我們在基督裡早已得救了），而是「因為我們已經被救、已經被造成新人」，生命自然要流露出來。一棵真正活著的樹，必然會結果；一個真正得救的生命，必然會渴望服事、流露愛——若完全沒有、毫無動靜，反而要回頭問問：這生命真的活了嗎？這也正是321所說的「先生命、再關係、後事工」：生命（得救、被基督充滿）在先，事工（服事、行善）在後，是生命自然流出的，絕不能倒過來用事工去換生命。所以你可以完全安心：你的得救穩穩地立在恩典上，一點都不靠你的服事。而正因為你已經白白得到了這麼大的救恩，這份恩典會在你裡面化成一股渴望——「主啊，祢這樣愛我、救我，我也願意為祢、為人擺上。」這股渴望，就是服事最美、最自由的動力。"}},{"h":"二服事是操練與主同作王的途徑","paras":["「在你們中間，誰願為大，就必作你們的用人。」（可10:43）⟦s:在世界的系統裡，大的是被服事的、高的是掌權的⟧；⟦g:但在神的國度裡，大的是服事人的、高的是謙卑的⟧。「我在你們中間，如同服事人的。」（路22:27）耶穌有一切權柄，卻選擇成為僕人。","「叫你們在我國裡……坐在寶座上。」（路22:30）⟦b:這裡揭示一個極深的屬靈法則——先服事，才能掌權；先謙卑，才能得榮耀⟧。","⟦g:謙卑戰勝驕傲；無己才能與主同作王⟧。服事，其實是在預備我們的未來——預備我們的生命、我們的身份、我們在神國裡的位置。"],"deeper":{"q":"想更深？「先服事才能掌權、將來與主同作王、同坐寶座」——這聽起來會不會也是一種「為了將來的獎賞、為了得榮耀而服事」？那不還是一種包裝得很屬靈的「為自己」嗎？","a":"你抓到了一個非常細膩、也非常關鍵的點——這正是「無己」與「有己」最微妙的分界。讓我們仔細分辨。

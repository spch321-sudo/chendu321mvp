確實，如果一個人服事的「動力來源」是「我要將來坐寶座、我要得那個獎賞、我要比別人更榮耀」，那他雖然在做屬靈的事，裡面運作的卻仍是「有己」——只是把「現在的好處」換成了「將來的好處」，本質還是為自己。但聖經講「與主同作王」，要帶出的恰恰相反，是要「醫治」這個有己。怎麼說？因為神所應許的這個「掌權、作王」，它的「內容」本身就是「服事」與「捨己」——耶穌就是那位「有一切權柄、卻甘願作僕人、為人捨命」的王。所以「與主同作王」不是「將來換我被服事、被高舉、享清福」，而是「將來我與這位捨己的王，一同以祂的方式——也就是以僕人的心、以愛、以捨己——去治理、去成全、去祝福」。換句話說，神給的賞賜，不是讓你的「己」終於得逞，而是讓你「更深地、永遠地，活出無己的生命」。一個真正明白這點的人，他渴望的就不再是「寶座的尊榮」，而是「能永遠與主同心、同行、同工」——這個渴望本身，就已經是無己了。所以重點不在於「能不能想到將來的賞賜」（神自己用賞賜來吸引、鼓勵我們，這是祂的恩慈），而在於「你被什麼吸引」：你是被「我可以高過別人、終於輪到我」吸引，還是被「我能永遠與這位我所愛的主同在、同作工」吸引？前者是有己披著屬靈外衣，後者是無己被神的愛點燃。當你越愛這位主、越被祂吸引，「為自己」就會越來越淡，「為祂」就會越來越濃——這時你會發現，將來的寶座不是你服事的「目的」，與主同在才是；寶座只是這份愛自然帶來的、神額外的恩典而已。"}},{"h":"三沒有服事，就容易落入「有己」的生命","paras":["「人子來，不是要受人的服事，乃是要服事人。」（可10:45）⟦s:若一個人不願服事，他就會自然走向另一條路——想被服事、想被肯定、想被高舉，這就是「有己」的生命⟧。","⟦g:但服事，正是神給我們的操練——操練捨己、操練謙卑、操練愛人⟧。⟦g:無己 → 活出基督；有己 → 活出老我⟧。","⟦b:當人持續在服事中，自我會被對付，生命會被更新，愛會被擴大⟧。這就是為什麼——要復興，就一定要有服事；因為生命在服事中被塑造，生命在服事中影響生命。"],"pq":"服事，不是因為別人需要你，而是因為你需要服事——服事使你活出真正的自己，進入神的計畫。","deeper":{"q":"想更深？我承認自己有時候就是「不想服事、只想被照顧」。這一課說那是「有己」。但人疲憊、軟弱、需要被服事、被照顧的時候，難道是錯的嗎？什麼時候是「正當的休息」，什麼時候是「有己」？","a":"這個分辨太重要了，因為許多認真的基督徒會在這裡被「假內疚」捆綁——一想休息就覺得自己「有己」、不夠屬靈，結果把自己逼到油盡燈枯。先給你一個清楚的釋放：人需要被服事、被照顧、需要休息，這「本身完全不是罪」。耶穌自己會疲乏（約4:6），會退到曠野安靜（路5:16），會在客西馬尼向門徒求陪伴。神造人就是有限的，「歇息」是祂親自設立、親自祝福的（創2:3）。一個懂得在主裡安息、也願意被弟兄姊妹服事的人，恰恰是謙卑、是健康的——因為他承認自己有限、需要神也需要人，這正是無己的一部分（無己不是「我什麼都不需要、我一個人扛」，那其實是另一種驕傲）。那「有己」是什麼？分界不在「你有沒有休息、有沒有被照顧」，而在「你生命的『常態方向』與『心的姿態』」。試著這樣分辨：第一，看「方向」——「正當的休息」是為了「再次流出去」而領受，像呼吸一樣，吸氣是為了呼氣，休息夠了你會自然想再去愛、再去服事；而「有己」是「只進不出」成了常態——長期只想被服事、被照顧，卻從不流向別人，把所有人都當成「來滿足我」的，這個「方向」整個是朝內、朝自己的。第二，看「姿態」——休息時你心裡是「感恩、安息」（「謝謝主、謝謝弟兄姊妹照顧我」），還是「理所當然、甚至抱怨、要求更多」（「你們本來就該服事我、為什麼不多照顧我」）？前者是領受恩典的謙卑，後者就是「想被服事」的有己了。所以，當你疲憊時，請安心地休息、安心地被愛、安心地被服事——這不是有己，這是神兒女正常的呼吸。只要記得：休息是為了走更長的路，領受是為了再次給出去。當你被主和弟兄姊妹的愛重新充滿了，那股「我也想去愛、去服事」的渴望若自然回來了，就是健康的記號。真正要警醒的「有己」，是那個「永遠只想被服事、從不願流出」的長期方向——而那一天若真的來了，最好的解藥也不是責備自己，而是回到主面前，讓祂的愛先把你重新充滿。"}}],"focus":"當我「不想服事、只想被服事」時，\n我願不願意誠實面對——\n這是身心真實的疲憊需要安息，\n還是我的生命，\n正悄悄滑向「有己」？","hope":{"t":"✺ 服事，是神給你的禮物，不是派給你的工作","paras":["也許「服事」這個詞，一直讓你聯想到「責任、排班、被需要、又一件事」。但這一課要把神的心意還給你：⟦b:服事不是因為別人需要你，而是因為你需要服事⟧——它是神救你時，就放在你生命裡的目的，是讓你「活出真正的自己、進入神計畫、預備永恆榮耀」的途徑。","⟦g:神不是要從你身上「拿走」時間和力氣，祂是要透過服事，把更豐盛的生命「給」你⟧——在給出去中，你會更有愛、更謙卑、更像耶穌，也更深地經歷與主同工的喜樂。當你明白這一點，你就會從「被動服事」，進入「喜樂服事」——這就是得勝者的生命。"]},"still":"此刻安靜——\n問自己一個誠實的問題：\n我的服事，\n比較像「勉強的責任」，\n還是「喜樂的需要」？\n是什麼，讓它變成了重擔？","still_hint":"不必自責，也不必勉強。\n安靜一分鐘，\n把那份疲憊或抗拒交給主：\n「主啊，更新我對服事的眼光，\n讓我看見它是祢給我的禮物。」","steps":[{"act":"操練把服事當作「人生目的」：每天提醒自己——我今天不是為自己活，是為神、為人而活。並問：我今天可以服事誰？","meta":""},{"act":"操練在服事中學習謙卑：服事時不求被看見、不求被稱讚，學習做在暗中、甘心樂意、不計代價，讓服事成為對付驕傲的途徑。","meta":""},{"act":"操練在小事上忠心服事：不要等大平台，從幫助一個人、關心一個人、祝福一個人開始。神看重的不是大小，而是是否忠心。","meta":""}],"declare":"主耶穌，我宣告：\n服事不是負擔，是我的呼召！\n我得救，是為了服事祢，活出祢的生命。\n我要在服事中學習謙卑，在服事中操練捨己。\n求祢帶領我，讓我一生都活在服事裡，\n預備自己，將來與祢同作王。\n奉主耶穌的名，阿們。","share":[{"tag":"領受","q":"「服事不是別人的需要，是我的需要」——這個觀念的翻轉，如果真的成立，它會怎麼改變你看待自己服事（或不服事）的心情？"},{"tag":"省察","q":"回想最近一次服事讓你「疲累、抱怨、想放棄」的經驗，那背後是「為人、為事、為自己做」，還是「為主、靠主做」？"},{"tag":"同行","q":"這禮拜，請你選一個「沒有人看見的小服事」忠心地做（在暗中、不求稱讚）。說出來，讓小家的家人陪你一起、彼此守望。"}],"next":"服事，是我的祝福","prog":"13"},{"n":159,"unit":"第十單元 · 服侍——靈悟命侍神的得勝之路","title":"服事，\n是我的祝福","no":"159","greet":"願你來到主的面前，得享安息","verse":"你們既做在我這弟兄中一個最小的身上，就是做在我身上了。","verse_ref":"馬太福音 25:40","bigidea":"本課核心：服事不只是付出，更是極大的祝福與機會——它是生命成長的途徑（有進有出才會活），是投資永恆的方式（給出去的才是永遠的），更使我們成為被神使用、有價值的人（用了就被擴大，不用連有的都失去）。","lead":"當我們明白「服事是我們的需要」，生命會開始從被動轉為主動——不再是有需要才服事、被安排才服事，而是看見機會就服事，把服事當作生命的一部分。因為服事，不只是付出，更是神給我們極大的祝福與機會。今天我們要更深入看見：服事，帶來生命的成長、永恆的投資，與真正的價值。","sections":[{"h":"一服事是生命成長的途徑","paras":["生命的原則是「有進有出」——呼吸要吸氣也要呼氣，身體要吃進也要排出，⟦b:生命要領受、也要給出去；若只有「進」沒有「出」，生命就會停滯，甚至死亡⟧。屬靈生命也是一樣：只聽道不行道，屬靈就停滯；只領受不分享，屬靈就軟弱。","「原來我們不是顧念所見的，乃是顧念所不見的。」（林後4:18）⟦g:服事讓我們從「看得見的需要」，進入「看不見的生命成長」⟧。","⟦g:生命在給出去中成長；無己在服事中被塑造⟧。當你開始服事，你會驚訝地發現——⟦b:你變得更有愛、更有耐心、更像耶穌⟧。原來，最大的受益者，是你自己。"],"deeper":{"q":"想更深？「有進有出生命才會成長」聽起來很美，但實際上我常覺得「進」都還不夠（自己都還很軟弱、還沒裝備好），怎麼可能「出」？把空的杯子倒出去，不是會更空、更枯乾嗎？","a":"這是一個非常合理的擔憂，背後其實藏著一個我們都有的、卻不太準確的「屬靈經濟學」——以為生命像一個「固定大小的杯子」，倒出去就少了，所以要先存滿才能給。但屬靈生命的運作恰恰相反，它更像「肌肉」或「活水的泉源」，不是「越用越少」，而是「越用越多、越流越活」。先看主耶穌怎麼說：祂應許那喝祂活水的人，「他腹中要流出活水的江河來」（約7:38）——注意，是「江河」，是源源不絕的流出，不是一杯倒完就沒了。為什麼？因為當你服事、流出去的那一刻，你不是在「消耗你自己存量」，你是在「打開管道，讓神的供應流經你」。源頭不是你那個小杯子，源頭是神那個無限的泉源。你越流，管道越通，神就流得越多。所以「倒出去會更空」這個顧慮，是把「自己」當成了源頭——這正是「用腦靠自己」的算計（用腦就煩惱）；而「用心靠聖靈」的人會發現，自己只是個管道，越給越被充滿。再說「還沒裝備好」這件事：如果要等「進」夠了才「出」，那永遠不會有那一天——因為人永遠覺得自己不夠。神的智慧是讓你「在出的同時，繼續進」——你會發現，正是在你軟弱地、不夠地擺上那一點點的時候，你最深地經歷神的供應、最真實地被神塑造。下一課我們會更清楚看見，神最喜歡用「五餅二魚」——你拿出那看似不夠的一點點，交在祂手中，祂就讓它「有限變無限」。所以不要怕你是空的、不夠的。恰恰是那願意把空杯、把五餅二魚交出去的人，才會經歷杯子被神不斷添滿的神蹟。生命的成長，從來不是「先裝滿再給」，而是「邊給邊被充滿」——這就是無己在服事中被塑造的奧秘。"}},{"h":"二服事是投資永恆的方式","paras":["「你還要來跟從我，就必有財寶在天上。」（可10:21）⟦s:地上的一切是暫時的⟧；⟦g:天上的價值是永恆的⟧。那什麼可以存到天上？不是你擁有多少，而是你給出去多少。","「你們既做在我這弟兄中一個最小的身上，就是做在我身上了。」（太25:40）⟦b:當你幫助一個人、關心一個人、付出時間與愛，其實是在「投資天上」⟧。","⟦g:給出去的，才是永遠的；留下來的，都會過去⟧。服事，就是把地上的資源——金錢、時間、精力、愛——轉化為天上的財寶。⟦b:每一次服事，都是一次永恆的投資⟧。"],"deeper":{"q":"想更深？「投資永恆、存財寶在天上」——這個說法雖然激勵人，但會不會還是在訴諸人的「貪心」，只是把貪的對象從「地上」換成「天上」？真正成熟的服事，難道不該「什麼都不為」嗎？","a":"你問得很深，這觸及了動機最核心的地方，分清楚會讓你既不被假屬靈綁住、也不被貪心欺騙。先回應「什麼都不為才最高」這個想法：其實聖經從不要求我們「什麼都不為」——連耶穌自己「因那擺在前面的喜樂，就輕看羞辱，忍受了十字架」（來12:2），祂的捨己也是「為了」那擺在前面的喜樂（就是把我們得回來）。神造人本就有渴望、有盼望，祂不是要消滅你的渴望，而是要「導正、提升」你渴望的對象。所以重點不是「為不為」，而是「為的是什麼、那個渴望的本質是什麼」。關鍵分辨在這裡：「貪心」的核心是「為了佔有、為了自己擁有更多」——所以把貪的對象從地上換到天上，若你想的是「我要在天上累積更多『屬於我的』財富、我要比別人更有獎賞」，那確實只是換湯不換藥的有己。但聖經講的「天上的財寶」，它的「內容」恰恰是「貪心的反面」——你怎麼存財寶在天上？是藉著「給出去」（可10:21叫那少年人變賣所有的分給窮人）、藉著「愛最小的弟兄」（太25:40）。也就是說，這個「投資」的動作本身，就是「捨己、給予、愛人」；你越「投資天上」，你在地上就越鬆手、越捨己、越愛人。這跟貪心「越要越抓緊」的方向，完全相反。更深一層看：什麼是真正的「天上財寶」？最終極的天上財寶，不是金銀珠寶，而是「神自己」和「被你愛、被你帶到主面前的那些生命」。耶穌說「在天上有財寶」，緊接著是「你還要來跟從我」——真正的賞賜，是更深地得到基督、與祂同在。所以一個越來越成熟的人，他「投資永恆」的心會慢慢從「我要得獎賞」，淨化成「我捨不得把生命浪費在會朽壞的事上，我要把它投在永遠存留的——神和人身上」。這時，「投資永恆」就不再是貪心的延伸，而是愛的智慧——是一個看清了什麼會過去、什麼存到永遠的人，甘心把自己最寶貴的，獻給那永不朽壞的神和祂所愛的人。"}},{"h":"三服事使我們成為有用的人","paras":["「你這又良善又忠心的僕人……可以進來享受你主人的快樂。」（太25:21）⟦b:神給每個人不同的恩賜與資源——有五千、有兩千、有一千；重點不在多少，而在「有沒有用」⟧。用了，就有價值；不用，就變無用。","「因為凡有的，還要加給他。」（太25:29）⟦g:神的原則很清楚——越用，越多；不用，連有的都失去⟧。","很多人不服事，是覺得「我不夠好、不夠多、不夠能力」。⟦b:但神說，不在乎多少，在乎是否願意用⟧。⟦g:不用 → 無用；使用 → 被擴大⟧。當你開始用，神會加添、會擴張、會使用你，使你成為一個有影響力、有價值、被神使用的人。"],"pq":"不要再問「我為什麼要服事」，而是開始說：「主啊，給我更多服事的機會！」","deeper":{"q":"想更深？那「一千」的僕人，他不是做壞事，只是「沒拿出去用、把它埋了」，結果卻被主人嚴厲責備、奪走、丟在外面。這會不會太嚴厲了？神對「不服事」的人，真的會這麼嚴厲嗎？這讓我更不敢、更有壓力了。","a":"這個比喻確實讓很多人心裡一緊，但若讀懂主耶穌的心，你會發現它不是要「威脅、施壓」，而是要「喚醒、釋放」。我們先看那個僕人「真正的問題」出在哪。他自己說出了關鍵：「我知道你是忍心的人……我就害怕，去把你的一千銀子埋藏在地裡。」（太25:24-25）你看，他不服事的根，是「對主人的誤解」——他以為主人是「忍心、苛刻、難伺候」的，所以他「害怕」，於是用「埋起來、什麼都不做」來自保。換句話說，他的問題不是「能力不夠」（主人按才幹給他，那一千正是他能承擔的），而是「他不認識主人的良善，活在懼怕裡，所以不敢冒險去愛、去給」。主人的「嚴厲」，嚴厲的不是「他賺得不夠多」（賺兩千的和賺一萬的，得到的稱讚一模一樣！），而是「他用懼怕和誤解，把主人託付的恩典整個埋葬、浪費了」。明白這點，這比喻對你就不是壓力，而是一面照妖鏡和一個邀請。它照出的是：如果你也「不敢服事」，請誠實問問，是不是你裡面也藏著對神的某種誤解——以為神是「嚴厲的監工、總在挑剔、做不好就完了」，所以你「害怕」、乾脆什麼都不做來自保？若是這樣，神要對你說的，恰恰是「我不是那樣的主人」。真正認識神的人會發現，祂給你「一千」（你以為不多的那一點點），不是要看你表現、給你壓力，而是「信任你、邀請你」進來一同經歷祂、一同享受「主人的快樂」。所以這比喻不該讓你更不敢，而該讓你卸下懼怕——因為你的價值不在於你「賺了多少、做得多好」（那兩千和一萬一樣蒙稱讚），只在於你「願不願意，憑著對神良善的信任，把祂給你的那一點點，喜樂地拿出去用」。這正是321「用心靠聖靈、不用腦靠自己」的功課：用腦的人會像那僕人一樣「計算風險、害怕失敗、於是埋起來」（用腦就煩惱、就癱瘓）；用心的人會單純信靠主人的良善，把五餅二魚交出去（用心就開心、就被神擴大）。神對你最深的心意從來不是「責備」，而是渴望有一天對你說那句話：「好，你這又良善又忠心的僕人……可以進來享受你主人的快樂！」"}}],"focus":"神已經把「一些」放在我手中——\n一點時間、一點恩賜、一點愛。\n我是把它「拿出去用」，\n還是因著害怕或自覺不夠，\n把它「埋起來」了？","hope":{"t":"✺ 你手中的「一點點」，在神手中能成為祝福","paras":["也許你常覺得自己「不夠」——不夠有恩賜、不夠有時間、不夠成熟，所以遲遲不敢服事。但這一課把神的眼光交給你：⟦b:神不在乎你有多少，只在乎你願不願意把所有的拿出來用⟧。那拿五餅二魚的孩子，獻上的也只是「不夠」的一點點，卻在主手中餵飽了五千人。","⟦g:服事不是「先變得夠好」才開始，而是「在服事中」被神擴大、被神塑造、成為有用的人⟧。當你願意把手中的一點點交出去，你會經歷生命在給予中成長、資源在投資永恆中加倍、自己在被神使用中找到真正的價值。原來，服事從來不是你給神，而是神藉著服事，把更豐盛的生命給你。"]},"still":"此刻安靜——\n看看自己手中，\n神已經給了我什麼「一千」？\n（一份恩賜、一段時間、\n一個影響力、一份愛）\n我把它埋起來了嗎？","still_hint":"不必焦慮，也不必比較。\n安靜一分鐘，\n把手中的「一點點」交給主：\n「主啊，我願意拿出來，\n求祢使用它，也擴大它。」","steps":[{"act":"操練讓生命「有進有出」：每天不只領受，也要給出去——聽了一篇信息，分享給一個人；得了一份恩典，成為別人的祝福。讓生命持續流動。","meta":""},{"act":"操練用服事投資永恆：每天問——今天我可以為誰付出？怎麼投資天上？把時間、資源、愛，轉化為永恆的價值。","meta":""},{"act":"操練使用神給你的一切：不要小看自己——一句話、一個關心、一點時間都能被神使用。開始用，你就會發現神不斷加添你。","meta":""}],"declare":"主耶穌，我宣告：\n服事是我的機會，不是負擔！\n我要讓生命流動，不再只領受，也願意給出去。\n我要用祢給我的一切來服事，投資在永恆裡。\n我相信，當我願意使用，\n祢就要加添，使我成為有用的人。\n奉主耶穌的名，阿們。","share":[{"tag":"領受","q":"「給出去的才是永遠的，留下來的都會過去」——這句話如果真的進到你心裡，會怎麼改變你對「時間、金錢、恩賜」的使用？"},{"tag":"省察","q":"誠實面對：你手中是否有一個「被埋起來的一千」（一份你一直不敢、不願拿出來用的恩賜或資源）？是什麼攔阻了你？"},{"tag":"同行","q":"這禮拜，請你刻意把手中的「一點點」拿出去用一次（分享一個領受、付出一段時間）。說出來，讓小家的家人陪你一起、彼此守望。"}],"next":"誰能服事？","prog":"20"},{"n":160,"unit":"第十單元 · 服侍——靈悟命侍神的得勝之路","title":"願意的人，\n都能服事","no":"160","greet":"願你來到主的面前，得享安息","verse":"我今日成了何等人，是蒙神的恩才成的，並且他所賜我的恩不是徒然的。","verse_ref":"哥林多前書 15:10","bigidea":"本課核心：誰能服事？不是最有能力、最有時間、最有恩賜的人，而是「願意的人」。不是裝備好才服事，而是在服事中被裝備；不是有恩賜才服事，而是在服事中經歷神的供應；服事是恩典，不是負擔。","lead":"當我們明白「服事是我們的需要、也是我們的祝福」，接下來一個很實際的問題就是：誰能服事？很多人會說「我還不夠好、我沒有恩賜、我沒有時間」。但神的答案卻非常簡單——願意的人，都能服事。問題從來不是「能不能」，而是「願不願」。","sections":[{"h":"一不是裝備好才服事，而是在服事中被裝備","paras":["很多人不敢服事，是覺得「我還沒準備好、還不夠成熟」。⟦b:但屬靈的原則剛好相反——不是先會才做，而是先做才會⟧。就像學騎腳踏車，不是聽懂才會，是騎上去才學會。","「各樣美善的恩賜……都是從上頭來的。」（雅1:17）⟦g:神不是等你完全了才用你，而是在使用中塑造你⟧。","⟦g:用心踏出第一步，聖靈就開始工作⟧。當你願意開始，會跌倒，但會學會；會不完全，但會成長。⟦b:服事本身，就是最好的裝備⟧。"],"deeper":{"q":"想更深？「先做才會、在服事中被裝備」——但如果我還沒裝備好就去服事，萬一做錯了、誤導了別人、甚至絆倒了人，那不是害人嗎？難道不該先學好、先準備充足，才負責任地去服事？","a":"這是一個出於「責任心」的好問題，這份謹慎是寶貴的，神不會輕看。但讓我們把它放在正確的位置，免得「責任心」被「懼怕」綁架，變成永遠不敢踏出的藉口。先釐清：「在服事中被裝備」絕不等於「莽撞、無知、自把自為地亂做」。聖經從不鼓勵不負責任。真正健康的「先做」，是有三重保護的：第一是「在順服與遮蓋之下做」——不是你一個人自己衝出去，而是在屬靈的帶領、團隊、教會的遮蓋與陪伴中開始（這正是後面要學的「帶－陪－放」：先有人「帶」你、「陪」你，你不是孤軍奮戰）。第二是「從小處、從你能承擔的開始」——神「按著各人的才幹」給託付（太25:15），祂不會把你扛不起的擔子壓給你；你從關心一個人、做一件小事開始，就算不完美，傷害也極其有限，而學習卻是真實的。第三是「邊做邊學、保持謙卑受教」——「先做才會」不是「做了就不用學」，而是「在做中學得更快、更真」。那麼「怕害人、怕誤導」呢？這個顧慮要分兩面看。一面是健康的提醒：是的，要謙卑、要受教、要在遮蓋下、不要不懂裝懂、不確定就誠實說「我需要再求問、再學習」——這是負責任。但另一面，要小心這個「怕」若被放大，會變成那個「把一千埋起來的僕人」的翻版——「我怕做不好，所以乾脆不做」。請想想：若每個人都要等「完全裝備好、絕不會出錯」才肯服事，那教會裡就沒有人能服事了，因為沒有人是完美的，連最成熟的同工都還在被神對付、還會犯錯。神國度的真相是：祂一直都是用「不完全的人」在成全祂的工——彼得三次不認主，後來卻牧養群羊；門徒們又軟弱又常常誤解主，主仍差派他們去。神的能力，「是在人的軟弱上顯得完全」（林後12:9）。所以最負責任的態度，不是「等我夠好了才服事」（那一天永遠不會來，而且背後常是怕失敗的有己在自保），而是「我謙卑地、在遮蓋下、從小處開始擺上，邊做邊讓神塑造我，並且一旦發現錯了就誠實認、趕快修正」。這正是321的功課：用腦靠自己的人，會被「萬一做錯」的計算癱瘓（用腦就煩惱）；用心靠聖靈的人，會帶著謙卑與信靠踏出第一步，相信那位呼召你的，必親自裝備你、也必在你軟弱不足之處親自補滿、保護祂的群羊。"}},{"h":"二不是有恩賜才服事，而是在服事中經歷神的供應","paras":["「因為他說有，就有，命立，就立。」（詩33:9）⟦g:神是創造的神——能使無變有、少變多⟧。當年五個餅、兩條魚，看起來完全不夠（太14:17-21）；但當門徒願意交給耶穌，⟦b:不夠變充足，有限變無限⟧。","⟦g:交在主手中，有限變無限⟧。很多人限制自己說「這不是我的恩賜、我做不到」；⟦b:但神說：你先願意，我來供應⟧。","這不代表什麼都要勉強做，而是不要「限制神的作為」。⟦g:當有需要時，神會加給你能力，神會擴張你的恩賜⟧。"],"deeper":{"q":"想更深？「不是有恩賜才服事」——可是聖經明明說神給人「不同的恩賜」，也要我們「按所得的恩賜彼此服事」。那「恩賜」到底重不重要？我該不該先去尋找、確認自己的恩賜，還是不管恩賜、什麼都做？","a":"這是一個很好的平衡問題，答案是：恩賜很重要，但「順序」更重要——別讓「尋找恩賜」反而成了「不服事的藉口」。我們分三層來看，就清楚了。第一層，恩賜確實重要、確實真實。聖經清楚教導，聖靈「隨己意分給各人」不同的恩賜（林前12:11），為要叫身體各盡其職、彼此配搭、共同建造（弗4:12）。所以恩賜不是可有可無，神也樂意你認識、發展、善用祂給你的恩賜——一個按恩賜服事的人，會更合適、更有果效、也更省力。第二層，但「發現恩賜」的方式，主要是「在服事中」，而不是「在服事前」。很多人卡住，是以為要先「靜下來想清楚我的恩賜是什麼」，確認了才敢動——結果想了好幾年還在原地。實際上，恩賜往往是「做出來、被印證出來」的：你去嘗試、去擺上，過程中你會發現「咦，做這個我特別有負擔、有果效、別人也被建造」，那就是恩賜浮現的地方；也會發現「這個我做起來特別吃力、沒果效」，那就幫你排除。所以服事不是「等你找到恩賜」的結果，反而是「你找到恩賜」的途徑。先願意動，恩賜才會在動中被照亮。第三層，也是最關鍵的：恩賜是「工具」，不是「源頭」；「願意的心」和「聖靈」才是源頭。保羅那麼有恩賜，卻說「我今日成了何等人，是蒙神的恩才成的」（林前15:10）——他把一切歸給「恩」，不是歸給自己的恩賜。為什麼這很重要？因為若把焦點放在「我有沒有恩賜、我恩賜夠不夠強」，人很容易落入兩個陷阱：有恩賜的，會驕傲、會靠自己（有己）；自覺沒恩賜的，會自卑、會退縮（也是另一種把焦點放在自己的有己）。但若焦點對準「神的恩、神的供應」，這兩個都被醫治了——有恩賜的知道是恩典、不敢誇口；自覺不足的知道神會供應、不必害怕。這正是五餅二魚的功課：那一點點若停在「我手裡」（看自己的恩賜夠不夠），永遠不夠；一旦「交在主手中」，有限就變無限。所以結論是：去服事、在服事中發現並發展你的恩賜，這很好、也該做；但永遠記得——讓你能服事的，最終不是你的恩賜，而是神的恩。先有願意的心，把恩賜（無論大小）交在主手中，祂就供應、就擴張。把焦點對準供應的主，而不是對準自己的恩賜——這樣，有恩賜時你不驕傲，恩賜不足時你也不退縮。"}},{"h":"三不是沒有時間，而是服事本是恩典","paras":["很多人說「我沒有時間服事」；但事實上，不是沒有時間，是沒有「優先次序」。⟦b:當一件事對你夠重要，你一定會挪出時間⟧——就像再忙的人，也會陪他最重要的人。⟦g:焦點在哪裡，時間就在哪裡⟧。「無論做甚麼，都要為榮耀神而行。」（林前10:31）","「我今日成了何等人，是蒙神的恩才成的。」（林前15:10）⟦b:保羅清楚知道，一切都是恩典——連服事的能力，也是神給的⟧。因此沒有可誇的，只有感恩。","⟦g:不是我能，乃是主能⟧。當我們明白服事是恩典，就不會比較、不會埋怨、不會懶惰，反而會感恩、珍惜、把握機會——⟦g:因為能服事，本身就是祝福⟧。"],"pq":"誰能服事？不是最有能力、最有時間、最有恩賜的人，而是——願意的人。當你願意，神就動工。","deeper":{"q":"想更深？「不是沒時間，是沒把神放第一」——這話聽起來有點不近人情。我真的很忙啊，工作、家庭、孩子都需要我，已經分身乏術了。難道把時間用在工作和家庭上，就是「沒把神放第一」、就是不夠愛神嗎？","a":"這個澄清太重要了，因為這句話若被誤解，會讓認真生活的人背上不必要的內疚，甚至為了「服事」而虧待了家庭和本分——那絕不是神的心意。讓我們把它說清楚、說得有恩典。首先要打破一個錯誤的二分法：「神 vs 工作家庭」並不是對立的兩邊。「把神放第一」不等於「把教會的服事排在工作家庭前面」，更不是要你蹺班、疏忽孩子去做教會的事。恰恰相反——好好工作、誠實正直，是服事；用心愛家人、陪伴孩子、照顧配偶，更是極重要、極蒙神喜悅的服事（聖經說「人若不看顧親屬，就是背了真道」提前5:8）。所以你把時間「用在工作和家庭上」，這本身很可能正是「把神放第一」的具體活出，一點都不虧欠神。那這句話真正要對付的是什麼？它要對付的，不是「你忙」這個事實，而是「忙」背後可能藏著的兩件事。第一，是「優先次序的真相」——這句話其實是一面誠實的鏡子：人總會為「真正在乎的」騰出時間。所以它不是要定你「沒時間」的罪，而是溫柔地問你：當你說「沒時間親近神、沒時間在任何意義上回應神」，那會不會其實是神在你心中的「位置」需要被重新檢視？不是要你「再擠出時間做更多事」，而是要你「讓神成為那個貫穿一切的中心」——讓祂進到你的工作裡（為祂而做）、進到你的家庭裡（用祂的愛去愛），這樣你不是「多做一件叫服事的事」，而是「整個忙碌的人生都有了神、都成了服事」。這正是這一課第三段的重點：「服事不是多做一件事，而是用神的心做每一件事。」第二，它要對付的是那個常見的、把「忙」當擋箭牌的「自我中心」——有些人是真的把神和服事放在心上，只是在學習平衡；但也有些人是用「我很忙」來合理化「我不想被神打擾、不想擺上、只想照自己的方式過日子」。這句話像一根刺，是要溫柔地刺破後者那層自我保護，而不是論斷前者的辛勞。所以，給你三句話帶走：第一，好好工作、用心愛家，這本身就是服事，是把神放第一的活出，請放下不必要的內疚。第二，「把神放第一」的核心不是「為神多做事」，而是「讓神成為你忙碌人生的中心與源頭」——在每件事裡有祂、為祂而做。第三，誠實地、但帶著恩典地問自己：我的「沒時間」，是真實的生命季節限制（那神完全體諒，祂知道你的軟弱、也知道你所在的季節），還是有時候，「忙」也成了我推開神、不想擺上的藉口？把這個問題輕輕交給神，讓祂自己來光照、來調整——不靠你用腦去焦慮地排程（用腦就煩惱），而是用心讓聖靈帶你，找到那個有神在中心、也照顧好本分的、有平安的次序（用心就開心）。"}}],"focus":"我說「我不能服事」的時候，\n真正攔阻我的，\n是「能力、時間、恩賜」的不足，\n還是其實是——\n害怕、自我設限、或不夠願意？","hope":{"t":"✺ 你不需要「夠好」，只需要「願意」","paras":["也許你心裡有一長串「我不能服事」的理由——不夠成熟、沒有恩賜、沒有時間。但這一課要溫柔地拿走這些重擔：⟦b:攔阻你服事的，從來不是能力，而是害怕、自我設限、和自我中心⟧。神要的不是你的「足夠」，而是你的「願意」。","⟦g:當你願意踏出第一步，聖靈就開始工作；當你把五餅二魚交出去，神就讓有限變無限⟧。你不是源頭，神才是；不是你能，乃是主能。所以放下那些「我不夠」的審判吧——能服事，本身就是神給你的恩典。當你願意，神就動工；當你踏出，神就加添。這就是恩典中的服事人生。"]},"still":"此刻安靜——\n把我那句「我不能……」\n（不夠好／沒時間／沒恩賜）\n誠實地說給主聽，\n然後問祂：\n「主，這是真的，還是我的害怕？」","still_hint":"不必勉強，也不必有壓力。\n安靜一分鐘，\n把「願意的心」獻給主：\n「主啊，我願意——\n求祢來裝備我、供應我、使用我。」","steps":[{"act":"操練跨出第一步：不要等準備好才開始，今天就做一件小小的服事、幫助一個人，讓行動帶來成長。","meta":""},{"act":"操練把有限交給神：把你所擁有的時間、能力、資源，交在神手中，讓神來使用與擴大——像獻上五餅二魚。","meta":""},{"act":"操練調整優先次序：檢視生活，神是否在第一位？刻意安排時間親近神、服事人，讓生命回到正確次序。","meta":""}],"declare":"主耶穌，我宣告：\n我願意被祢使用！\n我不再看自己的不足，我要相信祢的供應。\n我願意踏出信心的第一步，把我所有的交在祢手中。\n謝謝祢給我服事的恩典，\n我要一生忠心服事祢，活出祢的榮耀。\n奉主耶穌的名，阿們。","share":[{"tag":"領受","q":"「不是能力的問題，是願不願意」——這一課如果拿走了一個你長期用來「不服事」的理由，那會是哪一個？"},{"tag":"省察","q":"五餅二魚的故事裡，門徒一開始也覺得「這算什麼」。你手中是否也有一個被你看為「不夠、算不上什麼」、所以不願交出去的東西？"},{"tag":"同行","q":"這禮拜，請你帶著「願意的心」踏出一個你一直不敢踏的「第一步」（哪怕很小）。說出來，讓小家的家人陪你一起、彼此守望。"}],"next":"服侍之路：靈悟命侍神","prog":"27"},{"n":161,"unit":"第十單元 · 服侍——靈悟命侍神的得勝之路","title":"靈悟命侍神，\n一條生命的路","no":"161","greet":"願你來到主的面前，得享安息","verse":"因為萬有都是本於他，倚靠他，歸於他。","verse_ref":"羅馬書 11:36","bigidea":"本課核心：服侍不只是「做什麼」，而是「從哪裡來、靠誰、為誰而活」。真正的服侍是一條生命之路，可以用五個字總結——靈、悟、命、侍、神：從聖靈開始、被真理更新、活出生命、讓主作王、最終榮耀歸神。","lead":"從這一課開始，我們要進入服侍最核心的一條路。很多人以為服侍就是做事情、完成任務、付出時間能力；但聖經讓我們看見更深的真相——服侍不是做什麼，而是從哪裡來、靠誰、為誰而活。真正的服侍，是從神開始、靠神運行、為神而活、最後歸給神的一條生命之路。這條路可以用五個字總結：靈—悟—命—侍—神。","sections":[{"h":"一服侍的起點：從「靈」開始","paras":["服侍的起點不是能力，而是聖靈。「你要專心仰賴耶和華，不可倚靠自己的聰明。」（箴3:5）「不是倚靠勢力，不是倚靠才能，乃是倚靠我的靈方能成事。」（亞4:6）","⟦s:很多人服侍會累、會乾、會失去動力，不是因為事情太多，而是因為「源頭錯了」⟧。⟦s:用腦靠自己 → 壓力、焦慮、疲憊⟧；⟦g:用心靠聖靈 → 平安、力量、喜樂⟧。","⟦b:依靠聖靈不是一種感覺，而是一個選擇⟧。就像燈需要接上電源才會發光，我們的生命也必須連結聖靈，才能活出真正的能力。⟦g:用心靠聖靈，不用腦靠自己⟧。"],"deeper":{"q":"想更深？「服侍的起點是聖靈、要靠聖靈不靠自己」——這話很對，但很抽象。實際上我怎麼知道「我現在是靠聖靈，還是靠自己」？有沒有具體一點的分辨方法，免得我以為自己在靠聖靈，其實還是在靠自己？","a":"這是一個非常實際、也非常誠實的問題——因為「靠自己」最狡猾的地方，就是它常常「假裝成」靠聖靈。給你幾個具體可摸的分辨點，幫助你照出真相。第一，看「起手的動作」：當一件服事、一個需要出現時，你的「第一反應」是什麼？是立刻開始想方法、排計畫、評估自己的能力（「我該怎麼做、我做不做得到」），還是先停下來，把它帶到主面前問「主，這是不是祢要我做的？祢要我怎麼做？」？靠自己的人，禱告常常是「事後補一下」或「求神祝福我的計畫」；靠聖靈的人，禱告是「起點」，是先求問、先交託，再行動。第二，看「裡面的感覺」（這不是唯一標準，但很有參考價值）：這一課和前面好幾課都點出一個記號——靠自己，會「越來越累、越來越乾、越來越有壓力、想放棄」；靠聖靈，會有「生命、平安、喜樂」，就算累也是「累得有平安、有滿足」，而不是「乾枯、煩躁、被掏空」。所以當你發現自己服侍得「越來越煩、越來越苦、喜樂不見了」，這往往是個警訊：很可能源頭已經悄悄從聖靈滑到自己身上了（用腦就煩惱）。第三，看「面對失敗或攔阻時的反應」：靠自己的人，事情不順就會焦慮、自責、用更多努力去硬撐，或是埋怨、想放棄；靠聖靈的人，會在攔阻中回到神面前重新求問、重新交託，裡面仍有一份「這是神的工，祂負責」的安穩。第四，看「成果歸誰」：事情成了，你心裡第一個浮現的是「我做到了、我表現不錯」，還是「這是神做的、若不是主我什麼都不能」？前者透露焦點在自己，後者透露焦點在神。要特別提醒一件事：「靠聖靈」不等於「什麼都不做、不用計畫、坐等感動」——那是誤解。聖靈也會帶領你去思考、去計畫、去行動；分別不在「做不做、想不想」，而在「你的『依靠』和『焦點』放在誰身上」——是把自己當源頭、靠自己的聰明能力撐起來，還是把神當源頭、在每一步裡都連結祂、依靠祂、把主權交給祂。最後，給你一個最簡單的操練：在每件服侍的「之前、之中、之後」，都加一個小小的轉向——之前問「主，祢要怎麼做？」，之中說「主，是祢在做，不是我」，之後說「主，榮耀歸給祢」。這三個小動作，會像三個錨點，一次次把你從不知不覺的「靠自己」，拉回到「靠聖靈」。久了，這就從一個刻意的選擇，長成一個自然的生命習慣——這正是「靈」這個起點，要在你裡面建立的。"}},{"h":"二服侍的過程：從「悟」到「命」","paras":["聖靈的工作不只是給能力，更是帶領我們明白神的話。「聖靈要將一切的事指教你們。」（約14:26）「他要引導你們明白一切的真理。」（約16:13）這是「悟」——聖經是我的準則。","但關鍵在於，我們不是停在「明白」，而是要進入「活出」。「凡聽見我這話就去行的，好比一個聰明人。」（太7:24）這是「命」——耶穌是我的榜樣。⟦g:悟（明白） → 命（活出）⟧。","就像種子：只有聖靈的感動，像種子在空中飄；加上神的話，種子開始落地；當我們去行，種子就扎根。⟦g:改變觀念，就改變生命；改變生命，就改變生活⟧。"],"deeper":{"q":"想更深？這「靈、悟、命」三個字，跟我們321一直在講的「三個基礎」（聖靈是引導、聖經是準則、耶穌是榜樣）是不是同一回事？如果是，為什麼要換成「靈悟命侍神」這套說法？這兩套東西怎麼搭在一起？","a":"你的觀察非常敏銳——是的，「靈、悟、命」與321的「三個基礎」是同一個生命真理的兩種說法，它們不但不衝突，而且「靈悟命侍神」正是把三個基礎「活出來、走起來」的那條路。我們一個一個對上來看，你會看見它們嚴絲合縫地扣在一起。「靈」就是「聖靈是我的引導」——服侍從聖靈開始，每一刻尋求聖靈的引導與感動。「悟」就是「聖經是我的準則」——領悟並遵行聖經的真理，讓神的話成為我們的標準。「命」就是「耶穌是我的榜樣」——培養並活出耶穌的生命，效法祂。你看，「靈悟命」就是「三個基礎」。那麼後面的「侍」和「神」呢？它們正好接上321的「兩個核心」：「侍」就是「讓耶穌作王」——服侍時讓耶穌在我裡面活、作王掌權，靠祂的權柄能力服侍；「神」就是「讓耶穌得到一切的榮耀」——一切都是神在耶穌裡所成就的，凡事謝恩、把榮耀歸給耶穌。所以完整對照是這樣的：靈悟命侍神＝（聖靈引導＋聖經準則＋耶穌榜樣）＋（讓耶穌作王＋讓耶穌得榮耀）＝三個基礎＋兩個核心。那為什麼要另外有「靈悟命侍神」這套說法？因為「三個基礎、兩個核心」是把真理「並列」地陳明給你看——它告訴你「有哪五樣東西」；而「靈悟命侍神」是把這五樣按「生命流動的次序」串成一條「動線」——它告訴你「這五樣怎麼一個帶出一個、一步步走」。打個比方：三個基礎兩個核心，像是把蓋房子的「材料」（地基、樑柱、屋頂）一一列給你看；靈悟命侍神，則像是把這些材料按「施工的順序」排成流程（先打地基、再立樑柱、後上屋頂）。同樣的東西，一個是「清單」，一個是「路線」。為什麼服侍特別需要「路線」這個版本？因為服侍是「動」的、是要「走出去做」的，它最需要知道「從哪裡起步、接著往哪走、終點在哪」。靈悟命侍神就給了這條清楚的動線：服侍從「靈」起步（連結聖靈這個源頭），經過「悟」（讓神的話更新觀念）、「命」（把真理活成生命），再流向「侍」（讓這成熟的生命去服事、讓耶穌作王），最後歸回「神」（一切榮耀歸給祂）。而這整條動線，其實也正是321一再強調的另一個次序——「先生命、再關係、後事工」：靈悟命是在我裡面「成全生命」，侍是這生命「流出去服事（含關係與事工）」，神是這一切「歸回榮耀的源頭」。所以你完全可以放心：你沒有在學「兩套不同的東西」。靈悟命侍神，就是三個基礎加兩個核心，被排成了一條可以「天天走、一生走」的生命之路。記住它，你就握住了321整個理念「如何活出來」的鑰匙。"}},{"h":"三服侍的目標：從「侍」到「神」","paras":["當生命成長，自然會流露出服侍。「我給你們作了榜樣，叫你們照著我所做的去做。」（約13:15）這是「侍」——讓耶穌作王。","但服侍有一個最重要的關鍵：⟦b:不是做了多少，而是榮耀歸給誰⟧。「叫神在凡事上因耶穌基督得榮耀。」（彼前4:11）這是「神」——讓耶穌得到一切的榮耀。","⟦s:很多服侍之所以疲累，是因為不知不覺把焦點放在自己身上——想被看見、想被肯定、想證明自己，這就是「有己」⟧。⟦g:但真正的服侍，是無己 → 讓耶穌作王；無己 → 讓榮耀歸神⟧。⟦b:不是我，乃是基督；榮耀全歸給神⟧。"],"pq":"服侍不是短暫的熱情，而是一條一生的道路；走在這條路上，你會發現——不是你在為神做事，而是神在你裡面活出祂的生命。","deeper":{"q":"想更深？「靈悟命侍神」是「五個階段」嗎？我是不是要先把「靈」修好，才能進到「悟」，再修好「悟」才能到「命」……一關一關過？如果我覺得自己每一樣都還很差，是不是就還沒資格服侍？","a":"這是一個會大大影響你怎麼走這條路的關鍵理解，要釐清清楚：靈悟命侍神「不是五個一關一關、修完一關才能進下一關的『階段』，而是一個同時運行、不斷循環的『生命循環』」。第一，它不是「線性闖關」，而是「循環流動」。源頭的321一開始就說了，這「不是五個階段，而是一條持續循環的生命之路」。意思是，這五個字不是「先做完靈、再做悟、再做命」的進度條，而是像生命的呼吸與血液循環一樣，「同時」在你裡面運行，而且「不斷地一圈一圈循環」：你靠聖靈（靈），聖靈帶你明白真理（悟），真理化成生命（命），生命流出去服事（侍），服事中榮耀歸神（神）——然後在服事和敬拜中，你又更深地連結聖靈（回到靈），開始新的、更深的一圈。它是螺旋上升的循環，不是一條有終點的跑道。第二，所以你「不需要先把前面修到滿分」才能進下一個。事實上，你是「在走整條路的過程中」，五樣一起被神琢磨、一起成長的。你不是「靈滿分了才開始悟」，而是「一邊靠聖靈、一邊領受真理、一邊活出來、一邊去服事、一邊把榮耀歸神」，這五樣彼此餵養、彼此帶動，一起被提升。「悟」會幫助你更會「靠靈」，「侍」會逼著你更需要「靈」和「命」，「神」（歸榮耀）會保守你的「侍」不變質——它們是一個有機的整體，不是五個獨立的關卡。第三，關於「我每一樣都還很差，是不是沒資格服侍」——這恰恰是這整個單元前面幾課（160課「願意的人都能服事」）要醫治的謊言。答案是：你「永遠」不會覺得自己「五樣都修好了、夠資格了」才去服事，因為這是一條「一生的路」，沒有人在地上走到「畢業」。若要等夠資格，就永遠不會開始。真相是：你正是「在服侍中」，這五樣才真實地被建立、被煉成的。你帶著「還很不足」的靈悟命去服侍（侍），結果在服侍裡，你被逼著更深地依靠聖靈（靈長進了）、更渴慕明白真理（悟長進了）、更被神對付而活出生命（命長進了）、也更學會把榮耀歸給祂（神長進了）。所以「不足」不是你「不能服侍」的理由，反而是神「邀請你進來、在服侍中被祂塑造」的入口。最後給你一個釋放的圖像：別把靈悟命侍神想成一座「你要靠努力一層層爬上去、爬不到頂就不及格」的高塔；把它想成一條「你今天就能踏上、然後一生與主同行、越走越深、越走越像祂」的「道路」——而耶穌說「我就是道路」。你不是靠修滿五關去夠到神，你是踏上這條路，然後發現「不是你在為神做事，而是神在你裡面，活出祂自己的生命」。差，沒關係；願意踏上去、一直走下去，就對了。"}}],"focus":"我的服侍，\n是從「我能做什麼」開始，\n還是從「主，祢要怎麼做」開始？\n源頭，\n決定了這條路的一切。","hope":{"t":"✺ 你不是在撐起服侍，是被一條生命的路托住","paras":["若你曾在服侍中感到乾枯、疲憊、快要撐不下去，這一課要給你一個全新的眼光：⟦b:服侍的問題，從來不是「事情」的問題，而是「源頭」的問題⟧。當源頭錯了——靠自己、為自己——再小的服侍也成重擔；當源頭對了，再大的服侍也有生命。","⟦g:神為你預備的，是一條完整的生命之路：靈—悟—命—侍—神⟧。從聖靈起步，被真理更新，活出生命，讓主作王，榮耀歸神。走在這條路上，你會越來越被聖靈充滿、越來越明白真理、越來越活出生命、越來越流露愛、越來越將榮耀歸給神。⟦b:到最後你會發現——不是你在為神做事，而是神在你裡面，活出祂的生命⟧。這，才是服侍真正的輕省與喜樂。"]},"still":"此刻安靜——\n回想我最近的服侍，\n它的「源頭」在哪裡？\n是接在聖靈這個電源上，\n還是靠著我自己的電池\n勉強發光、快要耗盡？","still_hint":"不必論斷自己，也不必急。\n安靜一分鐘，\n把服侍的源頭交還給主：\n「主啊，今天我不靠自己，\n只靠祢的靈——求祢成為我的源頭。」","steps":[{"act":"建立起點，每天從「靈」開始：每天先禱告，把一天交給神，刻意依靠聖靈。操練——「主啊，今天我不靠自己，只靠祢的靈。」","meta":""},{"act":"領受啟示、活出真理：每天讀經停下來思想，讓聖靈說話；並選一個明白的真理，刻意去行（饒恕、忍耐、愛人）。","meta":""},{"act":"主動服侍、歸榮耀給神：不等感動才行動，主動關心一個人；每天結束時禱告——「主啊，一切都是祢做的，榮耀歸給祢。」","meta":""}],"declare":"主耶穌，我宣告：\n我的服侍從祢開始，靠祢而行，為祢而活。\n我不倚靠自己，乃是倚靠聖靈；\n我不高舉自己，乃是高舉耶穌。\n我要走在靈、悟、命、侍、神的道路上，\n讓我的生命成為祢的器皿，\n一切榮耀都歸給祢。\n奉主耶穌的名，阿們。","share":[{"tag":"領受","q":"「靈悟命侍神」這條生命之路（也就是321的三個基礎＋兩個核心），哪一個字、哪一個環節，是你目前最缺、最需要被建立的？"},{"tag":"省察","q":"誠實檢視你最近的服侍：源頭比較像「接上聖靈的電源」，還是「靠自己快耗盡的電池」？你是從哪裡感覺到的？"},{"tag":"同行","q":"這禮拜，請你在每件服侍的「之前」加一個小動作——先停下來禱告問「主，祢要怎麼做？」。說出來，讓小家的家人陪你一起、彼此守望。"}],"next":"服侍之路—靈","prog":"33"},{"n":162,"unit":"第十單元 · 服侍——靈悟命侍神的得勝之路","title":"服侍的起點，\n是聖靈","no":"162","greet":"願你來到主的面前，得享安息","verse":"耶穌滿有聖靈的能力，回到加利利；他的名聲就傳遍了四方。","verse_ref":"路加福音 4:14","bigidea":"本課核心：服侍真正的起點，不是「我能」，而是「聖靈」。耶穌的榜樣是「先有聖靈，才開始服侍」；使徒也先等候聖靈充滿。在服侍中只有兩條路——體貼聖靈（生命、平安）或體貼肉體（死、疲累）。","lead":"很多人一想到服侍，就會問「我能做什麼？我有什麼能力？」但聖經告訴我們一個完全不同的起點——服侍不是從「我能」開始，是從「聖靈」開始。耶穌尚未開始傳道之前，先經歷一件事：「聖靈降臨在他身上。」（路3:22）之後祂整個服侍，都在聖靈的引導與能力中展開。沒有聖靈，就沒有真正的服侍。","sections":[{"h":"一耶穌的榜樣：從聖靈開始","paras":["耶穌的服侍有一個清楚的次序：受洗 → 聖靈降臨 → 被聖靈引導 → 滿有能力服侍。「耶穌被聖靈充滿……聖靈將他引到曠野。」（路4:1）「耶穌滿有聖靈的能力……」（路4:14）","⟦b:注意一件事——不是先服侍，才有聖靈；是先有聖靈，才開始服侍⟧。甚至耶穌先被聖靈引到曠野受試探，勝過了，才進入事工。","⟦g:這告訴我們：聖靈不只帶我們做工，聖靈更要塑造我們的生命⟧。⟦g:先生命，後事工；先被聖靈帶領，才有聖靈的能力⟧。"],"deeper":{"q":"想更深？「先有聖靈才服侍」——可是我是已經信主、聖靈已經內住的人了，這不就「已經有聖靈」了嗎？那為什麼還要特別講「先被聖靈充滿」？「聖靈內住」和「被聖靈充滿」是不是兩回事？","a":"這是一個很好、也很關鍵的分辨，搞清楚會幫助你的服侍從「掙扎」進入「流動」。簡單說：「聖靈內住」和「被聖靈充滿」確實有所不同，前者是「身份的事實」，後者是「光景的經歷」。先講「內住」：是的，你信主的那一刻，聖靈就住進了你裡面，這是永遠的、不會改變的事實——「豈不知你們的身子就是聖靈的殿嗎？」（林前6:19）。這是你的「身份」，是神給的印記，無論你感覺如何，聖靈都在你裡面，這點永遠不變，你可以完全安穩。那「被聖靈充滿」是什麼？聖經卻是「不斷地、反覆地」命令信徒「要被聖靈充滿」（弗5:18，原文是持續、不斷的時態），可見它不是一次完成、永遠不變的，而是一個「需要持續經歷、可多可少」的光景。打個比方就清楚了：聖靈內住，像「電池已經裝進了手機裡」——它在裡面，是事實；被聖靈充滿，像「電池有沒有充飽電、電有沒有真正供應到整支手機運作」。電池在裡面（內住），不代表你的手機此刻就是滿電、就運轉順暢的（充滿）。你完全可能是「聖靈已經內住、但此刻卻沒有被聖靈充滿」的狀態——比如當你體貼肉體、靠自己、被罪和憂慮充滿時，聖靈雖然仍在你裡面（祂沒走），卻沒有在你裡面「掌權、運行、供應」，於是你乾枯、無力、服侍起來掙扎。這正是為什麼即使是已經內住聖靈的信徒，聖經還要不斷命令「要被聖靈充滿」。那「被充滿」的關鍵是什麼？不是去「得到更多聖靈」（你已經完整擁有祂了），而是「讓已經住在你裡面的聖靈，得到你更多、掌管你更多」。被充滿不是「神給你更多」，而是「你給神更多」——更多地降服、更多地把自己的主權交出去、更多地清理掉那些攔阻祂運行的（罪、自我、憂慮、體貼肉體）。所以這一課講「先被聖靈充滿才服侍」，對已經信主的你來說，意思不是「先去把聖靈求來」，而是「服侍之前，先讓那已經住在你裡面的聖靈，重新掌管你、充滿你、供應你」——先降服、先連結、先讓祂作主，再去做。這正是321「讓耶穌作王」在每天服侍裡最具體的操練：聖靈內住是「耶穌已經住進來」（身份），被聖靈充滿是「讓耶穌真正在我裡面作王、運行」（光景）。每一次服侍前那個「主啊，我需要祢的靈充滿我」的禱告，就是在做這件事——不是去求一個遙遠的恩賜，而是把家的主權，重新交還給那位早已住在你裡面的主人。"}},{"h":"二使徒的經歷：被聖靈充滿","paras":["使徒的服侍也是一樣的原則——他們沒有立刻出去做事，而是先等候聖靈。「聖靈降臨在你們身上，你們就必得到能力。」（徒1:8）五旬節那天，他們被聖靈充滿，結果：一篇信息，三千人悔改受洗。","⟦b:這不是彼得的口才，而是聖靈的能力⟧。⟦g:服侍的果效，不在人的能力，在聖靈的工作⟧。「我們若是靠聖靈得生，就當靠聖靈行事。」（加5:25）","⟦g:靠聖靈開始，也要靠聖靈繼續⟧。不是只有「起初」，而是「每一天」。⟦b:服侍不是一次的充滿，而是每天的連結⟧。"],"deeper":{"q":"想更深？使徒「等候聖靈」才出去——但我們不能凡事都「等」啊。實際服侍裡，很多事是有時間、有需要、有進度的，總不能每件事都停下來等到有感動、有充滿才動。「等候聖靈」和「該做就做、別拖延」之間，怎麼拿捏？","a":"這個張力非常真實，拿捏不好會走偏到兩個極端：一邊是「屬靈的被動」——什麼都不做，美其名曰「等候聖靈」，其實是懶惰或逃避；另一邊是「肉體的衝動」——什麼都不等，靠自己一頭栽進去，美其名曰「積極負責」，其實是靠自己。我們要的，是第三條路。先釐清「等候聖靈」真正的意思。使徒的「等候」（徒1:4，主吩咐他們「不要離開耶路撒冷，要等候父所應許的」），不是「無所事事地枯等到有感覺」，而是「在禱告中、在順服中、在預備中，等候那個關鍵的賦能」。事實上他們那十天並非什麼都沒做——他們「同心合意地恆切禱告」（徒1:14），還處理了揀選使徒的事。所以「等候」是「主動的、禱告的、降服的預備」，不是「被動的、發呆的、找藉口的拖延」。那實際怎麼拿捏？給你幾個原則。第一，分辨「等候」與「拖延」的動機：真等候聖靈的人，心是「降服、渴慕、預備好隨時要動」的——「主，我願意做，但求祢帶領、求祢充滿，祢一引導我就走」；而假借等候之名的拖延，心是「不想做、怕麻煩、找個屬靈的理由賴著」。同樣是「還沒動」，前者是箭已上弦、只等放手的時機，後者是根本不想射箭。第二，「等候」主要是針對「源頭和方向」，不是針對「每個動作」。意思是：你不需要為了「要不要回這封信、要不要去探訪」這種日常的每一步，都停下來枯等一個特別的感動才動——那會讓人癱瘓。「靠聖靈行事」更多是一種「持續連結的狀態」：你已經把一天交給神、已經求聖靈充滿、心已經降服在祂面前，那麼在這個「連結著聖靈」的狀態裡，你就「該做的去做、該動的去動」，相信聖靈會在你行的過程中引導、提醒、修正。靠聖靈不等於「事事被動等感動」，而是「在連結中積極地行」。第三，越是「重大的、定方向的決定」，越要刻意停下來等候、求問、確認（這正是上一課操練的「重大決定前先禱告」）；越是「日常的、本分內的小事」，越是在「已連結聖靈的狀態」中放手去做即可。把「等候」的力氣，用在刀口上——用在源頭（每天的降服與充滿）和關鍵的岔路口（重大決定）上，而不是消耗在每個微小動作的猶豫裡。第四，記得一個解套的真理：聖靈不只在「事前」引導，祂更「在行動中」引導。很多時候，神的帶領不是讓你「等到完全清楚了才走」，而是「你憑信心、帶著降服的心踏出去，祂在你走的過程中一步步顯明」。就像雲柱火柱，是「以色列人起行了，它才在前面引路」。所以不要把「等候聖靈」變成「永遠不敢動」的藉口；真正的等候，是「先降服、先連結、先求問源頭與方向，然後帶著對聖靈的信靠，積極地行，並在行動中持續敏銳於祂的引導與修正」。一句話收攏：源頭上要「先靈後動」（先連結聖靈，再行動），日常裡要「在靈中而動」（在持續連結聖靈的狀態裡積極去做），重大處要「停下等候」（關鍵岔路口刻意求問確認）。這樣，你既不會落入屬靈的被動，也不會落入肉體的衝動，而是真正走在「靠聖靈開始、也靠聖靈繼續」的路上。"}},{"h":"三兩條路的選擇：體貼聖靈或體貼肉體","paras":["在服侍中，其實只有兩條路：體貼聖靈，或體貼肉體。「體貼肉體的，就是死；體貼聖靈的，乃是生命、平安。」（羅8:6）","⟦s:體貼肉體，就是依靠自己、滿足自己、照自己的想法做事——結果是越服侍越累、越乾，最後想放棄⟧。⟦g:體貼聖靈，就是順服神的心意、依靠聖靈的引導——結果是有生命、有平安、有力量⟧。","耶穌也提醒：⟦b:不是每個奉主名服侍的人都被認可，唯有遵行天父旨意的人（太7:21-23）——不是做多少，而是是否出於神⟧。⟦s:用腦靠自己 → 勞苦重擔⟧；⟦g:用心靠聖靈 → 生命平安⟧。"],"pq":"服侍的問題，從來不是事情的問題，而是源頭的問題——源頭是聖靈，就有生命；源頭是肉體，就有消耗。","deeper":{"q":"想更深？太7:21-23那段話很可怕——有人「奉主名傳道、趕鬼、行異能」，耶穌竟說「我從來不認識你們」、是「作惡的人」。他們明明做了那麼多屬靈大事啊！這是不是說，我服侍若不夠好、果效不夠，就也會被主這樣拒絕？這讓我好害怕。","a":"我完全理解這段話帶來的震撼與不安，但讓我幫你看清楚：它要對付的，恰恰「不是」你所害怕的那件事，而你越害怕的、越想靠表現去避免被拒絕的那個心態，反而正是它要拆穿的。先看清楚這些人「真正的問題」出在哪。耶穌沒有說他們的問題是「做得不夠多、果效不夠好」——剛好相反，他們的「成績單」亮眼得很：傳道、趕鬼、行許多異能，這些都是大事。問題出在兩個地方。第一，看他們自己的申辯：「主啊，主啊，我們不是奉你的名傳道……趕鬼……行異能嗎？」——你聽出來了嗎？他們三句話裡，主詞全是「我們」，他們高舉的是「我們做了什麼」。他們站在主面前，遞上的是「我的事工成績單」，彷彿在說「看我為祢做了這麼多，祢欠我一個認可」。這就是「有己」的服侍最深的破口——做了一堆屬靈的事，焦點卻始終在「我、我的成就、我的果效」上，而不在那位主身上。第二，耶穌定義什麼才是真認識祂：「唯獨遵行我天父旨意的人，才能進去。」（太7:21）關鍵不在「為神做了多少」，而在「有沒有與神有真實的關係、有沒有降服於祂的旨意」。耶穌說「我從來不認識你們」——這個「認識」是關係性的字眼。問題不是他們「做得不夠」，是他們「從頭到尾都靠自己的肉體在做神的事，卻從來沒有真正降服、真正與主建立生命的關係」。他們是「體貼肉體地」做了一堆「屬靈的事」——這正是這一段的主題：奉主名做事，不等於出於神、不等於體貼聖靈。明白了這個，你就看見：這段話不該讓你「更害怕、更想靠拼命做、做出果效來換取主的認可」——因為那個方向（靠表現、靠成績單去站在主面前）正是這些人走的、被拒絕的路！這段話真正的呼召，恰恰相反，是要把你從「靠果效證明自己」裡釋放出來，轉向「與主建立真實的關係、降服於祂、靠祂的靈而活」。所以，給你三個釋放：第一，你的得救與蒙主悅納，從來不是靠你服侍的「果效夠不夠好」，而是靠耶穌的恩典、靠你與祂真實的關係——這點請完全安心，這正是這個單元一開始（158課）就釐清的：得救是恩典，不是靠行為換的。第二，這段經文不是要你「做得更多更好」，而是要你「回到關係、回到降服、回到靠聖靈」——它對付的不是「果效不足」，是「源頭錯誤（靠肉體）」和「焦點錯誤（高舉自己）」。第三，真正該檢視的，不是「我做得夠不夠多」，而是「我做這些的時候，是出於與主真實的關係、降服於祂、靠祂的靈，還是靠自己的肉體、為著證明自己？」一個真認識主、真降服於主、靠聖靈而活的人——哪怕他做的事不多、不轟轟烈烈，主也認識他、也悅納他；反之，一個靠肉體、為自己、與主沒有真關係的人，哪怕事工再大，也是虛空。這正是321最核心的「無己讓耶穌作王、讓耶穌得榮耀」：服侍若是「有己」的（為自己、靠自己、高舉自己），做再多也可能是「作惡」；服侍若是「無己」的（為主、靠主、榮耀歸主），就算微小，也蒙主喜悅。所以別怕。這段話不是懸在你頭上的審判之劍，逼你拼命做工；它是一盞探照燈，溫柔卻清楚地照向你的「源頭」與「焦點」，邀請你離開「靠肉體為自己」的死路，回到「靠聖靈、與主同行、讓祂得榮耀」的生命與平安。"}}],"focus":"在我服侍的此刻，\n我裡面運行的，\n是「體貼肉體」——\n靠自己、為自己、照自己的意思，\n還是「體貼聖靈」——\n順服祂、依靠祂、為祂而做？","hope":{"t":"✺ 不是你撐著走，是聖靈帶著你走","paras":["也許你一直以為服侍的關鍵是「我夠不夠能幹、夠不夠努力」，於是在自己的力量裡撐到乾枯。但這一課把耶穌和使徒的榜樣交給你：⟦b:服侍真正的起點，不是能力，不是熱情，而是聖靈⟧。連耶穌都是先有聖靈、被聖靈充滿，才開始服侍。","⟦g:當你回到這個起點，你會發現——不是你在努力服侍，是聖靈在你裡面動工；不是你撐著走，而是神帶著你走⟧。這就是服侍最深的奧秘：從「我做」變成「神做」，從「勉強」變成「流動」，從「疲累」變成「生命」。今天，先別急著做——先讓那住在你裡面的聖靈，重新充滿你、帶領你。"]},"still":"此刻安靜——\n在我開始任何服侍之前，\n我有沒有先停下來，\n讓聖靈充滿我？\n還是我總是「先衝出去做」，\n累了才想起祂？","still_hint":"不必自責，現在就可以開始。\n安靜一分鐘，\n單純地求：\n「主啊，今天我需要祢的靈充滿我——\n不是我做，是祢在我裡面做。」","steps":[{"act":"每天先被充滿：每天一開始先禱告，求聖靈充滿你，而不是直接進入忙碌。操練——「主啊，今天我需要祢的靈充滿我。」","meta":""},{"act":"學會停下來、尋求引導：做決定前先停一下，問「主啊，祢的心意是什麼？」重大決定前先禱告30秒。","meta":""},{"act":"分辨兩種聲音、檢視結果：當情緒或方法來時，先問「這是聖靈的平安嗎？」睡前問「今天我是靠聖靈，還是靠自己？」","meta":""}],"declare":"主耶穌，我宣告：\n我的生命從聖靈開始，我的生活靠聖靈帶領，\n我的服侍倚靠聖靈能力。\n我不再依靠自己，我選擇體貼聖靈，\n活在生命與平安中。\n讓祢的靈充滿我，引導我，使用我。\n一切榮耀歸給祢。\n奉主耶穌的名，阿們。","share":[{"tag":"領受","q":"「先有聖靈，才開始服侍」——這個次序的更新，對你習慣「先衝出去做」的服侍模式，帶來什麼提醒？"},{"tag":"省察","q":"羅8:6說兩條路：體貼肉體（死、累）或體貼聖靈（生命、平安）。回想你最近的服侍狀態，比較靠近哪一條？你是從哪裡看出來的？"},{"tag":"同行","q":"這禮拜，請你操練「先被充滿再行動」——每天一早，先安靜求聖靈充滿，再進入忙碌。說出來，讓小家的家人陪你一起、彼此守望。"}],"next":"服侍之路—靈（二）","prog":"40"},{"n":163,"unit":"第十單元 · 服侍——靈悟命侍神的得勝之路","title":"如何，\n體貼聖靈","no":"163","greet":"願你來到主的面前，得享安息","verse":"你要專心仰賴耶和華，不可倚靠自己的聰明。","verse_ref":"箴言 3:5","bigidea":"本課核心：知道「要靠聖靈」還不夠，關鍵是「怎麼」體貼聖靈。三把鑰匙——根基是謙卑（放下自己讓神作主），關鍵是用心不用腦（單純信靠順服），結果是啟示與能力（神的話帶著功效、神蹟隨著證實）。","lead":"我們已經知道，服侍要從「聖靈」開始，但更關鍵的問題是——我們「怎麼」體貼聖靈？因為很多時候，我們口裡說依靠聖靈，實際上卻仍然用自己的方法、靠自己的經驗、做自己想做的事。所以關鍵不只是「有聖靈」，而是「是否體貼聖靈」。「你要專心仰賴耶和華，不可倚靠自己的聰明。」（箴3:5）體貼聖靈，是一條路，也是一個選擇。","sections":[{"h":"一體貼聖靈的根基：謙卑放下自己","paras":["體貼聖靈的第一個關鍵，就是「謙卑」。⟦b:謙卑不是軟弱，謙卑是放下自己，讓神作主⟧。「我靠著那加給我力量的，凡事都能做。」（腓4:13）真正的問題不是「能不能」，而是「靠誰」。","⟦s:很多人服侍會焦慮、會害怕，是因為靠自己（沒把握）、靠環境（不穩定）⟧；⟦g:但當你選擇謙卑、依靠神，無論環境如何都能喜樂，無論條件如何都能得勝⟧。","⟦g:謙卑就是回到本位——讓人作人，讓神作神⟧。⟦b:當你放下自己，聖靈就能帶領你⟧；當你還抓著自己，聖靈就只能在一旁等候。"],"deeper":{"q":"想更深？「謙卑是放下自己、讓神作主」——但腓4:13說「我凡事都能做」，這聽起來又很有「自我」、很有力量啊。「放下自己」和「凡事都能做」不是矛盾嗎？到底是要「沒有自己」，還是要「很有能力」？","a":"你抓到了一個看似矛盾、實則是整個基督信仰最美奧秘的核心——而這正是321「無己」最精準的寫照。表面看，「放下自己」（軟弱、降服）和「凡事都能做」（剛強、得勝）好像水火不容；但腓4:13這節經文，把它們縫得天衣無縫。關鍵在那半句常被人忽略、卻定生死的話：「我靠著『那加給我力量的』，凡事都能做。」這節經文若只讀前半「我凡事都能做」，就成了自我膨脹的口號；但加上後半「靠著那加給我力量的（就是基督）」，整個意思就翻轉了——能做凡事的，根本不是「我」，是「那加力量給我的基督」；「我」只是那個「靠著祂」的管道。所以這節經文恰恰不是在高舉自我，而是在說：「離了我自己，我什麼都不能；但靠著基督，我凡事都能。」它同時宣告了「我的全然無能」和「基督的全然大能」——這不是矛盾，這正是「無己」的定義。讓我們把這個奧秘說透。「無己」從來不是「沒有了、變成零、軟弱無力地什麼都不是」——這是對無己最大的誤解。「無己」真正的意思是這個單元一再強調的：「不再是我，乃是基督；不是我自己活，乃是基督在我裡面活。」（加2:20）所以無己不是「失去自己」，而是「自己這個小水管，連接上了神那無限的活水源頭」；不是「進入虛無」，而是「進入無限、活出無限」。你看這個轉換多美：當「我」高舉自己、靠自己時，我能調動的，就只有「我自己」那一點點有限的力量——所以我會焦慮、會沒把握、會怕環境（這是第一段講的）；但當「我」放下自己、降服於基督、讓基督在我裡面作王時，我就接上了「那加力量給我的」全能的神——於是「我」反而能做「我自己」永遠做不到的事，「凡事都能做」。所以答案是：不是「要沒有自己」和「要有能力」二選一，而是——「正因為放下了靠自己的『己』，才接通了基督的『大能』」。放下自己（無己），不是讓你變得無能、消失，而是讓你從「有限的自己」進入「無限的基督」。這正是第一段那句話的深意：「真正的問題不是能不能，而是靠誰。」當你靠自己（己），答案是「很多事不能」；當你靠基督（無己），答案是「凡事都能」。所以最有能力的人，恰恰是最謙卑、最放下自己、最讓基督作王的人——因為他不再用自己那一點微弱的電池發光，而是接上了永不耗竭的電源。無己，從來不是失去能力，無己是最有能力的生命。"}},{"h":"二體貼聖靈的關鍵：用心，不用腦","paras":["「清心的人有福了！因為他們必得見神。」（太5:8）⟦b:體貼聖靈，不是靠分析，而是靠「心」⟧。⟦g:用心 → 單純、信靠、順服⟧；⟦s:用腦 → 計算、懷疑、保留⟧。","「神國的奧秘……叫他們看是看見，卻不曉得。」（可4:11-12）⟦s:為什麼很多人聽道很多，卻不明白？因為用腦理解，卻沒有用心領受⟧。⟦s:用腦的人會計算代價、衡量得失、保留順服，結果信心被吞吃、行動被卡住⟧。","⟦g:但用心的人單純相信、立刻順服、完全交託⟧。⟦g:用心就開心，用腦就煩惱；心連於聖靈，腦容易靠自己⟧。"],"deeper":{"q":"想更深？「用心不用腦」是不是叫人「不要思考、不要理性、什麼都憑感覺」？神不是也給了我們頭腦、也要我們「心意更新」、要我們「謹慎」嗎？如果服侍都不用腦、只憑感覺，會不會反而走偏、被騙、做出蠢事？","a":"這是對「用心不用腦」最常見、也最需要澄清的誤解——因為這句話若被誤讀成「反智、廢掉理性、純憑感覺衝動」，那確實會出大問題，而且也絕不是它的本意。我們把它說清楚。首先，「用心不用腦」中的「腦」，指的不是「神所造的、用來思考的理性」本身，而是特指「靠自己的聰明、自我中心的盤算」——就是箴3:5說的那個「自己的聰明」、那個與「專心仰賴耶和華」相對的東西。同樣，「心」也不是指「情緒、感覺、衝動」，而是聖經意義上那個「生命與意志的中樞」、那個「與神相連、向神敞開、信靠順服神」的核心（聖經說「一生的果效是由心發出」箴4:23；又說「神的靈住在我們心裡」）。所以「用心不用腦」真正的意思是：「用那顆信靠順服、與聖靈相連的心去回應神，而不是用那個靠自己聰明、計算得失、處處保留的自我去攔阻神。」它對付的，是「自我中心的理性主義」（凡事先算計我划不划算、安不安全、做得到做不到，算到最後就不敢信、不敢順服了），而不是「思考」本身。看清這點，你的幾個顧慮就都解開了。第一，它沒有叫你「廢掉理性」。事實上，聖靈會「引導你明白真理」（這需要你用心思去領受、思想、明白神的話），「心意更新而變化」（羅12:2，更新的正是你的「心思意念」）。神要的不是「沒有思想的人」，而是「思想被聖靈和真理更新、降服於神、不再以自我為中心」的人。所以是「更新後的、降服的理性」，不是「廢掉理性」。第二，它沒有叫你「純憑感覺、憑衝動」。恰恰相反，「用心」的核心是「信靠順服神和祂的話」，是有「真理為錨」的——這正是為什麼緊接著下一個單元就是「悟」（聖經是準則）！「用心靠聖靈」若沒有「悟」（真理）來搭配、來檢驗，就真的會漂、會被騙、會憑己意亂闖。所以這一課和下一課要合起來看：靈（用心靠聖靈）＋悟（用真理為準則），兩者平衡，才不會走偏。一個真正「用心」的人，他的「心」是順服在「神的話」之下的，他不會憑一個感覺就衝、而不顧聖經的教導——那不是用心，那是任性。第三，那「分辨、謹慎、不被騙」呢？真正的屬靈分辨，恰恰來自「謙卑用心連結聖靈＋紮根於真理」，而不是來自「靠自己頭腦的精明算計」。歷史上最會「用腦算計」的，是那些把耶穌釘十字架的法利賽人和文士——他們聖經滾瓜爛熟、頭腦極其精明，卻因為「用腦不用心」（驕傲、自以為懂、計算自己的利益），完全錯過了站在他們面前的彌賽亞（可4:12「看是看見，卻不曉得」）。可見「用腦靠自己」不但不能保證不走偏，反而常常是走偏的根源。所以結論是：「用心不用腦」不是反對思考、不是叫你憑感覺，而是叫你「把那顆信靠順服的心，連結於聖靈、降服於真理」，不再讓「自我中心、計算保留的聰明」作你的主、攔阻你對神的回應。健康的服侍，是「用降服於神的心去信靠順服（靈），同時用更新後、紮根於真理的思想去明白與分辨（悟）」——這兩者非但不衝突，還必須攜手同行。怕的從來不是「思考」，怕的是「靠自己的聰明、為自己盤算、處處保留，以致信心被吞吃、順服被卡住」。把「己」從你的思考裡讓出來，讓聖靈和真理來掌管你的心思——這才是「用心不用腦」的真義。"}},{"h":"三體貼聖靈的結果：啟示與能力","paras":["當一個人真正體貼聖靈，就會經歷兩件事。⟦g:第一是啟示（明白神的話）⟧——「他要引導你們明白一切的真理。」（約16:13）「神的道是活潑的，是有功效的。」（來4:12）神的話不再只是知識，而是變成能力，能刺入人心、改變生命，「將人所有的心意奪回，使他順服基督」（林後10:5）。","⟦g:第二是能力（神蹟隨著）⟧——「主和他們同工，用神蹟隨著，證實所傳的道。」（可16:20）⟦b:不是人證明神，是神證明祂的道⟧。","⟦g:聖靈的工作＝啟示＋能力；先有啟示，再有能力⟧。當你依靠聖靈，你會經歷神的同在、看見神的工作、進入神的能力。"],"pq":"體貼聖靈，不是技巧，而是生命的狀態——驕傲就聽不見神，謙卑就被神引導；用腦就限制神，用心就經歷神。","deeper":{"q":"想更深？「體貼聖靈就會有啟示與能力、會有神蹟隨著」——可是我很努力依靠聖靈、也很渴慕，卻常常沒看見什麼神蹟、沒有大能力、禱告也好像沒被垂聽。那是不是我「體貼聖靈」不夠、不夠屬靈、哪裡做錯了？這讓我很挫折、甚至懷疑。","a":"我聽見你的挫折，也心疼這份渴慕卻看似落空的失望——這是許多真心愛主、認真追求的人都會經歷的暗夜。讓我陪你從幾個角度，把這件事看得更完整、也更有盼望，免得這份挫折把你引向不必要的自我定罪或對神的懷疑。第一，先拆掉一個會傷害你的錯誤公式：「沒看見神蹟＝我不夠屬靈、我做錯了。」這個公式聽起來合理，卻不是聖經的真相，而且非常傷人。聖經裡最屬靈、最體貼聖靈的人，也經歷「沒有神蹟、禱告看似沒被垂聽」的時候：保羅三次求神挪去他身上的刺，神「沒有」照他求的做，反而說「我的恩典夠你用的」（林後12:8-9）；耶穌在客西馬尼三次求「叫這杯離開我」，那杯也「沒有」離開。難道保羅、耶穌「不夠屬靈、做錯了」嗎？當然不是。所以「沒看見神蹟」絕不能簡單地反推成「你的問題」。請先放下這個會壓垮你的自我定罪。第二，要分清「能力、神蹟」的「主權在神，不在你的技巧」。這一課說「體貼聖靈會有啟示與能力」，這是真的——但要小心別把它讀成一個「我做對了，就一定能換到神蹟」的機械公式，彷彿「體貼聖靈」是一套對了就出貨的技巧。聖靈是「位格」，不是「自動販賣機」；經文自己說「這一切都是這位聖靈所運行、隨己意分給各人的」（林前12:11）。神蹟何時顯、如何顯、顯不顯，主權完全在神，是出於祂的智慧與愛，不是出於你「操作」得夠不夠標準。一個真正體貼聖靈的人，恰恰是「降服於神的主權」的人——他求神蹟，但他更尊主為大，把結果交給神，而不是用「有沒有神蹟」來評斷自己或神。第三，重新認識「能力」與「神蹟」的真貌——它常常比你以為的更安靜、更深刻。我們很容易把「能力、神蹟」想像成轟轟烈烈、立竿見影的場面（瞬間的醫治、戲劇性的事件），於是錯過了神更常用、也更深的作為。請重讀這一課：它把「啟示」放在「能力」前面，而且說「神的道……能刺入人心、改變生命、將人的心意奪回，使他順服基督」（林後10:5）——你發現了嗎？聖靈最大、最核心的「能力」與「神蹟」，是「生命被改變」：一顆剛硬的心軟化了、一個轄制你多年的捆綁鬆開了、一段破裂的關係被恢復了、一個人從不認識神到願意跟隨主、你自己從暴躁變溫柔、從苦毒到饒恕……這些「人心的翻轉」，才是聖靈最了不起的神蹟，比身體的醫治更深、更永恆。如果你用這個眼光回看，你很可能會發現：神在你和你周圍，其實一直在行這類「安靜卻真實」的神蹟，只是它不夠「戲劇化」，被你忽略了。第四，關於「禱告好像沒被垂聽」：聖經給的不是「你不夠好」，而是三種可能——有時是「不」（像保羅的刺，神有更好的計畫），有時是「等」（時候還沒到，神在預備），有時是「我有更深的方式」（神不照你想的方式、卻用更好的方式回應）。垂聽，不等於照單全收；一位真正愛你的父親，不會孩子要什麼就給什麼，祂給的是「最好的」，哪怕當下你不明白。第五，也是最要緊的——把焦點從「神蹟」轉回「神」。這正是整個「靈悟命侍神」要帶你去的地方。渴慕能力、渴慕神蹟，若不小心，會悄悄變成「我要那個能力、那個果效（來證明我、來解決我的問題）」——焦點又回到了「我」和「我想要的東西」上。但體貼聖靈的終極，不是「得到神蹟」，是「得到神自己」、是「讓耶穌作王、讓耶穌得榮耀」。一個生命真正成熟的記號，不是「我能行多少神蹟」，而是「就算沒有神蹟、就算在曠野、就算禱告看似石沉大海，我仍然信靠祂、仍然愛祂、仍然把榮耀歸給祂」——這份「在看不見能力時仍然體貼聖靈、仍然忠心」的生命，本身就是最大的能力，也最讓神得到榮耀。所以，親愛的，請不要再用「有沒有神蹟」來審判自己的屬靈、或懷疑神的同在。你的渴慕是寶貴的，神都看見、都紀念。繼續謙卑地、用心地依靠祂、緊緊跟隨祂——把「要不要、何時、如何」顯出能力的主權，安心地交還給那位愛你、且智慧無誤的主。並且把眼睛放亮，去看見祂在人心、在生命中所行那些更安靜、更深刻的神蹟。最終你會明白：最大的得勝，不是你手中握有多少能力，而是你的心，無論在能力顯出或隱藏時，都單單信靠、單單高舉這位主。"}}],"focus":"當聖靈感動我、或神的話光照我時，\n我的「腦」是不是立刻跳出來——\n計算代價、衡量得失、想要保留？\n我願不願意，\n用一顆單純的「心」，立刻順服？","hope":{"t":"✺ 你不必更聰明，只要更謙卑、更單純","paras":["也許你以為「會體貼聖靈」是少數很屬靈、很有經歷的人才懂的高深技巧，而你總是抓不到。但這一課把鑰匙交給你，而且出奇地簡單：⟦b:不是靠你更聰明、更會分析，而是靠你更謙卑（放下自己）、更用心（單純信靠順服）⟧。","⟦g:謙卑的人得啟示，驕傲的人只得知識；用心的人經歷神，用腦的人限制神⟧。所以你不需要成為一個更厲害的人——你只需要成為一個更小、更謙卑、更單純的人，把自己讓開，把主權交給聖靈。當你這樣做，你會經歷神的話變得有能力、你的生命開始改變、你的服侍開始有果效。原來，最深的屬靈，藏在最單純的謙卑與信靠裡。"]},"still":"此刻安靜——\n回想最近一次，\n聖靈輕輕感動我去做一件事\n（饒恕、開口、付出、放下），\n我是「立刻順服」，\n還是「用腦想了想，就放掉了」？","still_hint":"不必懊悔，重新選擇就好。\n安靜一分鐘，\n把那顆計算的心交給主：\n「主啊，給我一顆清潔、單純的心，\n讓我能用心領受、立刻順服。」","steps":[{"act":"學習謙卑、用心生活：每天刻意選擇不靠自己——「主啊，我不倚靠自己，我選擇依靠祢」；當神感動你時，不要一直想，至少順服一次。","meta":""},{"act":"建立單純的心：檢視今天的動機，是為自己還是為主？不要讓動機複雜，學習單純愛神、愛人。","meta":""},{"act":"宣告真理、跟隨聖靈：當思想被攻擊時，選一句經文反覆宣告；在服侍中不只做事，也為一件事禱告、期待神介入。","meta":""}],"declare":"主耶穌，我宣告：\n我選擇謙卑，放下自己，\n不倚靠自己的聰明，單單仰賴祢。\n我不用腦靠自己，我要用心靠聖靈。\n求祢的靈引導我，讓我明白祢的真理，經歷祢的大能。\n使我的生命成為祢的器皿，讓祢的話帶著能力，改變生命。\n一切榮耀歸給祢。\n奉主耶穌的名，阿們。","share":[{"tag":"領受","q":"「謙卑（放下自己）、用心（單純信靠）」是體貼聖靈的兩把鑰匙。對你來說，哪一把是你比較缺、比較難的？"},{"tag":"省察","q":"「用腦就煩惱、用心就開心」——回想最近一件讓你焦慮、卡住的服侍或決定，你是不是「用腦」在計算？若改成「用心」交託，會有什麼不同？"},{"tag":"同行","q":"這禮拜，請你操練「立刻順服」一次——當聖靈感動你做一件小事（饒恕、開口、付出），不要用腦想太多，立刻去行。說出來，讓小家的家人陪你一起、彼此守望。"}],"next":"服侍之路—悟","prog":"47"},{"n":164,"unit":"第十單元 · 服侍——靈悟命侍神的得勝之路","title":"沒有領悟，\n真理只是資訊","no":"164","greet":"願你來到主的面前，得享安息","verse":"他叫我們能承當這新約的執事，不是憑著字句，乃是憑著精意；因為那字句是叫人死，精意是叫人活。","verse_ref":"哥林多後書 3:6","bigidea":"本課核心：服侍之路不只要「靈」，更要進入「悟」。真理若只停在頭腦是「資訊」，進到心裡才成為「啟示」——資訊不能改變生命，啟示才能。靈與悟必須平衡；領悟的關鍵是謙卑與反覆思想。","lead":"很多人讀聖經很多、聽道很多，卻發現生命沒有太大改變，為什麼？因為少了一個關鍵——沒有「悟」。「那字句是叫人死，精意是叫人活。」（林後3:6）真理若只停在頭腦，是「資訊」；真理進到心裡，才成為「啟示」。資訊不能改變生命，啟示才能改變生命。所以服侍之路，不只是「靈」，還必須進入「悟」。","sections":[{"h":"一靈與悟的平衡：聖靈＋真理","paras":["⟦s:「靈」若沒有「悟」，會失去根基（容易漂浮、偏差）；「悟」若沒有「靈」，會變成知識（有道理沒能力）⟧。⟦g:真正健康的服侍，是聖靈的能力＋神的話語⟧。","「神所差來的，就說神的話，因為神賜聖靈給他是沒有限量的。」（約3:34）耶穌的服侍就是最好的榜樣：「宣講天國的福音，又醫治各樣的病症。」（太9:35）——有真理（神的話），也有能力（聖靈）。","⟦g:靈讓人經歷神，悟讓人明白神——兩者缺一不可⟧。⟦b:只有靈、沒有悟，會像沒有根的火，燒得快也滅得快；只有悟、沒有靈，會像沒有電的燈，有形體卻不發光⟧。"],"deeper":{"q":"想更深？「靈」和「悟」要平衡——但教會裡好像總分成兩種人：一種很「追求聖靈、很有感動」卻不太讀經；一種很「追求真理、很會查經」卻比較冷、沒能力。為什麼會這樣分裂？我該怎麼不偏向任何一邊？","a":"你觀察到的這個現象非常普遍——這幾乎是教會歷史上反覆出現的張力，常被稱為「靈恩」與「真理」的兩極。看懂成因，能幫你避開兩邊的坑。先說為什麼會分裂：根本原因是人的「肉體」傾向於「選一個自己舒服、擅長的，然後排斥另一個」。偏「靈」的人，被經歷、感動、能力吸引（這些確實寶貴、真實），但若不肯下功夫扎根真理，就容易停在「感覺」層次——感動一波波，生命卻沒有真理的根基，於是容易漂、容易被帶偏、火熱一陣就退。偏「悟」的人，被真理的清晰、系統、可掌握吸引（也寶貴），但若把信仰變成純「知識研究」，心卻沒向聖靈敞開、沒真實經歷神、沒活出來，就容易變成「字句」——頭腦滿了，生命卻冷了，甚至像法利賽人那樣，聖經滾瓜爛熟卻認不出神。你看，兩邊其實是「同一個病」的兩種症狀——都缺了「與神生命真實的連結」：偏靈的缺「真理的根基」，偏悟的缺「聖靈的生命」。但聖經給的圖畫從來是「合一」，不是「二選一」。這一課用耶穌作榜樣：祂「宣講天國福音（真理／悟），又醫治各樣病症（能力／靈）」——在耶穌身上，靈與悟完美合一。彼得在五旬節「講解聖經（悟）」，同時「聖靈帶著能力（靈）」，三千人歸主。那你該怎麼辦？第一，認清這不是「立場之爭」，而是「都要、且要平衡」——不要被「我是追求真理派／追求聖靈派」這種標籤綁住，那本身就是肉體的分裂；你要的是耶穌，而耶穌兩者都滿有。第二，誠實看自己「天生偏哪一邊」，然後「刻意補另一邊」：偏靈的，刻意下功夫扎根聖經、接受真理的修正，免得漂浮；偏悟的，刻意向聖靈敞開、渴慕經歷神、把真理活出來，免得冷掉、變成字句。第三，記得這一課最深的洞見：你追求的「悟」，本來就「需要聖靈」才能真正得到——真正的「悟」（啟示）不是靠頭腦研究出來的，是「聖靈引導你明白真理」（約16:13）開啟出來的！所以真正的「悟」裡面，本就含著「靈」；而真正的「靈」（聖靈），祂的工作正是「引導你進入真理（悟）」。靈與悟在神的設計裡根本是一體兩面、彼此需要、彼此成全——是人的肉體硬把它們撕開。結論很美：你不需要選邊站，你需要的是「謙卑地、完整地追求神自己」——因為神既是「聖靈的神」，也是「真理的神」；既要你「經歷祂」，也要你「明白祂」。當你緊緊跟隨這位完整的神，靈與悟就會在你裡面自然合一，讓你的服侍既有真理的根基（不漂），又有聖靈的能力（不冷）。"}},{"h":"二從字句到啟示：真理進入生命","paras":["很多人讀經，只停在「字句」。但聖經說：「人活著，不是單靠食物，乃是靠神口裡所出的一切話。」（太4:4）⟦b:關鍵在於——話是否「活」在你裡面⟧。「神的道是活潑的，是有功效的。」（來4:12）","⟦g:當聖靈開啟你，你會經歷——同一段經文，突然「看懂了」；同一句話，突然「刺入心中」；同一個真理，變成「生命力量」⟧。這就是「悟」。","⟦b:字句像白米（生的、難消化）；啟示像白飯（煮熟了、能吃、能成長）⟧。⟦g:沒有悟 → 難消化；有悟 → 能成長⟧。當真理變成啟示，你的觀念會改變——⟦g:觀念改變 → 生命改變 → 生活改變⟧。"],"deeper":{"q":"想更深？「等聖靈開啟、等真理變成啟示」聽起來好被動。如果我讀經一直「沒感覺、沒亮光、就是平淡的字句」，我該怎麼辦？難道只能乾等嗎？我能做些什麼，讓真理從「字句」變成「啟示」？","a":"好消息是：從「字句」到「啟示」，你「絕對不是只能乾等」。先安慰你：「讀經沒感覺、就是平淡的字句」是幾乎每個認真讀經的人都會經歷的常態，完全不代表你有問題或不屬靈。啟示的「亮光時刻」確實是聖靈主權的恩賜（你無法用方法「製造」它），但你可以「預備好土壤、擺對自己的位置」，讓那恩賜更容易臨到。給你幾個可操作的功課。第一，最關鍵的——「謙卑」。這一課說得很重：「謙卑的人得啟示，驕傲的人得知識。」法利賽人讀那麼多卻不明白，是因「自以為懂」。所以讀經前，先放下「這段我讀過、我懂」的心，用「主啊，我不懂，求祢教我」的空杯、飢渴、受教的心來讀。這個「心的姿態」，比任何方法都重要。第二，「反覆思想」（默想）。「晝夜思想……就可以亨通」（書1:8）。不要趕進度式讀完就放下，而是選一句、停下來、慢下來、嚼一嚼——一整天帶在身上反覆想：這句話在說什麼？神透過它要對「我」說什麼？很多時候「突然看懂」不是發生在讀經當下，而是在你反覆咀嚼的某一刻，你洗碗、走路、遇到一件事時，那句話突然「活」了過來。第三，「禱告求開啟」。讀經前後直接求：「求祢開我的眼，使我看出祢律法中的奇妙」（詩119:18 是大衛親自的禱告）。把讀經當成「與神對話」，求祂向你說話。第四，「去行、去活出來」——這是最常被忽略、卻最有效的鑰匙！耶穌說「人若立志遵著祂的旨意行，就必曉得這教訓」（約7:17）——順序是「先願意行，就必曉得」。很多時候你讀不出亮光，不是讀得不夠多，而是「上一個已經明白的真理還沒去行」。當你把已懂的那一點點真理活出來、順服出去，神就向你開啟「更多」——因為神把更深的啟示，賜給那「忠心去行」的人。第五，「分享、講出來」。當你把領受的、哪怕只是一點點的真理分享給別人，你會發現在「講」的過程中，那真理變得更清楚、更深、更活。第六，給你一個釋放：不要用「有沒有強烈的亮光感覺」來衡量讀經的價值。有時候神的話是「平靜地、不知不覺地」滋養你——就像吃飯，你不會每一口都被震撼，但每一口都在供應你生命。哪怕「平淡地讀」，只要帶著謙卑敞開的心持續讀，神的話都在你裡面默默做工、累積、扎根，到時候自然發出力量。所以不要因為「今天沒感覺」就停下、灰心。結論是：你不是只能乾等。你可以「謙卑空杯地讀、反覆咀嚼地想、敞開禱告地求、忠心順服地行、分享建造地講」——把這些當成「預備土壤」的功課，然後把「何時賜下亮光」的主權，安心交給聖靈。你負責忠心撒種、鬆土、澆灌，神負責叫它生長。而那個「突然看懂」的恩典，往往就臨到那些「在平淡中仍謙卑忠心、持續親近神話語」的人身上。"}},{"h":"三如何領悟：謙卑與反覆思想","paras":["領悟不是靠聰明，而是靠「謙卑」。「父啊……你將這些事向聰明通達人就藏起來，向嬰孩就顯出來。」（太11:25）⟦s:為什麼法利賽人讀很多聖經卻不明白？「看是看見，卻不曉得」（可4:12）——因為驕傲、因為自以為懂⟧。⟦g:謙卑的人得啟示，驕傲的人得知識⟧。","另一個關鍵是「反覆思想」。「這律法書……你要晝夜思想……就可以亨通。」（書1:8）領悟的過程是：看（讀經）→ 聽（領受）→ 想（反覆思想）→ 講（分享）→ 行（活出來）。","⟦b:當你反覆思想、分享、實踐，啟示會加深、信心會增加、生命會改變⟧。最後你會發現——⟦g:不是人推你服侍，是神的話在你裡面推動你⟧。這樣的服侍，才會持久。"],"pq":"沒有領悟的服侍，會疲累、不穩定、容易放棄；有領悟的服侍，有根基、有方向、有動力——啟示，才是服侍持久的關鍵。","deeper":{"q":"想更深？「看聽想講行」這個循環，跟前面講「生命」（第八單元）時的「看聽想講行」是一樣的嗎？為什麼領悟真理、和培養生命，用的是同一套「看聽想講行」？這套東西到底是什麼，怎麼會貫穿這麼多地方？","a":"你的觀察很敏銳。是的，這裡的「看聽想講行」，和第八單元「生命——看聽想講行的更新」是同一套；不只如此，它其實貫穿了整個321的生命操練。為什麼？因為「看聽想講行」描述的，是「神的話（或任何東西）進入人、改變人、再從人流出的完整生命通道」——它是生命被塑造、被更新的「機制」本身。先看這五個字描繪的是什麼：神造人，生命的輸入與輸出，就是透過這五個管道——你「看」什麼、「聽」什麼（這是輸入，真理、影響從這兩個門進來）；進來之後，你「想」什麼（這是內在的消化、默想，輸入在這裡被吸收、變成你的一部分）；然後你「講」什麼、「行」什麼（這是輸出，你裡面成為的，透過嘴和行為流露出去）。所以「看聽想講行」就是一個完整的生命迴路：輸入（看、聽）→ 內化（想）→ 輸出（講、行）。明白這個，你就懂為什麼它貫穿這麼多地方——因為「凡是要真實進入並改變生命的東西，都必須走完這條通道」。在「悟」（領悟真理）這裡：神的話要從「字句」變成「啟示」、變成生命，就必須走完這條路——你「看」（讀經）、「聽」（領受），然後「想」（反覆思想，這是字句變啟示的關鍵），再「講」（分享，啟示就加深）、「行」（活出來，真理就成為生命）。若只「看、聽」卻不「想、講、行」，真理就停在頭腦的字句，進不到生命——這正是很多人讀經、聽道很多卻不改變的原因。在「命」（培養生命，第八單元）那裡：生命的改變、新人的培養，也是透過更新這五個管道——刻意「看」屬神的、「聽」屬神的、「想」屬神的，進而「講」造就的、「行」榮耀神的。你「看聽想講行」什麼，就漸漸成為什麼。在下一課「命（二）捨己」那裡，你也會看到：每天的捨己，正是在「看聽想講行」這五個選擇裡，一次次選擇「為主、不為己」。所以這套「看聽想講行」反覆出現，不是321在重複囉嗦，而是因為它觸及了「生命如何被塑造」這個最根本的機制。這帶給你一個極實用的洞見：如果你想在任何一方面被神改變（更明白真理、更有生命、更能捨己、更像耶穌），你都可以回到這五個管道來「動手」——檢視並調整你每天在「看、聽、想、講、行」什麼。因為「一生的果效是由心發出」（箴4:23），而「心」正是被你「看聽想講行」什麼所餵養、所塑造的。長期「看聽想講行」屬神的，心就被神充滿、生命就屬神；長期「看聽想講行」屬世的，心就被世界充滿、生命就屬世。這就是為什麼321如此看重這五個字——它不是口號，而是「改變從我開始、從每一個看聽想講行的選擇開始」的、最具體、最可操作的生命操練。掌握了「看聽想講行」，你就握住了讓真理進入生命、讓生命不斷被更新的那把總鑰匙。"}}],"focus":"我讀了那麼多經、聽了那麼多道，\n它們是停在我的「頭腦」（字句、資訊），\n還是進到了我的「生命」（啟示、改變）？\n是什麼，攔在中間？","hope":{"t":"✺ 神的話，要從你的頭腦，住進你的生命","paras":["也許你曾困惑：明明讀了那麼多、知道那麼多，生命卻好像沒什麼改變。這一課要給你盼望：⟦b:問題不在你讀得不夠，而在真理還停在「字句」、還沒成為「啟示」⟧。而從字句到啟示的鑰匙，不是更聰明，是更謙卑、更反覆思想、更願意活出來。","⟦g:當聖靈開啟你，同一句你讀過無數次的話，會突然「活」過來、刺入你心、成為改變你的力量⟧。你不必羨慕別人的恩賜或學問——你只要謙卑地來、慢慢地嚼、忠心地行，神就會親自把祂的話，從你的頭腦，住進你的生命。那時你會發現，不是你在勉強服侍，而是神活潑的話，在你裡面推動著你。"]},"still":"此刻安靜——\n想一句我「很熟、卻從沒真正活出來」的經文。\n求聖靈現在就向我「開啟」它：\n主啊，這句話，\n對我此刻的生命，\n究竟是什麼意思？","still_hint":"不必求很多，一句就夠。\n安靜一分鐘，\n讓那句話慢慢沉進心裡：\n「主啊，開我的眼，\n使我看出祢話語中的奇妙。」","steps":[{"act":"讀經不只閱讀、尋求啟示：讀經時不急著讀完，而是問「主啊，祢今天要對我說什麼？」每天寫下一句神對你說的話。","meta":""},{"act":"反覆思想、開口分享：選一句經文一整天反覆默想；並把你的領受分享給一個人，讓啟示加深。","meta":""},{"act":"實際行動、保持謙卑：把所領受的真理刻意活出來；每次讀經前先禱告——「主啊，我需要祢教我。」","meta":""}],"declare":"主耶穌，我宣告：\n我不只讀祢的話，我要明白祢的話，活出祢的話。\n求祢的聖靈開啟我，使我從字句進入啟示，從知識進入生命。\n給我謙卑的心，讓我晝夜思想祢的話，並且活出來。\n使我的生命被更新，使我的服侍有根基、有能力。\n一切榮耀歸給祢。\n奉主耶穌的名，阿們。","share":[{"tag":"領受","q":"「字句叫人死，精意（啟示）叫人活」——回想你信主以來，有沒有哪一次，一句你早就熟悉的經文「突然活了過來」、改變了你？那是怎麼發生的？"},{"tag":"省察","q":"誠實面對：我讀經、聽道，是比較像「累積知識（資訊）」，還是「渴慕遇見神、被神的話改變（啟示）」？是什麼讓它停在了頭腦？"},{"tag":"同行","q":"這禮拜，請你選一句經文，每天反覆思想，並至少分享給一個人。看看當你「想」和「講」之後，它如何在你裡面變得更深。說出來，讓小家的家人陪你一起、彼此守望。"}],"next":"服侍之路—命（一）","prog":"53"},{"n":165,"unit":"第十單元 · 服侍——靈悟命侍神的得勝之路","title":"沒有生命，\n服侍沒有影響力","no":"165","greet":"願你來到主的面前，得享安息","verse":"信心若沒有行為就是死的。","verse_ref":"雅各書 2:17","bigidea":"本課核心：有靈、有悟，若沒有進入「命」（把真理活出來），影響力就不長久。真正的服侍必須從靈→悟→命：當真理變成生命，從裡到外被更新（舊人有己→新人無己），才會以命傳命、產生真實的影響力。","lead":"很多人有感動、有啟示，也很愛主，但為什麼服侍的影響力不長久？因為少了一個關鍵——沒有進入「命」。「信心若沒有行為就是死的。」（雅2:17）有靈、有悟，卻沒有行動；有感動、有啟示，卻沒有活出來——這樣的信仰，仍停在頭腦與感覺，還沒進入「生命」。真正的服侍，必須從靈→悟→命。","sections":[{"h":"一從啟示到生命：把真理活出來","paras":["「我對你們所說的話就是靈，就是生命。」（約6:63）⟦b:神的話不只是讓我們明白，更是要讓我們「活出來」⟧。⟦s:很多人停在這裡——聽道 → 感動 → 結束⟧；⟦g:但神的心意是——聽道 → 領悟 → 行道 → 成為生命⟧。","「凡聽見我這話就去行的，好比一個聰明人，把房子蓋在磐石上。」（太7:24）⟦b:關鍵不是你聽了多少，而是你活出多少⟧。","⟦g:不是知道多少，而是活出多少⟧。當你開始活出來，真理就從「外面」進到「裡面」，從「觀念」變成「生命」。"],"deeper":{"q":"想更深？「信心沒有行為就是死的」（雅各書）——可是保羅明明說「人稱義是因著信，不在乎遵行律法」、「不是出於行為」。那到底是「因信稱義」還是「要靠行為」？這一課這麼強調「行出來、活出來」，會不會又把人帶回「靠行為」的老路、失去恩典？","a":"這是基督信仰裡一個極重要、也常被誤解的問題，而保羅和雅各「其實一點都不矛盾」——他們是從兩個不同角度，講同一個完整的真理。釐清了，你會既緊緊抓住恩典，又明白為什麼要「活出來」。關鍵在於：他們在回答「兩個不同的問題」。保羅（羅馬書、加拉太書）在回答的是：「人『如何』被神稱義、得救？靠什麼？」他的對手，是那些主張「要靠遵行律法、靠行為才能得救」的人。所以保羅斬釘截鐵地說：得救「完全是恩典、單單因信、絕不靠行為」——你不能用任何善行去「賺取、換取」救恩，救恩是神白白的禮物，你只能憑信心領受（弗2:8-9）。這一點，是整個福音的根基，永遠不能動搖。雅各回答的，卻是另一個問題：「一個『宣稱自己有信心』的人，怎麼知道他那信心是『真的、活的』，還是『假的、死的』？」雅各對付的，是那些「嘴上說信、生命卻完全沒有任何改變、毫無行為見證」的人。所以雅各說：「信心若沒有行為就是死的」——他的意思不是「你要靠行為得救」，而是「真信心『必然會』結出行為的果子；如果一個人口稱有信、生命卻毫無動靜、毫無果子，那要懷疑的是：他那『信心』根本是假的、死的，從來沒真正得救過。」你看，兩人完全不衝突。用一句話縫起來就是：「人得救，是『單單因信、不靠行為』（保羅）；但那使人得救的真信心，是『必然會活出行為』的（雅各）。」行為不是得救的『原因』，而是真信心、真生命的『證據和果子』。回到你的擔憂：這一課強調「活出來、行出來」，會不會把人帶回靠行為的老路？答案是：不會，只要你看清「次序」。這一課（和整個321）的次序，從來是「靈→悟→命」——是先有聖靈（靈）、領受真理（悟），然後這真理「自然」流露成生命、活出來（命）。「行出來」是放在「後面」的，是生命的「果子和流露」，不是放在「前面」的、用來換取什麼的「條件」。這正像第158課早就釐清過的：「得救是恩典，服事（行善）是得救的目的與結果，不是條件。」一棵蘋果樹結蘋果，不是「為了變成蘋果樹」（它早就是了，這是恩典、是身份），而是「因為它本來就是蘋果樹」（生命自然的流露）。所以這一課要對付的，恰恰不是「不夠努力行善」，而是「停在頭腦的感動和知識裡、卻沒有真實的生命」——它要的不是「你去拼命做來證明自己、來賺取什麼」，而是「讓那因信白白得到的生命，真實地活出來、流露出來」。差別在哪？「靠行為」的老路，是「靠自己努力做，來賺取神的接納、證明自己的價值」——這是有己、是律法、是重擔，做到死也沒有平安。「活出生命」的恩典之路，是「因為已經白白被愛、被救、被基督充滿了，這生命自然渴望流露、自然結出果子」——這是無己、是恩典、是輕省，因為「不是我活，乃是基督在我裡面活」（加2:20），是基督的生命透過我活出來，不是我靠自己撐出來。所以你可以完全安心：你的得救，穩穩立在恩典上，一點不靠你的行為。而正因為你白白得了這麼大的恩，這恩典會在你裡面化成一股生命，「自然地」想要活出來、流露愛、結出果子。這一課要你「活出來」，不是要你回去靠行為賺救恩，而是邀請你——別讓神的話只停在頭腦的感動，要讓那已經住進你裡面的基督生命，真實地、自由地，從你活出來。"}},{"h":"二生命的改變：從裡到外的更新","paras":["神的話有能力，能改變人的生命。「耶和華的律法全備，能甦醒人心。」（詩19:7）「不要效法這個世界，只要心意更新而變化。」（羅12:2）⟦g:這裡講到一個關鍵——觀念改變 → 生命改變 → 生活改變⟧。","「並且穿了新人。這新人……漸漸更新。」（西3:10）⟦b:生命的改變不是一瞬間，而是一個「漸漸更新」的過程⟧。⟦g:舊人有己 → 新人無己；靠自己 → 靠基督⟧。","⟦g:改變觀念，就改變生命；改變生命，就改變生活⟧。當你的生命改變，你的服侍就自然有力量——⟦b:因為你不再是「做」一個基督徒，而是「是」一個基督徒⟧。"],"deeper":{"q":"想更深？「漸漸更新」聽起來很慢——我信主這麼久了，有些老毛病、有些「有己」的東西，怎麼還是改不掉、一犯再犯？是不是我生命根本沒有真的改變？這種「漸漸」的緩慢，常讓我灰心、懷疑自己。","a":"我聽見這份灰心，這是許多真心愛主、真心想改變的人最深的掙扎。讓我用幾個角度陪你重新看，盼望能把灰心換成盼望與耐心。第一，要先抓住這一課給的關鍵詞——「漸漸更新」。聖經用的詞是「漸漸」（西3:10），不是「立刻」、不是「一次到位」。這意味著什麼？意味著「緩慢、反覆、需要時間」恰恰是神所設定的「正常過程」，而不是「你失敗的證據」。生命的改變，神設計的方式不是「瞬間變身」，而是像種子長成大樹、像嬰孩長成成人——是一個有過程、有季節、需要耐心的「生長」。所以當你發現「怎麼還這麼慢、還在反覆」，那不代表你沒在改變，反而正說明你走在神所設定的「漸漸更新」的真實路上。會「一蹴可幾、立刻完美」的，往往才是假的、表面的。第二，要分清「成聖是過程」與「沒有生命」的差別。你擔心「是不是我生命根本沒真的改變」——這裡有個很重要的分辨。一個「生命沒真的改變」的人，特徵是「不痛、不在乎、無所謂」——他犯罪、活在有己裡，心裡毫無掙扎、毫無不安、根本不想改。但你呢？你會「灰心、會懊惱、會渴望改變、會在意自己還改不掉」——這份「掙扎與渴望」本身，恰恰是「生命真的改變了、聖靈真的在你裡面動工」的鐵證！沒有新生命的人，是不會為這個痛苦的。死人不會痛，會痛的正是活著的人。所以你的掙扎不是你沒生命的證據，而是你「裡面的新人（無己），正在與舊人（有己）爭戰」的證據——這場爭戰本身，就證明新生命真實地活著、並且在長大（加5:17描述的正是這場聖靈與肉體的爭戰，這是每個真信徒都會經歷的）。第三，看「方向」，不要只看「速度」或「單次的跌倒」。生命的改變，要看的是「長期的、整體的方向」，不是「某一次的失敗」。問自己：拉長到一年、三年、五年來看，我這個人的「整體方向」，是不是在朝著神、朝著無己、朝著愛慢慢挪移？對罪的敏感度有沒有增加？跌倒後爬起來、回到神面前的速度有沒有變快？心裡渴慕神的心有沒有比以前多？如果「大方向」是對的，那麼某一次、某一段的反覆跌倒，不能定義你——就像一個人爬山，整體在往上走，不代表中間不會有下坡、不會滑倒幾次。撒但最喜歡用「單次的失敗」來騙你「你根本沒進步、你無可救藥」，好讓你灰心放棄；但神看的是你「整個生命被恩典挪動的方向」。第四，這正是321「不是對付，而是培養」的功課（第112-113課）。我們對付老毛病的方式，常常是「盯著那個壞習慣，用意志力硬壓、硬戒」——結果越壓越累、越戒越反彈、越灰心。但神的方式是「培養新生命」：不是把焦點放在「我又犯了、我好糟」（那只會餵養挫敗），而是把焦點放在「親近神、被基督的生命充滿、餵養裡面的新人」。當新人（無己、基督的生命）一天天被餵養、長大、強壯，舊人（有己、老毛病）就自然一天天被擠出去、失去地盤。這是「以生命勝過老我」，不是「以意志力對抗老我」。所以與其天天盯著「我為什麼還改不掉」而灰心，不如把力氣轉去「天天親近主、被祂充滿、活出已經懂的真理」——讓那位住在你裡面的基督，由內而外地把你更新。第五，最要緊的——把眼睛從「自己的表現」轉向「神的恩典與信實」。你會灰心，常常是因為焦點在「我改得好不好、我夠不夠格」（這其實又是一種「有己」——以自己的表現為中心）。但你站立得穩、你能改變，從來不是靠你「表現夠好」，而是靠「神的恩典和祂的信實」。聖經給你一個極大的安慰與保證：「那在你們心裡動了善工的，必成全這工，直到耶穌基督的日子」（腓1:6）——是「神」動的工，也是「神」負責成全，祂絕不會做一半就放棄你！你的改變，最終的保證不在你的努力夠不夠，而在「祂必成全」這個應許上。所以，親愛的，請不要灰心，也不要懷疑。你的緩慢，是「漸漸更新」的正常；你的掙扎，是「新生命真實活著」的證據；你要看的，是「長期的方向」而非「單次的跌倒」；你要做的，是「培養新生命」而非「硬壓老毛病」；你最終的盼望，是「那位開始善工的神，必親自成全」。改變，本就是一條一生之久、神與你同行、由祂親自完成的路——你只管謙卑地、忠心地、不放棄地，一天天親近祂、讓祂更新你。祂的恩典夠你用，祂的工必不落空。"}},{"h":"三生命的見證：以命傳命","paras":["耶穌的服侍，不只是講道，更是用生命活出來——⟦b:祂活給我們看，祂也死給我們看⟧。但很特別的是：很多人因神蹟跟隨祂，卻在困難來時離開祂。","⟦s:這說明，只有靈與悟，影響短暫⟧；⟦g:加上命，才有根基⟧。「房子總不倒塌，因為根基立在磐石上。」（太7:25）⟦b:真正影響人生命的，不是道理，而是生命⟧。","⟦g:以命傳命，以命影響命⟧。使徒們為什麼能改變世界？因為他們不只傳道，他們是「活出耶穌」，甚至願意擺上生命。⟦g:最有影響力的，不是口才，而是生命⟧。"],"pq":"沒有生命的服侍，很快、很熱，但不持久；有生命的服侍，穩定、有根、有影響力——關鍵不是你做多少，而是你活出多少。","deeper":{"q":"想更深？「以命傳命、最有影響力的是生命不是口才」——可是我覺得自己的生命實在很普通、甚至很軟弱，沒什麼好「傳」給別人的、沒什麼見證。那像我這樣平凡軟弱的人，怎麼可能「以命傳命」、影響別人？這不是只有那些很成熟、很厲害的屬靈偉人才能做到嗎？","a":"這是一個讓很多人卻步的迷思，而拆解它會大大釋放你。先說一個翻轉性的真相：「以命傳命」最有能力的，常常不是那些「看起來完美無瑕的屬靈偉人」，恰恰是那些「在軟弱中真實經歷神、被神恩典托住」的平凡人。為什麼？讓我們一層層看。第一，「以命傳命」傳的不是「我的完美」，而是「基督在我這軟弱人身上的真實」。如果「以命傳命」是要你先變成一個無懈可擊、毫無軟弱的「屬靈樣板」，那確實沒人做得到，連保羅都說自己是「罪人中的罪魁」（提前1:15）。但聖經給的圖畫完全不是這樣。保羅怎麼說？「我們有這寶貝放在瓦器裡，要顯明這莫大的能力是出於神，不是出於我們」（林後4:7）——你是「瓦器」（平凡、易碎、不起眼），但裡面有「寶貝」（基督的生命）；而神「故意」把寶貝放在瓦器裡，「為要顯明能力是出於神、不是出於你」！換句話說，你的平凡軟弱，不但不是攔阻，反而是神的舞台——正因為你這麼平凡，當別人在你身上看見愛、看見改變、看見從困境中站起來的力量時，他們會知道「這不可能是這個普通人自己做到的，這一定是神」。你的軟弱，反而讓基督更被看見。第二，「真實」比「完美」更有能力。人最容易被什麼觸動、被什麼吸引？不是一個「看起來什麼都好、毫無破綻、高高在上」的人（那反而讓人有距離、覺得「他是他、我是我」）；而是一個「真實的人」——一個會軟弱、會掙扎，卻在軟弱中仍然抓住神、仍然被神的恩典一點點改變的人。當你誠實地說「我也很軟弱，但神在我這樣的人身上做了這些事」，那個正在掙扎的人會想「原來像我這樣的人也可以、原來神連這樣的人都不放棄」——這份「真實的盼望」，比任何完美的見證、漂亮的口才都更能進到人心。你的軟弱被神恩典托住的故事，就是別人的盼望。第三，「以命傳命」不需要你「夠成熟才能開始」，它就藏在每天平凡的生活裡。你不需要站上講台、不需要有驚天動地的見證。「以命傳命」最常發生在最平凡的地方：你在壓力下仍然選擇溫柔、你被得罪了仍然選擇饒恕、你在困難中仍然信靠神、你誠實正直地工作、你耐心地愛一個難愛的家人、你在小事上忠心……這些「平凡卻真實」的生命流露，正在無聲地「傳命」——你身邊的人都看在眼裡。你不是靠「講」一篇大道理去影響人，而是靠「活」出一個有基督的生命去感染人。而這，平凡軟弱的你，今天就能開始。第四，記得這整個單元的核心：能「傳命」的，從來不是「你」，是「住在你裡面的基督」。「以命傳命」若是靠「你自己的生命有多好」，那確實會把人壓垮（永遠覺得自己不夠好）。但321一直強調「不是我，乃是基督」——是「基督的生命透過你」影響人，不是「你的生命」影響人。你的責任，不是「把自己修煉成偉人」，而是「無己、讓基督在你裡面活、作王」（這正是下一個字「侍」）。當你越無己、越讓基督充滿你、越讓祂透過你那平凡的瓦器流露出來，「傳命」就自然發生了——不是你多厲害，是耶穌透過你被看見。所以，親愛的，請別再用「我太平凡、太軟弱」把自己關在門外。神要用的，從來就是平凡軟弱的人——彼得是漁夫、馬太是稅吏、保羅自認罪魁、摩西口才笨拙。神不是在找「夠厲害的人」，祂在找「願意讓基督在他裡面活的人」。你的瓦器越是平凡，裡面那寶貝就越是顯明是出於神。你不需要先變偉大才能傳命；你只需要真實地、謙卑地，讓基督的生命一點一滴從你這平凡的器皿裡流出來——那就是最有能力、最能觸動人心的見證。"}}],"focus":"我的信仰，\n是停在「我知道、我感動了」，\n還是已經「活出來、成為生命」？\n別人在我身上，\n看見的是「道理」，\n還是「一個有基督的生命」？","hope":{"t":"✺ 你不是要「做」基督徒，是要「是」基督徒","paras":["也許你曾用力地「做」基督徒——做很多事、懂很多道理，卻覺得乾、覺得累、覺得影響不了人。這一課要帶你進入更深、也更輕省的地方：⟦b:真正有影響力的，不是你做了多少、懂了多少，而是你活出了誰⟧。當真理從你的頭腦，漸漸更新成你的生命，你就不再是「做」一個基督徒，而是「是」一個基督徒。","⟦g:而這生命的改變，是「漸漸更新」的——不急、不必完美，神會親自動工，直到祂完成⟧。你的軟弱不是攔阻，反而是神的舞台：當人在你這平凡的瓦器裡，看見基督真實的愛與改變，他們就會被吸引、被影響。原來，最深的服侍與見證，不是你多會講，而是基督透過你，被人看見、被人遇見。"]},"still":"此刻安靜——\n問自己：\n我最近領受、感動的那個真理，\n我「活出來」了嗎？\n還是它仍停在我的筆記本、\n我的頭腦裡？","still_hint":"不必自責，從一個真理開始就好。\n安靜一分鐘，\n把它交給主：\n「主啊，幫助我把這真理活出來，\n讓祢的生命，從我流露出來。」","steps":[{"act":"選擇行動、把一個真理活出來：每天不只領受，而是選一個真理去實踐（愛人、饒恕、忍耐）。","meta":""},{"act":"檢視生命、持續更新：問自己「我今天活出我所信的嗎？」並寫下一個需要被神改變的觀念。","meta":""},{"act":"活出榜樣、願意付代價：在一件事上活出基督的樣式，讓人從你身上看見耶穌；在一件不容易的事上選擇順服神。","meta":""}],"declare":"主耶穌，我宣告：\n我不只要明白祢的話，我要活出祢的話。\n求祢的生命在我裡面成長，使我從知識進入生命，從領受進入活出。\n我願意被祢改變，脫去舊人，穿上新人，活出基督的樣式。\n使我的生命成為見證，用生命影響生命。\n一切榮耀歸給祢。\n奉主耶穌的名，阿們。","share":[{"tag":"領受","q":"「以命傳命，最有影響力的是生命不是口才」——回想你的生命中，有沒有一個人，是用他「活出來的生命」（而不是說了什麼大道理）深深影響了你？"},{"tag":"省察","q":"誠實面對：我目前的服侍與信仰，比較像「用力地做基督徒（做事、懂道理）」，還是「自然地是基督徒（生命流露）」？差別在哪裡？"},{"tag":"同行","q":"這禮拜，請你選一個「已經很懂、卻一直沒活出來」的真理，刻意去行出來一次。說出來，讓小家的家人陪你一起、彼此守望。"}],"next":"服事之路—命（二）","prog":"60"},{"n":166,"unit":"第十單元 · 服侍——靈悟命侍神的得勝之路","title":"毫無保留，\n活出耶穌","no":"166","greet":"願你來到主的面前，得享安息","verse":"不背著他的十字架跟從我的，也不配作我的門徒。","verse_ref":"馬太福音 10:38","bigidea":"本課核心：服事的核心是「命」——耶穌的生命，而這生命的核心是「無己」。無己不是口號，是一個一個「捨己」的選擇累積出來的；毫無保留的捨己（一顆不怕付代價的心），才能進入無己、活出最有吸引力的生命。","lead":"在服事的道路上，最關鍵的不是能力，而是「生命」。很多人以為服事是做很多事、付出很多時間，但主耶穌看重的，從來不是外在的事工，而是裡面的生命。「命」，就是耶穌的生命——這生命的核心，不是「有己」，而是「無己」；不是為自己活，而是為耶穌、為別人活。神對我們是毫無保留的愛（約3:16），耶穌為我們是毫無保留的捨。今天我們要學的，不是如何做更多，而是如何活出這樣「毫無保留」的生命。","sections":[{"h":"一捨己是進入無己生命的唯一道路","paras":["⟦b:「無己」不是一個口號，而是一個一個「捨己」的選擇累積出來的生命⟧。什麼是捨己？⟦g:為耶穌、為別人、不為自己⟧——這就是十字架的道路。「不背著他的十字架跟從我的，也不配作我的門徒。」（太10:38）","⟦s:當我們選擇自己，就活在「有己」⟧；⟦g:當我們選擇耶穌，就進入「無己」⟧。彼得、安得烈、雅各、約翰為什麼能成為門徒？因為他們「立刻捨了網、捨了船、別了父親」來跟從耶穌（太4:20-22）——關鍵不是比較屬靈，而是「沒有保留」。","⟦s:相反地，那少年官有行為、有道德、有追求，卻「有保留」，所以「憂憂愁愁地走了」（太19:22）⟧。⟦b:不是你做多少決定你的人生，是你「保留多少」決定你能不能跟隨主⟧。⟦g:不是努力更多，而是放下更多⟧。"],"deeper":{"q":"想更深？「毫無保留、捨己、背十字架」——這聽起來好沉重、好可怕，像是要我放棄一切、過很苦的日子。難道跟隨耶穌、活出無己，就一定要「失去」很多、把自己搞得很慘嗎？這讓我害怕，也讓我有點抗拒。","a":"我完全理解這份害怕與抗拒——「捨己、毫無保留、背十字架」這些詞，表面聽起來確實像在要求你「失去、犧牲、過苦日子」。但讓我幫你看見它真正的、被福音照亮的面貌，你會發現它不是通往「悲慘」，而是通往「真正的豐盛與自由」。第一，先翻轉一個對「捨己」最大的誤解：捨己不是「失去」，是「交換」——而且是一場「穩賺不賠」的交換。耶穌怎麼說？「凡為我失喪生命的，將要得到生命」（太10:39）；「一粒麥子……若是死了，就結出許多子粒來」（約12:24）。你看，捨己的另一面，永遠是「得到」——麥子「捨」了一粒，「得」的是許多子粒；你「捨」了那個窄小、被罪和自我捆綁的舊生命，「得」的是基督那豐盛、自由、無限的新生命。所以捨己不是「淨虧損」，是「把次好的、會朽壞的，換成最好的、存到永遠的」。一個真正嚐過的人會說：「我撇下的，跟我得到的相比，根本不算什麼」（腓3:8 保羅正是這樣說的）。第二，要看清「無己」的真相：無己不是「沒有、虛無、把自己搞慘」，而是「進入無限、活出無限」。這一課和整個單元一再強調：無己「不是沒有生命，是最有能力的生命」；無己「不是失去，而是進入更豐盛的生命」。為什麼？因為「無己」的定義是「不再是我，乃是基督在我裡面活」（加2:20）。當「有己」的你在主導時，你能調動的只有「你自己」那一點點有限、會枯竭的資源；但當你「無己」、讓基督在你裡面活時，你就接通了基督那「無限」的生命與豐盛。所以無己不是把你「掏空成零」，而是把你「從有限的小水管，接上無限的活水源頭」。你失去的是那個會枯竭的小我，得到的是那位永不枯竭的基督。這哪裡是悲慘？這是最大的豐盛。第三，關於「背十字架」會不會「很苦」：要誠實說，跟隨耶穌、捨己，確實「有代價」——會有需要放下的東西、會有不容易的選擇、有時會有為主受的苦。這一課沒有騙你說「都很輕鬆」。但關鍵是「這代價的性質」和「伴隨代價的，是什麼」。世人靠自己過日子，也有代價、也有苦，那種苦是「靠自己撐、孤單、沒有盼望、最後歸於虛空」的苦；而為主捨己的代價，裡面卻有「主的同在、有平安、有喜樂、有永恆的盼望、有基督親自分擔」——耶穌說祂的「擔子是輕省的」（太11:30），不是因為沒有擔子，而是因為「是祂與你一同背、是祂的恩典托著你背」。同樣是流淚撒種，一個是絕望的淚，一個是「必歡呼收割」的淚（詩126:5）。所以那不是「把自己搞慘」，而是「為著那擺在前面的喜樂，甘心忍受十字架」（來12:2，連耶穌都是為著喜樂去背十字架的）。第四，也是最能釋放你的——「捨己」的源頭，是「被愛」，不是「被要求」。這一課開頭就說了：「神對我們，是毫無保留的愛；耶穌為我們，是毫無保留的捨。」你的捨己，從來不是出於「神要求你犧牲、不然就不配」的壓力，而是出於「神已經先毫無保留地愛了你、為你捨了命」的回應。當你真實地被這份愛充滿、被這份愛融化，「捨己」就不再是咬著牙、悲壯地「失去」，而是甜美地、自願地「回應」——就像熱戀中的人，為所愛的人付出、捨下自己，他不覺得是「犧牲、是慘」，反而覺得是「甘心、是喜樂、是愛的自然流露」。一個被基督的愛抓住的人，捨己對他而言不是重擔，是情不自禁。所以，親愛的，請不要害怕。「毫無保留地捨己、活出無己」不是通往悲慘的窄路，而是通往豐盛的門。你放下的，是那個會枯竭、會捆綁你的小我和會朽壞的次好；你得到的，是基督那無限、自由、永恆的生命，和祂親密的同在。而且這一切的動力，不是冷冰冰的要求，是那位「先愛了你、先為你毫無保留捨命」的主，用祂的愛在你裡面點燃的回應。捨己的盡頭，從來不是失去自己，而是在基督裡，第一次找到那個真正自由、真正豐盛、真正活著的自己。"}},{"h":"二毫無保留，是一顆不怕付代價的心志","paras":["「人到我這裡來，若不愛我勝過愛自己的性命……就不能作我的門徒。」（路14:26）「為我失喪生命的，將要得到生命。」（太10:39）⟦g:這是一個關鍵的屬靈原則——你抓住的會失去，你放下的會得到⟧。","毫無保留，其實就是：⟦b:不怕失去、不怕受傷、不怕付代價⟧。但以理就是最好的例子——當命令禁止向神禱告，他仍照常禱告，結果被丟進獅子坑；但因他毫無保留的順服，神親自拯救他，甚至讓外邦君王宣告「他的國永不敗壞」（但6:26）。","⟦b:人不是被你的口才吸引，而是被你的生命吸引⟧。「我若從地上被舉起來，就要吸引萬人來歸我。」（約12:32）⟦g:十字架的生命，本身就帶著吸引力⟧。⟦g:無己不是沒有生命，無己是最有能力的生命；真正的影響力不是掌控，而是捨己⟧。"],"deeper":{"q":"想更深？「不怕死、不怕受傷、毫無保留」——但以理那是被丟獅子坑的極端處境。我只是個過普通日子的人，又不會遇到逼迫殉道，這種「不怕死的心志」對我這種平凡生活，到底有什麼實際的意義？是不是離我很遠？","a":"這是一個很實在的問題，而答案會讓你發現：這顆「不怕死的心志」，其實天天都在你平凡的生活裡被考驗，一點都不遙遠。先釐清一件事：「不怕死的心志」，重點不在「真的去死」，而在「那顆『沒有任何東西能攔阻我跟隨神、順服神』的心」。但以理被丟獅子坑是「結果」，但那顆心志在「結果」來臨之前，早就活在他每天的選擇裡了——經文說他「素常」就一日三次禱告（但6:10），逼迫來時他只是「照常」。也就是說，他不怕死的心志，不是在獅子坑邊突然冒出來的，而是在無數個「平凡的、沒有獅子坑的日子」裡，一次次選擇「神比一切重要」所累積、所煉成的。這對你的意義就清楚了：「不怕死的心志」在你平凡生活裡的真實面貌，是無數個「小小的死」——是每一個「為了順服神、為了愛人，而甘願放下自己、付上代價」的選擇。讓我具體說，你會發現它離你一點都不遠，反而天天都在：當你被同事誤解、很想為自己據理力爭、爭回面子，卻為了主選擇了沉默與饒恕——那一刻，你的「面子、你的對、你的自尊」死了一點點，這就是一次「小小的捨己」。當你很累、很想休息，但家人或一個有需要的人需要你，你甘願擺上——那一刻，你的「舒適、你的權利」死了一點點。當你有機會用一個小謊言、走一條捷徑就能得利益，卻為了在神面前誠實正直而選擇吃虧——那一刻，你的「利益」死了一點點。當你心裡很想論斷、很想說那句傷人的話、很想回應那個情緒，卻為了主忍住、選擇了溫柔與造就——那一刻，你的「情緒、你的痛快」死了一點點。你看，這些不就是你平凡生活裡，天天在發生的事嗎？這每一個「為主、為人，放下自己」的選擇，本質上都是「捨己、是背起那天的十字架、是讓老我死一點點」——這正是這一課第三段要講的：捨己就藏在每天「看聽想講行」的選擇裡。而「不怕付代價的心志」，就是那顆「在這些日常的小選擇裡，願意吃虧、願意放下、願意付代價去順服神、去愛人」的心。所以但以理的獅子坑，對你的意義不是「你將來也要殉道」，而是「你今天，願不願意在這些平凡的小事上，也有那顆『神比我的面子、我的舒適、我的利益、我的情緒更重要』的心？」更深一層說：往往一個人能不能在「大的關口」（真正的逼迫、重大的考驗）站立得住，正是被他在「無數小的關口」上的選擇所決定的。如果在平凡日子的小事上，你都緊抓著自己、樣樣保留、不肯付一點代價，那麼大的考驗來時，你很難突然變得剛強；反過來，如果你在日常無數的小事上，已經一次次操練了捨己、操練了「神比這個重要」，那麼這顆心志就被煉得越來越剛強，大考驗來時，你會發現自己竟然站得住。所以這顆「不怕付代價的心志」，不是少數殉道者的專利，而是每一個平凡信徒，在每一個平凡日子裡，都要、也都能操練的功課。它離你不遠——它就在你下一個「要為自己，還是為主」的選擇裡。而且要記得：你不是靠自己咬牙去「不怕」，而是因為越來越認識、越來越愛這位主，越來越嚐到「捨了會得到」的真實，於是「為祂付代價」這件事，漸漸從「可怕的犧牲」變成「甘心的愛」。"}},{"h":"三從「看聽想講行」活出無己","paras":["很多人以為「捨己」很難，其實它就藏在每天的生活選擇裡。我們每天都在做五個選擇：⟦b:看什麼、聽什麼、想什麼、講什麼、做什麼⟧——這五個，就是你生命的方向盤。","⟦s:當你用自己的眼光看、自己的標準聽、自己的想法想，你就活在「有己」⟧；⟦g:當你用神的眼光看、神的聲音聽、神的真理想，你就進入「無己」⟧。而這一切的起點不在外面，在「靈」：靈 → 悟 → 命 → 侍 → 神。","⟦g:當你持續在「看聽想講行」中選擇捨己，你會經歷一個真實的記號——喜樂（JOY）⟧。⟦s:如果你越服事越累、越做越苦、越沒喜樂，不是因為事情太多，而是因為「沒有捨己」⟧。⟦g:用心就開心，用腦就煩惱；跟隨聖靈有生命，跟隨自己有壓力⟧。"],"pq":"舍己不是壓抑自己，而是讓耶穌在你裡面活；無己不是失去，而是進入更豐盛的生命——不要用力做基督徒，要讓基督活出來。","deeper":{"q":"想更深？這一課說「喜樂（JOY）」是捨己、無己的記號，沒喜樂就是沒捨己。但有時候我明明在順服、在捨己、在為主付代價，心裡卻是辛苦、掙扎、甚至流淚的，一點都不「喜樂」。難道我這樣就是「捨己捨錯了」、或根本沒真捨己嗎？","a":"這是一個很重要、需要細膩分辨的問題，因為若把「喜樂」誤解成「時時刻刻都得開心、毫無掙扎」，反而會讓真正在受苦、在捨己的人陷入不必要的自我懷疑。讓我們把「喜樂」這個記號看得更準確、更深。第一，要分清「喜樂（Joy）」和「快樂、開心（Happiness）」是兩回事。我們常把這兩個混為一談，但聖經講的「喜樂」，跟世人講的「開心」，本質完全不同。「開心、快樂」是「處境性」的——順利就開心，遇到難處就不開心，它隨外在環境上下起伏，很表面、很短暫。但「喜樂」是「生命性」的——它是聖靈所結的果子（加5:22），是一種「不靠環境、深藏在裡面、與主同在所帶來的篤定、平安、滿足」。這就是為什麼聖經能說出一句驚人的話：「在患難中也是歡歡喜喜的」（羅5:3），又能「似乎憂愁，卻是常常快樂的」（林後6:10）。你看，聖經明明白白說，喜樂「可以和憂愁、患難、眼淚同時存在」！所以「喜樂」絕不等於「沒有掙扎、沒有眼淚、表面笑呵呵」。第二，所以你描述的那個狀態——「在順服捨己，心裡卻辛苦、掙扎、流淚」——這「完全不代表你捨己捨錯了，或沒真捨己」。恰恰相反，這很可能正是「真捨己」的樣子！想想耶穌在客西馬尼園：祂順服神的旨意、走向十字架，那是最極致的捨己——可是祂當時「心裡甚是憂傷，幾乎要死」、「汗珠如大血點」、懇切禱告求那杯離開（路22:44）。耶穌那一刻有「掙扎、有憂傷、有眼淚」嗎？有，而且極深。但祂「沒有喜樂」嗎？聖經卻說，祂正是「因那擺在前面的喜樂，就輕看羞辱，忍受了十字架」（來12:2）！你看，在最痛苦的捨己裡，掙扎眼淚與深層的喜樂，是「同時並存」的。所以你「順服得很辛苦、流著淚」，不但不是捨己捨錯了，反而讓你的捨己更像耶穌——真實的捨己本來就常常是「含淚的順服」。第三，那「喜樂作為記號」到底要怎麼正確地理解？這一課要對付的，其實不是「你捨己時有沒有掙扎眼淚」，而是「你的服事，整體上、長期上，是把你帶向『有生命、有平安、有滿足』，還是帶向『乾枯、苦毒、被掏空、想逃』」。分辨的關鍵不在「當下開不開心」，而在「更深處有沒有那份『與主同在的平安和篤定』」。一個「真捨己、為主付代價」的人，哪怕當下流著淚、很辛苦，他「深處」仍有一份說不出的平安——「我雖然難，但我知道我走在對的路上、我與主同在、這是值得的」，這份篤定本身就是喜樂。但一個「沒有真捨己、其實在靠自己硬撐、或為自己在做」的人，他的累是另一種——是「乾枯的、煩躁的、苦毒的、覺得不值得、想放棄、越做越遠離神」的累，那裡面「連深處的平安都沒有」。所以記號不是「表面開不開心」，而是「深處有沒有平安、有沒有與主同在的滿足，整體方向是帶你更親近神還是更乾枯遠離」。第四，這一課真正要提醒的是：如果你發現自己服事得「又累又苦、又乾又煩、毫無喜樂平安、只想逃」，那是一個「警訊」——要回頭檢查，我是不是其實在「靠自己（用腦）、為自己（有己）」做？這時的解法不是「咬牙做更多」，而是「回到源頭，重新捨己、重新讓基督在裡面活」。所以「沒喜樂」這個記號，不是要定你「捨己捨錯了」的罪，而是溫柔地邀請你檢查「源頭和焦點」。但這要和「順服中含淚的掙扎」分清楚——前者是「乾枯、遠離、靠自己」的警訊，後者是「真實、與主同在、卻有代價」的捨己，兩者表面都「不開心」，深處卻天差地別。所以，親愛的，如果你正在「含淚順服、辛苦捨己」，請不要懷疑自己。去看你的「深處」：那裡有沒有一份「雖然難、但我與主同在、我走在對的路上」的平安和篤定？如果有，那你不但沒捨錯，你正走在耶穌走過的路上——含淚撒種的，必歡呼收割（詩126:5）。你當下的眼淚，與那擺在前面的喜樂，並不衝突。真正要警醒的，是那種「乾枯、苦毒、遠離神、靠自己硬撐」的累——若是那樣，就回到主面前，讓祂的愛重新充滿你，重新從「靈」開始。"}}],"focus":"在跟隨主這條路上，\n我是不是像那少年官一樣，\n有一個「捨不得、不肯放、留著的保留」？\n那個讓我「憂憂愁愁」的，\n究竟是什麼？","hope":{"t":"✺ 你放下的，神必加倍還給你","paras":["也許「捨己、毫無保留」讓你害怕——怕失去、怕受傷、怕日子變苦。但這一課要把福音的真相交給你：⟦b:你抓住的會失去，你放下的會得到；捨己不是淨虧損，是把會朽壞的，換成存到永遠的⟧。神對你毫無保留的愛在先，你的捨己，只是被這份愛融化後的回應。","⟦g:無己不是失去，是進入更豐盛的生命；不是把自己搞慘，是讓基督在你裡面活、活出無限⟧。而它就藏在每天「看聽想講行」的小選擇裡——一次溫柔、一次饒恕、一次放下、一次順服。當你這樣一點一點地捨己，你會經歷一個真實的記號：喜樂。因為你不再用力做基督徒，而是讓基督，從你裡面，活出來。"]},"still":"此刻安靜——\n求聖靈光照：\n在我的「看、聽、想、講、行」裡，\n今天有哪一個選擇，\n神正邀請我「為祂捨己」、\n放下那個「自己」？","still_hint":"不必勉強，也不必悲壯。\n安靜一分鐘，\n把那個「保留」交給主：\n「主啊，我願意放下，\n讓祢在我裡面活——不是我，乃是祢。」","steps":[{"act":"每天一個「捨己的選擇」：刻意做一件「不為自己」的決定——想回應情緒卻選擇溫柔、想為自己爭卻選擇放下、想逃避卻選擇順服。從小事開始。","meta":""},{"act":"操練「看聽想講行」對齊神：每天檢視——我看的是屬神還是屬世？聽的是聖靈還是情緒？想的是信心還是懼怕？講的是造就還是傷害？做的是為主還是為己？","meta":""},{"act":"用「喜樂」檢測生命方向：當你失去喜樂（乾枯、苦毒、想逃）時，不是責備自己，而是問——我是不是又靠自己、為自己了？然後重新選擇為耶穌、為別人。","meta":""}],"declare":"主耶穌，我願意放下自己，選擇跟隨祢。\n我不再為自己活，我要為祢而活，為人而活。\n我宣告：我選擇捨己，就活出無己的生命；\n我選擇謙卑，就讓耶穌在我裡面作王。\n我的生命要成為吸引人的生命，使人看見耶穌的榮耀。\n奉主耶穌的名，阿們。","share":[{"tag":"領受","q":"「捨己不是失去，是得到；無己不是搞慘自己，是進入更豐盛的生命」——這個翻轉，對你裡面那個「害怕捨己」的部分，帶來什麼釋放？"},{"tag":"省察","q":"像那位「憂憂愁愁走了」的少年官，你裡面是否也有一個「一直捨不得放下、保留著」的東西（一段關係、一個權利、一個習慣、一份安全感）？"},{"tag":"同行","q":"這禮拜，請你在「看聽想講行」中，刻意做一個「為主捨己」的小選擇（一次溫柔、一次放下、一次順服）。說出來，讓小家的家人陪你一起、彼此守望。"}],"next":"服事之路—侍（一）","prog":"67"},{"n":167,"unit":"第十單元 · 服侍——靈悟命侍神的得勝之路","title":"服事，\n是讓耶穌作王","no":"167","greet":"願你來到主的面前，得享安息","verse":"若有服事人的，要按著神所賜的力量服事，叫神在凡事上因耶穌基督得榮耀。","verse_ref":"彼得前書 4:11","bigidea":"本課核心：「侍」的核心不是能力，而是主權——讓耶穌作王。當耶穌作王，服事就從「人做事」變成「神做工」：靠自己做就有壓力、重擔、比較；讓耶穌做就有輕省、喜樂、能力、果效。真正的服事，是彰顯耶穌，不是證明自己。","lead":"我們已經走過靈、悟、命——從聖靈起步、被真理更新、活出生命。現在進入「侍」。服事，不只是做事，服事是讓耶穌作王。很多人服事久了會疲憊、壓力、甚至枯乾，問題不在服事本身，而在於「是誰在做」：如果是我在做，就有壓力、重擔、比較、挫折；如果是耶穌在做，就有輕省、喜樂、能力、果效。「侍」的核心，不是能力，而是主權。","sections":[{"h":"一沒有「侍」的生命，是停滯甚至死亡的生命","paras":["⟦b:「靈—悟—命」的目的，不是停留在自己生命的成長，而是要進入「侍」⟧。⟦s:如果只有「進」沒有「出」，生命就會停滯⟧——就像只進水不流動的池塘會腐敗，只吸收不給予的生命會枯乾。","⟦s:如果你一直聽道、一直領受、一直學習，卻沒有服事，你會發現——感動越來越少、熱情越來越低、生命越來越停滯⟧。因為生命的設計本來就是：⟦g:領受 → 流出 → 再領受 → 再流出⟧。這就是「靈—悟—命—侍」的循環。","⟦g:生命不是用來囤積，生命是用來流動；不是知道多少，而是流出多少⟧。⟦b:當你開始服事，你會發現你更需要神、更依靠神、更經歷神⟧——因為「侍」會把你帶進更深的生命。"],"deeper":{"q":"想更深？我懂了「要流出去服事」，但實際上我常覺得自己「裡面是空的、還沒被裝滿」，硬要流出去服事，會不會把自己掏空、燒盡（burnout）？很多服事的人不就是這樣累垮、枯乾、甚至離開教會的嗎？這個「流出」的危險，怎麼避免？","a":"這是一個極重要、也極實際的問題，因為「服事到枯乾、燒盡、累垮」確實是教會裡令人心疼的普遍現象。但讓我幫你看清楚：那些枯乾燒盡的人，問題往往「不是因為他們流出去了」，而是「他們流出去的『方式』錯了」——他們是在「靠自己流」，而不是「讓神流經他們」。這個分辨，就是避免燒盡的鑰匙。第一，先看清「燒盡」真正的成因。我們直覺以為，燒盡是「給太多、流太多、做太累」造成的——所以解法是「少做一點、多保留一點」。但這個診斷其實不準確。真正導致燒盡的，往往不是「做的量」，而是「做的源頭」。一個「靠自己」服事的人，他是在「消耗自己有限的存量」——他把自己當源頭，用自己的力氣、自己的情緒、自己的意志在撐，那當然會越用越少、越流越乾，最後見底、燒盡。但一個「讓神流經他」的人（這正是這一課「讓耶穌作王」的核心），他不是源頭，他是「管道」——是神那「無限」的活水流經他、流向別人，他自己反而在「流通」的過程中持續被神充滿。前者是「自己的電池在放電」，遲早耗盡；後者是「接著電源在導電」，源源不絕。所以耶穌應許的是「腹中要流出活水的江河」（約7:38）——江河是流不盡的，因為源頭不是你，是神。第二，所以你的擔憂「裡面是空的、硬流出去會掏空」，要分兩面回應。一面是：你的警覺是對的——如果你是「靠自己」在流（用腦、用己力、為自己），那確實會掏空，這時的解法不是「再加把勁多做」，而是「停下來，回到源頭」。另一面是：「裡面空」這件事，恰恰常常是因為「只進不出」造成的！這一課講得很清楚：只領受、不流出，生命反而會「停滯、枯乾」——就像死海，只進不出，所以是死的。很多人覺得「我裡面空，所以我要先一直裝、裝滿了再服事」，結果越裝越停滯、越裝越沒感動，因為生命的設計是「要流動才會活」。所以有時候，「適度地流出去」反而是「治好裡面乾枯」的藥，而不是病因。關鍵是「怎麼流」。第三，那實際上怎麼「流出去而不燒盡」？幾個原則：（1）守住源頭——讓服事永遠「從靈開始」（這正是整個靈悟命侍神的次序）。先連結聖靈、先被充滿、先讓耶穌作王，再流出去；不是把自己當源頭硬擠，而是讓神流經你。每天先領受（與主親近、讀經、禱告），再流出（服事）——維持「領受→流出→再領受→再流出」的健康循環，不要只出不進，也不要只進不出。（2）做「神要你做的」，不是「你以為你該做的所有事」。燒盡的人常常是「攬太多、不會拒絕、想滿足所有人的期待、想證明自己」——這其實是「有己」（怕讓人失望、想被需要、想被肯定）在驅動，不是聖靈的帶領。讓耶穌作王，包括讓祂決定「你該做什麼、不該做什麼」——連耶穌在地上都沒有醫好所有的病人、滿足所有的需要，祂只做「父要祂做的」（約5:19）。學會在聖靈的帶領下，做該做的、也勇敢放下不該攬的，這本身就是「讓耶穌作王」。（3）容許自己「有限、會累、需要休息」。這在第158課的「想更深」已經談過——休息、被服事、安息，是神所設立的，不是有己。耶穌也會退到曠野安歇。「讓耶穌作王」不是「把自己操到油盡燈枯來證明忠心」，恰恰相反，是「連我的有限、我的安息，都交給作王的主來管理」。（4）用「喜樂與平安」當儀表板（這是上一課166的功課）。如果你發現自己服事得越來越乾、越來越苦、越來越煩、毫無喜樂平安、只想逃——那是個警訊，告訴你「源頭很可能已經從聖靈滑到自己身上了」。這時要做的，不是責備自己、也不是硬撐，而是「停下來，回到主面前，重新讓耶穌作王、重新被充滿」。所以結論是：避免燒盡的鑰匙，不是「少流出、多保留」，而是「換源頭」——從「靠自己流（會枯竭）」換成「讓神流經你（流不盡）」。真正讓耶穌作王、讓神的活水流經你的服事，是「越服事越被充滿、越流出越經歷神」的，正如這一課說的：「當你開始服事，你會發現你更需要神、更依靠神、更經歷神。」會把人掏空燒盡的，從來不是「神的活水流經你」，而是「你把自己當源頭、靠自己、為自己硬撐」。把源頭交還給作王的耶穌，你就能流出去，卻不枯乾。"}},{"h":"二沒有「靈悟命」的服事，是不完全的服事","paras":["真正的服事，一定包含三個元素：⟦g:靈（聖靈的引導）、悟（神話語的真理）、命（耶穌的生命）⟧——缺一不可。⟦s:只有「悟」沒有「靈」，很會講道、很懂聖經，卻不能觸動人心、只有道理沒有能力⟧；⟦s:只有「靈」沒有「悟」，很有感動、很有熱情，卻不穩定、容易偏差⟧；⟦s:有「靈、悟」卻沒有「命」，有恩賜、有經歷，生命卻沒被對付，容易驕傲、不能傳遞生命⟧。","⟦g:真正的服事，是聖靈引導（靈）＋真理根基（悟）＋生命見證（命）⟧——這樣的服事，不只是教導，而是「生命影響生命」。「我們是有基督的心了。」（林前2:16）","⟦b:不是我在服事，是基督在我裡面服事；不是傳知識，是傳生命⟧。"],"deeper":{"q":"想更深？「靈、悟、命」三個都要、缺一不可——可是說實話，我覺得自己三個都還很弱、很不完整。那是不是要等我「靈、悟、命」都修得夠完整了，才有資格、才能去「侍」（服事）？不然我這麼不完整就去服事，會不會反而做壞了？","a":"這是一個會卡住很多人的問題，而答案能大大釋放你：「不，你不需要等靈悟命都完整了才能侍；恰恰相反，是『在侍（服事）的過程中』，靈悟命才被真實地建立、煉成完整的。」讓我說清楚這個關鍵。第一，要記得我們在第161課就釐清過：靈悟命侍神「不是五個一關一關、修完才能進下一關的階段，而是一個同時運行、不斷循環的生命之路」。所以「侍」不是排在「靈悟命都滿分」之後的最後一關，而是與靈悟命「一起循環、彼此餵養」的。事實上，「侍」會「逼著」你的靈悟命長大——這正是上一段（第一段）的重點：「侍會把你帶進更深的生命。」怎麼說？當你真的去服事、去流出，你會立刻發現自己「不夠」——於是你被逼著更深地依靠聖靈（靈長進了）、更渴慕明白真理好餵養別人（悟長進了）、更被神對付生命好能以命傳命（命長進了）。所以「侍」不是「靈悟命的成果展示」，而是「靈悟命的健身房」——你正是在服事中，這三樣才被操練得越來越完整、越來越強壯。如果你「等完整了才服事」，那這三樣反而失去了一個最重要的成長場域，可能永遠停在「裝備、領受」的階段，長不大。第二，回到一個我們已經反覆確認的真理（第160課「願意的人都能服事」、第161課末）：你「永遠」不會覺得自己「靈悟命都夠完整了、夠資格了」——因為這是一條「一生的路」，沒有人在地上走到「畢業」。連保羅都說自己「不是以為已經得到了……乃是竭力追求」（腓3:12）。若要等完整才服事，就永遠不會開始。「不完整」不是你不能服事的理由，反而是神邀請你「進來、在服事中被祂塑造成完整」的入口。第三，那「我這麼不完整就去服事，會不會做壞了」呢？這個責任心是好的，但要放在正確的位置——這在第160課的「想更深」已經詳談過，這裡簡要提醒：健康的「在不完整中服事」，是有保護的——是「在遮蓋與帶領之下（不是一個人莽撞衝出去）、從你能承擔的小處開始、並且謙卑受教、邊做邊讓神修正」。只要你不是「不懂裝懂、剛愎自用、靠自己硬幹」，而是「謙卑、受教、在團隊與遮蓋中、依靠聖靈」地服事，那麼就算有不足、有需要學習的地方，神不但會保護祂的群羊，更會在這過程中親自陶塑你。第四，也是最關鍵、最能釋放你的——「靈悟命」的完整，本來就不是靠『你自己修煉』修出來的，而是靠『基督在你裡面』！這一段的核心經文是「我們是有基督的心了」（林前2:16），結論是「不是我在服事，是基督在我裡面服事」。你看，真正讓服事「完整」的，從來不是「你這個人的靈悟命有多完整」，而是「你有沒有讓那位完全的基督，在你裡面活、作王、透過你服事」！這就是「侍」的真義——讓耶穌作王。所以你的「不完整」根本不是問題的核心，問題的核心是「你願不願意無己、讓那位完整的基督在你裡面做」。一個「自覺很完整、很有能力，卻靠自己服事」的人，反而危險（容易驕傲、靠己）；一個「自覺很不完整、卻謙卑地讓基督在他裡面服事」的人，神反而大大使用——因為「神的能力在人的軟弱上顯得完全」（林後12:9）。所以，親愛的，請不要再用「我靈悟命還不完整」把自己擋在服事門外。你的不完整，正是神的舞台；你的軟弱，正是基督能力顯明的地方。你需要的不是「先把自己修完整」，而是「謙卑地、在遮蓋下、依靠聖靈、讓那位完整的基督在你裡面作王、透過你服事」——然後你會發現，正是在這樣的服事中，你的靈、你的悟、你的命，被神一天天煉得越來越完整。先踏上去服事，靈悟命會在路上長大；讓基督作王，不完整的你也能成為祂完整的器皿。"}},{"h":"三從「靈」開始的服事，帶出權柄與能力","paras":["真正的服事，一定從「靈」開始——不是先想怎麼做，而是先問：⟦b:聖靈要我做什麼？⟧「因為時候到了，你們不要思慮怎樣說話……說話的不是你們，乃是聖靈。」（可13:11）當聖靈掌權，你會經歷在對的時間、對對的人、說對的話、做對的事——這不是技巧，是引導。","而且這樣的服事帶著能力：「我們爭戰的兵器……在神面前有能力，可以攻破堅固的營壘。」（林後10:4）⟦g:真正的服事，不是表面改變，而是攻破思想、更新觀念、釋放生命⟧——這就是屬靈爭戰，關鍵是靠著聖靈禱告、使用神的話（弗6:17-18）。","⟦g:當你讓耶穌作王，你會發現——不是你在努力，是神在動工；不是你在改變人，是神在改變人；不是你在服事，是耶穌在服事⟧。⟦s:用腦服事 → 靠自己 → 有壓力⟧；⟦g:用心服事 → 靠聖靈 → 有能力⟧。⟦b:讓耶穌作王，服事就變輕省⟧。"],"pq":"真正的服事，不是你多厲害，而是你讓耶穌有多少空間——當你讓耶穌作王，服事就有能力、有果效、有喜樂。","deeper":{"q":"想更深？「讓耶穌作王、是神在做不是我在做」——這聽起來會不會變成一種「被動、不負責任」？我就什麼都不規劃、不努力、不用心，反正「都是神做」，等祂動工就好？「讓耶穌作王」和「我自己要盡的責任、要的努力」之間，到底怎麼平衡？","a":"這是一個非常關鍵的平衡問題，因為「讓耶穌作王」若被誤解成「我什麼都不用做、躺著等神」，那就走偏成了屬靈的懶惰與不負責任；但它的本意，恰恰是一種「最積極、最盡力，卻又完全依靠神」的生命。我們把它說清楚。第一，先破除一個錯誤的二分法：「神做」與「我做」並不是「有你沒我、有我沒你」的對立關係。很多人以為「讓神做」就等於「我不做」，這是誤解。聖經給的圖畫是「神人同工」——是「我全力地做，同時又完全地依靠神、知道真正成事的是神」。保羅把這個平衡講得最精準：「然而我今日成了何等人，是蒙神的恩才成的，並且他所賜我的恩不是徒然的；我比眾使徒格外勞苦（你看，他『格外勞苦』，非常努力！），但這不是我，乃是神的恩與我同在（但他同時知道，做成的是神的恩）」（林前15:10）。同一節經文裡，「我格外勞苦（盡力）」和「不是我、乃是神的恩（依靠）」完美地並存。所以「讓耶穌作王」絕不是「我不勞苦、不努力」，而是「我格外勞苦地做，卻把功勞、把成事、把主權，完全歸給那位在我裡面動工的神」。第二，那「讓耶穌作王」到底改變了什麼？它改變的「不是『你做不做、努不努力』，而是『誰是主、靠誰、為誰、焦點在誰』」。讓我們對比一下「靠自己做」和「讓耶穌作王地做」的差別——注意，兩者「都在努力做事」，差別在裡面：「靠自己做」的人：把自己當主、當源頭；先靠自己的聰明規劃，再求神祝福我的計畫；成敗的壓力都扛在自己肩上；做成了是「我厲害」，做砸了是「我完了」；焦點在「我的表現」。「讓耶穌作王地做」的人：把主權交給耶穌，讓祂當主、當源頭；先求問「主，祢要怎麼做」，在聖靈引導下全力去規劃、去努力、去執行；但成敗交給神，知道「我盡力，神負責成就」；做成了是「神做的、榮耀歸祂」，遇挫折也不崩潰，因為「這是神的工，祂負責」；焦點在「耶穌」。你看，兩個人「同樣在認真規劃、努力、用心做事」，但一個是「靠自己、為自己、扛著壓力」（有己、用腦、有壓力），一個是「靠聖靈、為主、把主權和結果交給神」（無己、用心、有能力、輕省）。「讓耶穌作王」拿走的，不是你的「努力和責任」，而是你的「壓力、重擔、和自我中心」。第三，所以實際上怎麼平衡？記住三句話：（1）「盡上全力，如同靠你自己；完全交託，因知道是靠神。」你該規劃就認真規劃、該努力就全力努力、該盡的責任一樣不少——但裡面是「先求問聖靈、依靠祂、把主權交給祂」，做完了把結果和榮耀都交給神。這不是「少做」，是「同樣盡力地做，卻換了源頭、換了主、換了焦點」。（2）「讓耶穌作王」首先是「主權」的問題，不是「努力多寡」的問題。它問的是「這件事，誰說了算？誰是主？聽誰的？」——是你照自己的意思幹（哪怕很努力），還是降服於聖靈的引導去做（也很努力，但聽祂的）？所以它非但不減少你的投入，反而要求你「更敏銳、更謙卑、更降服地」去做。（3）真正的「被動、不負責任」，反而常常是「有己」的另一種偽裝——有些人用「我在等神、都是神做」當藉口，來合理化自己的懶惰、逃避、不肯付代價，這其實不是「讓神作王」，是「不想盡自己的本分」。真正讓耶穌作王的人，會像那忠心又良善的僕人，殷勤地、盡力地、負責任地去運用主人給的一切，而不是把銀子埋起來、什麼都不做還說「我在等主」。所以結論是：「讓耶穌作王」不是叫你「不規劃、不努力、被動等候」，而是叫你「在聖靈的引導下、全力以赴地去做，卻把『主權、源頭、成敗、榮耀』完全交給神」。你照樣勤奮、照樣負責、照樣用心——但你不再是那個扛著壓力、靠自己、為自己、患得患失的「主」，你成了那個依靠神、為主、把結果交給神、輕省又有能力的「管道和僕人」。一句話收攏：盡你全部的責任去做（人的本分），但讓耶穌坐在王位上、靠祂的靈、把一切交給祂、榮耀歸給祂（神的主權）。這樣，你既不會落入「靠自己硬撐」的壓力，也不會落入「躺平等候」的懶惰，而是走在「神人同工、又盡力又輕省、又努力又有能力」的服事之路上。"}}],"focus":"我服事疲憊的時候，\n問題真的是「事情太多」嗎？\n還是其實是——\n太多「我在做」，\n太少「讓耶穌做」？","hope":{"t":"✺ 服事會變輕省，當你讓出王位","paras":["也許你正服事得疲憊、有壓力、甚至枯乾，心裡想「是不是我做太多了」。但這一課指出一個更深的真相：⟦b:問題往往不是「做太多」，而是「自己做太多」——是「我」坐在了那個只屬於耶穌的王位上⟧。當「我」在做，就有壓力、重擔、比較；當「耶穌」在做，就有輕省、喜樂、能力、果效。","⟦g:服事真正的鑰匙，不是你更努力、更厲害，而是你「讓出王位」、讓耶穌作王⟧。你照樣盡心盡力，卻不再扛著成敗的重擔——因為不是你在改變人，是神在改變人；不是你在服事，是耶穌在你裡面服事。今天，把那個讓你壓力沉重的王位，重新交還給祂吧。你會驚訝地發現：原來服事，可以這麼輕省、這麼有能力。"]},"still":"此刻安靜——\n在我目前最累、最有壓力的那個服事裡，\n我願不願意，\n把「王位」交還給耶穌：\n「主，這是祢的工，不是我的；\n祢來作王，我來跟隨。」","still_hint":"不必獨自扛了。\n安靜一分鐘，\n把那份重擔卸給作王的主：\n「主啊，不是我，是祢——\n求祢在我裡面，作王、作工。」","steps":[{"act":"每次服事前，先回到「靈」：不要急著做，先安靜禱告——「主，今天不是我要做什麼，是祢要做什麼？」學習先等候，再行動。","meta":""},{"act":"操練「不是我，乃是基督」：在服事中常提醒自己——不是我在講，是聖靈在說；不是我在做，是耶穌在做。把焦點從「我」轉向「耶穌」。","meta":""},{"act":"用「果效」檢視是否讓主作王：問自己——是壓力還是喜樂？靠方法還是靠聖靈？越服事越累，不是做太多，是「自己做太多」，重新把主權交給耶穌。","meta":""}],"declare":"主耶穌，我願意把服事的主權交給祢。\n我不再靠自己，我要靠聖靈的引導與能力。\n我宣告：不是我在服事，乃是基督在我裡面服事；\n不是我得榮耀，乃是耶穌得一切的榮耀。\n我的服事要帶出能力、生命與改變！\n奉主耶穌的名，阿們。","share":[{"tag":"領受","q":"「侍的核心不是能力，而是主權（讓耶穌作王）」——這個從「我要更有能力」到「我要讓出王位」的轉向，對你最大的提醒是什麼？"},{"tag":"省察","q":"誠實檢視你目前最有壓力的服事：那壓力，是不是來自「我在坐王位、我在扛成敗、我在證明自己」？你願意把那個王位交還給耶穌嗎？"},{"tag":"同行","q":"這禮拜，請你在每次服事前，操練先停下來禱告——「主，是祢要做什麼？」並在服事後檢視：這次是壓力，還是喜樂？說出來，讓小家的家人陪你一起、彼此守望。"}],"next":"服事之路—侍（二）","prog":"73"},{"n":168,"unit":"第十單元 · 服侍——靈悟命侍神的得勝之路","title":"服事，\n是把生命傳出去","no":"168","greet":"願你來到主的面前，得享安息","verse":"所以，你們要去，使萬民作我的門徒，奉父、子、聖靈的名給他們施洗。","verse_ref":"馬太福音 28:19","bigidea":"本課核心：服事的最終目標，不是把事情做好、不是能力彰顯，而是把生命傳出去——使人作門徒。真正的服事，不是讓人依賴你，而是讓人像你一樣跟隨耶穌；它的核心是建立關係，方法是用「父母的心」、走「帶—陪—放」的傳承。","lead":"服事的最終目標，不是把事情做好，而是把生命傳出去。很多人以為服事成功就是人數增加、事工擴展、能力彰顯，但主耶穌給我們的使命卻非常清楚——「使萬民作我的門徒」（太28:19）。不是「聚會做大」，而是「門徒做出來」；不是「事情完成」，而是「生命傳承」。真正的服事，不是讓人依賴你，而是讓人像你一樣，去跟隨耶穌。這，就是「侍」的更深層意義。","sections":[{"h":"一服事的目的，是生命傳承","paras":["在服事中，我們常會看見神蹟、感動、能力，⟦b:但這些都不是最終目的⟧。⟦s:如果一個人經歷很多神蹟、很有感動，卻沒有改變生命、也不能影響別人，那這樣的服事，還停留在「靈」的層次⟧。","⟦g:真正的服事，是讓人生命改變、讓人跟隨耶穌、讓人去影響別人⟧。「你們該效法我，像我效法基督一樣。」（林前11:1）——我效法基督、你效法我、你再帶別人效法基督，這就是「生命的繁殖」。","⟦g:得到生命，不是終點；傳遞生命，才是目的⟧。⟦b:不是我被祝福，而是我成為祝福；真正的得到，是能夠給出去⟧。"],"deeper":{"q":"想更深？「使人作門徒、傳承生命」聽起來是傳道人、是很成熟的屬靈領袖才做的事。像我這樣自己都還在學、還很軟弱的普通信徒，怎麼可能去「帶門徒、傳承生命」？這對我是不是太高、太遠了？","a":"這是一個會讓很多人卻步的迷思，而拆解它會釋放你、也會徹底改變你對「服事」的眼光。先說一個翻轉性的真相：「使人作門徒、傳承生命」不是少數屬靈領袖的專利，而是主耶穌給「每一個」門徒的大使命——而且它最美的實現，往往就在最平凡的信徒、最日常的關係裡。第一，「門徒帶門徒」是主設計的「常態」，不是「特例」。耶穌說「你們要去，使萬民作我的門徒」（太28:19），這話是對「所有」跟隨祂的人說的，不是只對使徒、傳道人。神國度擴展的方式，從來不是靠少數超級屬靈的明星，而是靠「每一個普通門徒，都去帶下一個門徒」——這才是為什麼福音能從十二個門徒，傳遍全世界、傳了兩千年。如果「帶門徒」只有少數厲害的人能做，基督教早就斷了。所以你不是「有沒有資格」的問題，你本來就在這個大使命的呼召裡。第二，「傳承生命」不需要你「很成熟、很完整」，只需要你「比對方多走了一步、願意把這一步分享出去」。我們常誤以為「帶人」是要你站在「我什麼都懂、我很成熟」的高位上，把對方「教會」。但真正的生命傳承，核心是「林前11:1」那個美麗的接力：「你們該效法我，像我效法基督一樣」——保羅不是說「你們效法我，因為我很完美」，他是說「我在效法基督（我也還在路上），你就跟著我一起效法基督」。所以你不需要「先變完美」，你只需要「自己真實地在跟隨耶穌，然後拉著旁邊那個比你晚一步的人，一起跟隨」。一個信主一年的人，完全可以帶一個剛信主一個月的人——你不需要懂完所有的，你只需要把你「已經走過、已經經歷」的那一段，真實地分享、陪伴。傳承，是「一個正在被神改變的生命，去陪伴另一個生命，一起被神改變」，不是「一個完美的人去塑造一個不完美的人」。第三，「帶人」最有力量的，恰恰常常是「平凡軟弱、卻真實」的你。這在第165課「以命傳命」已深談過：人最容易被觸動的，不是一個「看起來什麼都好、高高在上」的屬靈樣板，而是一個「真實的、會軟弱、卻仍然抓住神、被神恩典一點點改變」的人。當你誠實地陪伴一個人，分享「我也曾經這樣掙扎，但神這樣幫助了我」，那份真實的同行，比任何「完美的教導」都更能進到人心、更能傳遞生命。你的軟弱不是攔阻，是讓對方覺得「原來像我這樣的人也可以」的盼望。第四，傳承生命，其實就藏在你最平凡的關係和日常裡，不必另闢一個「事工」。它可能就是：你陪伴一個剛信主的弟兄姊妹、回答他的問題、為他禱告；你在家裡用生命把信仰傳給孩子；你關心一個比你軟弱的人，陪他走一段；你把神在你身上做的，真實地分享給身邊的人……這些都是「使人作門徒、傳承生命」。下一段會講到，這正是「帶—陪—放」，而它最常發生在最日常、最有愛的關係裡。第五，最關鍵的——真正傳承生命的，是「住在你裡面的基督」，不是「你自己」。這呼應整個單元的核心「不是我，乃是基督」。你不是靠「你這個人有多成熟、多厲害」去傳承，你是讓「基督的生命透過你」流向另一個人。所以你的責任不是「把自己修煉成大師」，而是「無己、讓基督在你裡面活，然後讓祂透過你、流向你身邊的人」。當你越無己、越被基督充滿，傳承就自然從你流出——不是你多厲害，是耶穌透過你，得到了又一個生命。所以，親愛的，請不要用「我太普通、太軟弱、還在學」把自己關在大使命門外。神要用的，從來就是平凡、還在路上的人——十二個門徒當初也又軟弱又常常誤解主，主仍差派他們去使萬民作門徒。你不需要先變成屬靈領袖才能傳承生命；你只需要「真實地跟隨耶穌，然後拉著旁邊的人，一起跟隨」。從你身邊那一個人開始，從分享你已經走過的那一步開始——那就是生命的傳承，而那，今天的你就能做。"}},{"h":"二服事的核心，是建立關係","paras":["主耶穌在最後的晚餐，做了一件震撼的事——祂為門徒洗腳。「我是你們的主，你們的夫子，尚且洗你們的腳，你們也當彼此洗腳。」（約13:14）洗腳看起來是一件「事」，但背後有兩個目的：⟦g:第一，恢復人與神的關係（「凡洗過澡的人，只要把腳一洗，全身就乾淨了」約13:10）；第二，建立人與人的關係（「我給你們作了榜樣……」約13:15）⟧。","⟦b:所以你會發現——做事，是工具；關係，才是目的⟧。⟦s:很多服事的問題，不是事情沒做好，而是關係破裂了⟧。","⟦g:人比事重要，關係比成果重要⟧。⟦b:不要為了做事傷害人，要透過做事建立人⟧。真正的服事，是讓人更親近神、讓人彼此相愛——這才是耶穌的心。"],"deeper":{"q":"想更深？「服事的核心是關係、人比事重要」——這跟我們整個第九單元（關係）講的好像是同一件事。為什麼講到「服事」（第十單元），又回到「關係」？這兩個單元的「關係」，是重複嗎？還是有什麼不同、有什麼遞進？","a":"你的觀察非常準確——這確實又回到了「關係」，但它「不是重複，而是一個美麗的遞進與印證」，正好揭示了321整個生命邏輯的環環相扣。先看這兩個單元「關係」的不同角度。第九單元（關係）談的，主要是「我自己生命的次序——我與神、與己、與人、與事的關係如何被重整、被恢復」，焦點是「我這個生命，如何在正確的關係次序裡被建立、被醫治」，比較「向內、為著我自己生命的健康」。而第十單元（服事）這裡再提「關係」，焦點卻轉向了「當我去服事、去傳承生命時，我與『被我服事、被我帶領的那個人』之間的關係」，焦點是「我這個已經被建立的生命，如何透過關係去服事人、得到人、傳承生命」，比較「向外、為著別人生命的成全」。所以同樣是「關係」，第九單元是「我的關係被神重整（為了我）」，第十單元是「我用關係去服事、傳承（為了人）」——前者是「領受、被建立」，後者是「流出、去建立人」。這正是「有進有出」的生命：第九單元是「進」（我的關係被神醫治、滋養），第十單元是「出」（這健康的生命，透過關係流向別人）。為什麼會這樣遞進？這正是321最核心的次序：「先生命、再關係、後事工」，以及「生命→關係→事工」的流動。看這整個下半部課程如何環環相扣：第八單元「生命」——神先在我裡面培養出無己的、被基督充滿的生命（這是根）。第九單元「關係」——這成熟的生命，自然要流向關係，先把我自己與神、與己、與人、與事的關係重整對了（這是這生命健康流動的次序被擺正）。第十單元「服事」——當生命對了、關係的次序也對了，這一切必然要進一步流出，成為服事，也就是「用這份愛與關係，去成全別人、傳承生命」。這條線很清楚：無己的生命（八）→ 流向正確的關係（九）→ 落實為傳承的服事（十）。而第十單元這裡之所以「又」強調關係，正是要提醒一件極重要的事——「服事（事工）絕不能脫離關係、變成冷冰冰的『做事』」。這是許多服事最大的陷阱：一旦投入服事、有了事工，人很容易「眼裡只剩下事、只剩下成果、只剩下績效」，而忘了「服事的本質是愛人、是建立關係、是得到生命」，結果「為了把事做好，反而傷害了人、破壞了關係」，這就本末倒置了。所以第十單元把「關係」再次高舉，是要把「服事（事工）」牢牢錨定在「關係」上、錨定在「人比事重要」上，不讓它退化成「沒有愛的做事」。換句話說，第九單元教你「把關係的次序擺對」，第十單元提醒你「在服事中，永遠別丟掉這個次序——別讓事蓋過了人、別讓成果蓋過了關係」。所以這不是重複，而是：第九單元把「關係」這個原則「建立」在你生命裡，第十單元把這個原則「應用」到服事的實戰中、並守護它不被「事工」吞噬。一個真正明白的人會看見：原來整個321，從頭到尾都是在恢復「關係」——與神的關係（三個基礎、兩個核心），與己的關係（無己、謙卑），與人的關係（建立屬神體系），而服事，正是這一切「關係」最具體、最捨己、最豐盛的流露與傳承。事工從來不是目的，「得到人、建立關係、傳承生命」才是目的；而這一切，最終都是為了那個最大的關係——讓更多人與神和好、與神建立關係，建立起一個彼此相愛的「屬神的體系」、神國的群體。這，就是復興的實際。"}},{"h":"三用「父母的心」帶出傳承","paras":["真正能帶出傳承的服事，一定是「父母的心」。⟦g:父母的心有一個特質——願意成全別人，甚至讓別人超過自己⟧，這樣的心一定包含「捨己」。「人子來，不是要受人的服事，乃是要服事人，並且要捨命。」（太20:28）這是最高層次的服事：⟦b:我死，你活⟧。","就像一粒麥子：「一粒麥子不落在地裡死了……若是死了，就結出許多子粒來。」（約12:24）⟦s:不死，就不能繁殖；不捨己，就不能傳承⟧。而傳承有一個重要的過程——⟦g:帶（做給他看，他跟著做）→ 陪（讓他開始做，你在旁支持、鼓勵、修正）→ 放（他可以獨立，你放手，讓他去帶別人）⟧。","⟦g:我被帶 → 我被陪 → 我被放 → 我再去帶人⟧。⟦b:不是抓住人，而是成全人；不是控制人，而是釋放人；真正的愛，是讓人可以走出去⟧。"],"pq":"真正成功的服事，不是你做了多少，而是你留下多少生命——讓耶穌的生命，從你流出去，一代一代傳承下去。","deeper":{"q":"想更深？「帶—陪—放」，最難的好像是「放」。我好不容易帶起來、陪伴一個人，投入了那麼多，要「放手」讓他獨立、甚至超過我，心裡其實很捨不得、甚至有點失落、怕被取代。為什麼「放」這麼難？我該怎麼放得下？","a":"你誠實地說出了「放」的難處，而這份難處，恰恰是「父母的心」最深的功課，也是「無己」最真實的試煉。先看「為什麼放這麼難」——因為「放」會碰觸到我們裡面最隱微的「有己」。表面上，我們帶人、陪人是愛；但若不警醒，這份「愛」裡會不知不覺混進「自己」：我投入了那麼多，他「屬於」我（佔有）；他很需要我、很倚賴我，讓我覺得自己「很重要、被需要」（價值感建立在被需要上）；他是「我的」門徒、「我帶出來的」，是我的成就（隱藏的驕傲）；如果他獨立了、甚至超過我、不再那麼需要我，我怕「失去這份重要感」、怕「被取代」、怕「自己變得不重要」。你看，「捨不得放、怕被取代」的根，其實是「有己」——是我把自己的「重要感、價值、成就感」，建立在「對方對我的倚賴」上了。所以「放」之所以難，是因為它要你「放下的，不只是那個人，更是你藉著那個人所抓住的『自己』」。這正是為什麼「帶—陪—放」一定包含「捨己」、一定要像「一粒麥子落地死了」——「放」就是那個「死」：我的重要感死了、我的佔有死了、我的成就感死了，那個被我帶的人，才能真正「活」出來、獨立、去結更多子粒。「不死，就不能繁殖。」那「如何放得下」？幾個角度幫助你。第一，認清「他從來不是『我的』，是『神的』」。我們捨不得，是因為潛意識把對方當成「我的門徒、我的成就、屬於我的」。但真相是——他是「神的兒女」，你只是神暫時託付、用來「帶他一程」的器皿和管家。施洗約翰是最好的榜樣：當他的門徒都跑去跟隨耶穌了，約翰沒有捨不得、沒有怕被取代，反而說「他必興旺，我必衰微」（約3:30），因為他清楚知道「那些人本來就是要歸向基督的，不是歸向我的」。當你看清「他是神的，不是我的」，「放手」就從「失去我的」變成「交還給神」——這就釋放了。第二，重新定義「成功」與「價值」。如果你的價值感建立在「被需要、被倚賴」上，那「放手」當然像失去價值。但這一段把成功重新定義了：「真正成功的服事，不是你做了多少，而是你留下多少生命。」一個父母真正的成功與喜樂，不是孩子「永遠離不開我、永遠需要我」，而是孩子「長大、獨立、活得比我更好、甚至去成為別人的祝福」！如果你帶的人永遠倚賴你、走不出去，那其實是你「帶失敗了」（你養出了倚賴，而非生命）；他能獨立、能去帶別人，才證明你「真的把生命傳承下去了」——那是你最大的成功，該歡喜，而不是失落。把「他還需不需要我」的眼光，換成「他能不能去結更多子粒」的眼光，「放」就從失落變成了豐收的喜悅。第三，看見「放」帶來的是「繁殖」，不是「失去」。一粒麥子若緊抓著自己、不肯落地死，它「保住」了自己，卻「永遠只是一粒」；它若願意死、願意放，它「失去」了原來的自己，卻「結出許多子粒」。「放手」也是如此：你「抓住」一個人，你最多擁有「一個倚賴你的人」；你「放手」一個人去獨立、去帶別人，你就參與了「生命的繁殖」——一個變多個，多個再變更多個。從天國的眼光看，「放」不是失去，是「以一換多」的豐收。第四，最終，把焦點從「我」轉回「耶穌」。你之所以怕「被取代」，是因為焦點還在「我重不重要、我有沒有被需要」。但真正的傳承，目標從來不是「讓人記得我、需要我」，而是「讓人跟隨耶穌、需要耶穌」（這正是接下來兩課「讓耶穌得榮耀、不見一人只見耶穌」要講的）。你帶人最深的目的，不是把他綁在「你」身上，而是把他連結到「耶穌」身上——讓他可以不需要你，卻永遠需要主。當你帶的人能獨立地、不靠你地、直接地與神同行時，那才是你最成功的時刻：因為你成功地把他「交給了主」，而不是「留給了自己」。所以，親愛的，「放」之所以難，是因為它要你捨下藉著對方所抓住的「自己」；但「放」之所以美，是因為它正是麥子落地、生命繁殖、愛得成全的時刻。試著這樣禱告：「主啊，他本是祢的，不是我的；謝謝祢用我帶了他一程。現在我把他交還給祢——求祢使他興旺，過於我；使他直接地跟隨祢、倚靠祢，去結更多的子粒。我願意衰微，只要祢、和祢的生命，在他身上興旺。」當你能這樣放手，你就活出了父母的心、活出了麥子落地的捨己、活出了「他必興旺、我必衰微」的無己——而那，正是傳承生命最榮耀的一刻。"}}],"focus":"我的服事，\n是讓人越來越「依賴我」、需要我，\n還是讓人越來越「跟隨耶穌」、\n甚至能獨立、能去帶別人？\n我在「留事工」，還是在「留生命」？","hope":{"t":"✺ 你能留下最美的，是生命，不是事工","paras":["也許你曾以為服事的成功，是把事情做大、做漂亮、做到被看見。但這一課把更深、更永恆的眼光交給你：⟦b:真正成功的服事，不是你做了多少，而是你留下多少生命⟧。事工會過去、會被遺忘，但你用生命傳承給的人、帶出來的門徒，會一代一代活下去。","⟦g:你不需要成為偉大的領袖，才能傳承生命——你只要真實地跟隨耶穌，然後拉著身邊那一個人，一起跟隨⟧。用父母的心去愛、去成全，走「帶—陪—放」的路，甚至甘願讓對方超過你、不再需要你。因為真正的愛，是讓人可以走出去；而最美的服事，是讓耶穌的生命，從你流出去，一代一代，傳承下去。"]},"still":"此刻安靜——\n神放在我身邊，\n有沒有一個人，\n是祂要我去「帶、陪、放」、\n用生命去陪伴、傳承的？\n求聖靈把那張臉，浮現在我眼前。","still_hint":"不必有壓力，從一個人開始。\n安靜一分鐘，\n把那個人交給主：\n「主啊，給我父母的心，\n讓我用生命，陪他走一段、跟隨祢。」","steps":[{"act":"每天問自己一個問題：不是「今天我做了多少事」，而是「今天我影響了誰的生命？」把焦點從「做事」轉向「帶人」。","meta":""},{"act":"操練建立「生命關係」：在服事中刻意做三件事——關心對方的生命、陪伴對方的成長、幫助對方更親近神。不只完成任務，要用心建立關係。","meta":""},{"act":"開始實踐「帶—陪—放」：找一個人，帶他（做給他看）、陪他（讓他學習）、放他（讓他去帶人）。不要怕他做不好，成長一定經過過程。","meta":""}],"declare":"主耶穌，我願意成為一個能傳承生命的人。\n我不只要跟隨祢，我也要帶人來跟隨祢。\n我宣告：我不是只做事的人，我是傳遞生命的人；\n我不是建立事工，我是建立門徒；\n我願意捨己，成全更多人活出基督的生命！\n奉主耶穌的名，阿們。","share":[{"tag":"領受","q":"「真正成功的服事，不是你做了多少，而是你留下多少生命」——這個對「成功」的重新定義，如何挑戰或更新了你對服事的看法？"},{"tag":"省察","q":"在「帶—陪—放」裡，哪一步對你最難？（不敢「帶」？沒耐心「陪」？捨不得「放」？）那背後可能藏著什麼樣的「自己」？"},{"tag":"同行","q":"這禮拜，請你刻意去關心、陪伴一個比你晚一步的人（一個新朋友、一個軟弱的肢體），開始一段「生命關係」。說出來，讓小家的家人陪你一起、彼此守望。"}],"next":"服事之路—神（一）","prog":"80"},{"n":169,"unit":"第十單元 · 服侍——靈悟命侍神的得勝之路","title":"讓耶穌，\n得一切的榮耀","no":"169","greet":"願你來到主的面前，得享安息","verse":"他必興旺，我必衰微。","verse_ref":"約翰福音 3:30","bigidea":"本課核心：服事的起點、過程、終點都是耶穌。最後最關鍵的一步是「神」——把一切榮耀歸給神。不歸榮耀給神，是屬靈敗壞的開始；唯有看見「一切都是恩典」，才能活在真實的謙卑中；讓耶穌興旺、我衰微，是無己生命的最高表現。","lead":"服事的起點是耶穌，服事的過程是耶穌，服事的終點仍然是耶穌。很多人走在服事路上，前面都很好——有聖靈的帶領（靈）、有真理的根基（悟）、有生命的改變（命）、有實際的服事（侍），但最後卻跌倒了。為什麼？因為少了最後一個最關鍵的——「神」，把一切榮耀歸給上帝。如果服事的最後，焦點變成自己，再大的事工也會變成敗壞的開始。","sections":[{"h":"一不把榮耀歸給神，是屬靈敗壞的開始","paras":["聖經給我們一個嚴肅的提醒：「希律不歸榮耀給神，所以主的使者立刻罰他……他被蟲所咬，氣就絕了。」（徒12:23）⟦s:希律做錯的，不是沒有能力，而是把榮耀留給自己⟧。","這是一個屬靈定律：⟦s:能力越大、影響越大，越容易把榮耀歸給自己⟧。「驕傲在敗壞以先；狂心在跌倒之前。」（箴16:18）「凡自高的，必降為卑；自卑的，必升為高。」（太23:12）","⟦b:不是失敗毀掉人，是成功中的驕傲毀掉人；不是沒有能力的問題，是榮耀歸給誰的問題⟧。⟦s:當人開始覺得「是我做的、是我努力的、是我厲害」，其實已經偏離了⟧——真正的危機，不在外面，在「心的焦點」。"],"deeper":{"q":"想更深？「把榮耀歸給神」這句話我們常講，幾乎變成口頭禪了。但說實話，我不太確定這到底是什麼意思、實際上要怎麼做。難道神「需要」我們的榮耀嗎？把榮耀歸給神，對神、對我，到底有什麼意義？","a":"這是一個極好的問題，因為「榮耀歸給神」確實太容易淪為一句不走心的口頭禪，而真正明白它，會徹底改變你的服事和生命。第一，「把榮耀歸給神」到底是什麼意思？「榮耀」這個詞，簡單說，是指「一個人/一件事真實的、本該得到的稱讚、尊崇、功勞、看重」。當一件美好、有能力、有果效的事發生時，總會有「榮耀」產生——人們會讚嘆、會歸功。問題是：這份榮耀、這份功勞，「該歸給誰」？「把榮耀歸給神」就是：承認並宣告——這一切美好的、有能力的、有果效的，真正的源頭、真正的成就者，是神，不是我；所以一切的稱讚、功勞、尊崇，都該歸向祂，不是歸向我。它是一個「歸回真相」的動作——把本來就屬於神的，誠實地還給神，而不是貪天之功、據為己有。第二，神「需要」我們的榮耀嗎？這是關鍵的澄清：神「不需要」我們的榮耀來填補祂的不足——神是完全的、自足的，祂的榮耀不會因為你不歸給祂就減少，也不會因為你歸給祂就增加。祂不是一個「缺乏掌聲、需要人吹捧才滿足」的神。那為什麼聖經一再要我們歸榮耀給神？因為「把榮耀歸給神」這件事，不是為了滿足神的需要，而是為了保守「我們」活在真相與健康裡。第三，「把榮耀歸給神」真正的意義，是「保護你、醫治你」。你想想：當你「不」把榮耀歸給神、而是歸給自己時，會發生什麼？你會開始覺得「是我做的、我很厲害、沒有我不行」——這就是驕傲，而「驕傲在敗壞以先」（箴16:18）。希律就是活生生的例子：他把該歸給神的榮耀留給自己，那份「自高」直接帶來了他的敗壞。所以「不歸榮耀給神」傷害的不是神（神毫髮無傷），而是「你自己」——它會養大你裡面的驕傲（有己），而驕傲是一切跌倒、敗壞的根源。反過來，當你「把榮耀歸給神」時，你是在持續地、刻意地拆毀自己裡面那個會膨脹、會跌倒的「己」，讓自己活在謙卑、活在真相裡——「不是我，是神」。這就保守了你不被成功中的驕傲毀掉。所以「榮耀歸給神」是神給你的「保命符」、是無己生命的「免疫系統」。第四，那「實際上怎麼做」、怎麼不淪為口頭禪？幾個方向：（1）從「心」做，不只從「口」做——刻意去想「這件事若不是神，根本不可能；是神給我能力、給我機會、是神做成的」，讓那句話是你心裡真實的看見，而非習慣的尾音。（2）「具體地」歸榮耀——不要只籠統地說「榮耀歸給神」，試著具體地說「神做了什麼」：「是神感動了那個人的心」「是神在那個時刻給了我不是我自己能有的智慧」，下一段的操練講得很實際——「多講神做了什麼，少講自己做了什麼」。（3）在「成功、被稱讚」時特別刻意地歸回——榮耀最容易被偷走的時刻，是事情成了、有人稱讚你的時候，那一刻刻意在心裡轉向神：「主，謝謝祢，這是祢做的，我把這稱讚轉獻給祢。」（4）在「失敗、沒果效」時也歸榮耀——在軟弱、失敗時仍然信靠祂、仍然說「主，我不明白，但祢是神，祢配得尊崇」，這是更深的歸榮耀，因為它證明你尊崇的是「神自己」，不是「神給你的成果」。第五，最深的意義——「榮耀歸給神」是你受造的目的，也是你最大的喜樂。聖經說神造我們「是為祂的榮耀」（賽43:7）。所以「把榮耀歸給神」不是一個外加的、勉強的宗教義務，而是「人回到他被造的本位、活出他存在的目的」——就像水回到大海、河流歸回源頭，是最自然、最對位、最滿足的事。而且奇妙的是，當你越不抓榮耀、越把焦點從自己轉向神，你會越輕省、越喜樂、越自由——因為你卸下了「靠表現證明自己、靠成就餵養自己」的重擔，單純地享受「與神同工、看祂得榮耀」的喜悅。這正是下一段要說的：「他必興旺，我必衰微」——當你越來越不重要、耶穌越來越重要，那不是失落，那是無己生命最深的喜樂與自由。所以，別讓「榮耀歸給神」再只是一句口頭禪。讓它成為你心裡真實的看見（不是我，是神）、刻意的操練（具體地、在成功與失敗時都歸回）、和最深的喜樂（回到本位、看神得榮耀）。它保護你不被驕傲毀掉，醫治你的有己，也讓你回到受造的目的——這，就是服事走到最後，最關鍵、也最美的一步。"}},{"h":"二一切都是恩典，才能活在真實的謙卑中","paras":["保羅是被神大大使用的人，但他怎麼看自己？「我今日成了何等人，是蒙神的恩才成的……這原不是我，乃是神的恩與我同在。」（林前15:10）⟦b:保羅做了很多，但他知道——不是我，是神的恩⟧。這才是真正的謙卑。","⟦g:謙卑不是貶低自己，而是看清真相——我所有的能力是神給的，我所有的機會是神給的，我所有的果效是神做的⟧。⟦b:連「能服事」這件事，都是恩典⟧。如果神沒有揀選你，你連服事的機會都沒有。","⟦g:不是我配得，是我蒙恩；不是我能，是神能；不是我做了什麼，是神在我裡面做了什麼⟧。當你真的看見「恩典」，你就不會驕傲，反而會更感恩、更謙卑。"],"deeper":{"q":"想更深？「一切都是恩典、不是我、是神的恩」——可是我也確實付出了努力啊！我花了時間、流了汗、犧牲了很多。如果「全部都是神的恩、不是我」，那我的努力、我的擺上，難道都不算數、都沒意義嗎？這樣會不會反而讓人覺得「反正都是神做的，那我幹嘛努力」？","a":"這是一個非常真實、也很重要的張力，而最美的答案，又一次藏在保羅這節經文裡。我們仔細看林前15:10：「我今日成了何等人，是蒙神的恩才成的（這是恩典），並且他所賜我的恩不是徒然的；我比眾使徒格外勞苦（這是他的努力！而且是「格外」勞苦），但這不是我，乃是神的恩與我同在（最後又歸回恩典）。」你看，在同一節經文裡，保羅同時說了三件事：一切是神的恩、我格外勞苦（我真的非常努力）、連我能這樣勞苦也是神的恩。所以保羅給的答案，從來不是「全是恩典，所以你的努力不算數」，而是一個更深的真相——「你的努力是真實的、有意義的、神也紀念，但連『你能努力、你願意努力、你努力有果效』這件事本身，都是神的恩典在背後托住、推動、成就的。」第一，「全是恩典」不是要否定你的努力，而是要指出你努力背後的源頭。你確實付出了時間、流了汗、犧牲了——這是真的，神都看見、都紀念（「你們的勞苦，在主裡面不是徒然的」林前15:58）。「恩典」要對付的，不是「你有沒有努力」，而是「這努力的源頭和功勞該歸給誰」。是「誰」給了你那顆願意努力的心？是「誰」給了你健康、時間、能力，讓你「能夠」努力？是「誰」在你努力時賜下果效？都是神。你的努力像「划槳」，是真實的、必要的、有意義的；但「水、風、和讓船真正前進的力量」是神給的。第二，所以這「不會」讓人變消極、不努力，反而會讓人「更努力、卻更謙卑、更輕省」。看保羅，他明白「全是恩典」之後，不但沒變懶，反而「比眾使徒格外勞苦」！因為「恩典」帶來的不是消極，而是「感恩驅動的、不為自己的、輕省的努力」。一個明白「全是恩典」的人，動機變了：他不再是「為了證明自己、為了賺取什麼、為了得榮耀」而努力（那是有己、有壓力的努力，做到死也不滿足）；而是「因為白白蒙了這麼大的恩，所以甘心、感恩地回應神的愛」而努力（那是無己、輕省的努力，越做越喜樂）。前者努力是「為了得到」（為自己），患得患失、把功勞算自己；後者努力是「因為已經得到了」（出於感恩），甘心喜樂、把功勞歸給神。「恩典」不會澆熄努力，它只會「淨化」努力的動機。第三，這正是321「無己」與「讓耶穌得榮耀」的精髓。「全是恩典」要拆毀的，是那個會在努力之後說「看我做了多少、是我的功勞、我配得稱讚」的「己」。當你把功勞歸給神，你不是否定自己的努力，而是「在真相中、在謙卑中」努力——你照樣全力以赴，卻不貪天之功；你照樣流汗擺上，卻把一切榮耀歸給那位賜恩、托住、成就這一切的神。這樣的努力，神最喜悅，也最保護你——因為它讓你在大大被使用、大有果效之後，仍然能說「不是我，是神的恩」，於是不被成功中的驕傲毀掉。所以，親愛的，請放心：你的努力、你的擺上、你的犧牲，完全算數、完全有意義、神都紀念。「全是恩典」不是要抹煞你的努力，而是要讓你看見——連你能努力、努力有果效，都是神的恩在背後成就的。所以你大可「格外勞苦」地擺上，全力以赴地服事；只是在這一切之後，學保羅那樣，謙卑地說一句：「這不是我，乃是神的恩與我同在。」這樣，你既盡了全力（你的努力有意義），又活在謙卑裡（榮耀歸給神）——這就是恩典與努力最美的合一，也是無己生命最自由、最有能力的活法。"}},{"h":"三讓耶穌興旺，是無己生命的最高表現","paras":["施洗約翰說了一句最震撼的話：「他必興旺，我必衰微。」（約3:30）⟦b:這句話，就是「無己」的極致⟧。⟦g:不是我被看見，是耶穌被看見；不是我被高舉，是耶穌被高舉；不是人記得我，是人認識耶穌⟧。這就是服事真正的目標。","⟦s:很多人服事，是為了被肯定、被需要、被看見⟧；⟦g:但真正的服事，是讓人忘記你、只記得耶穌⟧。⟦b:當你越來越「不重要」，耶穌就越來越重要；當你越來越「退下來」，耶穌就越來越被高舉⟧。","⟦g:焦點在耶穌，不在自己；無己不是沒有，是讓耶穌充滿；真正的成功，是讓耶穌得榮耀⟧。"],"pq":"服事走到最後，不是看你做了多少、多成功，而是看一件事——榮耀歸給誰？讓耶穌得到一切的榮耀，就是服事最榮耀的結局。","deeper":{"q":"想更深？「他必興旺，我必衰微」、「越來越不重要、讓人忘記你」——這聽起來會不會讓人活得很沒有自我價值、很卑微、甚至有點自我否定、不健康？神創造我、愛我，難道是要我變得「不重要、被忘記」嗎？這跟「神看我為寶貴」不是矛盾嗎？","a":"你問到了一個極重要、也極容易被誤解的點，而釐清它，會讓你看見「無己」其實是通往「真正的自我價值與自由」，而不是「自我否定與卑微」。第一，要先分清「無己」和「沒有自我價值／自我否定」是完全不同的兩件事。「自我否定、覺得自己沒價值、卑微」是一種不健康的、被傷害的、看輕自己的狀態——它的根，常常是「我不被愛、我不夠好、我沒有價值」的謊言，這絕對不是神的心意，神反而要醫治這個。而「無己、我必衰微」是一種健康的、被愛充滿的、甘願讓開的狀態——它的根，恰恰是「我已經在基督裡被完全地愛、被完全地肯定、價值已經穩穩地立定了，所以我不再需要從被看見、被記得、被高舉裡去抓取價值」。兩者的根是相反的：「自我否定」是因為覺得自己沒價值，所以看輕自己；「無己」是因為價值已經在神那裡被滿足了，所以不必再為自己抓取。前者是匱乏，後者是豐盛；前者是傷害，後者是自由。第二，「我必衰微」不是「我變得沒價值、消失」，而是「我不再需要搶焦點、搶榮耀、證明自己」。施洗約翰說「他必興旺，我必衰微」時，他是「自我否定、覺得自己很卑微沒價值」嗎？完全不是！耶穌親自稱讚他「凡婦人所生的，沒有一個興起來大過施洗約翰的」（太11:11）。約翰清楚知道自己是誰（是為彌賽亞預備道路的、是新郎的朋友），正因為他的身份和價值如此穩固、如此被神肯定，他才能毫無不安、毫無失落地說「我必衰微」——他不需要跟耶穌爭那個焦點，因為他的價值不建立在「被看見」上。第三，神創造你、愛你、珍視你為寶貴——這跟「我必衰微」一點都不矛盾，反而是「我必衰微」的根基！正因為神已經如此愛你、看你為寶貴、你的價值在祂那裡已經是滿分了（不是靠你的表現、被看見才有價值），所以你才「不需要」再從被人看見、被人記得裡去掙價值。一個還在「拼命要被看見、怕被忘記、要證明自己」的人，恰恰是還沒真正相信「神已經看我為寶貴」的人——他還在靠人的肯定填補價值的空洞。而一個真正被神的愛充滿、深知自己在神眼中寶貴的人，反而能自由地、安穩地「衰微」、讓耶穌興旺——因為他的價值早已滿足，不必再抓。第四，更深一層看——「無己」恰恰是你「找到真正自我」的地方，不是「失去自我」。這正是321對「無己」最核心的定義：「無己不是沒有，是讓耶穌充滿」、「無己不是失去，是進入無限、活出無限」、「不再是我，乃是基督在我裡面活」（加2:20）。所以「我必衰微」衰微的，是那個「靠抓取、靠被看見、靠證明自己來建立價值的、虛假的、捆綁的小我」；而「他必興旺」興旺的，是「基督在你裡面的生命」——當基督在你裡面越興旺、越充滿，你反而越成為「神所創造的、真正的、自由的你」。這不是「你消失了」，而是「那個被罪和自我扭曲的假我消失了，那個在基督裡真實、自由、滿有神形象的真我，浮現了」。耶穌說「為我失喪生命的，將要得到生命」（太10:39）——你失喪那個靠抓取的假我，得到的是那個在基督裡豐盛的真我。所以「衰微」的盡頭，不是「沒有自我」，而是「在基督裡，第一次找到真正的、自由的自我」。第五，給你一個美麗的圖像：施洗約翰自稱是「新郎的朋友」（約3:29）——是伴郎。一個健康、有自我價值的伴郎，在婚禮上會「搶新郎的鋒頭、要大家都看他」嗎？不會。他會「滿心歡喜地」退到一旁，讓所有人的目光都聚焦在新郎新娘身上——而這不會讓他覺得自己卑微、沒價值，反而他「因新郎的聲音就甚喜樂」（約3:29）！他的喜樂，正來自「看見新郎被高舉、婚禮成全」。這就是「他必興旺、我必衰微」的真貌：不是悲情地自我否定，而是喜樂地、自由地，因「主被高舉」而滿足。所以，親愛的，請放心：神創造你、愛你，絕不是要你變得沒價值、卑微、消失。恰恰相反，祂要你的價值穩穩地立定在祂的愛裡——立定到一個地步，你「不再需要」靠被看見、被記得來填補它。然後，從這份「已經滿足、已經自由」的價值裡，你才能像施洗約翰、像伴郎那樣，喜樂地、毫無失落地說：「他必興旺，我必衰微。」那不是你的消失，那是你最自由、最有價值、最像神所造的那個你——一個被愛充滿、不必再為自己抓取、單單以「看見耶穌被高舉」為最大喜樂的你。這，就是無己生命最榮耀、也最自由的樣子。"}}],"focus":"當服事有了果效、得了稱讚，\n我心裡第一個浮現的，\n是「我做到了」，\n還是「這是神做的」？\n我的心，\n正悄悄把榮耀歸給誰？","hope":{"t":"✺ 把榮耀讓給神，你反而最自由","paras":["也許你以為「把榮耀歸給神」是神在跟你搶功勞，是一種屬靈的義務。但這一課要把真相交給你：⟦b:把榮耀歸給神，不是為了滿足神的需要，而是為了保護你、醫治你⟧——讓你在被神使用、有了能力果效之後，不被成功中的驕傲毀掉。","⟦g:當你真的看見「一切都是恩典」——能力是神給的、機會是神給的、果效是神做的、連能服事都是恩典——你就不會驕傲，反而更感恩、更謙卑、更輕省⟧。因為你卸下了「靠表現證明自己」的重擔。而「他必興旺，我必衰微」，不是你的失落，是你最深的自由與喜樂：當你越來越不需要被看見，你就越來越像那個被神的愛完全充滿、再無所求的、真正自由的你。"]},"still":"此刻安靜——\n回想最近一件「做得不錯、被稱讚」的事。\n求聖靈光照：\n那一刻，我的心，\n是收下了那份榮耀，\n還是把它轉獻給了神？","still_hint":"不必自責，現在就可以轉向。\n安靜一分鐘，\n把那份榮耀交還給主：\n「主啊，這是祢做的，\n一切的榮耀，都歸給祢。」","steps":[{"act":"每次服事後，刻意把榮耀歸給神：無論結果好壞，都禱告——「主，這一切都是祢做的，榮耀歸給祢。」不要停在「我做得如何」，要轉向「神得到榮耀沒有」。","meta":""},{"act":"操練在心中拆毀「自我中心」：當「我做得很好、沒有我不行、是我帶來改變」的念頭出現，立刻用真理取代——「若不是主，我什麼都不能。」","meta":""},{"act":"刻意高舉耶穌，而不是高舉自己：在分享、見證、服事中，多講神做了什麼，少講自己做了什麼，讓人看見的是神的作為、恩典與榮耀。","meta":""}],"declare":"主耶穌，我願意把一切榮耀都歸給祢。\n我承認：我所擁有的一切，都是祢的恩典。\n我宣告：不是我，乃是基督；\n不是我得榮耀，乃是耶穌得榮耀；\n他必興旺，我必衰微！\n願我的生命，單單高舉祢！\n奉主耶穌的名，阿們。","share":[{"tag":"領受","q":"「不是失敗毀掉人，是成功中的驕傲毀掉人」——希律的警惕，對「正在被神使用、或渴望被使用」的你，帶來什麼提醒？"},{"tag":"省察","q":"誠實面對：當我服事有果效、被人看見、被稱讚時，我心裡是更感恩（歸給神），還是會偷偷地享受、甚至開始覺得「是我厲害」（歸給自己）？"},{"tag":"同行","q":"這禮拜，請你操練「具體地歸榮耀給神」——在一次分享或見證中，刻意多講「神做了什麼」，少講「自己做了什麼」。說出來，讓小家的家人陪你一起、彼此守望。"}],"next":"服事之路—神（二）","prog":"87"},{"n":170,"unit":"第十單元 · 服侍——靈悟命侍神的得勝之路","title":"不見一人，\n只見耶穌","no":"170","greet":"願你來到主的面前，得享安息","verse":"他們舉目不見一人，只見耶穌在那裡。","verse_ref":"馬太福音 17:8","bigidea":"本課核心：服事走到最深處，不是更被看見，而是「越來越看不見自己」，讓所有人的眼目都轉向耶穌。不出頭，是保護榮耀歸神的關鍵；透過傳承與團隊（身體），讓耶穌成為唯一的頭；進入國度的服事，活出更深的隱藏——越隱藏，越被神使用。","lead":"服事走到最深的地方，不是更被看見，而是「越來越看不見自己」。真正成熟的服事，不是站在台前被高舉，而是讓所有人的眼目都轉向耶穌。主耶穌在變像山上顯出榮耀，彼得卻想要「搭三座棚」（一座給耶穌、一座給摩西、一座給以利亞），但神親自打斷他——「這是我的愛子……你們要聽他！」最後的畫面是：「他們舉目不見一人，只見耶穌在那裡。」（太17:8）這就是服事最高的境界：不見一人，只見耶穌。","sections":[{"h":"一不出頭，是保護榮耀歸給神的關鍵","paras":["⟦s:人很自然會想被肯定、被看見、被重用，但這正是屬靈最大的試探⟧。⟦s:當人被看見，焦點就會從「耶穌」轉到「人」⟧——就像魚缸裡顏色鮮豔的魚，很容易吸引目光，但人被看見，榮耀就被分散、甚至被奪走。","因此，屬靈的原則是：⟦b:越出頭 → 越危險；越隱藏 → 越安全⟧。出頭，就成為目標；目標明顯，就容易被攻擊、被跌倒。","⟦g:但當我們選擇「隱藏」——不爭位置、不搶焦點、不求名聲——人就不會被我們吸引，而會被耶穌吸引⟧。⟦g:不是我被看見，是耶穌被看見；隱藏自己，就是保護神的榮耀⟧。"],"deeper":{"q":"想更深？「越隱藏越安全、不出頭」——可是有些服事就是需要站在台前、需要有人帶領、需要被看見啊（講道、領詩、當領袖）。難道站在台前、被看見，就是錯的、就是危險的、就是不夠屬靈嗎？那些不得不「出頭」服事的人，怎麼辦？","a":"這是一個很重要的平衡問題，因為若把「隱藏」誤解成「絕不能站台前、被看見就是錯」，會讓許多神所呼召、要站在前面服事的人陷入不必要的內疚，也會讓教會失去帶領。第一，要先分清「位置」和「心」——「隱藏」講的不是「身體站在哪裡」，而是「心在不在焦點上」。聖經要對付的，從來不是「你的身體有沒有站在台前」，而是「你的心，是不是在貪戀、抓取那個焦點和榮耀」。一個人完全可以「身體站在台前（講道、領詩、帶領），心卻是隱藏的」——他站在前面，是因為神呼召他、託付他這個位置，但他的心毫不貪戀那個鋒頭，他站在前面的唯一目的，是「讓人透過他看見耶穌」，而不是「讓人看見他自己」。反過來，一個人也完全可能「身體躲在幕後，心卻一點都不隱藏」——他表面謙讓、不站前面，心裡卻在暗暗較勁、渴望被注意、抱怨自己不被看重。所以真正的「隱藏」是「心的隱藏」，不是「位置的隱藏」。站不站台前，本身沒有對錯；關鍵是「站在那個位置上的那顆心，是要榮耀自己，還是要榮耀耶穌」。第二，神確實「呼召某些人站在前面、被看見地服事」——這是神的安排，不是錯。神設立使徒、先知、傳福音的、牧師教師（弗4:11），這些角色很多都需要站在前面、被看見。摩西要站在百姓前面、保羅要公開傳道、彼得要在五旬節站起來講道——他們都「出頭」了，但他們不是在搶焦點榮耀自己，而是在順服神的呼召、承擔神給的位置、好讓神得榮耀、讓百姓得牧養。所以如果神呼召你站在前面服事，那「站出去」就是你的順服、是你該盡的責任，逃避反而是不順服。重點不是「逃避台前」，而是「帶著隱藏的心站在台前」。第三，那「站在台前的人」怎麼活出「隱藏」、怎麼不被那個試探毀掉？給站台前的人幾個守護：（1）時時校準「目的」——我站在這裡，是要讓人看見我，還是要讓人透過我看見耶穌？像施洗約翰那樣，他很「被看見」（眾人都出去到曠野找他），但他一被看見，就立刻把焦點推向耶穌：「祂必興旺，我必衰微」。被看見不可怕，可怕的是被看見時把焦點留給自己。（2）警醒「被看見」帶來的試探——掌聲、肯定、注目，會餵養人裡面的驕傲，所以站台前的人，要更加警醒地操練上一課的功課：每次被稱讚，刻意把榮耀轉獻給神；站得越前面、越被看見，就越要刻意地、更深地把榮耀歸給神，這是站台前者的「保命操練」。（3）守住「隱藏的內室生活」——一個健康地站在台前的人，一定有一個不被看見的、與神親密的內室生活，他在人前的「顯」，是建立在人後的「隱」（隱密的禱告、讀經、與神獨處）之上的。耶穌也是退到曠野獨自禱告，再出來服事。（4）活在團隊與遮蓋裡（這正是下一段的重點）——不要當孤星，而要在身體裡、在團隊裡服事，讓服事是「我們」，而不是「我一個人的舞台」。第四，回到平衡：所以「越隱藏越安全」這個原則，不是要每個人都躲起來、不敢站出來服事（那會讓神的工停擺），而是要對付那個「貪戀焦點、抓取榮耀、為被看見而服事」的「有己」之心。它真正的意思是：無論你站在台前還是幕後，都要有一顆隱藏的心——不爭、不搶、不貪戀焦點，唯一的渴望是讓耶穌被看見。站台前的，帶著隱藏的心站出去（為主、為人，不為自己被看見）；在幕後的，帶著喜樂的心配搭（不嫉妒、不較勁、不抱怨不被看見）。兩者都在「隱藏自己、高舉耶穌」，只是位置不同。所以，如果神呼召你站在前面，請安心地、順服地站出去——不要因為「怕被看見就不夠屬靈」而逃避你的呼召。你要做的，不是「躲起來」，而是「站在那裡，卻讓人不見你、只見耶穌」——像施洗約翰，被看見，卻立刻指向基督；像那變像山上的時刻，連摩西、以利亞都隱去，最後「不見一人，只見耶穌」。這，才是「隱藏」最深、最美的意思：不是你的位置消失了，而是在你的服事裡，你淡出了，耶穌凸顯了。"}},{"h":"二透過傳承與團隊，讓耶穌成為唯一的頭","paras":["要活出「不見一人，只見耶穌」，需要實際的策略。⟦g:第一，傳承的生命——帶、陪、放⟧。不是建立「我很厲害」，而是建立「很多人都被成全」。當你願意讓別人比你更好，焦點就不在你，榮耀就歸給神；當一代比一代更興旺，就不會有「明星人物」，只有神的工作、神的榮耀。","⟦g:第二，身體的服事⟧。「你們就是基督的身子，並且各自作肢體。」（林前12:27）⟦b:教會不是舞台，是身體——沒有人是全部，每個人都是一部分⟧。當大家都活在肢體的位置，沒有人突出，沒有人取代耶穌，因為——只有耶穌是頭。","⟦g:不是一個人完成，是整個身體配搭；不是誰最重要，是耶穌最重要；真正的合一，是一起讓耶穌作王⟧。"],"deeper":{"q":"想更深？「身體、肢體、配搭、合一」聽起來很美，但實際在團隊服事裡，最讓人受傷、最難的，恰恰就是「人」：有人爭、有人推卸、有人不配合、有人意見不合、有人受傷退出……為什麼「身體的服事」理論上很美，實際卻這麼難、這麼多衝突？真正的「合一」要怎麼可能？","a":"你說出了團隊服事最真實、也最痛的部分。先看「為什麼這麼難」——因為團隊服事，恰恰是「有己」最容易被引爆、也最容易彼此碰撞的地方。一個人獨自服事時，他的「己」沒有對象去碰撞；但一進到團隊，每個人都帶著各自的「己」（自己的想法、方式、面子、想被看見、想作主）進來——於是「己」與「己」相遇，就產生了你說的那一切：有人爭（爭位置、爭功勞、爭主導），是「己」要被高舉；有人推卸，是「己」要保護自己、怕擔責任；有人不配合、堅持己見，是「己」要照自己的意思；有人因意見不合而受傷，是「己」被冒犯、被否定。團隊衝突的根，幾乎都是「己」——是多個「有己」的生命碰在一起的必然結果。所以「身體的合一」，恰恰是「無己生命」最高、最難的試煉場。理論上很美，實際很難，正是因為它要求每一個肢體都「無己」。那「合一如何可能」？關鍵就在這裡：真正的合一，不是靠方法、技巧、制度（那些有幫助，但不是根本），而是靠「每個肢體都無己、都讓耶穌作頭」。第一，合一的根基，是「都連於同一個頭——耶穌」。身體為什麼能協調？因為所有肢體都聽從同一個頭的指揮。手和腳不會打架，因為它們都聽大腦的。團隊之所以衝突，往往是因為「有太多個頭」——每個人都想當頭、都要別人聽我的。真正合一的關鍵，不是「大家彼此遷就」（那很表面、撐不久），而是「每個人都先降服於那唯一的頭——耶穌」。當每個肢體都不再堅持「我這個頭」，而是一起仰望、順服「耶穌這個頭」，問「主，祢的心意是什麼」，那麼分歧就有了一個「之上的、共同的權威」可以歸回——不是「我贏你輸」，而是「我們一起聽主的」。第二，合一需要「無己」——這是最難、卻最根本的。林前12章講「身體」，緊接著就是林前13章「愛的真諦」，這不是巧合——身體要合一，唯一的黏合劑是「愛」，而愛的核心是「不求自己的益處、不輕易發怒、不計算人的惡」（林前13:5），這正是「無己」。團隊裡的衝突，解法從來不是「先要求別人改」，而是「我先無己」：我先放下我的面子、我的堅持、我想被看見的渴望；我先選擇成全別人、看別人比自己強（腓2:3）；我先饒恕那個冒犯我的肢體；我先去丟繩子而不是丟石頭（這正是第九單元156課的功課）。第三，要有正確的「期待」——身體裡有摩擦，是「正常」的，不是「失敗」。我們常以為「真正屬靈的團隊應該毫無衝突」，於是一遇衝突就灰心、就想退出。但只要是「人」組成的團隊，就一定有摩擦——連耶穌的十二門徒都會爭「誰為大」（路22:24）、保羅和巴拿巴都會「爭論到分開」（徒15:39）。摩擦本身不是失敗的證據，重點是「摩擦來時，我們怎麼處理」——是讓「己」主導、彼此攻擊隔離（兩敗俱傷），還是讓「無己」主導、彼此饒恕成全（達到雙贏）？這正是321講的：「驕傲對抗驕傲，兩敗俱傷；謙卑帶動謙卑，達到雙贏。」第四，給你一個釋放與盼望：你不能控制別
